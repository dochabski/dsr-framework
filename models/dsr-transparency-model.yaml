  item_type: specification
  model_type: conceptual_operational_model
  title: DSR Transparency Model
  subtitle: Six-dimension model for planning, documenting, reviewing, and publishing transparent Design Science Research
  purpose: 'Define a reviewable six-dimension transparency model for Design Science Research (DSR) artifact packages. The
    model specifies controlled entities, relationships, evidence expectations, boundary conditions, validation implications,
    and traceability needed to document process, problem-space, solution-space, build, evaluation, and contribution transparency
    without overclaiming reproducibility, publication readiness, or empirical validation.

    '
