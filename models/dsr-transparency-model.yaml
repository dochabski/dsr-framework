  description: 'Build choices should be linked to relevant theories, prior artifacts, methods, technologies, design principles,
    or justified alternatives.

    '
- relationship_id: rel_process_explains_build_and_evaluation
  from_dimension: process_transparency
  to_dimension: build_transparency
