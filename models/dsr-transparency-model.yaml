assumptions:
- id: asm_transparency_dimensions_source
  statement: 'The six model dimensions are adopted as process, problem_space, solution_space, build, evaluation, and contribution
    transparency.

    '
  rationale: 'This is the central structure of the DSR Transparency Framework in the internal corpus.

    '
- id: asm_l2_scope
  statement: 'L2 reviewable conformance requires controlled definitions, evidence fields, validation logic, and traceability,
    but does not require executable schema validation or empirical evaluation of the transparency model itself.

    '
  rationale: 'The selected row requests a model file at default L2 conformance, not a schema, checklist, or validation automation.

    '
- id: asm_no_forced_full_openness
  statement: 'Transparency means proportionate, justified disclosure rather than mandatory full publication of every artifact,
    dataset, source-code repository, or proprietary detail.

    '
  rationale: 'DSR transparency must account for privacy, security, intellectual property, maintenance burden, and publication-process
    burden.

    '
controlled_entities:
- id: transparency_profile
  label: Transparency Profile
  entity_type: aggregate_record
  definition: 'Project-level declaration of what transparency dimensions apply to a DSR artifact package, what evidence is
    available for each dimension, what disclosure level is used, and what limitations or withholding rationales are documented.

    '
  required_fields:
  - profile_id
  - artifact_or_project_id
  - applicable_dimensions
  - evidence_inventory
  - disclosure_levels
  - withholding_rationales
  - reviewer_notes
  boundary_notes: 'A transparency profile is not itself an evaluation report or contribution claim; it indexes evidence that
    may reside in other package records.

    '
- id: transparency_dimension
  label: Transparency Dimension
  entity_type: controlled_class
  definition: 'One of the six DSR-specific transparency areas that must be considered when planning, documenting, reviewing,
    or publishing a DSR artifact package.

    '
  required_fields:
  - dimension_id
  - label
  - definition
  - purpose
  - applicability_rule
  - evidence_expectations
  - review_questions
  - failure_modes
- id: transparency_evidence_item
  label: Transparency Evidence Item
  entity_type: evidence_object
  definition: 'A retained document, record, file, log, table, model, diagram, dataset, design rationale, evaluation artifact,
    or publication material used to substantiate a transparency claim.

    '
  required_fields:
  - evidence_id
  - evidence_type
  - linked_dimension_id
  - location_or_path
  - access_status
  - sensitivity_level
  - evidence_summary
  - limitations
- id: disclosure_level
  label: Disclosure Level
  entity_type: controlled_value
  definition: 'A proportionate access and detail level assigned to a transparency evidence item or dimension.

    '
  allowed_values:
  - full_public
  - public_summary
  - repository_available
  - controlled_access
  - private_retained_record
  - withheld_with_rationale
  - not_applicable
  boundary_notes: 'Disclosure level is not a quality rating. A private retained record may be appropriate when public disclosure
    would create confidentiality, privacy, security, or intellectual-property risk.

    '
- id: withholding_rationale
  label: Withholding Rationale
  entity_type: justification_record
  definition: 'A documented reason that a transparency evidence item is not publicly released or is released only at reduced
    granularity.

    '
  required_fields:
  - rationale_id
  - affected_evidence_id
  - reason_category
  - explanation
  - reviewer_access_option
  - residual_risk
  allowed_reason_categories:
  - privacy_or_human_subjects
  - proprietary_or_ip
  - security_risk
  - third_party_rights
  - artifact_maintenance_burden
  - context_sensitivity
  - publication_space_or_format_constraint
  - unavailable_or_not_collected
- id: transparency_review_finding
  label: Transparency Review Finding
  entity_type: review_output
  definition: 'A reviewer judgment about whether transparency evidence is sufficient, proportionate, coherent, and aligned
    with the artifact package claims.

    '
  required_fields:
  - finding_id
  - dimension_id
  - finding_status
  - evidence_reviewed
  - deficiency
  - remediation
  allowed_status_values:
  - pass
  - conditional_pass
  - fail
  - not_applicable
  - deferred
transparency_dimensions:
- dimension_id: process_transparency
  label: Process Transparency
  definition: 'Transparency about the actual DSR process by which artifacts and design knowledge were generated, including
    activities, reasoning, context, decisions, iteration, divergence from plans, and emergent changes.

    '
  purpose: 'Enable reviewers, readers, and future researchers to understand how the research unfolded, why activities were
    performed, and how process choices shaped artifact and knowledge outcomes.

    '
  applicability_rule: 'Applies to all DSR artifact packages. Minimum evidence may be lighter for conceptual models than for
    fielded instantiations, but some process account is always required.

    '
  lifecycle_stage_alignment:
  - project_chartering
  - problem_framing
  - design_and_build
  - demonstration
  - evaluation
  - communication
  minimum_evidence:
  - process_summary
  - major_activity_sequence
  - decision_log_or_design_rationale_links
  - deviations_from_original_plan
  - iteration_summary
  recommended_evidence:
  - dated_activity_log
  - design_decision_records
  - meeting_notes_or_workshop_records
  - version_history
  - process_diagram
  - reflective_memos_on_design_theorizing
  review_questions:
  - question_id: rq_process_01
    question: Does the package describe what was actually done, not only the idealized method sequence?
  - question_id: rq_process_02
    question: Are major design decisions, pivots, and iterations linked to rationale or evidence?
  - question_id: rq_process_03
    question: Can a reviewer distinguish planned activities from emergent or retrospective framing?
  failure_modes:
  - id: fm_process_ex_post_dsr_ification
    description: Project is retrospectively framed as DSR without showing DSR reasoning during the work.
  - id: fm_process_idealized_method_only
    description: Reporting follows a generic method template but omits actual sequence, deviations, and rationale.
  - id: fm_process_lost_design_reasoning
    description: Important design reasoning is missing because process records were not kept concurrently.
  validation_implications:
    required_for_l2: true
    schema_fields:
    - process_summary
    - process_records
    - design_decisions
    - iterations
    - deviations
    checklist_mapping:
    - checklist_transparency.process_evidence
    - checklist_minimum_dsr.process_identity
  source_traceability:
    primary_source_ids:
    - hevner_et_al_2024_transparency_in_design_science_research
    - dsr_process_journaling_source
    citation_anchor_ids:
    - CA06
- dimension_id: problem_space_transparency
  label: Problem-Space Transparency
  definition: 'Transparency about the problem context, application domain, stakeholders, scope, improvement goals, timeframe,
    resources, constraints, risks, and boundary conditions that make the artifact relevant.

    '
  purpose: 'Support relevance, acceptance criteria, evaluation design, transfer assessment, and interpretation of artifact
    utility in context.

    '
  applicability_rule: 'Applies to all DSR projects, including conceptual and methodological artifacts, because each must state
    the problem class or methodological gap it addresses.

    '
  lifecycle_stage_alignment:
  - problem_framing
  - objectives_and_requirements
  - evaluation_planning
  - communication
  minimum_evidence:
  - problem_statement
  - problem_class
  - stakeholder_map
  - scope_and_boundary_conditions
  - improvement_goals
  - timeframe_or_project_phase
  - constraints_and_assumptions
  recommended_evidence:
  - needs_assessment
  - context_diagram
  - stakeholder_interview_or_workshop_summary
  - baseline_process_or_artifact_description
  - acceptance_criteria
  - risk_register
  review_questions:
  - question_id: rq_problem_01
    question: Is the local problem instance linked to a broader problem class or research gap?
  - question_id: rq_problem_02
    question: Are stakeholders, constraints, and boundary conditions explicit enough to judge relevance?
  - question_id: rq_problem_03
    question: Are evaluation criteria traceable to problem-space goals?
  failure_modes:
  - id: fm_problem_context_free_claim
    description: Artifact utility is claimed without specifying the problem context in which it matters.
  - id: fm_problem_unbounded_scope
    description: Problem scope is too broad or unstable to support coherent design requirements or evaluation.
  - id: fm_problem_missing_stakeholders
    description: Stakeholders affected by the artifact are unnamed or treated generically.
  validation_implications:
    required_for_l2: true
    schema_fields:
    - problem_statement
    - problem_class
    - stakeholders
    - context
    - goals
    - constraints
    - boundary_conditions
    checklist_mapping:
    - checklist_transparency.problem_space_evidence
    - checklist_minimum_dsr.problem_relevance
  source_traceability:
    primary_source_ids:
    - hevner_et_al_2024_transparency_in_design_science_research
    citation_anchor_ids:
    - CA07
- dimension_id: solution_space_transparency
  label: Solution-Space Transparency
  definition: 'Transparency about the knowledge bases, theories, technologies, prior artifacts, design patterns, methods,
    standards, alternatives, and solution candidates that ground or inform artifact design.

    '
  purpose: 'Support rigor, design search, novelty assessment, alternative comparison, reuse, and contribution positioning.

    '
  applicability_rule: 'Applies when the artifact depends on existing descriptive, explanatory, prescriptive, technical, methodological,
    or domain knowledge. If the solution space is intentionally exploratory, the search boundary and uncertainty must still
    be documented.

    '
  lifecycle_stage_alignment:
  - solution_space_grounding
  - objectives_and_requirements
  - design_and_build
  - contribution_positioning
  - communication
  minimum_evidence:
  - knowledge_base_summary
  - prior_artifact_or_method_review
  - relevant_theories_or_design_knowledge
  - alternatives_considered
  - novelty_or_gap_statement
  - search_or_selection_rationale
  recommended_evidence:
  - search_terms_and_sources
  - comparison_matrix
  - design_pattern_inventory
  - reusable_component_list
  - theory_or_design_principle_crosswalk
  - excluded_alternatives_with_rationale
  review_questions:
  - question_id: rq_solution_01
    question: Does the package explain what prior knowledge and prior artifacts shaped the design?
  - question_id: rq_solution_02
    question: Are alternatives, rejected options, and novelty claims traceable to evidence?
  - question_id: rq_solution_03
    question: Are knowledge-base limitations and unresolved uncertainties declared?
  failure_modes:
  - id: fm_solution_black_box_grounding
    description: Artifact design appears as an unsupported creative leap without grounding in existing knowledge.
  - id: fm_solution_novelty_overclaim
    description: Novelty is asserted without comparing prior artifacts, theories, or methods.
  - id: fm_solution_missing_search_boundary
    description: Search coverage and inclusion boundaries are not documented.
  validation_implications:
    required_for_l2: true
    schema_fields:
    - knowledge_base_summary
    - source_basis
    - prior_artifacts
    - alternatives
    - novelty_claims
    - exclusions
    checklist_mapping:
    - checklist_transparency.solution_space_evidence
    - checklist_contribution_positioning.prior_knowledge_grounding
  source_traceability:
    primary_source_ids:
    - hevner_et_al_2024_transparency_in_design_science_research
    citation_anchor_ids:
    - CA08
- dimension_id: build_transparency
  label: Build Transparency
  definition: 'Transparency about how the artifact was designed, constructed, configured, encoded, assembled, prototyped,
    or specified, including design search, creative reasoning, collaboration, make plans, use plans, components, dependencies,
    and versioned changes.

    '
  purpose: 'Make artifact construction intelligible enough to assess artifact quality, design rationale, reuse potential,
    and the relationship between artifact form and intended function.

    '
  applicability_rule: 'Applies to all artifact types. For conceptual models, build evidence may consist of modeling decisions,
    entity selection, boundary decisions, and source synthesis. For software or technical instantiations, code, architecture,
    configuration, and deployment evidence may be required or justified as withheld.

    '
  lifecycle_stage_alignment:
  - design_and_build
  - demonstration
  - evaluation
  - packaging
  minimum_evidence:
  - artifact_description
  - artifact_boundary
  - component_inventory
  - design_rationale
  - version_or_change_summary
  - dependencies_or_inputs
  - build_limitations
  recommended_evidence:
  - architecture_diagram
  - make_plan
  - use_plan
  - source_code_or_pseudocode
  - configuration_records
  - design_decision_records
  - screenshots_or_interaction_examples
  - prototype_iteration_history
  review_questions:
  - question_id: rq_build_01
    question: Can the reviewer understand what was built and where the artifact boundary lies?
  - question_id: rq_build_02
    question: Are component choices, design decisions, and dependencies documented?
  - question_id: rq_build_03
    question: Are withheld build details justified by privacy, security, IP, or maintenance constraints?
  failure_modes:
  - id: fm_build_artifact_boundary_blur
    description: The artifact is conflated with the entire system, organization, project, or evaluation setting.
  - id: fm_build_hidden_dependencies
    description: Important dependencies, configuration choices, or assumptions are omitted.
  - id: fm_build_unmaintainable_transparency_commitment
    description: The package promises executable artifact availability without a feasible maintenance plan.
  validation_implications:
    required_for_l2: true
    schema_fields:
    - artifact_boundary
    - components
    - build_process
    - design_rationale
    - dependencies
    - version_history
    - withholding_rationales
    checklist_mapping:
    - checklist_transparency.build_evidence
    - checklist_package_readiness.artifact_materials
  source_traceability:
    primary_source_ids:
    - hevner_et_al_2024_transparency_in_design_science_research
    - weigand_johannesson_andersson_2021_artifact_ontology_for_dsr
    citation_anchor_ids:
    - CA09
    - CA13
    - CA14
    - CA18
- dimension_id: evaluation_transparency
  label: Evaluation Transparency
  definition: 'Transparency about how the artifact was, is, or will be evaluated, including evaluation purpose, timing, setting,
    criteria, methods, units, data, results, limitations, and the alignment between evidence and claims.

    '
  purpose: 'Build stakeholder confidence by showing how artifact utility, artifact quality, fitness for use, fitness for evolution,
    validity threats, limitations, and evaluation boundaries were assessed.

    '
  applicability_rule: 'Applies when evaluation has occurred or is planned. If no empirical evaluation has occurred, the package
    must distinguish demonstration, conceptual argument, planned evaluation, and completed evaluation.

    '
  lifecycle_stage_alignment:
  - evaluation_planning
  - demonstration
  - evaluation
  - review
  - communication
  minimum_evidence:
  - evaluation_status
  - evaluation_questions_or_claims
  - evaluation_criteria
  - method_or_design
  - evidence_or_data_summary
  - findings_summary
  - limitations_and_threats
  - claim_alignment
  recommended_evidence:
  - evaluation_plan
  - evaluation_report
  - instruments_or_protocols
  - data_dictionary_or_dataset_link
  - analysis_script_or_pseudocode
  - reviewer_or participant role summaries
  - formative_and_summative_evaluation_crosswalk
  review_questions:
  - question_id: rq_evaluation_01
    question: Are demonstration and evaluation clearly distinguished?
  - question_id: rq_evaluation_02
    question: Are evaluation methods and criteria aligned with stated artifact and contribution claims?
  - question_id: rq_evaluation_03
    question: Are limitations, threats to validity, and non-evaluated claims explicit?
  failure_modes:
  - id: fm_evaluation_demonstration_overclaim
    description: A demonstration or example is presented as if it were empirical evaluation evidence.
  - id: fm_evaluation_claim_evidence_gap
    description: Contribution or utility claims exceed what evaluation evidence can support.
  - id: fm_evaluation_context_opacity
    description: Evaluation context, units, criteria, or data are insufficiently described.
  validation_implications:
    required_for_l2: true
    schema_fields:
    - evaluation_status
    - evaluation_plan
    - evaluation_report
    - criteria
    - methods
    - findings
    - limitations
    - claim_alignment
    checklist_mapping:
    - checklist_transparency.evaluation_evidence
    - checklist_evaluation_readiness.claim_alignment
  source_traceability:
    primary_source_ids:
    - hevner_et_al_2024_transparency_in_design_science_research
    - venable_et_al_2016_feds_if_available
    citation_anchor_ids:
    - CA10
- dimension_id: contribution_transparency
  label: Contribution Transparency
  definition: 'Transparency about what the DSR project contributes to practice, design knowledge, methodology, theory, evaluation,
    validity, reliability, publication practice, or other research and practitioner communities.

    '
  purpose: 'Clarify the difference between artifact utility, artifact quality, and contribution to knowledge; distinguish
    descriptive and prescriptive knowledge; and support appropriate communication to scholarly and practitioner audiences.

    '
  applicability_rule: 'Applies to all DSR artifact packages. At minimum, the package must state the contribution claim, contribution
    type, knowledge goal, knowledge scope, evidence basis, and limitations.

    '
  lifecycle_stage_alignment:
  - contribution_positioning
  - evaluation
  - communication
  - publication
  - release
  minimum_evidence:
  - contribution_claims
  - contribution_type
  - knowledge_goal
  - knowledge_scope
  - practice_contribution
  - scholarly_contribution
  - evidence_basis
  - limitations
  recommended_evidence:
  - contribution_positioning_record
  - claim_evidence_matrix
  - design_principles_or_design_theory_elements
  - knowledge_path_or_contribution_sequence
  - audience_specific_communication_plan
  - practitioner_guidance_or_reuse_notes
  review_questions:
  - question_id: rq_contribution_01
    question: Are artifact utility, artifact quality, and knowledge contribution separated?
  - question_id: rq_contribution_02
    question: Are contribution claims scoped as idiographic, nomothetic, mixed, or projectable?
  - question_id: rq_contribution_03
    question: Are practice and scholarly impacts both addressed when claimed?
  failure_modes:
  - id: fm_contribution_utility_equals_knowledge
    description: The artifact is useful locally, but no distinct design knowledge or contribution is articulated.
  - id: fm_contribution_overgeneralization
    description: Context-specific findings are reported as broadly generalizable without projectability evidence.
  - id: fm_contribution_audience_mismatch
    description: Contribution is written only for scholars or only for practitioners despite claiming both audiences.
  validation_implications:
    required_for_l2: true
    schema_fields:
    - contribution_claims
    - knowledge_goal
    - knowledge_scope
    - evidence_basis
    - audience_mapping
    - limitations
    checklist_mapping:
    - checklist_transparency.contribution_evidence
    - checklist_contribution_positioning.claim_scope
  source_traceability:
    primary_source_ids:
    - hevner_et_al_2024_transparency_in_design_science_research
    - akoka_comyn_wattiau_prat_storey_2023_knowledge_contributions_in_dsr
    citation_anchor_ids:
    - CA11
    - A07
    - A08
    - A13
    - A14
