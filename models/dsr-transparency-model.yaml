quality_and_conformance:
  conformance_level: l2_reviewable
  acceptance_criteria:
  - criterion_id: ac_model_complete_dimensions
    statement: The model defines all six transparency dimensions with definitions, evidence expectations, review questions,
      and failure modes.
    evidence: transparency_dimensions
  - criterion_id: ac_relationships_explicit
    statement: The model defines relationships among transparency dimensions and explains how evidence constrains claims.
    evidence: relationships
  - criterion_id: ac_traceability_present
    statement: The model contains source_basis and source_traceability entries tied to DSR corpus source IDs and citation
      anchors where available.
    evidence: source_basis and dimension-level source_traceability
  - criterion_id: ac_reviewable
    statement: The model includes validation rules, acceptance criteria, and checklist/schema implications sufficient for
      reviewer assessment.
    evidence: transparency_profile_schema_implications and quality_gates
  - criterion_id: ac_no_overclaim
    statement: The model explicitly distinguishes demonstration from evaluation and proportionate transparency from full openness.
    evidence: evaluation_transparency and limitations_and_non_goals
  quality_gates:
  - gate_id: qg_consistency
    status: pass
    rationale: Uses lower-kebab-case target path, YAML source-of-truth format, stable lower_snake_case identifiers, and controlled
      item metadata.
  - gate_id: qg_coherence
    status: pass
    rationale: Aligns with lifecycle, evaluation, contribution, schema, template, checklist, and documentation items through
      related_items.
  - gate_id: qg_cogency
    status: pass
    rationale: Organizes the model from identity to dimensions, relationships, evidence model, validation implications, and
      limitations.
  - gate_id: qg_correspondence
    status: pass
    rationale: Corresponds to the selected model_transparency target and supports the DSR Framework artifact package.
  - gate_id: qg_dsr_transparency
    status: pass
    rationale: The entire file operationalizes process, problem-space, solution-space, build, evaluation, and contribution
      transparency.
  - gate_id: qg_reviewability
    status: pass
    rationale: Includes acceptance criteria, review questions, validation rules, evidence fields, and failure modes.
