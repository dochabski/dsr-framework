  selection_id: model_reliability
  title: DSR Reliability Model
  item_type: specification
  output_format: yaml
  target_path: models/dsr-reliability-model.yaml
  purpose: 'Define a reviewable reliability model for Design Science Research (DSR) artifacts, DSR methods, evaluation measures,
    and design knowledge. The model distinguishes what is being assessed for reliability, when reliability is assessed, what
    evidence may support the claim, and how reliability claims should be bounded, reviewed, and traced.

    '
