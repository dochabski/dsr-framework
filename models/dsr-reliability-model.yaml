model_scope:
  applies_to:
  - dsr_artifact_design_and_evaluation
  - dsr_method_selection_and_use
  - dsr_evaluation_measure_selection_and_use
  - dsr_design_knowledge_claims
  - review_of_dsr_artifact_packages
  does_not_replace:
  - validity_model
  - evaluation_alignment_model
  - projectability_model
  - replication_model
  - technical_safety_or_security_assurance_standard
  reliability_positioning:
    definition: 'Reliability is the dependability, consistency, or stability of a specified DSR target under specified conditions
      and time horizons. A reliability claim is incomplete unless it states the target, mode, evidence basis, boundary conditions,
      and relationship to validity or projectability claims.

      '
    relation_to_validity: 'Reliability supports validity by reducing uncertainty about whether an artifact, method, measure,
      or design-knowledge claim can be trusted. It is not identical to validity because a result may be consistent without
      being appropriate, useful, or true for the intended claim.

      '
    relation_to_replication: 'Reliability may support replication or reduce the need for full replication in some DSR cases,
      but it does not replace replication. Replication remains a separate concern when the claim depends on repeated construction,
      evaluation, transfer, or reuse.

      '
    relation_to_projectability: 'Diachronic reliability provides evidence that a result, artifact, method, measure, or design
      knowledge may remain dependable across time, settings, versions, or related problem classes. Projectability claims still
      require explicit boundary and transfer logic.

      '
controlled_entities:
  reliability_target:
    description: What is being assessed for reliability.
    entries:
    - id: artifact_reliability
      label: Artifact reliability
      definition: 'The dependability of a DSR artifact''s performance, capacities, or use effects under specified conditions.

        '
      allowed_use: 'Use when the claim concerns whether the artifact itself performs consistently, robustly, or dependably
        in an intended environment or across environments.

        '
      boundary_notes: 'Do not use as a generic substitute for artifact utility or artifact validity. Utility asks whether
        the artifact is useful; artifact reliability asks whether the relevant artifact behavior is dependable.

        '
      typical_units_of_analysis:
      - artifact_type
      - artifact_instance
      - prototype
      - instantiation
      - algorithm
      - model
      - method_artifact
      - socio_technical_system_artifact
      common_evidence:
      - robustness_test_results
      - failure_mode_analysis
      - performance_stability_observations
      - capacity_verification
      - repeated_demonstrations
      - field_use_logs
      - maintenance_or_defect_records
    - id: method_reliability
      label: Method reliability
      definition: 'The dependability of the DSR method, procedure, or process by which the artifact and design knowledge are
        produced, selected, evaluated, or justified.

        '
      allowed_use: 'Use when the claim concerns whether a DSR procedure can be applied consistently enough to produce trustworthy
        project conduct, artifacts, or knowledge claims.

        '
      boundary_notes: 'Distinguish from process transparency. Process transparency documents what occurred; method reliability
        assesses whether the method was sufficiently dependable and consistently applied for the claim being made.

        '
      typical_units_of_analysis:
      - dsr_methodology
      - research_protocol
      - design_process
      - build_process
      - evaluation_process
      - coding_or_classification_procedure
      common_evidence:
      - protocol_adherence_records
      - process_logs
      - design_decision_records
      - independent_audit
      - inter_coder_or_inter_reviewer_agreement
      - repeat_application_across_cases
      - method_variant_rationale
    - id: measure_reliability
      label: Measure reliability
      definition: 'The consistency of measures, observations, instruments, scales, coded judgments, or evaluation indicators
        used to assess DSR artifact utility, quality, effects, or contribution claims.

        '
      allowed_use: 'Use when the evidence base depends on measurement instruments, evaluator judgments, indicators, ratings,
        usage metrics, observations, or coded data.

        '
      boundary_notes: 'Do not collapse measure reliability into evaluation validity. Reliable measures are necessary but not
        sufficient for credible evaluation.

        '
      typical_units_of_analysis:
      - survey_scale
      - rubric
      - observation_protocol
      - performance_metric
      - coded_publication_sample
      - expert_rating
      - usage_metric
      common_evidence:
      - inter_rater_agreement
      - internal_consistency
      - test_retest_results
      - calibration_records
      - measurement_invariance_check
      - triangulation
      - instrument_pilot_results
    - id: design_knowledge_reliability
      label: Design knowledge reliability
      definition: 'The dependability of prescriptive or explanatory design knowledge when used to understand, build, adapt,
        evaluate, or reuse artifacts within stated contexts or problem classes.

        '
      allowed_use: 'Use when the claim concerns whether design principles, design theories, contribution claims, or artifact-related
        knowledge remain trustworthy beyond a single observation or local artifact instance.

        '
      boundary_notes: 'Do not overstate this as universal generalizability. Design knowledge reliability must identify context,
        problem class, artifact boundary, mechanism, and evidence limits.

        '
      typical_units_of_analysis:
      - design_principle
      - design_theory
      - contribution_claim
      - artifact_pattern
      - method_guideline
      - reusable_design_specification
      - problem_class_claim
      common_evidence:
      - saturated_field_evidence
      - cross_case_support
      - rival_explanation_analysis
      - conceptual_replication
      - differentiated_replication
      - transfer_case_documentation
      - boundary_condition_mapping
  reliability_mode:
    description: When or over what horizon reliability is being assessed.
    entries:
    - id: synchronic_internal_reliability
      label: Synchronic or internal reliability
      definition: 'Reliability assessed at a point in time, within a case, within a study, or across contemporaneous observations,
        evaluators, measures, or artifact uses.

        '
      allowed_use: 'Use for same-study or same-period evidence such as triangulation, multiple observers, inter-rater agreement,
        internal consistency, or intensive within-case assessment.

        '
      boundary_notes: 'Synchronic evidence does not by itself justify claims about future use, longitudinal stability, or
        cross-context projectability.

        '
    - id: diachronic_external_reliability
      label: Diachronic or external reliability
      definition: 'Reliability assessed across time, versions, deployments, cases, contexts, evaluators, problem-class instances,
        or subsequent research projects.

        '
      allowed_use: 'Use for repeated assessment, longitudinal evidence, cross-case evidence, reuse, transfer, maintenance,
        or follow-on study evidence.

        '
      boundary_notes: 'Diachronic evidence must specify what changed and what was held stable; otherwise repeated observation
        can obscure rather than clarify reliability.

        '
  reliability_claim_strength:
    description: Strength levels for reviewing how far a reliability claim may go.
    entries:
    - id: not_assessed
      label: Not assessed
      definition: No reliability evidence is provided for the target.
      allowed_use: Use when reliability is irrelevant, unavailable, or not yet examined.
    - id: minimally_documented
      label: Minimally documented
      definition: 'The target and intended reliability concern are identified, but evidence is limited to description, rationale,
        or untested assumption.

        '
      allowed_use: Use for early-stage planning, concept papers, or prototype packages.
    - id: plausibly_supported
      label: Plausibly supported
      definition: 'Some direct evidence is provided, but scope, sample, duration, or independence is limited.

        '
      allowed_use: Use when evidence supports cautious local reliability claims.
    - id: well_supported
      label: Well supported
      definition: 'Multiple evidence sources support the target, and major threats or boundary conditions are documented.

        '
      allowed_use: Use when reliability can be reviewed confidently for the declared scope.
    - id: strongly_supported
      label: Strongly supported
      definition: 'Independent, repeated, or cross-context evidence supports the target, with documented threats, limitations,
        and transfer conditions.

        '
      allowed_use: Use only when the claim is backed by robust synchronic and/or diachronic evidence.
  evidence_role:
    description: Functional roles evidence can play in a reliability argument.
    entries:
    - id: direct_reliability_evidence
      definition: Evidence directly assessing dependability, consistency, or stability of the target.
    - id: indirect_reliability_evidence
      definition: Evidence that supports reliability through adjacent documentation or evaluation evidence.
    - id: threat_mitigation_evidence
      definition: Evidence showing that known reliability threats were reduced or controlled.
    - id: boundary_evidence
      definition: Evidence defining where the reliability claim does and does not apply.
    - id: negative_or_failure_evidence
      definition: Evidence of unreliability, instability, defect, disagreement, drift, or failed transfer.
reliability_matrix:
  description: 'Operational crosswalk of the four DSR reliability targets and two reliability modes. Each cell states the
    review question, evidence examples, claim limits, and recommended records.

    '
  cells:
  - cell_id: artifact_synchronic_reliability
    target: artifact_reliability
    mode: synchronic_internal_reliability
    review_question: 'Does the artifact perform dependably under the current evaluation conditions and for the intended users,
      tasks, inputs, or use context?

      '
    evidence_examples:
    - controlled_demonstration_results
    - acceptance_test_results
    - artifact_capacity_checks
    - robustness_or_stress_tests
    - defect_or_failure_logs
    - concurrent_observations_from_multiple_evaluators
    claim_limit: 'Supports current-scope artifact dependability only. Does not by itself support long-term stability or transfer
      to materially different settings.

      '
    recommended_records:
    - artifact_specification_record
    - demonstration_record
    - evaluation_report
    - review_record
  - cell_id: artifact_diachronic_reliability
    target: artifact_reliability
    mode: diachronic_external_reliability
    review_question: 'Does the artifact or artifact type continue to perform dependably across time, versions, deployments,
      settings, or related problem instances?

      '
    evidence_examples:
    - longitudinal_monitoring
    - repeated_deployment_results
    - version_comparison_results
    - maintenance_records
    - cross_context_field_evaluations
    - differentiated_replication_records
    claim_limit: 'Supports bounded artifact stability or transfer only when contextual differences, version changes, and maintenance
      conditions are documented.

      '
    recommended_records:
    - release_record
    - preservation_record
    - evaluation_report
    - projectability_record
  - cell_id: method_synchronic_reliability
    target: method_reliability
    mode: synchronic_internal_reliability
    review_question: 'Was the DSR method applied consistently and traceably within the current study, build process, evaluation
      process, or coding/classification task?

      '
    evidence_examples:
    - protocol_adherence_record
    - activity_log
    - design_decision_record
    - peer_audit
    - inter_coder_agreement
    - consistency_check_against_workflow
    claim_limit: 'Supports the dependability of method application in the present study; it does not prove that the method
      will work equally well in future studies.

      '
    recommended_records:
    - design_decision_record
    - build_transparency_record
    - evaluation_plan
    - review_record
  - cell_id: method_diachronic_reliability
    target: method_reliability
    mode: diachronic_external_reliability
    review_question: 'Does the DSR method remain dependable when reused, adapted, or compared across projects, teams, artifact
      types, or problem classes?

      '
    evidence_examples:
    - repeat_application_across_cases
    - method_reuse_records
    - comparison_to_established_dsr_methods
    - documented_method_variants
    - cross_project_review
    - external_audit_or_replication
    claim_limit: 'Supports a method-reuse claim only when adaptations and context changes are documented and distinguished
      from core method components.

      '
    recommended_records:
    - method_tailoring_record
    - contribution_positioning_record
    - review_record
    - projectability_record
  - cell_id: measure_synchronic_reliability
    target: measure_reliability
    mode: synchronic_internal_reliability
    review_question: 'Are the measures, instruments, rubrics, observations, or evaluator judgments consistent within the current
      evaluation setting?

      '
    evidence_examples:
    - inter_rater_agreement
    - internal_consistency_analysis
    - instrument_calibration
    - rubric_pilot_results
    - evaluator_training_record
    - triangulation_among_measure_types
    claim_limit: 'Supports consistency of current evaluation evidence, but not necessarily construct validity or stability
      across future contexts.

      '
    recommended_records:
    - evaluation_plan
    - evaluation_report
    - review_record
  - cell_id: measure_diachronic_reliability
    target: measure_reliability
    mode: diachronic_external_reliability
    review_question: 'Do the measures remain stable, comparable, and interpretable across time, sites, evaluators, populations,
      artifact versions, or evaluation cycles?

      '
    evidence_examples:
    - test_retest_evidence
    - longitudinal_calibration
    - measurement_invariance_check
    - repeated_rubric_application
    - cross_site_measure_comparison
    - instrument_revision_history
    claim_limit: 'Supports measure stability only when changes to instruments, evaluators, contexts, samples, and artifacts
      are traceable.

      '
    recommended_records:
    - evaluation_plan
    - evaluation_report
    - change_history
    - review_record
  - cell_id: design_knowledge_synchronic_reliability
    target: design_knowledge_reliability
    mode: synchronic_internal_reliability
    review_question: 'Is the design knowledge claim dependable within the present project, problem instance, artifact boundary,
      and evidence base?

      '
    evidence_examples:
    - triangulated_field_evidence
    - stakeholder_confirmation
    - rival_explanation_analysis
    - saturated_case_evidence
    - explicit_design_rationale
    - traceability_from_problem_to_requirements_to_artifact_to_evaluation
    claim_limit: 'Supports local or bounded design knowledge reliability. It should not be reported as general design theory
      unless projectability evidence exists.

      '
    recommended_records:
    - contribution_claim_record
    - contribution_positioning_record
    - evaluation_report
    - transparency_crosswalk
  - cell_id: design_knowledge_diachronic_reliability
    target: design_knowledge_reliability
    mode: diachronic_external_reliability
    review_question: 'Does the design knowledge remain useful, interpretable, and dependable across subsequent cases, contexts,
      implementations, versions, or related problem classes?

      '
    evidence_examples:
    - conceptual_replication
    - differentiated_replication
    - transfer_case_evidence
    - follow_on_study_evidence
    - boundary_condition_mapping
    - design_principle_refinement_history
    claim_limit: 'Supports projectable design knowledge only when scope, mechanism, boundary conditions, non-transfer cases,
      and context variation are explicit.

      '
    recommended_records:
    - contribution_claim_record
    - projectability_record
    - release_record
    - review_record
relationships:
- relationship_id: reliability_supports_validity
  source_entity: reliability_claim
  target_entity: validity_claim
  relation_type: supports_but_does_not_substitute_for
  description: 'Reliability evidence can strengthen validity claims, but validity still requires appropriate fit between problem,
    artifact, evaluation, and contribution.

    '
- relationship_id: reliability_requires_target
  source_entity: reliability_claim
  target_entity: reliability_target
  relation_type: must_identify
  description: A reliability claim must specify the target being assessed.
- relationship_id: reliability_requires_mode
  source_entity: reliability_claim
  target_entity: reliability_mode
  relation_type: must_identify
  description: A reliability claim must specify whether the evidence is synchronic, diachronic, or both.
- relationship_id: reliability_constrains_projectability
  source_entity: diachronic_external_reliability
  target_entity: projectability_claim
  relation_type: bounds_and_supports
  description: 'Diachronic reliability supports transfer and projectability claims only within stated boundaries and documented
    context variation.

    '
- relationship_id: process_transparency_enables_method_reliability
  source_entity: process_transparency_evidence
  target_entity: method_reliability
  relation_type: enables_review_of
  description: 'Activity logs, decision records, protocol records, and audit trails make method reliability reviewable.

    '
- relationship_id: evaluation_transparency_enables_measure_reliability
  source_entity: evaluation_transparency_evidence
  target_entity: measure_reliability
  relation_type: enables_review_of
  description: 'Evaluation plans, instruments, rubrics, calibration records, and reporting details make measure reliability
    reviewable.

    '
- relationship_id: artifact_ontology_enables_artifact_reliability
  source_entity: artifact_specification
  target_entity: artifact_reliability
  relation_type: enables_review_of
  description: 'Make plans, use plans, capacity specifications, version metadata, and artifact boundaries define what artifact
    performance can be assessed.

    '
- relationship_id: contribution_traceability_enables_design_knowledge_reliability
  source_entity: contribution_claim_record
  target_entity: design_knowledge_reliability
  relation_type: enables_review_of
  description: 'Clear traceability from problem class to artifact, evaluation, mechanism, and boundaries makes design knowledge
    reliability reviewable.

    '
workflow:
  id: dsr_reliability_assessment_workflow
  title: Reliability Assessment Workflow
  steps:
  - step_id: identify_reliability_need
    order: 1
    action: 'Determine whether the DSR package makes any reliability-relevant claim about an artifact, method, measure, or
      design knowledge.

      '
    required_inputs:
    - artifact_profile
    - evaluation_plan
    - contribution_claim
    outputs:
    - reliability_scope_statement
  - step_id: classify_reliability_target
    order: 2
    action: 'Classify the reliability target as artifact, method, measure, design knowledge, or a justified combination.

      '
    required_inputs:
    - reliability_scope_statement
    outputs:
    - reliability_target_classification
  - step_id: classify_reliability_mode
    order: 3
    action: 'Classify the evidence horizon as synchronic/internal, diachronic/external, or both.

      '
    required_inputs:
    - reliability_target_classification
    outputs:
    - reliability_mode_classification
  - step_id: select_evidence_plan
    order: 4
    action: 'Select evidence types that match the target-mode cell and the strength of the intended claim.

      '
    required_inputs:
    - reliability_matrix
    - evaluation_plan
    outputs:
    - reliability_evidence_plan
  - step_id: collect_or_link_evidence
    order: 5
    action: 'Collect, retain, or link evidence in controlled records, templates, evaluation reports, release records, or review
      records.

      '
    required_inputs:
    - reliability_evidence_plan
    outputs:
    - reliability_evidence_bundle
  - step_id: assess_threats_and_boundaries
    order: 6
    action: 'Identify reliability threats, mitigations, negative evidence, and boundary conditions before stating the reliability
      claim.

      '
    required_inputs:
    - reliability_evidence_bundle
    outputs:
    - reliability_threat_assessment
    - reliability_boundary_statement
  - step_id: state_claim_strength
    order: 7
    action: 'Assign a claim-strength level and write a bounded reliability claim that does not overstate validity, generalization,
      replication, or projectability.

      '
    required_inputs:
    - reliability_evidence_bundle
    - reliability_threat_assessment
    - reliability_boundary_statement
    outputs:
    - reliability_claim
  - step_id: review_and_record
    order: 8
    action: 'Review the claim against the acceptance criteria and retain the review outcome in a review record.

      '
    required_inputs:
    - reliability_claim
    - acceptance_criteria
    outputs:
    - reliability_review_outcome
reliability_threat_model:
  threats:
  - threat_id: unspecified_target
    description: Reliability is asserted without specifying what is reliable.
    applies_to:
    - all_targets
    mitigation:
    - require_target_classification
    - link_to_reliability_matrix_cell
  - threat_id: timing_ambiguity
    description: The claim does not distinguish single-case or same-time evidence from longitudinal or cross-context evidence.
    applies_to:
    - all_targets
    mitigation:
    - require_reliability_mode_classification
    - separate_synchronic_and_diachronic_evidence
  - threat_id: reliability_validity_conflation
    description: Consistency evidence is treated as if it proves utility, appropriateness, or truth.
    applies_to:
    - all_targets
    mitigation:
    - require_linked_validity_claim_with_separate_evidence
    - state_claim_limits
  - threat_id: measure_instability
    description: Instruments, rubrics, observations, or metrics change without traceability.
    applies_to:
    - measure_reliability
    mitigation:
    - retain_instrument_versions
    - document_calibration_and_revision_history
  - threat_id: method_drift
    description: The DSR method changes across cycles without rationale or documentation.
    applies_to:
    - method_reliability
    mitigation:
    - maintain_activity_logs
    - retain_design_decision_records
    - record_tailoring_decisions
  - threat_id: artifact_version_drift
    description: Artifact performance evidence is mixed across versions without version control.
    applies_to:
    - artifact_reliability
    mitigation:
    - link_evidence_to_artifact_version
    - preserve_release_and_change_history
  - threat_id: context_overextension
    description: Local or idiographic evidence is used to justify a broad design knowledge claim.
    applies_to:
    - design_knowledge_reliability
    mitigation:
    - state_problem_class_and_boundary_conditions
    - link_to_projectability_model
    - include_negative_or_non_transfer_evidence_when_available
  - threat_id: evaluator_dependency
    description: Reliability depends on one evaluator, coder, designer, or stakeholder perspective.
    applies_to:
    - method_reliability
    - measure_reliability
    - design_knowledge_reliability
    mitigation:
    - use_multiple_evaluators_where_feasible
    - report_inter_rater_or_inter_reviewer_agreement
    - triangulate_evidence_sources
validation_implications:
  required_fields_for_reliability_claim_record:
  - claim_id
  - reliability_target
  - reliability_mode
  - claim_strength
  - evidence_summary
  - evidence_links
  - boundary_conditions
  - threats_considered
  - mitigations
  - relationship_to_validity
  - relationship_to_replication_or_projectability
  - reviewer_decision
  controlled_value_dependencies:
