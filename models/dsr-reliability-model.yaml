implementation_guidance:
  use_in_evaluation_planning:
  - Add a reliability subsection to every DSR evaluation plan when the project makes dependable-performance, consistent-method,
    stable-measure, or reusable-design-knowledge claims.
  - Select at least one reliability target and mode before selecting evidence.
  - Do not require all eight matrix cells for every project; select cells proportional to the claim being made.
  use_in_evaluation_reporting:
  - Report reliability evidence separately from utility, validity, novelty, and contribution evidence.
  - Preserve negative reliability evidence where relevant; do not suppress failures, drift, disagreement, or unstable measures.
  - Link reliability evidence to artifact version, method variant, instrument version, evaluator role, and context.
  use_in_review:
  - Ask whether the reliability claim is scoped to the evidence actually collected.
  - Downgrade claim strength when target, mode, context, or version boundaries are missing.
  - Require clarification when reliability language is used as a vague synonym for quality, rigor, validity, or generalizability.
  use_in_repository_release:
  - Pair the reliability model with release records, preservation records, and package inventory entries when reliability
    depends on artifact versions, code, data, schemas, or documentation.
