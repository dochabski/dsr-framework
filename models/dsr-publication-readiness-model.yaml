model:
  id: dsr_publication_readiness_model
  item_id: dsr_publication_readiness_model
  item_type: specification
  title: DSR Publication and Release Readiness Model
  purpose: >
    Define the controlled model used to determine whether a Design Science Research
    artifact package is ready for scholarly submission, repository release,
    citation, reuse, and archival preservation. The model distinguishes manuscript
    readiness, artifact-package readiness, repository-release readiness, and
    archival-publication readiness so that a project can be reviewed without
    overclaiming evidence, reproducibility, projectability, or publication status.
  status: draft
  version: "0.1.0"
  target_path: models/dsr-publication-readiness-model.yaml
  selection_id: model_publication_readiness
  output_format: yaml
  conformance_target: l4_reusable
  owner: dsr_framework_maintainers
  responsible_roles:
    - role_id: artifact_author
      label: Artifact Author
      responsibility: Prepare the manuscript, artifact package, evidence bundle, and release notes.
    - role_id: quality_reviewer
      label: Quality Reviewer
      responsibility: Review consistency, coherence, cogency, correspondence, transparency, and conformance.
    - role_id: release_manager
      label: Release Manager
      responsibility: Confirm package integrity, version tagging, release metadata, and repository readiness.
    - role_id: publication_steward
      label: Publication Steward
      responsibility: Confirm publication target fit, citation metadata, licensing, archival deposit, and public communication.
  change_history:
    - version: "0.1.0"
      date: "2026-04-27"
      change: Initial publication-readiness model generated from the DSR Framework selection table.
      responsible_party: GPT-5.5 Thinking

