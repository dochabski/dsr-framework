implementation_guidance:
  use_sequence:
    - Use this model to classify the candidate as publication_candidate, release_candidate, archival_deposit_candidate, or a combination.
    - Select the readiness threshold from the declared conformance target.
    - Apply only the gates relevant to the candidate type and threshold.
    - Record gate outcomes using controlled result values.
    - Convert failed gates into remediation actions before advancing state.
    - Convert conditional passes into release conditions or post-release obligations.
    - Do not advance to publication_ready or archival_release_ready unless blockers are resolved or explicitly waived with rationale by the responsible authority.
  review_result_values:
    - pass
    - conditional_pass
    - fail
    - waived_with_rationale
    - not_applicable_with_rationale
    - not_assessed
  blocker_classes:
    - blocker_id: blocker_missing_identity
      label: Missing or conflicting package identity
      default_severity: blocker
    - blocker_id: blocker_unmapped_core_claims
      label: Core claims lack evidence or limitations
      default_severity: blocker
    - blocker_id: blocker_invalid_package
      label: Required file or validation failure
      default_severity: blocker
    - blocker_id: blocker_license_or_rights
      label: License, attribution, privacy, security, or rights issue
      default_severity: blocker
    - blocker_id: blocker_metadata_conflict
      label: Metadata conflict prevents citation or indexing
      default_severity: major
    - blocker_id: blocker_transparency_gap
      label: Critical process, build, evaluation, or contribution trace is missing
      default_severity: major
  conditional_release_policy:
    allowed_when:
      - Conditions do not undermine artifact identity, evidence integrity, license safety, or user safety.
      - Conditions are disclosed in release notes or publication limitations.
      - Each condition has an owner, trigger, monitoring method, and closure condition.
    not_allowed_when:
      - A blocker concerns license authority, unauthorized disclosure, invalid package contents, or unsupported core claims.

assumptions:
  - The generated DSR Framework package is intended for public GitHub release and possible scholarly publication.
  - L4 readiness means reusable and reviewable release readiness, not guaranteed archival deposit or external publication acceptance.
  - The publication registry specification will define repository-specific DOI, archival, and registry mechanics beyond this model.
  - The quality review specification supplies detailed review workflow; this model supplies publication-readiness structure and state logic.

limitations:
  - This draft model uses mapped corpus-level source IDs and citation anchors; it does not embed full bibliographic records.
  - This model is generic across DSR artifact packages and should be tailored to specific journal, conference, repository, or archive requirements.
  - This model does not substitute for legal, privacy, security, institutional-review, or publisher-specific compliance review.
  - Some evidence requirements may be not applicable for conceptual-only artifacts, provided the rationale is recorded.

open_questions:
  - question_id: oq_publication_target_specific_profiles
    question: Should later versions include venue-specific readiness profiles for journals, conferences, GitHub releases, Zenodo deposits, and institutional repositories?
    priority: medium
    disposition: backlog
  - question_id: oq_public_metrics
    question: Should post-release impact indicators such as citations, forks, downloads, issues, adaptations, or teaching use be standardized as publication-readiness extensions?
    priority: medium
    disposition: backlog
  - question_id: oq_rights_review_detail
    question: Should the rights and risk profile be expanded into a dedicated schema or checklist for third-party materials, privacy, security, and AI-assisted generation disclosures?
    priority: high
    disposition: backlog
