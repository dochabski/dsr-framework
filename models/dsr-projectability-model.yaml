limitations:
- id: lim_01_not_statistical_generalization_model
  statement: 'This model supports DSR projectability and analytic generalization logic; it does not provide a statistical
    sampling framework for population inference.

    '
- id: lim_02_not_empirical_evidence_by_itself
  statement: 'Completing this model does not create projectability evidence. Evidence must come from demonstration, evaluation,
    reuse, adaptation, replication, or cumulative research records.

    '
- id: lim_03_vocabularies_still_required
  statement: 'The controlled values included here should be split into vocabularies/replication-types.yaml and vocabularies/projectability-types.yaml
    for stricter repository-level validation.

    '
- id: lim_04_exact_replication_may_be_inappropriate
  statement: 'Exact reproduction is not treated as the default gold standard for DSR because artifacts and interventions may
    alter their environment and require differentiated replication.

    '
open_questions:
- id: oq_01_thresholds_for_claim_strength
  question: What repository-level evidence thresholds should distinguish demonstrated, evaluated, corroborated, and mature
    projectability?
  disposition: defer_to_quality_review_and_checklist_generation
- id: oq_02_repository_reuse_testing
  question: Should reuse-ready packages require independent reviewer execution of a smoke test before release?
  disposition: defer_to_publication_readiness_and_automation_validation_models
- id: oq_03_negative_replication_records
  question: What minimum fields should be required for failed transfer or failed reuse records?
  disposition: defer_to_evaluation_report_and_review_record_templates
- id: oq_04_vocabulary_alignment
  question: Should projectability_types and replication_types remain embedded here or be fully normalized into vocabulary
    files only?
  disposition: defer_until_vocabulary_generation
