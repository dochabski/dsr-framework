        - mechanism_plausibility
        - scope_conditions
        - evidence_across_contexts
    compound_artifact_package:
      default_paths:
        - publication_readiness_review
        - mixed_sequential_evaluation
        - projectability_or_replication_evaluation
      evidence_focus:
        - package_completeness
        - conformance_alignment
        - reuse_guidance
        - archival_readiness

conformance_decision_model:
  level_definitions:
    - level_id: l0_draft
      label: L0 Draft
      use_when:
        - Artifact identity, problem boundary, or intended use is incomplete.
        - Evidence is exploratory, unstructured, or not yet traceable.
      minimum_required_evidence:
        - draft_title
        - draft_problem_statement
        - draft_artifact_candidate
      prohibited_claims:
        - publication_ready
        - reusable
        - validated
        - projectable
    - level_id: l1_documented
      label: L1 Documented
      use_when:
        - Core identity files exist and the artifact is documentable.
        - The case can be understood but not yet fully reviewed.
      minimum_required_evidence:
        - metadata
        - artifact_profile
        - conformance_declaration
        - package_inventory_entry
      prohibited_claims:
        - evaluation_complete
        - reusable_without_adaptation_guidance
    - level_id: l2_reviewable
      label: L2 Reviewable
      use_when:
        - The artifact has stable IDs, source basis, related items, traceability, acceptance criteria, limitations, and review gates.
        - A reviewer can assess whether the file is coherent and appropriately bounded.
      minimum_required_evidence:
        - source_basis
        - related_items
        - traceability
        - acceptance_criteria
        - quality_gate_status
        - open_questions
      expected_outputs:
        - review_record
    - level_id: l3_exercisable
      label: L3 Exercisable
      use_when:
        - Templates, schemas, examples, checks, or operating procedures can be tried against a case.
        - Validation can detect at least some conformance failures.
      minimum_required_evidence:
        - schema_or_checklist_mapping
        - worked_example_or_test_case
        - validation_rules
        - failure_modes
      expected_outputs:
        - example_package
        - validation_report
    - level_id: l4_reusable
      label: L4 Reusable
      use_when:
        - The artifact package has enough documentation, examples, licensing, boundary conditions, and adaptation guidance for external reuse.
        - Projectability and maintenance expectations are explicit.
      minimum_required_evidence:
        - reuse_guidance
        - projectability_boundary_conditions
        - examples
        - license
        - maintenance_notes
      expected_outputs:
        - reuse_readiness_review
    - level_id: l5_archival_publication_ready
      label: L5 Archival and Publication Ready
      use_when:
        - The package is prepared for citable release, archival preservation, DOI/identifier registration, and public publication review.
        - Release, preservation, and citation metadata are complete.
      minimum_required_evidence:
        - citation_metadata
        - release_record
        - preservation_record
        - publication_readiness_checklist
        - archival_identifier_or_planned_identifier
      expected_outputs:
        - release_record
        - preservation_record
      prohibited_claims:
        - archival_ready_without_review

conformance_routing_rules:
  - rule_id: cr_01_missing_artifact_identity_routes_l0
    condition: artifact_candidate is absent or artifact_boundary is absent
    recommended_level: l0_draft
    review_flags:
      - missing_artifact_boundary
  - rule_id: cr_02_core_metadata_only_routes_l1
    condition: artifact identity exists but traceability and acceptance criteria are incomplete
    recommended_level: l1_documented
    required_next_records:
      - artifact_profile
      - package_inventory
      - conformance_declaration
  - rule_id: cr_03_reviewable_model_routes_l2
    condition: source_basis, related_items, traceability, quality gates, and limitations are present
    recommended_level: l2_reviewable
    required_next_records:
      - review_record
  - rule_id: cr_04_validatable_operating_material_routes_l3
    condition: schemas, templates, examples, or checklists can be exercised against a test case
    recommended_level: l3_exercisable
    required_next_records:
      - validation_report
      - example_package
  - rule_id: cr_05_reuse_guidance_routes_l4
    condition: adaptation guidance, examples, boundary conditions, maintenance expectations, and license are present
    recommended_level: l4_reusable
    required_next_records:
      - reuse_readiness_review
  - rule_id: cr_06_release_and_preservation_routes_l5
    condition: release record, preservation record, citation metadata, publication readiness checklist, and archival plan are complete
    recommended_level: l5_archival_publication_ready
    required_next_records:
      - release_record
      - preservation_record

review_flags:
  - flag_id: missing_artifact_boundary
    severity: high
    issue: The artifact type, boundary, intended use, or design specification is underspecified.
    remediation: Add artifact profile, artifact specification, use plan, and success criteria.
  - flag_id: missing_problem_relevance
    severity: high
    issue: The problem context or improvement goal is absent or too broad.
    remediation: Add problem statement, stakeholders, scope, constraints, and objectives.
  - flag_id: missing_solution_grounding
    severity: medium
    issue: The artifact is not grounded in a documented solution space or prior knowledge base.
    remediation: Add solution-space record with sources, alternatives, and design rationale.
  - flag_id: demonstration_evaluation_confusion
    severity: high
    issue: The case treats a walkthrough, example, or prototype demonstration as if it were evaluation.
    remediation: Record demonstration separately and add an evaluation plan aligned to claims.
  - flag_id: evidence_overclaim
    severity: high
    issue: Claim breadth exceeds available demonstration, evaluation, reliability, or projectability evidence.
    remediation: Narrow the claim or add stronger evaluation and boundary evidence.
  - flag_id: contribution_underpositioned
    severity: medium
    issue: The artifact is useful but its knowledge contribution type and scope are not explicit.
    remediation: Add contribution claim, contribution positioning record, and knowledge goal/scope values.
  - flag_id: insufficient_evaluation_alignment
    severity: high
    issue: Evaluation method does not test the stated artifact utility, artifact quality, or contribution claim.
    remediation: Revise evaluation plan to map claims to criteria, measures, evidence, and limitations.
  - flag_id: insufficient_transparency
    severity: medium
    issue: One or more relevant transparency dimensions are undocumented.
    remediation: Add process, problem-space, solution-space, build, evaluation, or contribution transparency evidence.
  - flag_id: insufficient_reliability_attention
    severity: medium
    issue: Artifact, method, measure, or design-knowledge reliability has not been considered where relevant.
    remediation: Add reliability target, reliability evidence, or limitation statement.
  - flag_id: insufficient_projectability_boundary
    severity: medium
    issue: Transfer, adaptation, or reuse claims lack boundary conditions.
    remediation: Add context conditions, adaptation logic, limits, and projectability evidence.
  - flag_id: conformance_gap
    severity: medium
    issue: Claimed conformance level lacks required records, metadata, validation, review, or release evidence.
    remediation: Complete missing package items or lower the conformance claim.

workflow:
  - step_id: wf_01_collect_inputs
    title: Collect decision inputs
    action: >
      Gather the problem context, artifact candidate, use claim, knowledge goal,
      knowledge scope, novelty basis, demonstration status, evaluation evidence,
      transparency evidence, and conformance evidence.
    output: decision_case
  - step_id: wf_02_apply_identity_gate
    title: Apply DSR identity gate
    action: >
      Confirm problem relevance, artifact presence, use logic, and contribution
      intent before routing to artifact classification.
    output: identity_gate_result
  - step_id: wf_03_select_artifact_type
    title: Select artifact type
    action: >
      Apply artifact type rules and record primary plus secondary artifact types.
    output: artifact_type_recommendation
  - step_id: wf_04_select_contribution_type
    title: Select contribution type
    action: >
      Use knowledge goal, knowledge scope, novelty, grounding, and evidence to
      classify the contribution claim.
    output: contribution_type_recommendation
  - step_id: wf_05_select_evaluation_path
    title: Select evaluation path
    action: >
      Match artifact and contribution claims to evaluation path, evidence type,
      stakeholder setting, and current lifecycle stage.
    output: evaluation_path_recommendation
  - step_id: wf_06_select_conformance_level
    title: Select conformance level
    action: >
      Compare existing package evidence to L0-L5 conformance criteria and assign
      current and target conformance recommendations.
    output: conformance_level_recommendation
  - step_id: wf_07_record_decision
    title: Record decision result
    action: >
      Record selected recommendations, confidence, review flags, required next
      records, assumptions, and open questions in the appropriate record or profile.
    output: decision_record_entry

boundary_conditions:
  - condition_id: bc_01_advisory_not_dispositive
    statement: >
      The decision flow is advisory. Reviewers may override a recommendation
      when domain evidence or project constraints justify a different route.
  - condition_id: bc_02_multi_artifact_cases
    statement: >
      Compound packages may require multiple artifact type recommendations.
      The model should preserve primary and secondary artifact types rather than
      forcing a single category.
  - condition_id: bc_03_context_sensitive_evaluation
    statement: >
      Evaluation path recommendations must be adapted to artifact maturity,
      ethical constraints, access to users, available data, risk, and domain norms.
  - condition_id: bc_04_claim_strength_controls_evidence
    statement: >
      Broader contribution, transfer, reliability, or publication-readiness claims
      require stronger evidence and clearer limitations.
  - condition_id: bc_05_not_all_dsr_requires_l5
    statement: >
      L5 is only required for archival publication-ready releases. A reviewable
      internal or developmental model may legitimately target L2 or L3.

validation_implications:
  schema_implications:
    - schema_id: dsr_project_schema
      implication: >
        Add fields for decision_flow_result, artifact_type_recommendation,
        contribution_type_recommendation, evaluation_path_recommendation,
        conformance_level_recommendation, review_flags, and required_next_records.
    - schema_id: dsr_artifact_schema
      implication: >
        Validate artifact_type against controlled values and require boundary,
        intended_use, and evidence for primary artifact type.
    - schema_id: dsr_evaluation_plan_schema
      implication: >
        Require claim-to-evaluation mapping, demonstration/evaluation separation,
        criteria, measures, evidence sources, and limitations.
    - schema_id: dsr_contribution_claim_schema
      implication: >
        Require knowledge_goal, knowledge_scope, novelty_basis, contribution_type,
        evidence_status, and boundary conditions.
  checklist_implications:
    - checklist_id: dsr_minimum_viable_study_checklist
      implication: Use identity gate nodes as minimum DSR identity checks.
    - checklist_id: contribution_positioning_checklist
      implication: Use contribution type decision table as the contribution review structure.
    - checklist_id: evaluation_readiness_checklist
      implication: Use artifact-to-evaluation matrix as readiness routing.
    - checklist_id: publication_readiness_checklist
      implication: Use conformance routing rules for L4 and L5 evidence review.
  validation_rules:
    - rule_id: vr_01_no_l2_without_traceability
      assertion: >
        conformance_level_recommendation must not be l2_reviewable unless source_basis,
        related_items, traceability, acceptance_criteria, and limitations are present.
      severity: error
    - rule_id: vr_02_no_evaluation_complete_from_demonstration_only
      assertion: >
        evaluation_path_recommendation must not be treated as evaluation_complete when
        demonstration_status is demonstration_only and no evaluation_evidence is present.
      severity: error
    - rule_id: vr_03_no_projectability_claim_without_boundary_conditions
      assertion: >
        contribution_type_recommendation must not be replication_or_projectability_contribution
        unless knowledge_scope, boundary_conditions, and adaptation_or_transfer evidence are present.
      severity: warning
    - rule_id: vr_04_artifact_type_requires_evidence
      assertion: >
        artifact_type_recommendation must include artifact boundary, intended use,
        and evidence required by the selected artifact type rule.
      severity: error
    - rule_id: vr_05_contribution_claim_requires_solution_grounding
      assertion: >
        contribution_type_recommendation must not exceed situated_artifact_contribution
        unless novelty_basis and solution_space_grounding are present.
      severity: warning

traceability:
  - trace_id: tr_model_decision_flow_selection
    source_item: dsr-framework-selection-table.md#model_decision_flow
    target_item: models/dsr-decision-flow.yaml
    relation: selected_generation_target
    evidence_status: mapped
  - trace_id: tr_model_decision_flow_spec_rules
    source_item: dsr-framework-generation-spec.yaml#content_generation_rules
    target_item: model.source_basis
    relation: governed_by_generation_rules
    evidence_status: mapped
  - trace_id: tr_model_decision_flow_prompt_rules
    source_item: dsr-framework-generation-prompt.md#model-files
    target_item: controlled_entities
    relation: implements_model_file_requirements
    evidence_status: mapped
  - trace_id: tr_decision_flow_to_canonical_model
    source_item: models/dsr-framework-canonical-model.yaml
    target_item: relationship_model.canonical_model_controls_decision_terms
    relation: depends_on_canonical_entities
    evidence_status: dependency_declared
  - trace_id: tr_decision_flow_to_schemas
    source_item: validation_implications.schema_implications
    target_item: schemas
    relation: suggests_downstream_validation
    evidence_status: not_yet_implemented

quality_and_conformance:
  quality_gates:
    - gate_id: qg_consistency
      status: pass
      rationale: >
        File uses YAML, lower-kebab-case target path, stable lower_snake_case IDs,
        item metadata, related items, source basis, and change history.
    - gate_id: qg_coherence
      status: pass
      rationale: >
        Decision outputs align with canonical model dependency and downstream
        artifacts, contribution, evaluation, transparency, reliability,
        projectability, schema, template, and checklist items.
    - gate_id: qg_cogency
      status: pass
      rationale: >
        The flow is ordered from DSR identity to artifact classification,
        contribution positioning, evaluation path, conformance level, and record output.
    - gate_id: qg_correspondence
      status: pass
      rationale: >
        The model directly corresponds to the requested decision tree for selecting
        artifact type, contribution type, evaluation path, and conformance level.
    - gate_id: qg_dsr_transparency
      status: pass
      rationale: >
        Transparency evidence is a required input and cross-cutting relationship;
        review flags identify transparency gaps.
    - gate_id: qg_reviewability
      status: pass
      rationale: >
        The file includes explicit decision rules, required evidence, review flags,
        validation implications, and quality-gate statuses.
  acceptance_criteria:
    - criterion_id: ac_01_selected_path_correct
      statement: The file path is models/dsr-decision-flow.yaml.
      evidence_required:
        - target_path
    - criterion_id: ac_02_four_primary_decisions_present
      statement: >
        The model includes decision logic for artifact type, contribution type,
        evaluation path, and conformance level.
      evidence_required:
        - artifact_type_decision_table
        - contribution_type_decision_table
        - artifact_to_evaluation_path_matrix
        - conformance_decision_model
    - criterion_id: ac_03_model_requirements_present
      statement: >
        The model defines controlled entities, relationships, boundary conditions,
        validation implications, and traceability.
      evidence_required:
        - controlled_entities
        - relationship_model
        - boundary_conditions
        - validation_implications
        - traceability
    - criterion_id: ac_04_l2_reviewable
      statement: >
        The model is reviewable without hidden assumptions and includes source
        basis, related items, limitations, acceptance criteria, and quality gates.
      evidence_required:
        - source_basis
        - related_items
        - non_goals
        - boundary_conditions
        - quality_and_conformance

assumptions:
  - assumption_id: as_01_canonical_model_dependency_available
    statement: >
      The canonical model exists or will exist as the upstream authority for
      entity names and relationship semantics.
    impact: >
      Some term IDs may need minor harmonization after the canonical model is finalized.
  - assumption_id: as_02_l2_target
    statement: >
      The requested default conformance level is L2, so this file prioritizes
      reviewability over full executable validation.
    impact: >
      L3 schema tests and examples are identified as downstream implications rather than completed deliverables.
  - assumption_id: as_03_controlled_vocabularies_pending
    statement: >
      Artifact type, contribution type, evaluation method, reliability, replication,
      and projectability vocabularies may be generated or refined later.
    impact: >
      Controlled values may need synchronization with future vocabulary files.

open_questions:
  - question_id: oq_01_secondary_artifact_type_cardinality
    question: >
      Should compound DSR packages allow unlimited secondary artifact types, or
      should the schema limit them to a primary type plus a small number of declared secondary types?
    disposition: defer_to_schema_design
  - question_id: oq_02_evaluation_path_granularity
    question: >
      Should evaluation path values remain broad families, or should they be
      split into method-family vocabularies such as simulation, experiment,
      field study, technical proof, expert review, and competing artifact analysis?
    disposition: defer_to_evaluation_vocabulary
  - question_id: oq_03_conformance_threshold_automation
    question: >
      Which L2, L3, L4, and L5 conformance checks should be automatable in CI
      workflows, and which should remain human review judgments?
    disposition: defer_to_automation_validation_spec

change_history:
  - version: "0.1.0"
    date: "2026-04-27"
    change_type: initial_creation
    description: >
      Created initial L2 reviewable decision-flow model for selecting artifact
      type, contribution type, evaluation path, and conformance level.
    responsible_party: GPT-5.5 Thinking
