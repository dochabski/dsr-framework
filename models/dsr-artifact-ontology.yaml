    relation: constrains_entity_definitions
  - id: models/dsr-lifecycle-model.yaml
    relation: aligns_artifact_entities_to_lifecycle_stages
  - id: models/dsr-contribution-model.yaml
    relation: connects_artifact_to_contribution_claims
  - id: models/dsr-evaluation-alignment-model.yaml
    relation: connects_artifact_claims_to_evaluation_evidence
  - id: models/dsr-transparency-model.yaml
    relation: connects_artifact_documentation_to_transparency_dimensions
