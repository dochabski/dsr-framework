open_questions:
- id: oq_non_technical_artifacts
  question: 'How broadly should the framework recognize non-technical artifacts such as laws, contracts, policies, organizational
    structures, and social practices?

    '
  current_treatment: 'Allowed only when a focal designed symbolic, documentary, procedural, or socio-technical artifact boundary
    is explicit.

    '
  evidence_status: partially_mapped
- id: oq_ai_adaptive_artifacts
  question: 'How should adaptive AI systems, generated artifacts, prompts, models, training pipelines, and monitoring systems
    be decomposed into artifact records?

