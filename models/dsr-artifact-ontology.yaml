model:
  id: dsr_artifact_ontology_model
  selection_id: model_artifact_ontology
  title: DSR Artifact Ontology and Boundary Model
  item_type: specification
  output_format: yaml
  status: draft
  version: 0.1.0
  conformance_target: l2_reviewable
  file_path: models/dsr-artifact-ontology.yaml
  purpose: 'Define the controlled artifact ontology for the DSR Framework, including artifact entities, abstraction levels,
    make/use structure, boundary rules, artifact-instance treatment, artifact-network context, validation implications, and
    traceability to the DSR corpus.

    '
  owner: dsr_framework_maintainers
  responsible_roles:
  - framework_author
  - ontology_maintainer
  - schema_maintainer
  - reviewer
  source_basis:
  - source_id: dsr_framework_generation_prompt
    role: generation_procedure_and_required_model_shape
    evidence_status: mapped
    relevant_requirements:
    - infer selected path and output format from selection_id
    - use YAML for models
    - include metadata, traceability, quality and conformance material
    - preserve DSR-specific distinctions
  - source_id: dsr_framework_generation_spec
    role: repository_rules_quality_gates_and_conformance
    evidence_status: mapped
    relevant_requirements:
    - controlled files use YAML or JSON-compatible structured formats
    - models reside in models
    - controlled files include source_basis, related_items, and traceability
    - models must be reviewable against explicit quality gates
  - source_id: weigand_johannesson_andersson_2021_101878
    role: primary_artifact_ontology_source
    evidence_status: mapped
    citation_anchor_ids:
