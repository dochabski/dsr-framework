process_model:
  stages:
  - stage_id: evaluation_scoping
    label: Evaluation Scoping
    purpose: Identify evaluation subjects, claims, lifecycle stage, conformance target, and available evidence.
    required_outputs:
    - evaluation_subjects
    - claim_inventory
    - evaluation_scope_statement
    - assumptions_and_constraints
    exit_criteria:
    - every_claim_has_type_and_scope
    - every_subject_has_boundary_and_version_or_state
  - stage_id: claim_translation
    label: Claim Translation
    purpose: Translate artifact, quality, utility, and contribution claims into evaluation questions.
    required_outputs:
    - evaluation_questions
    - claim_question_trace_links
    exit_criteria:
    - every_substantive_claim_has_one_or_more_questions_or_deferred_rationale
  - stage_id: criteria_operationalization
    label: Criteria Operationalization
    purpose: Define criteria, indicators, pass conditions, fail conditions, and interpretation logic.
    required_outputs:
    - evaluation_criteria
    - indicators_or_reasoning_rules
    - baseline_or_comparator_statement
    exit_criteria:
    - each_question_has_reviewable_criterion
    - criteria_have_operational_definitions
  - stage_id: method_selection
    label: Method Selection
    purpose: Select evaluation methods appropriate to claim strength, artifact state, timing, and setting.
    required_outputs:
    - evaluation_methods
    - method_rationale
    - data_collection_or_analysis_plan
    exit_criteria:
    - method_limitations_are_documented
    - timing_and_setting_are_declared
  - stage_id: evidence_collection_or_mapping
    label: Evidence Collection or Mapping
    purpose: Collect, retain, cite, or map evidence to claims and questions.
    required_outputs:
    - evidence_inventory
    - evidence_availability_status
    - traceability_links
    exit_criteria:
    - each_method_has_expected_or_actual_evidence_items
    - unshareable_or_missing_evidence_is_explained
  - stage_id: analysis_and_interpretation
    label: Analysis and Interpretation
    purpose: Analyze evidence, answer evaluation questions, and assign claim-support status.
    required_outputs:
    - evaluation_results
    - evidence_summary
    - claim_support_status
    - limitation_or_threat_assessment
    exit_criteria:
    - every_result_links_to_claims_questions_and_evidence
    - findings_are_qualified_by_limitations
  - stage_id: decision_and_reporting
    label: Decision and Reporting
    purpose: Decide whether claims, lifecycle transitions, release readiness, or publication-readiness assertions are supported.
    required_outputs:
    - acceptance_decisions
    - evaluation_report
    - required_follow_up
    - transparency_materials
    exit_criteria:
    - decisions_are_bound_to_specific_claims
    - overclaiming_checks_are_complete
    - follow_up_actions_are_recorded
method_family_crosswalk:
- method_family_id: analytical_conceptual_evaluation
  allowed_uses:
  - assess_internal_coherence
  - assess_design_rationale
  - assess_literature_or_standards_alignment
  - support_plausibility_or_ex_ante_claims
  claim_fit:
    strong_for:
    - artifact_boundary_claim
    - problem_solution_fit_claim
    - artifact_quality_claim
    - contribution_to_knowledge_claim
    weak_for:
    - broad_artifact_utility_claim
    - naturalistic_effectiveness_claim
  required_qualifier: empirical_or_field_utility_claims_must_be_marked_tentative_if_only_conceptual_evidence_exists
- method_family_id: formal_or_mathematical_evaluation
  allowed_uses:
  - prove_or_check_formal_properties
  - test_algorithmic_correctness_or_consistency
  - analyze_optimization_or_rule_logic
  claim_fit:
    strong_for:
    - artifact_quality_claim
    - validity_claim
    weak_for:
    - stakeholder_acceptability_claim
    - naturalistic_utility_claim
  required_qualifier: formal_results_apply_only_to_specified_model_assumptions_and_inputs
- method_family_id: prototype_demonstration
  allowed_uses:
  - show_operability
  - show_feasibility
  - illustrate_use_case
  - generate_formative_feedback
  claim_fit:
    strong_for:
    - artifact_existence_claim
    - problem_solution_fit_claim
    weak_for:
    - summative_utility_claim
    - projectability_claim
  required_qualifier: demonstration_must_not_be_reported_as_full_evaluation_unless_criteria_method_and_results_are_present
- method_family_id: expert_review
  allowed_uses:
  - assess_plausibility
  - assess_completeness
  - assess_utility_potential
  - assess_contribution_significance
  claim_fit:
    strong_for:
    - artifact_quality_claim
    - contribution_significance_claim
    - validity_claim
    weak_for:
    - actual_field_effectiveness_claim
  required_qualifier: reviewer_qualification_and_review_criteria_must_be_declared
- method_family_id: controlled_user_or_task_evaluation
  allowed_uses:
  - compare_performance
  - assess_usability
  - assess_task_success
  - assess_comprehension_or_acceptance_under_controlled_conditions
  claim_fit:
    strong_for:
    - artifact_utility_claim
    - artifact_quality_claim
    weak_for:
    - naturalistic_projectability_claim
  required_qualifier: artificial_conditions_and_participant_limitations_must_be_reported
- method_family_id: naturalistic_field_evaluation
  allowed_uses:
  - assess_real_or_typical_use
  - assess organizational_or_social_impact
  - assess_practitioner_value
  - assess_fitness_for_use
  claim_fit:
    strong_for:
    - artifact_utility_claim
    - problem_solution_fit_claim
    - stakeholder_acceptability_claim
    - projectability_claim
    weak_for:
    - claims_requiring_precise_causal_attribution_without_comparison
  required_qualifier: context_inputs_users_and_boundary_conditions_must_be_reported
- method_family_id: longitudinal_evaluation
  allowed_uses:
  - assess_sustained_utility
  - assess_maintenance
  - assess_evolution
  - assess_reuse_or_adaptation
  claim_fit:
    strong_for:
    - reliability_claim
    - projectability_claim
    - fitness_for_evolution_claim
    weak_for:
    - claims_about_initial_feasibility_only
  required_qualifier: time_period_version_changes_and_environmental_changes_must_be_reported
- method_family_id: literature_based_or_repository_evaluation
  allowed_uses:
  - evaluate_coverage
  - evaluate_contribution_positioning
  - evaluate_accumulated_design_knowledge
  - evaluate_traceability_to_prior_sources
  claim_fit:
    strong_for:
    - contribution_to_knowledge_claim
    - contribution_significance_claim
    - projectability_claim
    weak_for:
    - direct_artifact_usefulness_claim_without_use_evidence
  required_qualifier: search_scope_selection_basis_and_limitations_must_be_documented
- method_family_id: mixed_methods_evaluation
  allowed_uses:
  - combine_performance_evidence_with_stakeholder_meaning
  - combine_artificial_and_naturalistic_evidence
  - triangulate_claim_support
  claim_fit:
    strong_for:
    - artifact_utility_claim
    - validity_claim
    - projectability_claim
    - responsible_design_claim
    weak_for: []
  required_qualifier: integration_logic_must_explain_how_evidence_streams_jointly_support_claims
demonstration_evaluation_boundary_rules:
- rule_id: der_001
  rule: 'A demonstration shows that an artifact can be used, instantiated, applied, or walked through in a scenario; it becomes
    evaluation only when criteria, evidence, interpretation, and a claim-support judgment are recorded.

    '
  severity: error_for_l2_if_violated
- rule_id: der_002
  rule: 'Prototype demonstration may support feasibility, operability, or plausibility claims, but it must not be used alone
    to support broad field utility or naturalistic effectiveness claims.

    '
  severity: error_for_l2_if_overclaimed
- rule_id: der_003
  rule: 'If demonstration evidence is the only available evidence, the evaluation report must state claim_support_status as
    partially_supported, deferred, or inconclusive for claims requiring stronger evaluation.

    '
  severity: warning_or_error_depending_on_claim_strength
- rule_id: der_004
  rule: 'Evaluation may include demonstration as one evidence stream when it is accompanied by explicit criteria, stakeholder
    or technical evidence, analytic interpretation, and limitations.

    '
  severity: guidance
validation_implications:
  schema_implications:
    evaluation_plan_required_fields:
    - evaluation_plan_id
    - title
    - purpose
    - status
    - version
    - evaluation_subjects
    - claims
    - evaluation_questions
    - evaluation_criteria
    - methods
    - evidence_plan
    - analysis_plan
    - traceability
    - limitations
    - acceptance_criteria
    - source_basis
    - related_items
    - change_history
    evaluation_report_required_fields:
    - evaluation_report_id
    - title
    - status
    - version
    - evaluated_subjects
    - claims_evaluated
    - methods_used
    - evidence_inventory
    - results
    - claim_support_summary
    - limitations_and_threats
    - acceptance_decisions
    - traceability
    - retained_evidence
    - source_basis
    - change_history
  lint_rules:
  - lint_id: eval_lint_001
    rule: Every claim must have at least one linked evaluation question or a documented deferral rationale.
    severity: error
  - lint_id: eval_lint_002
    rule: Every evaluation question must have at least one criterion or explicit reasoning rule.
    severity: error
  - lint_id: eval_lint_003
    rule: Evaluation methods must declare timing and setting.
    severity: error
  - lint_id: eval_lint_004
    rule: Utility claims must identify intended user, task, context, and criterion.
    severity: error
  - lint_id: eval_lint_005
    rule: Naturalistic or field-effectiveness claims require field, case, operational, or clearly justified representative
      evidence.
    severity: error
  - lint_id: eval_lint_006
    rule: Conceptual or analytical evaluation must not be overstated as empirical validation.
    severity: error
  - lint_id: eval_lint_007
    rule: Contribution-to-knowledge claims must specify knowledge goal, knowledge scope, contribution type, and prior-knowledge
      comparison.
    severity: error
  - lint_id: eval_lint_008
    rule: Results must include limitation or threat assessment when evidence is partial, artificial, proxy-based, or non-naturalistic.
    severity: warning
  - lint_id: eval_lint_009
    rule: Acceptance decisions must cite results and must not exceed the supported claim scope.
    severity: error
  - lint_id: eval_lint_010
    rule: Evidence items must be retained, cited, or marked not_shareable with rationale.
    severity: warning
conformance_model:
  levels:
  - level: l0_draft
    expectation: Claims, evaluation subjects, and possible methods are drafted but may not yet be fully linked.
  - level: l1_documented
    expectation: Claims, questions, criteria, methods, and planned evidence are documented with stable identifiers.
  - level: l2_reviewable
    expectation: Claim-question-criterion-method-evidence traceability is present; limitations and acceptance criteria are
      reviewable.
  - level: l3_exercisable
    expectation: Evaluation plan can be executed using templates or schemas; evidence collection and reporting workflow are
      operational.
  - level: l4_reusable
    expectation: Evaluation model, templates, and reports can be reused across DSR projects with controlled vocabularies and
      example instances.
  - level: l5_archival_publication_ready
    expectation: Evaluation evidence, identifiers, metadata, limitations, and release records are sufficient for archival
      review and citation.
  selected_level: l2_reviewable
  l2_acceptance_criteria:
  - criterion_id: l2_eval_001
    criterion: The file defines controlled entities and relationships for evaluation alignment.
    pass_condition: controlled_entities and relationship_model are present.
  - criterion_id: l2_eval_002
    criterion: Claim types are mapped to minimum evidence and typical methods.
    pass_condition: claim_alignment_model includes claim_alignment_requirements for major DSR claim types.
  - criterion_id: l2_eval_003
    criterion: Demonstration and evaluation are explicitly distinguished.
    pass_condition: demonstration_evaluation_boundary_rules are present.
  - criterion_id: l2_eval_004
    criterion: Utility, quality, and knowledge-contribution claims are separately modeled.
    pass_condition: claim_types and alignment requirements distinguish artifact_utility_claim, artifact_quality_claim, and
      contribution_to_knowledge_claim.
  - criterion_id: l2_eval_005
    criterion: Validation and schema implications are explicit.
    pass_condition: validation_implications contains required fields and lint rules.
  - criterion_id: l2_eval_006
    criterion: Traceability to source basis and dependent files is explicit.
    pass_condition: source_basis, related_items, and traceability sections are populated.
