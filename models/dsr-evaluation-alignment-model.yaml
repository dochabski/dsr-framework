scope:
  includes:
  - alignment_between_claims_questions_criteria_methods_evidence_and_results
  - evaluation_plan_structure
  - evaluation_report_structure
  - demonstration_evaluation_boundary_rules
  - formative_summative_ex_ante_ex_post_and_longitudinal_evaluation_timing
  - artificial_naturalistic_literature_based_and_mixed_evaluation_settings
  - artifact_utility_artifact_quality_and_knowledge_contribution_claim_support
  - validity_reliability_projectability_and_responsible_design_evaluation_hooks
  - reviewability_and_acceptance_decision_logic
  excludes:
  - complete_controlled_vocabulary_definitions_for_all_evaluation_methods
  - final_json_schema_implementation
  - project_specific_metric_thresholds
  - statistical_analysis_protocols_for_domain_specific_studies
  - claims_of_publication_ready_empirical_validation_for_the_framework_itself
  boundary_notes:
  - 'This model defines how evaluation elements relate. It does not assert that every DSR project must perform every evaluation
    method.

    '
  - 'Demonstration evidence can support feasibility or plausibility claims, but stronger utility, effectiveness, naturalistic,
    or projectability claims require evaluation evidence appropriate to the claim scope.

    '
  - 'Evaluation adequacy is claim-relative: the same evidence may be sufficient for a prototype feasibility claim but insufficient
    for a broad field-utility or reusable design-knowledge claim.

    '
controlled_entities:
- id: evaluation_subject
  label: Evaluation Subject
  definition: 'The artifact, artifact component, method, model, framework, template, schema, process, design principle, or
    contribution claim being evaluated.

    '
  required_fields:
  - subject_id
  - subject_type
  - name
  - version_or_state
  - boundary
  - lifecycle_stage
  boundary_notes: 'The subject must be specific enough that evidence can be interpreted; avoid evaluating an undefined package,
    artifact family, or broad idea as though it were an operational artifact instance.

    '
- id: claim
  label: Claim
  definition: 'A proposition that the evaluation is expected to support, qualify, reject, or leave unresolved.

    '
  required_fields:
  - claim_id
  - claim_type
  - claim_text
  - claim_scope
  - expected_strength
  - associated_evaluation_questions
  - evidence_status
  boundary_notes: 'Claims should be phrased so that a reviewer can determine what evidence would count for or against them.

    '
- id: evaluation_question
  label: Evaluation Question
  definition: 'A reviewable question that translates a claim into an evaluable inquiry.

    '
  required_fields:
  - question_id
  - question_text
  - linked_claim_ids
  - evaluation_focus
  - answer_format
  boundary_notes: 'Evaluation questions should be narrower than research questions when the evaluation concerns a specific
    artifact property, use condition, or contribution claim.

    '
- id: evaluation_criterion
  label: Evaluation Criterion
  definition: 'A quality, utility, contribution, validity, reliability, projectability, or responsible-design standard against
    which evidence will be judged.

    '
  required_fields:
  - criterion_id
  - label
  - operational_definition
  - linked_question_ids
  - pass_condition
  - failure_condition
  boundary_notes: 'A criterion must be operationalized in terms of observable indicators, expert judgments, formal properties,
    traceability evidence, or documented argumentation.

    '
- id: measure_or_indicator
  label: Measure or Indicator
  definition: 'A metric, observation, rating, trace artifact, benchmark, performance result, coded statement, or qualitative
    marker used to assess a criterion.

    '
  required_fields:
  - indicator_id
  - linked_criterion_id
  - indicator_type
  - data_source
  - interpretation_rule
  boundary_notes: 'Indicators may be qualitative, quantitative, formal, documentary, or expert-judgment based, but their interpretation
    rule must be explicit.

    '
- id: evaluation_method
  label: Evaluation Method
  definition: 'A family or specific procedure used to collect, generate, analyze, or interpret evidence for one or more criteria.

    '
  required_fields:
  - method_id
  - method_family
  - method_description
  - timing
  - setting
  - units_or_participants
  - data_collected
  - analysis_logic
  boundary_notes: 'Evaluation methods should be selected to match claim type, artifact state, lifecycle stage, and available
    evidence rather than selected only for convenience.

    '
- id: evidence_item
  label: Evidence Item
  definition: 'A retained artifact, dataset, log, document, analytic result, observation, expert judgment, benchmark, or review
    output used to support an evaluation finding.

    '
  required_fields:
  - evidence_id
  - evidence_type
  - source_or_location
  - linked_method_id
  - linked_claim_ids
  - availability
  - limitation_notes
  boundary_notes: 'Evidence should be retained or cited wherever feasible. If evidence cannot be shared, the reason and substitute
    transparency material should be stated.

    '
- id: baseline_or_comparator
  label: Baseline or Comparator
  definition: 'A prior state, existing artifact, alternative design, standard, benchmark, null condition, expert expectation,
    or current practice used to interpret evaluation findings.

    '
  required_fields:
  - comparator_id
  - comparator_type
  - rationale
  - linked_criterion_ids
  boundary_notes: 'Absence of a comparator does not automatically invalidate an evaluation, but the report must explain how
    findings are interpreted without one.

    '
- id: evaluation_result
  label: Evaluation Result
  definition: 'A recorded answer to an evaluation question, including findings, evidence summary, limitations, and claim-support
    judgment.

    '
  required_fields:
  - result_id
  - linked_question_id
  - linked_claim_ids
  - finding_summary
  - evidence_summary
  - support_status
  - limitations
  boundary_notes: 'Results should distinguish positive support, qualified support, inconclusive evidence, negative evidence,
    and deferred evaluation.

    '
- id: limitation_or_threat
  label: Limitation or Threat
  definition: 'A factor that constrains the interpretation, validity, reliability, transferability, scope, or practical use
    of evaluation evidence.

    '
  required_fields:
  - limitation_id
  - limitation_type
  - linked_claim_ids
  - effect_on_interpretation
  - mitigation_or_next_step
  boundary_notes: 'Limitations should modify claim strength rather than being listed only as generic caveats.

    '
- id: alignment_link
  label: Alignment Link
  definition: 'A traceable relation connecting a claim to evaluation questions, criteria, indicators, methods, evidence, results,
    limitations, and decisions.

    '
  required_fields:
  - trace_id
  - source_element_id
  - relationship_type
  - target_element_id
  - evidence_status
  boundary_notes: 'Alignment links are the minimum reviewable mechanism for preventing unsupported evaluation or contribution
    claims.

    '
- id: acceptance_decision
  label: Acceptance Decision
  definition: 'A recorded judgment about whether evidence is sufficient for a specific claim, gate, release, publication,
    or next lifecycle transition.

    '
  required_fields:
  - decision_id
  - decision_scope
  - linked_result_ids
  - decision
  - rationale
  - required_follow_up
  boundary_notes: 'Acceptance decisions should be bounded to a claim and conformance level; they should not imply universal
    validation.

    '
controlled_value_sets:
  claim_types:
  - id: artifact_existence_claim
    label: Artifact Existence Claim
    definition: The artifact or artifact component exists and is identifiable.
  - id: artifact_boundary_claim
    label: Artifact Boundary Claim
    definition: The artifact boundary, components, version, scope, and exclusions are sufficiently specified.
  - id: problem_solution_fit_claim
    label: Problem-Solution Fit Claim
    definition: The artifact is plausibly or demonstrably aligned to the stated problem, objectives, requirements, and context.
  - id: artifact_utility_claim
    label: Artifact Utility Claim
    definition: The artifact is useful for intended users, tasks, contexts, or problem instances.
  - id: artifact_quality_claim
    label: Artifact Quality Claim
    definition: The artifact has internal or external quality attributes such as correctness, completeness, reliability, usability,
      maintainability, security, or interoperability.
  - id: contribution_to_knowledge_claim
    label: Contribution-to-Knowledge Claim
    definition: The work contributes reusable or projectable design knowledge beyond routine local artifact production.
  - id: contribution_significance_claim
    label: Contribution Significance Claim
    definition: The contribution is non-trivial, novel, or valuable relative to prior DSR knowledge, artifacts, or methods.
  - id: validity_claim
    label: Validity Claim
    definition: The evaluation and its interpretation are credible for the intended construct, context, procedure, inference,
      or external scope.
  - id: reliability_claim
    label: Reliability Claim
    definition: The method, artifact, measurement, evaluation, or design knowledge can produce sufficiently consistent results
      under specified conditions.
  - id: projectability_claim
    label: Projectability Claim
    definition: The design knowledge or artifact is plausibly transferable, adaptable, generalizable, or reusable across a
      bounded problem class.
  - id: responsible_design_claim
    label: Responsible Design Claim
    definition: The artifact or method addresses relevant ethical, social, accessibility, privacy, security, equity, or stakeholder-value
      obligations.
  evaluation_focuses:
  - problem_relevance
  - solution_objectives
  - requirements_satisfaction
  - artifact_behavior
  - artifact_quality
  - artifact_utility
  - stakeholder_acceptance
  - contribution_significance
  - design_knowledge_grounding
  - validity
  - reliability
  - projectability
  - responsible_design
  - publication_readiness
  evaluation_timing:
  - id: ex_ante
    label: Ex Ante
    definition: Evaluation before full construction or deployment, usually using argument, criteria, model checking, simulation,
      expert review, or predicted effects.
  - id: formative
    label: Formative
    definition: Evaluation during design or development for improvement, defect discovery, feasibility checking, or design
      refinement.
  - id: summative
    label: Summative
    definition: Evaluation after a sufficiently complete artifact is available, used to judge whether claims are supported.
  - id: ex_post
    label: Ex Post
    definition: Evaluation after use, implementation, release, or publication.
  - id: longitudinal
    label: Longitudinal
    definition: Evaluation across time to assess persistence, adaptation, maintenance, learning, evolution, or sustained utility.
  - id: deferred
    label: Deferred
    definition: Evaluation is explicitly postponed with rationale, target evidence, and planned follow-up.
  evaluation_settings:
  - id: analytical_or_conceptual
    label: Analytical or Conceptual
    definition: Argument-based, model-based, or logic-based evaluation without primary empirical deployment.
  - id: mathematical_or_formal_analysis
    label: Mathematical or Formal Analysis
    definition: Formal proof, consistency checking, model checking, optimization, or related formal analysis.
  - id: laboratory_or_controlled
    label: Laboratory or Controlled
    definition: Evaluation under controlled conditions, often with restricted tasks, users, inputs, or comparators.
  - id: simulation
    label: Simulation
    definition: Evaluation using simulated conditions, synthetic data, models, scenarios, or computational experiments.
  - id: prototype_demonstration
    label: Prototype Demonstration
    definition: Controlled or illustrative showing that the artifact can operate or solve an example problem instance.
  - id: expert_review
    label: Expert Review
    definition: Evaluation by qualified experts using explicit criteria, rubrics, Delphi logic, panels, or structured review.
  - id: literature_based_argument
    label: Literature-Based Argument
    definition: Evaluation by alignment with prior studies, standards, design theories, or codified knowledge.
  - id: field_case
    label: Field Case
    definition: Evaluation within one or more real organizational, social, technical, educational, or professional contexts.
  - id: naturalistic_field_setting
    label: Naturalistic Field Setting
    definition: Evaluation using typical or intended users, real or representative environments, and appropriate inputs.
  - id: mixed_setting
    label: Mixed Setting
    definition: Evaluation combining artificial, analytical, controlled, field, or naturalistic evidence.
  evidence_status_values:
  - not_planned
  - planned
  - collected
  - analyzed
  - reported
  - retained
  - not_shareable
  - accepted_v1_limitation
  claim_support_status_values:
  - supported
  - partially_supported
  - unsupported
  - contradicted
  - inconclusive
  - not_evaluated
  - deferred
  acceptance_decision_values:
  - accept_claim
  - accept_with_qualification
  - revise_claim
  - reject_claim
  - defer_claim
  - require_additional_evidence
relationship_model:
  core_relationships:
  - relationship_type: translates_into
    source_entity: claim
    target_entity: evaluation_question
    cardinality: one_or_more_questions_per_claim
    rule: Every substantive claim must translate into at least one evaluation question or be explicitly marked not_evaluated
      with rationale.
  - relationship_type: operationalized_by
    source_entity: evaluation_question
    target_entity: evaluation_criterion
    cardinality: one_or_more_criteria_per_question
    rule: Every evaluation question must have at least one criterion or an explicit qualitative judgment basis.
  - relationship_type: indicated_by
    source_entity: evaluation_criterion
    target_entity: measure_or_indicator
    cardinality: zero_or_more_indicators_per_criterion
    rule: Criteria based on direct observation, performance, or stakeholder judgment should define indicators; argument-based
      criteria may use reasoning rules instead.
  - relationship_type: evaluated_using
    source_entity: evaluation_question
    target_entity: evaluation_method
    cardinality: one_or_more_methods_per_question
    rule: Each method must state timing, setting, data, units or participants, and analysis logic.
  - relationship_type: supported_by
    source_entity: claim
    target_entity: evidence_item
    cardinality: zero_or_more_evidence_items_per_claim
    rule: A claim with no evidence items must be labeled planned, deferred, not_evaluated, or accepted_v1_limitation.
  - relationship_type: interpreted_against
    source_entity: evaluation_result
    target_entity: baseline_or_comparator
    cardinality: optional
    rule: If no baseline exists, the result must explain its interpretation logic.
  - relationship_type: qualified_by
    source_entity: evaluation_result
    target_entity: limitation_or_threat
    cardinality: zero_or_more_limitations_per_result
    rule: Limitations that materially change claim strength must be linked to the affected claim.
  - relationship_type: resolves_or_updates
    source_entity: evaluation_result
    target_entity: acceptance_decision
    cardinality: zero_or_more_decisions_per_result
    rule: Release, review, or publication decisions should cite evaluation results and unresolved limitations.
  alignment_chain_template:
    trace_pattern: claim_to_question_to_criterion_to_indicator_to_method_to_evidence_to_result_to_decision
    required_for_l2_reviewable:
    - claim
    - evaluation_question
    - evaluation_criterion
    - evaluation_method
    - evidence_status
    - result_or_planned_result
    - limitation_or_threat
    - acceptance_decision_or_review_status
claim_alignment_model:
