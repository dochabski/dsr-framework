    bibliographic citations.

    '
  implication: Downstream publication-ready docs should add exact citation anchors or bibliographic references.
  mitigation: Use records/source-basis and docs/evaluation to refine scholarly traceability.
- limitation_id: lim_eval_003
  limitation: 'The model defines validation logic but does not itself implement JSON Schema.

    '
  implication: Automated validation requires a separate schema generation step.
  mitigation: Generate schemas/dsr-evaluation-plan.schema.json and schemas/dsr-evaluation-report.schema.json.
assumptions:
