  statement: The DSR Framework package will use YAML source-of-truth records and JSON Schema validation for evaluation plans
    and reports.
- assumption_id: asm_eval_002
  statement: Evaluation vocabularies will be generated as separate controlled vocabulary files and then linked to this model.
- assumption_id: asm_eval_003
  statement: The model must remain method-neutral enough to cover conceptual, formal, artificial, naturalistic, qualitative,
    quantitative, and mixed DSR evaluation.
- assumption_id: asm_eval_004
  statement: L2 reviewability requires explicit traceability and limitation handling, not completed empirical evaluation of
    every framework component.
