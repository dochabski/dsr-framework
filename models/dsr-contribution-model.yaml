implementation_guidance:
  authoring_guidance:
  - Start every contribution-positioning record with a concise claim statement.
  - Use multiple contribution claims rather than forcing one claim to carry utility, quality, and knowledge contribution at
    once.
  - Assign knowledge scope conservatively; use mixed_multi_level when local evidence and generalized claims coexist.
  - Treat projectability as a claim requiring problem-class definition, boundary conditions, and evidence or rationale.
  - Preserve not_yet_mapped when source evidence or downstream vocabulary entries have not yet been generated.
  reviewer_guidance:
  - Check whether the claimed contribution type matches the evidence basis.
  - Flag routine implementation, consulting output, or local success as overclaimed if no abstraction is provided.
  - Require separate discussion of practice impact and contribution to knowledge.
  - Require explicit limitations for every non-idiographic claim.
  schema_implications:
  - schema_contribution_claim should require claim_id, claim_statement, contribution_type, knowledge_goals, knowledge_scope,
    evidence_basis, limitations, and review_status.
  - schema_contribution_claim should validate controlled values against vocabularies once vocabularies are finalized.
  - schema_contribution_claim should allow evidence_status not_yet_mapped during draft phases.
  template_implications:
  - template_contribution_claim should prompt for artifact utility, artifact quality, and knowledge contribution as separate
    fields.
  - template_contribution_positioning should include a review-for-overclaiming section.
  - checklist_contribution_positioning should mirror the review_criteria in this model.
assumptions:
- id: asm_model_dependencies_pending
  statement: Referenced vocabulary, schema, template, and checklist files may be generated later; this model provides controlled-value
    candidates and relationship rules for them.
- id: asm_l2_target
  statement: The file targets l2_reviewable rather than executable validation because the dependent JSON Schema is not yet
    generated in this selection.
- id: asm_internal_corpus_sufficient
  statement: The internal DSR corpus provides sufficient contribution-model evidence for this draft; no external source lookup
    was used.
limitations:
- id: lim_vocabularies_not_finalized
  statement: Controlled values are included here for model coherence but should be reconciled with the dedicated vocabulary
    files when generated.
- id: lim_no_empirical_validation_of_model
  statement: This contribution model is protocol-ready and reviewable but has not yet been empirically tested with independent
    DSR authors or reviewers.
- id: lim_corpus_anchor_granularity
  statement: Citation anchors are mapped at source-extraction level; future review may refine them against page-level source
    PDFs.
open_questions:
- id: oq_include_aesthetic_contribution_type
  question: Should aesthetic contribution be modeled as a distinct contribution type or as a responsible-design / artifact-quality
    subdimension?
  disposition: defer_to_aesthetics_vocabulary_and_quality_model
- id: oq_scoring_model
  question: Should contribution strength be scored ordinally or kept as qualitative review criteria?
  disposition: defer_to_quality_conformance_and_review_model
- id: oq_multi_claim_aggregation
  question: How should multiple contribution claims be aggregated for package-level publication readiness?
  disposition: defer_to_publication_readiness_model
