assumptions:
- assumption_id: asm01_l2_reviewable_target
  statement: 'The requested default conformance L2 is interpreted as reviewable rather than fully executable, reusable, or
    archival-publication-ready.

    '
- assumption_id: asm02_no_existing_lifecycle_vocab_file_required
  statement: 'This model anticipates vocabularies/lifecycle-stages.yaml but does not require that file to exist before this
    model can be reviewed.

    '
- assumption_id: asm03_dsr_framework_package_as_conceptual_artifact
  statement: 'The DSR Framework package may contain conceptual artifacts and structured documentation artifacts; build transparency
    therefore includes authoring, synthesis, modeling, and file-generation activities.

    '
- assumption_id: asm04_internal_corpus_sufficient
  statement: 'The model uses the internal DSR extraction corpus and uploaded generation files as its evidence basis; no external
    web source was used.

    '
limitations:
- limitation_id: lim01_not_a_schema
  statement: 'This file is a model, not a JSON Schema. Validation implications require downstream implementation in schema
    or checklist files.

    '
- limitation_id: lim02_not_project_specific
  statement: 'The model is generic to DSR Framework packages and DSR projects; project- specific lifecycle records must still
    be created for each artifact package.

    '
- limitation_id: lim03_evidence_anchor_granularity
  statement: 'Source_basis uses corpus source IDs and citation anchor IDs rather than direct bibliographic quotations inside
    this file.

    '
- limitation_id: lim04_release_readiness_not_claimed
  statement: 'This model supports L2 reviewability but does not itself establish L4 reuse readiness or L5 archival/publication
    readiness.

    '
open_questions:
- question_id: oq01_stage_vocabulary_split
  question: 'Should lifecycle stage identifiers remain embedded in this model, or should they be rendered into vocabularies/lifecycle-stages.yaml
    as the controlled source?

    '
  decision_needed_by: before_schema_generation
- question_id: oq02_evaluation_method_mapping_depth
  question: 'How granular should the mapping be between lifecycle stages and evaluation method families in vocabularies/evaluation-method-families.yaml?

    '
  decision_needed_by: before_evaluation_model_finalization
- question_id: oq03_release_stewardship_scope
  question: 'Should post-release stewardship remain part of the lifecycle model or be split into publication/readiness and
    governance models?

    '
  decision_needed_by: before_l4_or_l5_conformance
