model:
  id: dsr_framework_canonical_model
  item_id: dsr_framework_canonical_model
  selection_id: model_canonical
  target_path: models/dsr-framework-canonical-model.yaml
  item_type: specification
  portion_type: model
  title: DSR Framework Canonical Model
  purpose: >
    Define the master model of Design Science Research Framework entities,
    relationships, boundary conditions, validation implications, and traceability
    links used by downstream schemas, templates, checklists, documentation, and
    retained records.
  status: draft
  version: "0.1.0"
  owner: DSR Framework maintainers
  conformance_target: l2_reviewable
  default_conformance: L2
  created_date: "2026-04-27"
  license_expression: CC0-1.0

source_basis:
  - source_id: user_current_request
    role: immediate_generation_target
    evidence_status: direct_user_selection
    notes: >
      User selected model_canonical with target path
      models/dsr-framework-canonical-model.yaml.
  - source_id: dsr_framework_generation_spec
    role: generation_rules_and_repository_conventions
    evidence_status: mapped
    used_for:
      - repository_path
      - controlled_item_metadata
      - quality_gates
      - traceability_requirements
      - model_file_requirements
  - source_id: dsr_framework_generation_prompt
    role: generation_procedure_and_dsr_distinctions
    evidence_status: mapped
    used_for:
      - artifact_utility_quality_contribution_distinction
      - demonstration_evaluation_distinction
      - artifact_instance_type_distinction
      - transparency_dimensions
      - reviewability_expectations
  - source_id: dsr_framework_selection_table
    role: selection_registry
    evidence_status: mapped
    used_for:
      - selection_id
      - target_path
      - portion_type
      - output_format
      - default_conformance
      - key_dependencies
  - source_id: akoka_comyn_wattiau_prat_storey_2023_knowledge_contributions_in_dsr
    role: knowledge_contribution_and_strategy_basis
    evidence_status: mapped
    citation_anchor_ids: [A02, A07, A08, A10, A13, A16]
    used_for:
      - knowledge_goal
      - knowledge_scope
      - path_of_knowledge_types
      - contribution_strategy
      - knowledge_accumulation
  - source_id: hevner_et_al_2024_transparency_in_design_science_research
    role: transparency_framework_basis
    evidence_status: mapped
    citation_anchor_ids: [CA01, CA05, CA06, CA07, CA08, CA09, CA10, CA11, CA16]
    used_for:
      - process_transparency
      - problem_space_transparency
      - solution_space_transparency
      - build_transparency
      - evaluation_transparency
      - contribution_transparency
  - source_id: weigand_johannesson_andersson_2021_artifact_ontology_for_dsr
    role: artifact_ontology_basis
    evidence_status: mapped
    citation_anchor_ids: [A03, A09, A11, A12, A15, A17, A18, A19, A20]
    used_for:
      - artifact_universal
      - artifact_instance
      - design_specification
      - make_plan
      - use_plan
      - capacity_specification
      - artifact_network
      - make_use_contexts
  - source_id: dsr_extraction_corpus
    role: broader_scholarly_and_methodological_evidence_base
    evidence_status: partially_mapped
    used_for:
      - canonical_dsr_terms
      - artifact_taxonomy
      - evaluation_alignment
      - quality_review
      - projectability_and_replication

