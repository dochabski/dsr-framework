    - README.md
    - LICENSE
    - CITATION.cff
    - CHANGELOG.md
    - CONTRIBUTING.md
    - GOVERNANCE.md
    - SECURITY.md
    - CODE_OF_CONDUCT.md
    - .zenodo.json
    - manifest.yaml
    - metadata.yaml
    - artifact-profile.yaml
    - package-inventory.yaml
    - conformance-declaration.yaml
