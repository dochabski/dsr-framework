    status: pass
  - criterion_id: ac_release_inventory_linked
    criterion: The record identifies package-inventory.yaml as a file that must include this release record.
    status: pass
  limitations:
  - limitation_id: lim_public_draft_not_stable_release
    description: v0.1.0 has confirmed GitHub and Zenodo public-draft facts, but it is not a stable 1.0.0 framework release.
    effect: L3/L4/L5 claims remain out of scope for v0.1.0.
  - limitation_id: lim_l5_preservation_not_complete
    description: Public-draft DOI availability is not equivalent to completed L5 preservation, registry, metadata-freeze, and release-approval evidence.
    effect: L5 archival/publication-ready status remains deferred.
  - limitation_id: lim_checklist_not_attached
    description: 'The release readiness checklist is named as a dependency but its completed review results are not embedded
