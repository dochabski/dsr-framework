    - templates
    - checklists
    - docs/protocol
    - records/decisions
    - records/design-decisions
    - records/tailoring
    - records/source-basis
    - records/dsr-transparency
    - records/contributions
    - records/evaluations
    - records/reviews
    - records/releases
    - records/preservation
    - crosswalks
    - examples
    - .github/ISSUE_TEMPLATE
    - .github/workflows
