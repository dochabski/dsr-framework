    - evidence_id: ev_archive_or_registry_record
      evidence_type: archive_or_registry_record
      description: DOI, Zenodo, OSF, institutional repository, GitHub release archive, or equivalent archival record.
      evidence_status: TODO
      supports:
      - archival_publication_readiness
    - evidence_id: ev_package_validation_report
      evidence_type: validation_report
      description: Automated or manual validation report confirming schema, link, inventory, and metadata checks.
      evidence_status: TODO
      supports:
      - qg_consistency
      - qg_coherence
      - qg_reviewability
  outcome:
    outcome_id: release_record_outcome_v0_1_0
    result: release_record_created
    decision: conditional_go
    release_claim: 'The DSR Framework v0.1.0 release record has been created as a controlled release evidence record. Final
      release approval remains conditional on package inventory alignment, release readiness checklist completion, repository
      tag confirmation, archival metadata confirmation, and validation evidence attachment.

      '
    approved_actions:
    - Add records/releases/record-release-0001-v0-1-0.yaml to the repository.
    - Use this record as the release evidence spine for v0.1.0.
    - Update package-inventory.yaml and release notes to reference this record.
    - Complete or link the release readiness checklist before declaring final L5 release readiness.
    deferred_actions:
    - Assign final release approver.
    - Verify archive or DOI metadata.
    - Attach final package validation report.
    - Finalize release tag and preservation record.
  related_items:
    upstream_dependencies:
    - item_id: dsr_framework_generation_prompt
      relationship: governed_by
      path: dsr-framework-generation-prompt.md
    - item_id: dsr_framework_generation_spec
      relationship: governed_by
      path: dsr-framework-generation-spec.yaml
    - item_id: dsr_framework_selection_table
      relationship: selected_from
      path: dsr-framework-selection-table.md
    - item_id: release_readiness_checklist
      relationship: depends_on
      path: checklists/publication-readiness-checklist.yaml
      evidence_status: not_yet_mapped
    package_control_files:
