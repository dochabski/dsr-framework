    date: '2026-04-27'
    release_tag: v0.1.0
    release_name: DSR Framework v0.1.0
    release_scope: 'Initial governed release of the DSR Framework package as a protocol-governed, reviewable, reusable, and
      citable artifact package for planning, documenting, evaluating, reviewing, and publishing Design Science Research artifacts.

      '
    release_status: public_draft_release_published
