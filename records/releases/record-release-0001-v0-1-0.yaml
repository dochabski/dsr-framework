  - question_id: oq_independent_review
    question: What independent review record is sufficient before L4 reusable stable status?
    resolution_status: open
  - question_id: oq_canonical_example
    question: What canonical example package should be validated before 1.0.0?
    resolution_status: open
  retention_rule:
    retention_id: ret_release_records_permanent
    retention_period: permanent
    retention_rationale: 'Release records are retained as permanent governance, provenance, citation, preservation, and audit
