      - model_or_taxonomy_artifact
      - documentation_only
      - data_or_information_artifact
    repository_url: https://github.com/dochabski/dsr-framework
    release_url: https://github.com/dochabski/dsr-framework/releases/tag/v0.1.0
    published_zenodo_doi: 10.5281/zenodo.19835424
    zenodo_record_url: https://zenodo.org/records/19835424
  release_basis:
    governing_selection:
      selection_id: record_release_v0_1_0
      target_path: records/releases/record-release-0001-v0-1-0.yaml
      portion_type: record
      output_format: yaml
      purpose: First release record.
      default_conformance: L5
      key_dependencies:
      - release_readiness_checklist
    source_basis:
    - source_id: user_current_request
      source_type: immediate_task_definition
      use: Defines the selected record, target path, output format, and release-record purpose.
      evidence_status: mapped_to_current_request
    - source_id: dsr_framework_generation_prompt
      source_type: project_generation_prompt
      use: Provides generation procedure, record-file requirements, final response conventions, and quality expectations.
      evidence_status: mapped_to_project_registry
    - source_id: dsr_framework_generation_spec
      source_type: generation_specification
      use: Provides repository architecture, information item rules, record required fields, naming rules, quality gates,
        and L5 conformance target vocabulary.
      evidence_status: mapped_to_project_registry
    - source_id: dsr_framework_selection_table
      source_type: selection_registry
      use: Confirms selected target path, record type, output format, purpose, conformance, and dependency.
      evidence_status: mapped_to_project_registry
    - source_id: release_readiness_checklist
      source_type: checklist
      use: Supplies readiness criteria that should be completed before final release approval.
      evidence_status: not_yet_mapped
    - source_id: dsr_corpus
      source_type: scholarly_and_methodological_evidence_base
      use: 'Supports the DSR Framework''s methodological basis, especially artifact transparency, contribution positioning,
        evaluation, projectability, and publication/reporting norms.

        '
      evidence_status: referenced_indirectly
    documentation_protocol_alignment:
      repository_record_role: 'This file belongs in records/releases and functions as retained evidence of release identity,
        release readiness assessment, release decision status, and post-release preservation obligations.

        '
      structured_source_of_truth: true
  release_readiness_summary:
    readiness_decision: public_draft_release_published
    decision_label: v0.1.0 public draft GitHub release and Zenodo DOI published.
    decision_rationale: Root metadata, licensing, package inventory, crosswalk counts, citation metadata, GitHub release,
      and Zenodo archival deposit are complete for the v0.1.0 public draft. The release remains under active validation and
      does not claim stable 1.0 maturity.
    validation_counts:
      total_corpus_sources: 71
      source_basis_only_or_no_substantive_hits: 0
      minimally_mapped_single_substantive_hit: 0
      substantively_mapped_multi_file: 71
      trace_objects_with_required_pattern: 142
      evidence_status_counts:
        substantive: 142
