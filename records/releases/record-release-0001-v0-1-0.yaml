    readiness_decision: 0.1.0_public_draft_published
    decision_label: v0.1.0 public draft GitHub release and Zenodo DOI published.
    decision_rationale: Root metadata, licensing, package inventory, crosswalk counts, citation metadata, GitHub release,
      and Zenodo archival deposit are complete for the v0.1.0 public draft. The release remains under active validation and
      does not claim stable 1.0 maturity.
