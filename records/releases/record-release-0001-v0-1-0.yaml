      - qg_reviewability
    - evidence_id: ev_generation_spec_l5_target
      evidence_type: conformance_rule
      description: The generation specification includes l5_archival_publication_ready as an allowed conformance target.
      evidence_status: available
      supports:
      - qg_correspondence
    - evidence_id: ev_release_readiness_checklist
      evidence_type: checklist_result
      description: Completed release-readiness checklist for v0.1.0.
      evidence_status: not_yet_mapped
      supports:
