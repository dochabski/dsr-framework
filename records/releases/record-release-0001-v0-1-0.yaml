  - item_id: preservation_record
    status: pending_for_l5
    rationale: Zenodo publication exists for v0.1.0, but L5 requires explicit preservation evidence and preservation decision records.
  - item_id: independent_review_record
    status: pending_for_l4_or_higher
    rationale: L4 reusable stable requires independent review or equivalent retained review evidence.
  - item_id: release_approval_record
    status: pending_for_v1_stable
    rationale: Stable 1.0.0 should not be approved until release-blocking findings are closed.
  - item_id: registry_closure
    status: pending_for_l5
    rationale: L5 requires registry and archival metadata closure beyond public-draft DOI availability.
