      disposition: accepted_primary_support
    - finding_id: source_anomaly_002
      severity: pass
      statement: Sources that are conceptual, typological, ontology, synthesis, or reporting-guidance sources are not used as empirical proof of framework utility.
      disposition: accepted_with_evidence_limits
    - finding_id: source_anomaly_003
      severity: pass
      statement: The human-review-sensitive Pekkola source is excluded from primary v1 claim support.
      disposition: limited_use_background_only
    - finding_id: source_anomaly_004
