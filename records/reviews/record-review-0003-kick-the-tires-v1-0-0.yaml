      statement: The example is intentionally minimal and synthetic.
      disposition: accepted_v1_limitation
    - finding_id: ktt_002
      severity: blocking_if_absent
      statement: The example must remain linked in manifest and package inventory.
      disposition: fixed_or_verified
  outcome:
    result: pass
    supports:
      - l3_exercisability
      - l4_reuse_readiness
    does_not_support:
      - empirical_external_reuse_validation
      - l5_archival_publication_ready
  retention_rule:
    retention_period: permanent_while_package_is_active
    supersession_rule: Supersede only with a later retained kick-the-tires review.
