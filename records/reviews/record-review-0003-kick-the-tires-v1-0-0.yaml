  title: v1.0.0 Kick-the-Tires Review
  status: approved
  version: 1.0.0-rc.1
  review_date: '2026-04-28'
  responsible_party: framework_reviewer
  target_release: v1.0.0
  target_package_conformance: l4_reusable_stable
  l5_claimed: false
  exercised_path:
    - read README
    - inspect package inventory
    - inspect conformance declaration
    - open canonical worked example
    - trace problem statement to artifact specification
    - trace artifact specification to evaluation plan
    - trace contribution claim to claim-level crosswalk
    - inspect transparency crosswalk
    - run validation script
  review_questions:
    - Can a new user identify where to start?
    - Can a researcher complete the example path without hidden assumptions?
    - Can a reviewer distinguish demonstration from evaluation?
    - Can a maintainer validate the package locally?
    - Are limitations and non-claims visible?
  findings:
