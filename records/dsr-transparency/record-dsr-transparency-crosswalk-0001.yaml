    source_type: user_instruction
    role: immediate_task_definition
    evidence_status: mapped
    notes: >
      User selected record_transparency_crosswalk and instructed that the generated
      file is new and should not be checked in Dropbox as already created.
  - source_id: dsr_framework_generation_spec
    source_type: governing_specification
    role: repository_structure_and_quality_gate_rules
    evidence_status: mapped
    citation_or_anchor: dsr-framework-generation-spec.yaml
