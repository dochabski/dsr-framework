    source_type: governing_prompt
    role: generation_procedure_and_record_output_rules
    evidence_status: mapped
    citation_or_anchor: dsr-framework-generation-prompt.md
  - source_id: dsr_framework_selection_table
    source_type: selection_registry
    role: selected_path_and_dependency_confirmation
    evidence_status: mapped
    citation_or_anchor: dsr-framework-selection-table.md
  - source_id: hevner_et_al_2024_transparency_in_design_science_research
    source_type: primary_dsr_corpus_source
    role: primary_six_dimension_transparency_framework_source
    evidence_status: mapped
    citation_or_anchor: CA01
    short_citation: Hevner et al. (2024)
  - source_id: dsr_extraction_corpus
    source_type: internal_extraction_corpus
    role: normalized_evidence_base_for_dsr_transparency_and_reporting_guidance
    evidence_status: mapped

