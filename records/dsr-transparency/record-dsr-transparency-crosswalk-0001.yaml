record:
  record_id: record_dsr_transparency_crosswalk_0001
  record_class: dsr_transparency_crosswalk
  item_type: record
  title: DSR Transparency Crosswalk Record 0001
  purpose: >
    Record the initial six-dimension Design Science Research transparency evidence
    for the DSR Framework artifact package and preserve traceability to the DSR
    transparency corpus, framework generation specification, and transparency
    crosswalk template dependency.
  status: draft
  version: "0.1.0"
  date: "2026-04-27"
  event_or_action: initial_recording_of_six_dimension_dsr_transparency_evidence
  responsible_party:
    role: framework_author_or_maintainer
    name: "TODO: Confirm responsible maintainer name before release."
  created_by:
    role: assistant
    system: GPT-5.5 Thinking
  conformance_target: l2_reviewable
  retention_rule: >
    Retain as a package evidence record for the life of the DSR Framework repository;
    supersede only with a later numbered transparency crosswalk record that preserves
    this record's identifier and change history.

scope:
  artifact_package: dsr_framework
  target_path: records/dsr-transparency/record-dsr-transparency-crosswalk-0001.yaml
  selected_portion:
    selection_id: record_transparency_crosswalk
    portion_type: record
    output_format: yaml
    purpose: Record six-dimension transparency evidence.
    default_conformance: L2
    key_dependencies:
      - transparency_crosswalk_template
      - dsr_transparency_model
      - dsr_corpus
      - documentation_protocol
  record_boundary:
    includes:
      - framework_level_transparency_evidence
      - evidence_status_by_dimension
      - citation_anchor_traceability
      - review_and_validation_criteria
      - limitations_and_open_questions
    excludes:
      - empirical evaluation of the framework package as a deployed artifact
      - claim that every repository file has been independently audited
      - release or publication readiness claims

