      path: schemas/dsr-transparency-crosswalk.schema.json
      relationship: expected_validation_schema
      evidence_status: not_repository_audited_in_this_record
    - item_id: checklist_transparency
      path: checklists/dsr-transparency-crosswalk-checklist.yaml
      relationship: review_checklist_for_transparency_records
      evidence_status: not_repository_audited_in_this_record
  downstream_or_consumer_items:
