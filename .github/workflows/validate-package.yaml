# SPDX-License-Identifier: Apache-2.0
name: Validate package

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: Validation mode
        default: all
        type: choice
        options:
          - all
          - public_draft
          - release_candidate

jobs:
  validate-public-draft:
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'all' || inputs.mode == 'public_draft'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pyyaml jsonschema

      - name: Validate package
        run: python scripts/validate-package.py --mode public_draft

  validate-release-candidate:
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'all' || inputs.mode == 'release_candidate'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pyyaml jsonschema

      - name: Validate release-candidate gates
        shell: bash
        run: |
          set +e
          python scripts/validate-package.py --mode release_candidate
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if [[ "$GITHUB_REF" == refs/heads/v1-release* || "$GITHUB_REF" == refs/tags/v1.* ]]; then
            exit "$status"
          fi
          echo "::warning::Release-candidate validation failed as expected before v1 finalization. It will be required on v1-release* branches and v1.* tags."
