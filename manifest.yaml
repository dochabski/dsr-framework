# SPDX-License-Identifier: CC0-1.0
manifest:
  item_id: dsr_framework_manifest
  item_type: specification
  portion_type: root_specification
  selection_id: root_manifest
  title: DSR Framework Repository Manifest
  purpose: 'Declare the canonical package identity, root file set, directory architecture, dependency structure, conformance
    target, validation obligations, and traceability expectations for the Design Science Research Framework repository.

    '
  status: 0.1.0_public_draft
  version: 0.1.0
  package:
    package_id: dsr_framework
    package_name: DSR Framework
    package_slug: dsr-framework
    package_class:
      primary: compound_dsr_artifact
      secondary:
      - method_or_protocol_artifact
      - model_or_taxonomy_artifact
      - documentation_only
      - data_or_information_artifact
    canonical_description: 'A protocol-governed, GitHub-publishable Design Science Research framework for planning, documenting,
      evaluating, reviewing, and publishing DSR artifacts.

      '
    canonical_repository_role: source_of_truth_package
    repository_url: https://github.com/dochabski/dsr-framework
    publication_status: 0.1.0_public_draft
    intended_release: v0.1.0
    license:
      spdx_id: CC0-1.0
      license_file: LICENSE
      license_text_files:
      - LICENSES/CC0-1.0.txt
      - LICENSES/Apache-2.0.txt
      reuse_file: REUSE.toml
      evidence_status: open_license_confirmed
    citation_files:
    - CITATION.cff
    - .zenodo.json
    - codemeta.json
    normalization_status:
      status: 0.1.0_public_draft_reconciled_for_v1_readiness
      normalized_at: '2026-04-27'
      structure_status: canonical_directories_populated_from_product_catalog
      required_root_file_status: all_required_root_files_present_as_draft_or_controlled_files
      schema_contract_status: schema_template_and_schema_record_pairs_validate
      parse_status: yaml_json_cff_parse_checks_pass_after_source_traceability_remediation
      repaired_corpus_reference:
        individual_records: ../Extractions_Repaired
        combined_yaml: ../Extractions_Combined_Repaired/dsr_extractions_repaired_20260427.yaml
        record_count: 71
        status: parseable_working_corpus_for_next_literature_alignment_pass
      publication_readiness_status: published_citable_public_draft_not_l5
      latest_literature_alignment_review: records/reviews/record-literature-alignment-0002-post-crosswalk-review.yaml
      prior_literature_alignment_review: records/reviews/record-literature-alignment-0001.yaml
      literature_alignment_status: post_crosswalk_review_pass_with_required_followup
      latest_design_decision_record: records/design-decisions/record-design-decision-0001-public-draft-hardening-sequence.yaml
      latest_release_scope_decision: records/design-decisions/record-design-decision-0002-v1-0-0-release-scope.yaml
      latest_open_marker_disposition_review: records/reviews/record-review-open-marker-disposition-0001-v1-0-0.yaml
      latest_tailoring_record: records/tailoring/record-tailoring-0001-public-draft-conformance-scope.yaml
      public_draft_tailoring_status: accepted_for_0_1_0_public_draft_l2_scope
      v1_release_scope_status: l4_reusable_stable_target_l5_not_claimed_for_v1
      latest_source_to_framework_crosswalk: crosswalks/source-to-framework-alignment.yaml
      latest_claim_traceability_crosswalk: crosswalks/claim-to-source-traceability.yaml
      latest_claim_traceability_review: records/reviews/record-review-claim-traceability-0001-v1-0-0.yaml
      latest_source_anomaly_disposition_review: records/reviews/record-review-source-anomaly-disposition-0001-v1-0-0.yaml
      claim_traceability_status: established_for_major_v1_claims_after_source_anomaly_disposition
      latest_canonical_example_package: examples/canonical-minimal-dsr-package/README.md
      canonical_example_status: synthetic_demonstration_package_present_for_v1_exercisability_work
      latest_template_checklist_stabilization_review: records/reviews/record-review-template-checklist-stabilization-0001-v1-0-0.yaml
      template_checklist_stabilization_status: reviewed_against_canonical_example_for_v1_preparation
      latest_schema_hardening_review: records/reviews/record-review-schema-hardening-0001-v1-0-0.yaml
      schema_hardening_status: v1_field_hardening_pass_completed_with_canonical_example_fixtures
      validation_automation_status: v1_l4_release_candidate_gate_runs_in_ci_with_allowed_failure_until_release_branch
      latest_v1_completeness_review: records/reviews/record-review-0002-completeness-v1-0-0.yaml
      latest_v1_kick_the_tires_review: records/reviews/record-review-0003-kick-the-tires-v1-0-0.yaml
      latest_v1_full_review: records/reviews/record-review-0004-full-review-v1-0-0.yaml
      latest_v1_author_response: records/reviews/record-author-response-0001-v1-0-0.yaml
      v1_review_packet_status: retained_review_packet_present_pending_metadata_freeze_release_record_and_approval
      source_traceability_status: all_repaired_corpus_sources_have_substantive_non_source_basis_trace_objects
      source_traceability_validation_counts:
        total_corpus_sources: 71
        source_basis_only_or_no_substantive_hits: 0
        minimally_mapped_single_substantive_hit: 0
        substantively_mapped_multi_file: 71
        trace_objects_with_required_pattern: 142
        evidence_status_counts:
          substantive: 142
      github_repository: https://github.com/dochabski/dsr-framework
      published_zenodo_doi: 10.5281/zenodo.19835424
      zenodo_record_url: https://zenodo.org/records/19835424
      latest_preservation_record: records/preservation/record-preservation-0001-v0-1-0.yaml
      preservation_record_status: public_draft_preservation_evidence_retained_l5_deferred
  owner:
    responsible_role: project_maintainer
    stewarding_body: David Ochabski
    contact: https://github.com/dochabski
    github_handle: '@dochabski'
  conformance:
    selected_default_conformance: l1_documented
    file_conformance: l1_documented
    package_conformance: l2_reviewable_qualified_public_draft
    v1_target_package_conformance: l4_reusable_stable
    l5_status: deferred_until_preservation_registry_metadata_freeze_and_independent_review
    conformance_declaration_file: conformance-declaration.yaml
    tailoring_status: preliminary_root_manifest
    conformance_rationale: 'The selected table row identifies root_manifest as an L1 root specification. The broader generation
      specification treats the package default as L2 reviewable; this manifest therefore declares L1 for the generated file
      while preserving a path toward L2 package reviewability through package inventory, schemas, records, and review gates.

      '
  source_basis:
  - source_id: user_current_request
    source_type: immediate_task_definition
    role: selected root_manifest row and file-generation instruction
    evidence_status: provided
  - source_id: dsr_framework_generation_spec
    source_type: governing_specification
    role: repository architecture, item rules, naming rules, quality gates, and completion-report requirements
    evidence_status: provided
  - source_id: dsr_framework_generation_prompt
    source_type: governing_generation_prompt
    role: output conventions, required metadata, traceability, and reviewability requirements
    evidence_status: provided
  - source_id: dsr_framework_selection_table
    source_type: selection_registry
    role: target path, portion type, output format, purpose, conformance, and dependencies
    evidence_status: provided
  - source_id: dsr_extraction_corpus
    source_type: internal_dsr_corpus
    role: scholarly and methodological evidence base for downstream DSR framework products
    evidence_status: repaired_working_copy_available_for_next_alignment_pass
    notes: Original corpus preserved; repaired corpus copy parses with 71 records.
  - source_id: documentation_protocol_repository
    source_type: external_repository_model
    role: governing documentation-protocol model referenced by the generation specification
    evidence_status: checked_2026-04-27_for_public_release_metadata_precedent
  - source_id: dsr_extraction_corpus_repaired
    source_type: internal_dsr_corpus_repaired_copy
    role: working corpus for second-pass literature alignment and vocabulary/schema authority checks
    evidence_status: available_parse_validated
    record_count: 71
    paths:
    - ../Extractions_Repaired
    - ../Extractions_Combined_Repaired/dsr_extractions_repaired_20260427.yaml
  - source_id: evaluator_source_to_framework_alignment_crosswalk
    source_type: evaluator_remediation_artifact
    role: Crosswalk mapping each repaired corpus source to target framework constructs, grounding decisions, and evidence
      status.
    evidence_status: integrated_2026-04-27
    paths:
    - crosswalks/source-to-framework-alignment.yaml
    - ../source-to-framework-alignment.yaml
  - source_id: evaluator_source_trace_summary
    source_type: evaluator_traceability_summary
    role: Baseline traceability count evidence used to verify remediation movement from source-basis-only to substantive grounding.
    evidence_status: used_for_validation_2026-04-27
    path: ../source_trace_summary.tsv
  repository_architecture:
    required_root_files:
    - path: README.md
      role: public_repository_entry_point
      required: true
      expected_item_type: description
      validation_status: present_current_orientation
      existence_audit_date: '2026-04-27'
    - path: LICENSE
      role: license_terms
      required: true
      expected_item_type: policy
      validation_status: present_open_license_confirmed
      existence_audit_date: '2026-04-27'
    - path: CITATION.cff
      role: citation_metadata
      required: true
      expected_item_type: metadata_record
      validation_status: present_public_draft_citation_metadata_confirmed_v0_1_0_v1_freeze_pending
      existence_audit_date: '2026-04-27'
    - path: CHANGELOG.md
      role: release_change_log
      required: true
      expected_item_type: record
      validation_status: present_updated_for_v0_1_0_public_draft
      existence_audit_date: '2026-04-27'
    - path: CONTRIBUTING.md
      role: contributor_guidance
      required: true
      expected_item_type: procedure
      validation_status: present_draft
      existence_audit_date: '2026-04-27'
    - path: GOVERNANCE.md
      role: governance_model
      required: true
      expected_item_type: policy
      validation_status: present_public_draft_governance_policy_v1_role_confirmation_pending
      existence_audit_date: '2026-04-27'
    - path: SECURITY.md
      role: security_reporting_policy
      required: true
      expected_item_type: policy
      validation_status: present_draft
      existence_audit_date: '2026-04-27'
    - path: CODE_OF_CONDUCT.md
      role: participation_norms
      required: true
      expected_item_type: policy
      validation_status: present_draft
      existence_audit_date: '2026-04-27'
    - path: .zenodo.json
      role: archival_and_doi_metadata
      required: true
      expected_item_type: metadata_record
      validation_status: present_public_draft_zenodo_metadata_confirmed_v0_1_0_l5_preservation_pending
      existence_audit_date: '2026-04-27'
    - path: manifest.yaml
      role: repository_manifest_and_canonical_package_identity
      required: true
      expected_item_type: specification
      validation_status: present_current_control_file
      existence_audit_date: '2026-04-27'
    - path: metadata.yaml
      role: structured_project_metadata
      required: true
      expected_item_type: metadata_record
      validation_status: present_public_draft_metadata_confirmed_v0_1_0_v1_freeze_pending
      existence_audit_date: '2026-04-27'
    - path: artifact-profile.yaml
      role: artifact_identity_scope_claims_and_reuse_constraints
      required: true
      expected_item_type: description
      validation_status: present_draft
      existence_audit_date: '2026-04-27'
    - path: package-inventory.yaml
      role: package_file_inventory_and_validation_responsibilities
      required: true
      expected_item_type: record
      validation_status: present_current_control_file
      existence_audit_date: '2026-04-27'
    - path: conformance-declaration.yaml
      role: conformance_level_and_tailoring_declaration
      required: true
      expected_item_type: record
      validation_status: present_draft
      existence_audit_date: '2026-04-27'
    - path: REUSE.toml
      role: machine-readable license annotations
      required: true
      expected_item_type: metadata
      validation_status: present
      existence_audit_date: '2026-04-27'
    - path: codemeta.json
      role: CodeMeta citation metadata
      required: true
      expected_item_type: metadata
      validation_status: present
      existence_audit_date: '2026-04-27'
    - path: .gitattributes
      role: repository_line_ending_policy
      required: true
      expected_item_type: repository_configuration
      validation_status: present_public_draft_lf_normalization_policy
      existence_audit_date: '2026-04-28'
    canonical_directories:
    - path: specs
      role: controlled product specifications
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: models
      role: conceptual and operational models
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: vocabularies
      role: controlled vocabularies
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: schemas
      role: JSON Schema validation files
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: templates
      role: reusable templates
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: checklists
      role: quality and readiness checklists
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: docs/protocol
      role: human-facing protocol documentation
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/decisions
      role: retained decision records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/design-decisions
      role: retained design-decision records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/tailoring
      role: retained tailoring records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/source-basis
      role: evidence basis records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/dsr-transparency
      role: transparency evidence records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/contributions
      role: contribution-positioning records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/evaluations
      role: evaluation plans and reports
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/reviews
      role: quality and self-review records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/releases
      role: release records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: records/preservation
      role: preservation and archival records
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: crosswalks
      role: mappings among sources, protocol products, and framework constructs
      required: true
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: examples
      role: demonstration packages and examples
      required: false
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: .github/ISSUE_TEMPLATE
      role: repository issue templates
      required: false
      directory_status: exists
      existence_audit_date: '2026-04-27'
    - path: .github/workflows
      role: automation and validation workflows
      required: false
      directory_status: exists
      existence_audit_date: '2026-04-27'
  naming_rules:
    files: lower-kebab-case
    yaml_extension: .yaml
    markdown_extension: .md
    schema_extension: .schema.json
    product_file_pattern: product-<product-id>.yaml
    record_file_pattern: record-<record-class>-<sequence-or-date>.yaml
    template_file_pattern: <target-name>-template.<extension>
    checklist_file_pattern: <target-name>-checklist.yaml
    stable_identifier_style: lower_snake_case
  dependency_map:
    upstream_dependencies:
    - dependency_id: repository_architecture
      dependency_type: governing_structure
      required_for: manifest_identity_and_file_tree
      status: available_from_generation_spec
    - dependency_id: dsr_framework_generation_spec
      dependency_type: governing_specification
      required_for: conformance_quality_traceability_and_output_rules
      status: available
    - dependency_id: dsr_framework_selection_table
      dependency_type: selection_registry
      required_for: selected_target_and_default_conformance
      status: available
    peer_root_files:
    - artifact-profile.yaml
    - package-inventory.yaml
    - conformance-declaration.yaml
    - metadata.yaml
    downstream_dependents:
    - specs/product-catalog.yaml
    - specs/product-dsr-repository-architecture.yaml
    - specs/product-dsr-artifact-package-specification.yaml
    - package-inventory.yaml
    - conformance-declaration.yaml
    - records/source-basis/record-source-basis-0001-dsr-corpus.yaml
  package_control:
    source_of_truth_rules:
    - id: sot_001
      rule: Structured package-control data should be maintained in YAML or JSON-compatible files.
      applies_to:
      - manifest.yaml
      - metadata.yaml
      - artifact-profile.yaml
      - package-inventory.yaml
      - conformance-declaration.yaml
    - id: sot_002
      rule: Markdown files should remain human-facing descriptions or guides and should link back to controlled YAML or JSON
        files where applicable.
      applies_to:
      - README.md
      - docs/protocol
    - id: sot_003
      rule: Evidence claims must be traceable to the DSR corpus, the documentation protocol, project records, or explicit
        scoped/reserved status markers.
      applies_to:
      - specs
      - models
      - records
      - checklists
      - docs/protocol
    manifest_authority:
      role: package_identity_index
      authoritative_for:
      - package_id
      - package_name
      - root_file_expectations
      - canonical_directory_expectations
      - dependency_relationships
      - package_control_validation_expectations
      not_authoritative_for:
      - detailed artifact contribution claims
      - final publication readiness
      - empirical evaluation findings
      - exhaustive file inventory
      delegated_authority:
        artifact-profile.yaml: artifact scope, contribution claims, reuse constraints, and boundary conditions
        metadata.yaml: bibliographic, authorship, citation, and release metadata
        package-inventory.yaml: exhaustive file inventory and validation status
        conformance-declaration.yaml: conformance level, tailoring, and review status
        records/source-basis/record-source-basis-0001-dsr-corpus.yaml: retained scholarly source-basis evidence
  validation:
    validation_status: organized_validated_public_draft
    validation_date: '2026-04-27'
    validation_rules:
    - validation_id: val_manifest_required_fields
      rule: Manifest must include item_id, item_type, title, purpose, status, version, owner, related_items, source_basis,
        and change_history.
      status: pass
    - validation_id: val_repository_root_alignment
      rule: Required root files must include manifest.yaml and package-control peer files.
      status: pass
    - validation_id: val_directory_alignment
      rule: Canonical directories must preserve specs, models, vocabularies, schemas, templates, checklists, docs, records,
        crosswalks, examples, and GitHub automation areas.
      status: pass
    - validation_id: val_conformance_statement
      rule: Manifest must distinguish selected L1 file conformance from broader L2 package target.
      status: pass
    - validation_id: val_traceability
      rule: Manifest must include upstream dependencies, evidence statuses, quality gates, and related items.
      status: pass
    - validation_id: val_required_root_files_present
      rule: All required root files must exist in the organized package copy.
      status: pass
    - validation_id: val_schema_contract_alignment
      rule: Schemas must validate their corresponding generated templates and retained records after authority reconciliation.
      status: pass
    - validation_id: val_repaired_corpus_available
      rule: A parseable repaired extraction corpus must be available before second-pass literature alignment.
      status: pass
    failure_modes:
    - failure_id: fm_missing_root_file
      description: A required root file is absent from package inventory or release archive.
      remediation: Add the file or document tailoring in conformance-declaration.yaml.
    - failure_id: fm_uncontrolled_identity
      description: Package identity differs across manifest.yaml, metadata.yaml, artifact-profile.yaml, and CITATION.cff.
      remediation: Reconcile canonical package_id, title, version, repository URL, and release metadata.
    - failure_id: fm_unmapped_evidence
      description: A DSR concept or quality claim is made without corpus, protocol, or record evidence.
      remediation: Add trace links to records/source-basis or mark evidence_status as accepted_v1_limitation.
    - failure_id: fm_overclaimed_readiness
      description: The package claims L4/L5 reuse or archival publication readiness without supporting evaluation and release
        records.
      remediation: Downgrade the conformance claim or add required review, validation, preservation, and release records.
    validation_summary:
      required_root_files: pass_all_present
      canonical_directories: pass_all_required_directories_present_or_intentionally_empty
      yaml_json_cff_parse: pass
      json_schema_meta_validation: pass
      schema_template_record_validation: pass_previously_failing_pairs_now_validate
      repaired_corpus_parse: pass_71_records
      publication_readiness: public_draft_published_not_l5
      literature_alignment_review: completed_2026-04-27_pass_with_required_followup
  quality_gates:
  - gate_id: qg_consistency
    status: pass
    evidence:
    - manifest path is root-level manifest.yaml
    - item_type is specification
    - naming rules use lower-kebab-case files and lower_snake_case identifiers
  - gate_id: qg_coherence
    status: pass
    evidence:
    - peer root files are declared
    - package inventory and conformance declaration are delegated, not duplicated exhaustively
    - repository architecture follows the generation specification
  - gate_id: qg_cogency
    status: pass
    evidence:
    - manifest separates identity, architecture, dependencies, validation, traceability, and limitations
    - failure modes and remediation guidance are explicit
  - gate_id: qg_correspondence
    status: pass
    evidence:
    - package class and repository structure correspond to a compound DSR artifact package
    - manifest supports repository-level identity and package control
  - gate_id: qg_dsr_transparency
    status: pass
    evidence:
    - manifest maps its role to process, problem-space, solution-space, build, evaluation, and contribution transparency
  - gate_id: qg_reviewability
    status: pass
    evidence:
    - validation rules, quality gates, assumptions, open questions, and related items are explicit
  dsr_transparency_mapping:
    process_transparency:
      role: Declares repository control flow, dependencies, validation status, and change history.
      applicability: direct
    problem_space_transparency:
      role: Identifies the framework purpose and intended use as a DSR artifact package.
      applicability: indirect
    solution_space_transparency:
      role: Identifies the generation specification, documentation protocol, and DSR corpus as source bases.
      applicability: direct
    build_transparency:
      role: Captures generation date, generation mode, validation status, and change record.
      applicability: direct
    evaluation_transparency:
      role: Defines validation rules, failure modes, and quality gates for reviewer inspection.
      applicability: direct
    contribution_transparency:
      role: Positions the repository as a reusable framework package while deferring detailed claims to artifact-profile.yaml
        and contribution records.
      applicability: indirect
  traceability:
  - trace_id: tr_root_manifest_to_selection
    from: dsr_framework_selection_table.root_manifest
    to: manifest.item_id
    relation: selected_generation_target
    evidence_status: provided
  - trace_id: tr_manifest_to_generation_spec_architecture
    from: dsr_framework_generation_spec.repository_architecture
    to: manifest.repository_architecture
    relation: implements_repository_architecture
    evidence_status: provided
  - trace_id: tr_manifest_to_quality_gates
    from: dsr_framework_generation_spec.quality_gates
    to: manifest.quality_gates
    relation: applies_quality_gates
    evidence_status: provided
  - trace_id: tr_manifest_to_prompt_procedure
    from: dsr_framework_generation_prompt.general_generation_procedure
    to: manifest.validation
    relation: implements_generation_procedure
    evidence_status: provided
  - trace_id: tr_manifest_to_dsr_corpus
    from: dsr_extraction_corpus
    to: manifest.source_basis
    relation: declares_available_scholarly_source_basis
    evidence_status: available_accepted_v1_limitation
  - trace_id: tr_manifest_to_repaired_corpus
    from: dsr_extraction_corpus_repaired
    to: manifest.normalization_status.repaired_corpus_reference
    relation: declares_current_working_corpus_for_literature_alignment
    evidence_status: available_parse_validated
  - trace_id: tr_manifest_to_literature_alignment_review
    from: dsr_extraction_corpus_repaired
    to: records/reviews/record-literature-alignment-0001.yaml
    relation: supports_second_pass_literature_alignment_review
    evidence_status: review_completed_pass_with_required_followup
  - trace_id: tr_source_crosswalk_to_post_crosswalk_literature_review
