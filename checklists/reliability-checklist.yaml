      severity: error
    - rule_id: vr_claim_target_alignment
      description: >
        Every reliability claim reviewed with this checklist should map to at least
        one reliability target and one temporal mode.
      severity: warning
    - rule_id: vr_no_unbounded_diachronic_claims
      description: >
        Diachronic reliability claims require repeated, cross-context, longitudinal,
        reuse, or adaptation evidence; otherwise they must be downgraded or marked unassessed.
      severity: error
    - rule_id: vr_evidence_traceability
      description: >
