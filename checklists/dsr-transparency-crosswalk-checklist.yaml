metadata:
  item_id: dsr_transparency_crosswalk_checklist
  item_type: procedure
  title: DSR Transparency Crosswalk Checklist
  purpose: >
    Provide a reviewable checklist for assessing whether a Design Science
    Research transparency crosswalk adequately documents process, problem-space,
    solution-space, build, evaluation, and contribution transparency.
  status: draft
  version: "0.1.0"
  target_path: checklists/dsr-transparency-crosswalk-checklist.yaml
  owner: dsr_framework_maintainers
  default_conformance: l2_reviewable
  created_date: "2026-04-27"
  license: CC0-1.0

source_basis:
  - source_id: dsr_framework_generation_spec
    role: governing_generation_and_quality_rules
    evidence_status: mapped
    notes: >
      Requires checklists to include stable check IDs, questions, evidence
      required, pass and fail conditions, and remediation guidance.
  - source_id: dsr_framework_generation_prompt
    role: generation_procedure_and_output_conventions
    evidence_status: mapped
    notes: >
      Requires generated framework portions to preserve DSR distinctions,
      traceability, quality gates, and conformance information.
  - source_id: hevner_et_al_2024_transparency_in_design_science_research
    role: primary_transparency_model_source
    evidence_status: mapped
    notes: >
      Defines the six transparency dimensions used by this checklist:
      process, problem space, solution space, build, evaluation, and
      contribution transparency.
  - source_id: dsr_framework_selection_table
    role: selected_target_registry
    evidence_status: mapped
    notes: >
      Identifies checklist_transparency as checklists/dsr-transparency-crosswalk-checklist.yaml.

