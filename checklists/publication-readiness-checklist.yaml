assumptions:
  - id: asm_l4_scope
    statement: >
      L4 reusable publication readiness means a public, citable, reusable release candidate;
      it does not imply final archival preservation maturity unless a separate L5 release or preservation checklist passes.
  - id: asm_registry_pending
    statement: >
      DOI, registry, or archive fields may be planned rather than completed at review time, but claims must distinguish readiness from completed deposit.
  - id: asm_prior_files_exist_or_are_stubbed
    statement: >
      Related models, specs, records, and templates may still be draft or stub files during early framework construction,
      but publication readiness cannot be declared until required dependencies exist or are explicitly tailored.

limitations:
  - id: lim_not_peer_review
    statement: This checklist supports internal and pre-submission readiness review; it does not replace external peer review.
  - id: lim_not_legal_review
    statement: This checklist does not provide legal advice about license, privacy, security, or intellectual-property exposure.
  - id: lim_not_archival_certification
    statement: This checklist does not certify long-term preservation, DOI registration, or archival deposit completion.

open_questions:
  - id: oq_publication_model_alignment
    question: Should the publication readiness model distinguish separate gates for manuscript submission, repository release, DOI deposit, and archival preservation?
    disposition: track_for_model_publication_readiness
  - id: oq_journal_specific_variants
    question: Should journal- or venue-specific submission appendices be added as optional profiles?
    disposition: track_for_docs_publication_review
  - id: oq_automation
    question: Which publication readiness checks should become automated repository validation checks in the automation model?
    disposition: track_for_automation_validation_model

