review_protocol:
  review_mode: gate_review
  recommended_reviewers:
    - role: author_or_maintainer
      responsibility: Complete the evidence references and remediate failed checks.
    - role: independent_reviewer
      responsibility: Verify that pass conditions are supported by package evidence rather than assertion.
    - role: release_manager
      responsibility: Verify repository, version, license, citation, archival, and registry readiness.
  severity_levels:
    - id: blocking
      definition: Failure prevents L4 reusable release or publication-readiness declaration.
    - id: major
      definition: Failure should be remediated before external submission unless explicitly waived.
    - id: minor
      definition: Failure should be tracked but does not normally block readiness.
  allowed_results:
    - pass
    - fail
    - not_applicable
    - deferred_with_rationale
  evidence_rules:
    - Evidence must reference repository files, records, schemas, validation reports, review records, or release artifacts.
    - Assertions by the author are not sufficient unless captured in a controlled record with rationale.
    - Deferred checks must include a responsible party, remediation target, and reason for deferral.
    - Any waiver of a blocking check must be recorded in a review or release decision record.
  scoring_and_gate_logic:
    l4_reusable_minimum:
      blocking_checks_allowed_failed: 0
      major_checks_allowed_failed: 0
      minor_checks_allowed_failed: 3
      deferred_blocking_checks_allowed: 0
      required_evidence_status: present_or_not_applicable_with_rationale
    release_recommendation_rules:
      - outcome: ready_for_reusable_release
        condition: >
          All blocking and major checks pass or are not applicable with rationale;
          no critical metadata, license, citation, evidence, repository, or review
          gaps remain; release record can be completed.
      - outcome: ready_for_publication_review
        condition: >
          All scholarly-argument, contribution, evaluation, transparency, and
          manuscript-submission checks pass; some registry or archival steps may
          remain pending if documented.
      - outcome: needs_remediation
        condition: >
          Any blocking or major check fails, or required evidence is absent.
      - outcome: out_of_scope
        condition: >
          Minimum DSR identity, package readiness, transparency, contribution,
          or evaluation readiness has not yet been established.

sections:
  - id: package_identity_and_scope
    title: Package Identity and Scope
    purpose: Verify that the publication candidate is identifiable, bounded, and aligned with the declared DSR artifact package.
  - id: scholarly_argument_and_contribution
    title: Scholarly Argument and Contribution
    purpose: Verify that the work makes a publishable DSR contribution beyond local artifact construction.
  - id: evidence_evaluation_and_claim_alignment
    title: Evidence, Evaluation, and Claim Alignment
    purpose: Verify that evidence supports the claims made in the manuscript and package records.
  - id: transparency_and_reuse
    title: Transparency and Reuse
    purpose: Verify that the package exposes enough process, problem, solution, build, evaluation, and contribution information for review and reuse.
  - id: metadata_citation_and_attribution
    title: Metadata, Citation, and Attribution
    purpose: Verify that identifiers, citation metadata, authorship, provenance, and credit information are publication-ready.
  - id: repository_release_and_archival_readiness
    title: Repository, Release, and Archival Readiness
    purpose: Verify that the repository can be released, archived, and linked from scholarly communication channels.
  - id: governance_legal_and_risk_controls
    title: Governance, Legal, and Risk Controls
    purpose: Verify that licensing, security, privacy, proprietary, and maintenance risks have been addressed.
  - id: reviewer_and_practitioner_usability
    title: Reviewer and Practitioner Usability
    purpose: Verify that scholarly and practitioner audiences can understand, inspect, and reuse the package.

items:
  - check_id: prc_identity_001
    section_id: package_identity_and_scope
    severity: blocking
    question: Is the publication candidate associated with a stable package identity and declared version?
    evidence_required:
      - manifest.yaml with package identifier and version
      - metadata.yaml or artifact-profile.yaml with artifact identity
      - release or candidate tag naming convention
    pass_condition: >
      The artifact package has a stable name, version, canonical repository path,
      and candidate release identifier that match across manifest, metadata, and release materials.
    fail_condition: >
      Package identity, version, repository path, or release candidate identifier is missing,
      inconsistent, or not traceable across controlled files.
    remediation_guidance: >
      Update manifest.yaml, metadata.yaml, artifact-profile.yaml, and release materials so
      the same package identity and version are used throughout.
    traceability:
      - source_id: dsr_framework_generation_spec
        trace_id: repository_architecture.required_root_files

  - check_id: prc_identity_002
    section_id: package_identity_and_scope
    severity: blocking
    question: Is the publication candidate clearly bounded as a DSR artifact package rather than an unbounded project folder?
    evidence_required:
      - artifact-profile.yaml scope and non-goals
      - package-inventory.yaml
      - README.md repository boundary statement
    pass_condition: >
      The included files, excluded files, non-goals, required records, examples, and controlled artifacts
      are explicitly bounded and consistent with the package inventory.
    fail_condition: >
      The repository contains ambiguous, unmanaged, or undocumented files that make the publication boundary unclear.
    remediation_guidance: >
      Classify files as required package contents, examples, evidence records, generated artifacts,
      working materials, or excluded materials; update package-inventory.yaml accordingly.
    traceability:
      - source_id: dsr_framework_generation_spec
        trace_id: repository_architecture.canonical_directories

  - check_id: prc_identity_003
    section_id: package_identity_and_scope
    severity: major
    question: Does the candidate release declare its conformance level and tailoring rationale?
    evidence_required:
      - conformance-declaration.yaml
      - review record documenting tailoring decisions
      - list of waived or deferred checks, if any
    pass_condition: >
      Conformance level, tailoring decisions, exclusions, waivers, and open issues are explicit,
      internally consistent, and supported by review evidence.
    fail_condition: >
      The package claims L4 reusable readiness without a conformance declaration or without rationale for tailored requirements.
    remediation_guidance: >
      Complete or update conformance-declaration.yaml and link any tailoring decisions to a retained review or decision record.
    traceability:
      - source_id: dsr_framework_generation_spec
        trace_id: content_generation_rules.universal_rules

  - check_id: prc_identity_004
    section_id: package_identity_and_scope
    severity: major
    question: Are all required root and controlled repository files present or explicitly marked not applicable?
    evidence_required:
      - package-inventory.yaml
      - repository tree listing
      - validation report or manual file audit
    pass_condition: >
      Required root files, controlled directories, specifications, models, vocabularies,
      schemas, templates, checklists, records, docs, and release materials are present or
      have documented not-applicable rationales.
    fail_condition: >
      Required files or directories are missing without documented rationale.
    remediation_guidance: >
      Add missing controlled files, generate approved stubs, or document exclusions in package-inventory.yaml and conformance-declaration.yaml.
    traceability:
      - source_id: dsr_framework_generation_spec
        trace_id: repository_architecture.required_root_files

  - check_id: prc_scholarly_001
    section_id: scholarly_argument_and_contribution
    severity: blocking
    question: Does the publication candidate state a clear DSR problem class and not merely a local implementation problem?
    evidence_required:
      - problem-and-objectives record or template instance
      - artifact-profile.yaml problem-class field
      - manuscript or README problem statement
    pass_condition: >
      The problem is stated at a projectable level, identifies the affected stakeholders,
      defines the desired improvement, and distinguishes the problem class from a single local case.
    fail_condition: >
      The work only describes a local activity, implementation, or tool without articulating a broader DSR problem class.
    remediation_guidance: >
      Rewrite the problem statement to identify the class of problems, stakeholders, undesired current state,
      desired end state, and relevance beyond the immediate case.
    traceability:
      - source_id: gregor_zwikael_2024_ijpm_102584
        citation_anchor_ids: [A26]
      - source_id: weber_2018_design_science_research
        citation_anchor_ids: [A11]

  - check_id: prc_scholarly_002
    section_id: scholarly_argument_and_contribution
    severity: blocking
    question: Does the candidate identify the artifact type, artifact boundary, and artifact contribution level?
    evidence_required:
      - artifact-profile.yaml
      - artifact specification or artifact ontology record
      - contribution claim or contribution positioning record
    pass_condition: >
      The candidate distinguishes artifact type, artifact instance, design knowledge, artifact boundary,
      contribution type, and contribution scope without conflating demonstration with contribution.
    fail_condition: >
      The candidate presents an artifact but does not clarify what kind of artifact it is, what its reusable boundary is,
      or what knowledge contribution it makes.
    remediation_guidance: >
      Complete artifact profile and contribution-positioning materials; classify the artifact and map it to contribution claims.
    traceability:
      - source_id: gregor_zwikael_2024_ijpm_102584
        citation_anchor_ids: [A08, A09]
      - source_id: weber_2018_design_science_research
        citation_anchor_ids: [A12, A14]

  - check_id: prc_scholarly_003
    section_id: scholarly_argument_and_contribution
    severity: blocking
    question: Is the contribution positioned against prior knowledge rather than asserted as novel without comparison?
    evidence_required:
      - solution-space record
      - contribution-positioning record
      - source-basis record or literature grounding section
    pass_condition: >
      Prior artifacts, theories, methods, standards, or frameworks are identified; the candidate explains whether
      the contribution is improvement, exaptation, invention, method extension, evaluation contribution, or another controlled type.
    fail_condition: >
      Novelty, usefulness, or significance is asserted without a comparison set or contribution-positioning rationale.
    remediation_guidance: >
      Add a solution-space review and contribution-positioning crosswalk that identifies what is reused,
      extended, replaced, or newly introduced.
    traceability:
      - source_id: gregor_zwikael_2024_ijpm_102584
        citation_anchor_ids: [A27]
      - source_id: weber_2018_design_science_research
        citation_anchor_ids: [A12]

  - check_id: prc_scholarly_004
    section_id: scholarly_argument_and_contribution
    severity: major
    question: Does the candidate balance practical utility and scientific legitimacy?
    evidence_required:
      - artifact utility claim
      - evaluation report or evaluation plan
      - contribution claim
      - stakeholder or use-context description
    pass_condition: >
      The candidate explains both how the artifact can be useful in practice and how the work contributes
      to transferable, reviewable, or reusable design knowledge.
    fail_condition: >
      The candidate emphasizes either local practical utility or abstract theory while neglecting the other.
    remediation_guidance: >
      Add paired claims for practical utility and knowledge contribution, each linked to evidence and boundary conditions.
    traceability:
      - source_id: gregor_zwikael_2024_ijpm_102584
        citation_anchor_ids: [A06, A28]

  - check_id: prc_scholarly_005
    section_id: scholarly_argument_and_contribution
    severity: major
    question: Is the manuscript or public documentation organized around a structured DSR process?
    evidence_required:
      - lifecycle model mapping
      - project charter or process record
      - manuscript methods section or protocol documentation
    pass_condition: >
      The documentation explains problem identification, objectives, design/development, demonstration,
      evaluation, communication, and iteration or tailoring where applicable.
    fail_condition: >
      The documentation presents results without reconstructable process logic or without distinguishing lifecycle stages.
    remediation_guidance: >
      Add a lifecycle crosswalk or process narrative that maps package evidence to DSR lifecycle stages.
    traceability:
      - source_id: weber_2018_design_science_research
        citation_anchor_ids: [A09]
      - source_id: gregor_zwikael_2024_ijpm_102584
        citation_anchor_ids: [A16, A28]

  - check_id: prc_evidence_001
    section_id: evidence_evaluation_and_claim_alignment
    severity: blocking
    question: Are all publication claims traceable to package evidence?
    evidence_required:
      - contribution claim template instance
      - evaluation report
      - transparency crosswalk
      - source-basis record
    pass_condition: >
      Claims about utility, artifact quality, contribution, rigor, reuse, transparency, and readiness
      each link to specific evidence records, files, or validation results.
    fail_condition: >
      Claims rely on unsupported assertion, unreferenced evidence, or evidence not included in the package.
    remediation_guidance: >
      Create a claim-evidence matrix and revise unsupported claims to match available evidence.
    traceability:
      - source_id: dsr_framework_generation_spec
        trace_id: citation_and_traceability_rules

  - check_id: prc_evidence_002
    section_id: evidence_evaluation_and_claim_alignment
    severity: blocking
    question: Does the candidate distinguish demonstration evidence from evaluation evidence?
    evidence_required:
      - demonstration record
      - evaluation plan
      - evaluation report
      - contribution claim
    pass_condition: >
      Demonstrations are labeled as use scenarios, walkthroughs, examples, or instantiations;
      evaluations are labeled by method, criteria, data, findings, limitations, and claims supported.
    fail_condition: >
      A demonstration is presented as if it were an evaluation, or evaluation claims lack method and criteria.
    remediation_guidance: >
      Separate demonstration records from evaluation records and revise claims to reflect the actual evidence type.
    traceability:
      - source_id: dsr_framework_generation_spec
        trace_id: content_generation_rules.universal_rules

  - check_id: prc_evidence_003
    section_id: evidence_evaluation_and_claim_alignment
    severity: blocking
    question: Is the evaluation evidence sufficient for the stated readiness and contribution claims?
    evidence_required:
      - evaluation plan
      - evaluation report
      - acceptance criteria
      - evaluation limitations
    pass_condition: >
      Evaluation criteria, method, data, results, and limitations support the strength of claims made about artifact utility,
      artifact quality, and design knowledge contribution.
    fail_condition: >
      The candidate claims effectiveness, validity, reliability, reuse, or broad applicability beyond what the evaluation evidence supports.
    remediation_guidance: >
      Strengthen evaluation evidence or narrow the publication claims and boundary conditions.
    traceability:
      - source_id: hevner_et_al_2024_transparency_in_design_science_research
        citation_anchor_ids: [CA10]
      - source_id: weber_2018_design_science_research
        citation_anchor_ids: [A10, A14, A15]

  - check_id: prc_evidence_004
    section_id: evidence_evaluation_and_claim_alignment
    severity: major
    question: Are validity, reliability, replication, and projectability limitations explicitly stated?
    evidence_required:
      - validity or quality review record
      - reliability checklist result, if applicable
      - replication/projectability checklist result
      - limitations section
    pass_condition: >
      The candidate states known threats, boundaries, failed or deferred checks, reuse constraints,
      and confidence limits in a way that prevents overclaiming.
    fail_condition: >
      Limitations are absent, generic, or inconsistent with evaluation findings and package maturity.
    remediation_guidance: >
      Add a limitations and boundary-conditions section linked to quality, evaluation, reliability, and projectability records.
    traceability:
      - source_id: hevner_et_al_2024_transparency_in_design_science_research
        citation_anchor_ids: [CA13, CA17]

  - check_id: prc_evidence_005
    section_id: evidence_evaluation_and_claim_alignment
    severity: major
    question: Have failed checks, unresolved issues, and known defects been retained as review evidence?
    evidence_required:
      - review record
      - issue list or backlog
      - release record risk section
      - change history
    pass_condition: >
      Known defects and unresolved issues are documented with severity, disposition, owner, and rationale for release or deferral.
    fail_condition: >
      Known issues are hidden, undocumented, or not connected to release and review decisions.
    remediation_guidance: >
      Add a review record or release decision record that names unresolved issues and justifies disposition.
    traceability:
      - source_id: dsr_framework_generation_spec
        trace_id: information_item_rules.record_required_fields

  - check_id: prc_transparency_001
    section_id: transparency_and_reuse
    severity: blocking
    question: Does the package provide process transparency sufficient for a reviewer to reconstruct the work?
    evidence_required:
      - project charter or lifecycle record
      - design rationale
      - review records
      - change history
    pass_condition: >
      The package records major activities, design decisions, reasoning, changes, review actions,
      and context sufficient to understand how the artifact and knowledge claims were produced.
    fail_condition: >
      The package lacks process evidence or presents only final outputs without decisions and rationale.
    remediation_guidance: >
      Add or complete process records, design rationale, review records, and change history.
    traceability:
      - source_id: hevner_et_al_2024_transparency_in_design_science_research
        citation_anchor_ids: [CA06]

  - check_id: prc_transparency_002
    section_id: transparency_and_reuse
    severity: blocking
    question: Does the package provide problem-space and solution-space transparency?
    evidence_required:
      - problem-and-objectives template instance
      - solution-space record
      - source-basis record
      - requirements or acceptance criteria
    pass_condition: >
      The package describes application context, stakeholders, improvement goals, timeframe,
      prior knowledge, existing artifacts, grounding theories, and design constraints.
    fail_condition: >
      The package omits context, stakeholder problem, prior knowledge, or grounding evidence needed to interpret the artifact.
    remediation_guidance: >
      Complete problem-space and solution-space records and link them to objectives, requirements, and evaluation criteria.
    traceability:
      - source_id: hevner_et_al_2024_transparency_in_design_science_research
        citation_anchor_ids: [CA07, CA08]

  - check_id: prc_transparency_003
    section_id: transparency_and_reuse
    severity: blocking
    question: Does the package provide build transparency without exposing inappropriate sensitive material?
    evidence_required:
      - design rationale
      - build transparency record
      - artifact specification
      - risk or security review
    pass_condition: >
      The package documents design search, artifact construction, assumptions, alternatives, decisions,
      and implementation boundaries while protecting privacy, security, proprietary, or restricted information.
    fail_condition: >
      Build evidence is absent, or the package exposes sensitive material without controls.
    remediation_guidance: >
      Add build records and redact, summarize, obfuscate, or restrict sensitive material with explicit rationale.
    traceability:
      - source_id: hevner_et_al_2024_transparency_in_design_science_research
        citation_anchor_ids: [CA09, CA18]

  - check_id: prc_transparency_004
    section_id: transparency_and_reuse
    severity: major
    question: Does the package provide contribution transparency for both scholarly and practitioner audiences?
    evidence_required:
      - contribution claim
      - README.md or documentation page
      - practitioner-facing summary, if applicable
      - contribution-positioning record
    pass_condition: >
      The package distinguishes practical impact, scientific contribution, descriptive knowledge,
      prescriptive knowledge, reusable artifact value, and audience-specific communication needs.
    fail_condition: >
      The candidate states a contribution without clarifying who can use it, how, and what kind of knowledge is contributed.
    remediation_guidance: >
      Add separate scholarly and practitioner contribution statements and link each to artifact and evidence records.
    traceability:
      - source_id: hevner_et_al_2024_transparency_in_design_science_research
        citation_anchor_ids: [CA11, CA15]

  - check_id: prc_transparency_005
    section_id: transparency_and_reuse
    severity: major
    question: Are reuse instructions and boundary conditions sufficient for independent users?
    evidence_required:
      - README.md reuse section
      - artifact specification
      - examples or templates
      - license and citation instructions
    pass_condition: >
      Independent users can identify what may be reused, under what conditions, with what limitations,
      and with what citation or attribution requirements.
    fail_condition: >
      Reuse instructions are absent, ambiguous, or inconsistent with license, artifact boundary, or evaluation limitations.
    remediation_guidance: >
      Add a reuse guide covering scope, prerequisites, limitations, examples, attribution, and support boundaries.
    traceability:
      - source_id: hevner_et_al_2024_transparency_in_design_science_research
        citation_anchor_ids: [CA14, CA15]

  - check_id: prc_metadata_001
    section_id: metadata_citation_and_attribution
    severity: blocking
    question: Are citation metadata and recommended citation instructions present and internally consistent?
    evidence_required:
      - CITATION.cff
      - metadata.yaml
      - README.md citation section
      - .zenodo.json, if archival deposit is planned
    pass_condition: >
      Title, authors, version, release date or planned release date, repository URL, license,
      identifiers, and recommended citation agree across citation files and public documentation.
    fail_condition: >
      Citation files are missing or contain conflicting metadata.
    remediation_guidance: >
      Normalize citation metadata across CITATION.cff, metadata.yaml, README.md, and archival metadata.
    traceability:
