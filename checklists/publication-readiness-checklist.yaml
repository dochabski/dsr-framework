acceptance_criteria:
  - id: ac_l4_no_blocking_failures
    criterion: No blocking check may fail for an L4 reusable publication-readiness declaration.
  - id: ac_l4_claims_evidence_alignment
    criterion: All utility, quality, contribution, readiness, reuse, and publication claims must be traceable to evidence or narrowed.
  - id: ac_l4_publication_boundary
    criterion: Publication readiness must distinguish manuscript readiness, repository release readiness, registry readiness, and archival deposit completion.
  - id: ac_l4_reuse_and_risk_balance
    criterion: The package must provide enough transparency for reuse and review while managing privacy, security, proprietary, and maintenance risks.
  - id: ac_l4_review_record
    criterion: A retained review or release record must document checklist result, unresolved issues, waivers, and final disposition.

validation_rules:
  - id: vr_yaml_parse
    rule: The checklist file must parse as valid YAML.
    validation_method: yaml_parser
  - id: vr_required_item_fields
    rule: Every checklist item must include check_id, question, evidence_required, pass_condition, fail_condition, and remediation_guidance.
    validation_method: structural_review
  - id: vr_unique_check_ids
    rule: Every check_id must be unique and stable.
    validation_method: automated_or_manual_uniqueness_check
  - id: vr_traceability_present
    rule: Blocking and major checks should include traceability to source basis or governing specification.
    validation_method: structural_review
  - id: vr_no_unbounded_overclaiming
    rule: The checklist must require evidence before publication, reuse, archival, replication, or generalization claims are made.
    validation_method: manual_review

