checklist:
  id: publication_readiness_checklist
  item_id: publication_readiness_checklist
  item_type: procedure
  title: DSR Publication Readiness Checklist
  target_path: checklists/publication-readiness-checklist.yaml
  purpose: >
    Determine whether a Design Science Research artifact package is ready for
    scholarly communication, public repository release, citation, registry or
    archival deposit, and reuse by researchers, reviewers, practitioners, and
    maintainers.
  status: draft
  version: "0.1.0"
  conformance_target: l4_reusable
  owner: dsr_framework_maintainer
  intended_users:
    - author
    - maintainer
    - reviewer
    - release_manager
    - repository_curator
  use_when:
    - Before submitting a DSR manuscript or artifact paper.
    - Before tagging a reusable public release of the DSR Framework or a DSR project package.
    - Before depositing a package in a registry, archive, institutional repository, or DOI-minting service.
    - Before declaring that a package is reusable beyond its originating project team.
  not_for:
    - Certifying that a study has reached archival or long-term preservation maturity.
    - Replacing journal peer review, editorial review, legal review, or institutional approval.
    - Claiming exact replication, generalization, or field-validated utility unless supporting evidence is present.
  readiness_outcomes:
    - id: ready_for_publication_review
      label: Ready for publication review
      definition: >
        The package is sufficiently coherent, transparent, citable, and reviewed
        for submission or external scholarly review, but may still require
        journal-specific formatting.
    - id: ready_for_reusable_release
      label: Ready for reusable release
      definition: >
        The package includes the controlled files, metadata, evidence records,
        licensing, and boundary statements needed for independent reuse.
    - id: needs_remediation
      label: Needs remediation
      definition: >
        One or more blocking checks have failed and must be corrected before
        public release or publication submission.
    - id: out_of_scope
      label: Out of scope
      definition: >
        The artifact package is not yet mature enough for this checklist and
        should be reviewed with a lower-level quality, package, or evaluation checklist first.

source_basis:
  - source_id: user_current_request
    role: immediate_task_definition
    evidence_status: mapped
    notes: >
      User selected checklist_publication_readiness with target path
      checklists/publication-readiness-checklist.yaml, output format YAML,
      default conformance L4, and dependency on the publication readiness model.
  - source_id: dsr_framework_generation_spec
    role: governing_generation_and_repository_convention
    evidence_status: mapped
    notes: >
      Requires YAML for checklists, stable identifiers, source_basis,
      related_items, traceability, reviewability, quality gates, and checklist
      items with check_id, question, evidence_required, pass_condition,
      fail_condition, and remediation_guidance.
  - source_id: dsr_framework_generation_prompt
    role: generation_procedure_and_output_convention
    evidence_status: mapped
    notes: >
      Requires preservation of DSR distinctions, traceability, quality and
      conformance material, and a completion report after file generation.
  - source_id: dsr_framework_selection_table
    role: selected_file_registry
    evidence_status: mapped
    notes: >
      Confirms the target path, portion type, output format, purpose, L4 default
      conformance, and dependency on the publication readiness model.
  - source_id: hevner_et_al_2024_transparency_in_design_science_research
    role: dsr_transparency_and_publication_guidance
    evidence_status: mapped_to_extraction_anchor
    citation_anchor_ids:
      - CA01
      - CA06
      - CA07
      - CA08
      - CA10
      - CA11
      - CA14
      - CA15
      - CA16
      - CA17
      - CA18
    notes: >
      Supports publication-readiness checks for process, problem-space,
      solution-space, build, evaluation, and contribution transparency; repository
      use; proportionality of transparency requirements; and privacy, security,
      intellectual-property, maintenance, and publication-burden risks.
  - source_id: gregor_zwikael_2024_ijpm_102584
    role: dsr_publication_rigor_relevance_and_contribution_guidance
    evidence_status: mapped_to_extraction_anchor
    citation_anchor_ids:
      - A06
      - A08
      - A09
      - A16
      - A26
      - A27
      - A28
    notes: >
      Supports checks for rigor-relevance balance, structured DSR process,
      problem-class specification, abstraction beyond a local artifact, evidence
      of co-creation where applicable, and clear design knowledge contribution.
  - source_id: weber_2018_design_science_research
    role: dsr_quality_and_evaluation_guidance
    evidence_status: mapped_to_extraction_anchor
    citation_anchor_ids:
      - A06
      - A09
      - A10
      - A11
      - A12
      - A13
      - A14
      - A15
    notes: >
      Supports checks for viable artifacts, relevance, rigorous evaluation,
      contribution, rigorous construction, design search, communication, process
      quality, product quality, problem specification, and artifact-specific evaluation.

