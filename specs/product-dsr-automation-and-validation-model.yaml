  - id: open_questions_and_backlog
    title: Open Questions and Backlog
    purpose: Preserve unresolved design questions and future implementation tasks.
    content:
      open_questions:
        - id: oq_auto_001
          question: Which JSON Schema dialect should be fixed as the package standard?
          current_position: Use the most stable broadly supported JSON Schema dialect when schema files are generated.
          decision_needed_by: first_schema_release
        - id: oq_auto_002
          question: Should validation scripts live in scripts/, .github/workflows/, or both?
          current_position: Specify technology-neutral logic first; add concrete scripts and CI workflows later.
          decision_needed_by: first_exercisable_release
        - id: oq_auto_003
          question: How strict should evidence_status validation be for L3 compared with L4 and L5?
          current_position: L3 may allow not_yet_mapped evidence where the claim is marked draft; L4 and L5 should require stronger mapping.
          decision_needed_by: conformance_model_revision
        - id: oq_auto_004
          question: Should external DOI, license, and archive-link verification be automated or manually reviewed?
          current_position: Treat as manual or semi-automated until stable release metadata exists.
          decision_needed_by: publication_registry_implementation
