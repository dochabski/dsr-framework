  - id: implementation_guidance
    title: Implementation Guidance
    purpose: Provide technology-neutral implementation guidance for scripts, CI, and local checks.
    content:
      recommended_implementation_layers:
        - id: layer_01_parse
          label: Parse layer
          description: Parse YAML and JSON files; fail fast on syntax or encoding errors.
          candidate_tools:
            - python_yaml_parser
            - json_parser
        - id: layer_02_schema
          label: Schema layer
          description: Validate JSON-compatible instances against JSON Schema definitions.
          candidate_tools:
            - jsonschema_validator
        - id: layer_03_repository
          label: Repository structure layer
          description: Compare observed files and directories against repository architecture and package inventory.
          candidate_tools:
            - path_scanner
            - inventory_checker
        - id: layer_04_reference
          label: Reference layer
          description: Resolve internal links, related items, target paths, source basis entries, and traceability references.
          candidate_tools:
            - link_checker
            - reference_resolver
        - id: layer_05_review
          label: Review layer
          description: Summarize quality gate evidence for human reviewer judgment.
          candidate_tools:
            - review_summary_generator
        - id: layer_06_release
          label: Release layer
          description: Assemble release validation bundle and block release when unresolved blockers remain.
          candidate_tools:
            - release_gate_runner
      recommended_exit_codes:
        - code: 0
          meaning: pass_with_no_blockers
        - code: 1
          meaning: fail_with_blockers
        - code: 2
          meaning: fail_due_to_tool_or_configuration_error
        - code: 3
          meaning: pass_with_warnings
      structured_result_shape:
        validation_result:
          result_id: TODO_generate_unique_result_id
          target_id: TODO_target_id
          target_path: TODO_target_path
          rule_id: TODO_rule_id
          status: TODO_pass_fail_warning_not_applicable_blocked_not_run
          severity: TODO_blocker_major_minor_advisory
          evidence: []
          message: TODO_human_readable_summary
          remediation_required: false
          remediation_guidance: TODO_if_failed
      github_actions_guidance:
        recommended_triggers:
          - pull_request
          - push_to_main
          - release_candidate_tag
        recommended_jobs:
          - parse_and_schema_validate
          - inventory_and_link_validate
          - quality_gate_summarize
          - release_validate
        artifact_outputs:
          - validation-summary.yaml
          - validation-findings.yaml
          - release-validation-bundle.yaml
      local_use_guidance:
        - Run parse and schema checks before committing controlled YAML, JSON, or schema files.
        - Run inventory and link checks before opening a release review.
        - Preserve validation summaries in records only when they support review, exception, release, or preservation events.
        - Do not treat a passing automation run as approval when human review gates remain open.

