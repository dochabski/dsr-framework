  - id: implementation_guidance
    title: Implementation Guidance
    purpose: Provide operational guidance for authors, maintainers, reviewers, and adopters.
    content:
      authoring_guidance:
        - id: ig_001_start_from_information_item
          guidance: >
            Start every template from the information item or record it is meant
            to produce, not from a generic document outline.
        - id: ig_002_use_controlled_fields
          guidance: >
            Use controlled field names and values wherever validation, comparison,
            or package inventory alignment matters.
        - id: ig_003_keep_questions_atomic
          guidance: >
            Write checklist items so that a reviewer can answer each one with a
            single pass, fail, not_applicable, or not_reviewed outcome.
        - id: ig_004_embed_traceability
          guidance: >
            Include related_requirements, source_basis, or quality_gate_mapping
            close to the field or checklist item it supports.
        - id: ig_005_mark_unknowns_explicitly
          guidance: >
            Use evidence_status: not_yet_mapped, not_applicable with rationale,
            or TODO with a specific requested input instead of vague blanks.
        - id: ig_006_preserve_proportionate_transparency
          guidance: >
            Include redaction, summarization, or restricted-disclosure options
            where full transparency would create confidentiality, privacy,
            security, intellectual-property, or maintenance risks.
      reviewer_guidance:
        - id: rg_001_review_against_declared_conformance
          guidance: >
            Evaluate templates and checklists against their declared conformance
            target. Do not apply L4 or L5 expectations to L2 material unless the
            checklist is explicitly scoped for publication readiness.
        - id: rg_002_check_evidence_before_claims
          guidance: >
            Confirm that evidence fields support the claims they are attached to,
            especially evaluation, reliability, projectability, and publication
            readiness claims.
        - id: rg_003_record_remediation
          guidance: >
            Failed checklist items should produce actionable remediation guidance,
            not only a negative judgment.
        - id: rg_004_separate_documentation_quality_from_artifact_success
          guidance: >
            Passing a template or checklist review means the documentation is
            reviewable; it does not by itself establish artifact effectiveness.
      maintainer_guidance:
        - id: mg_001_coordinate_updates
          guidance: >
            Update templates, checklists, schemas, vocabularies, and package
            inventory together when field names, identifiers, or required
            evidence change.
        - id: mg_002_preserve_backwards_traceability
          guidance: >
            When a material is superseded, keep its identifier and version history
            available for prior package releases.
        - id: mg_003_flag_breaking_changes
          guidance: >
            Treat required field changes, checklist decision-rule changes, and
            identifier renames as breaking changes.
        - id: mg_004_pilot_before_higher_conformance
          guidance: >
            Before claiming L3 or higher for operating materials, pilot them on at
            least one example package or completed DSR project record.
      adopter_guidance:
        - id: ag_001_retain_source_attribution
          guidance: >
            When adapting templates or checklists locally, preserve original
            source_basis, version, license, and change_history fields.
        - id: ag_002_record_tailoring
          guidance: >
            Tailor fields only with explicit tailoring_notes or not_applicable
            rationale so that reviewers can distinguish local adaptation from
            omission.
        - id: ag_003_do_not_upgrade_claims_without_evidence
          guidance: >
            Do not re-label L2 templates as L4 reusable or L5 archival ready
            without supplying validation, release, preservation, and publication
            evidence.
      recommended_authoring_order:
        - template_artifact_profile
        - template_package_inventory
        - template_conformance_declaration
        - template_project_charter
        - template_problem_objectives
        - template_solution_space
        - template_artifact_specification
        - template_design_rationale
        - template_build_transparency
        - template_demonstration_record
        - template_evaluation_plan
        - template_evaluation_report
        - template_contribution_claim
        - template_contribution_positioning
        - template_transparency_crosswalk
        - template_review_record
        - checklist_minimum_dsr
        - checklist_evaluation_readiness
        - checklist_contribution_positioning
        - checklist_transparency
        - checklist_reliability
        - checklist_projectability
        - checklist_package_readiness
        - checklist_publication_readiness

  - id: template_or_schema_implications
    title: Template or Schema Implications
    purpose: Identify downstream effects for templates, checklists, schemas, and validation tooling.
    content:
      template_implications:
        - id: tsi_001_template_metadata_block
          implication: >
            Every YAML template should begin with a metadata block containing
            template_id, title, status, version, owner, source_basis,
            related_items, and change_history.
          affected_outputs:
            - templates/*.yaml
        - id: tsi_002_markdown_front_matter
          implication: >
            Markdown templates should include YAML front matter where practical
            so that metadata remains machine-readable.
          affected_outputs:
            - templates/*.md
        - id: tsi_003_placeholder_policy
          implication: >
            Templates should include a short placeholder_policy section that
            explains TODO, TBD, and not_applicable conventions.
          affected_outputs:
            - templates/*.yaml
            - templates/*.md
        - id: tsi_004_traceability_fields
          implication: >
            Templates that produce records should include related_items,
            source_basis, evidence, and retention_rule fields when applicable.
          affected_outputs:
            - templates/*record-template.yaml
            - templates/*template.yaml
      checklist_implications:
        - id: csi_001_item_shape
          implication: >
            Every checklist item should use the same minimum shape so checklist
            outputs can be compared and transformed into review records.
          affected_outputs:
            - checklists/*.yaml
        - id: csi_002_decision_rule
          implication: >
            Each checklist should state how individual check outcomes roll up
            into an overall review outcome.
          affected_outputs:
            - checklists/*.yaml
        - id: csi_003_evidence_to_template_mapping
          implication: >
            Checklist evidence_required values should reference the templates or
            records that normally produce the evidence.
          affected_outputs:
            - checklists/*.yaml
      schema_implications:
        - id: ssi_001_schema_generation_needed
          implication: >
            YAML templates that are intended for validation should have a
            corresponding JSON Schema or an explicit not_yet_mapped schema status.
          affected_outputs:
            - schemas/*.schema.json
            - templates/*.yaml
        - id: ssi_002_schema_enums_from_vocabularies
          implication: >
            Schemas should use controlled vocabularies for artifact types,
            contribution types, lifecycle stages, transparency dimensions,
            validity types, reliability types, replication types, and
            projectability types where stable.
          affected_outputs:
            - schemas/*.schema.json
            - vocabularies/*.yaml
        - id: ssi_003_review_record_schema
          implication: >
            A future review-record schema should validate retained checklist
            outcomes, remediation notes, evidence links, reviewer identity or
            role, date, and retention rule.
          affected_outputs:
            - schemas/review-record.schema.json
            - templates/review-record-template.yaml
      automation_implications:
        - id: asi_001_linting
          implication: >
            Automation can lint identifiers, file names, required metadata,
            checklist item shape, YAML parseability, and unresolved TODO counts.
          affected_outputs:
            - specs/product-dsr-automation-and-validation-model.yaml
        - id: asi_002_traceability_validation
          implication: >
            Automation can check whether checklist items have related_requirements
            and whether templates reference at least one governing product spec.
          affected_outputs:
            - specs/product-dsr-automation-and-validation-model.yaml
        - id: asi_003_inventory_alignment
          implication: >
            Automation can compare generated template and checklist paths with
            package-inventory.yaml.
          affected_outputs:
            - package-inventory.yaml
            - specs/product-dsr-automation-and-validation-model.yaml

  - id: open_questions_and_backlog
    title: Open Questions and Backlog
    purpose: Preserve unresolved design questions and next actions.
    content:
      assumptions:
        - id: asm_001_l2_scope
          statement: >
            This specification is scoped to L2 reviewable operating materials;
            it does not require executable validators or empirical usability
            studies for every template and checklist.
        - id: asm_002_information_item_architecture_pending
          statement: >
            The upstream information item architecture is treated as the
            governing dependency, but exact field profiles may need adjustment
            after that specification is finalized.
        - id: asm_003_markdown_templates_allowed
          statement: >
            Markdown templates are permitted for human-facing planning and
            rationale documents when they identify related controlled YAML files.
      open_questions:
        - id: oq_001_required_vs_optional_templates
          question: Which templates are required for minimum package readiness, and which are optional by DSR project type?
          disposition: defer_to_artifact_package_spec_and_quality_model
        - id: oq_002_schema_coverage_sequence
          question: Which templates should receive JSON Schema coverage first?
          disposition: prioritize_root_control_evaluation_contribution_and_transparency_records
        - id: oq_003_checklist_scoring
          question: Should checklists use binary pass/fail only, or support severity-weighted scoring?
          disposition: defer_until_quality_review_model_is_stabilized
        - id: oq_004_publication_readiness_threshold
          question: What threshold differentiates package readiness from publication readiness?
          disposition: defer_to_publication_registry_and_quality_review_specs
        - id: oq_005_template_examples
          question: Should each template include a minimal example, a full example, or no embedded examples?
          disposition: defer_until_examples_directory_policy_is_finalized
      backlog:
        - id: bl_001_generate_root_templates
          task: Generate root control templates for artifact profile, package inventory, and conformance declaration.
          priority: high
          status: open
        - id: bl_002_generate_core_dsr_templates
          task: Generate project charter, problem/objectives, solution-space, design-rationale, artifact-specification, and build-transparency templates.
          priority: high
          status: open
        - id: bl_003_generate_evaluation_and_contribution_templates
          task: Generate evaluation plan, evaluation report, demonstration record, contribution claim, and contribution positioning templates.
          priority: high
          status: open
        - id: bl_004_generate_transparency_and_review_templates
          task: Generate transparency crosswalk and review record templates.
          priority: medium
          status: open
        - id: bl_005_generate_checklists
          task: Generate minimum DSR, package readiness, transparency, evaluation readiness, contribution positioning, reliability, projectability, and publication readiness checklists.
          priority: high
          status: open
        - id: bl_006_create_schema_alignment_map
          task: Create or update schema mappings for all YAML templates and review records.
          priority: medium
          status: open
        - id: bl_007_pilot_on_example_package
          task: Apply templates and checklists to one example DSR artifact package and record usability findings.
          priority: medium
          status: open

quality_gates:
  - id: qg_consistency
    status: pass_expected
    evidence:
      - target_path follows specs/product-<product-id>.yaml pattern.
      - downstream templates and checklists use canonical directories.
      - stable identifiers use lower_snake_case.
  - id: qg_coherence
    status: pass_expected
    evidence:
      - dependencies identify information item architecture and related quality, package, metadata, lifecycle, and publication products.
      - downstream templates and checklists map to related upstream models and schemas.
  - id: qg_cogency
    status: pass_expected
    evidence:
      - workflow, acceptance criteria, validation rules, and failure modes are explicit.
      - reviewer and maintainer procedures are defined.
  - id: qg_correspondence
    status: pass_expected
    evidence:
      - scope corresponds to operating material specification for templates and checklists.
      - conformance level is L2 reviewable and does not overclaim higher maturity.
  - id: qg_dsr_transparency
    status: pass_expected
    evidence:
      - transparency mapping covers process, problem-space, solution-space, build, evaluation, and contribution transparency.
      - source basis includes DSR transparency guidance.
  - id: qg_reviewability
    status: pass_expected
    evidence:
      - checklist item profile, decision logic, evidence requirements, and remediation guidance are specified.

