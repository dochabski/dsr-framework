product:
  id: product_dsr_templates_and_checklists
  title: DSR Templates and Checklists Product Specification
  purpose: >
    Specify the operating materials used by the DSR Framework, including reusable
    templates, review checklists, checklist item rules, template/checklist
    lifecycle controls, and traceability expectations for researcher-facing and
    reviewer-facing materials.
  status: draft
  version: "0.1.0"
  item_type: specification
  target_path: specs/product-dsr-templates-and-checklists.yaml
  selection_id: spec_templates_checklists
  conformance_target: l2_reviewable
  owner: dsr_framework_maintainers
  license: CC0-1.0
  created_date: "2026-04-27"
  last_updated: "2026-04-27"

source_basis:
  - id: user_selected_portion
    type: user_instruction
    role: immediate_task_definition
    evidence_status: mapped
    notes: >
      The selected row identifies spec_templates_checklists as a product_spec in
      YAML at specs/product-dsr-templates-and-checklists.yaml, with L2 default
      conformance and information item architecture as its key dependency.
  - id: dsr_framework_generation_spec
    type: governing_specification
    role: structure_and_quality_rules
    evidence_status: mapped
    notes: >
      Governs repository architecture, naming rules, controlled information item
      fields, product-spec sections, quality gates, traceability, and output
      conventions.
  - id: dsr_framework_generation_prompt
    type: generation_prompt
    role: product_spec_shape_and_completion_rules
    evidence_status: mapped
    notes: >
      Requires product specifications to include identity and purpose,
      conceptual model, normative requirements, information items, workflow,
      quality and conformance, traceability, implementation guidance, template
      or schema implications, and open questions.
  - id: hevner_et_al_2024_transparency_in_design_science_research
    type: dsr_corpus_source
    role: transparency_and_reporting_guidance
    evidence_status: mapped_to_citation_anchors
    citation_anchor_ids:
      - CA01
      - CA06
      - CA07
      - CA08
      - CA09
      - CA10
      - CA11
      - CA14
      - CA15
      - CA16
      - CA17
    notes: >
      Supports six-part DSR transparency coverage, documentation materials,
      repository use, and the caution that detailed prescriptive checklists
      should remain proportionate and reviewable rather than burdensome.
  - id: akoka_et_al_2023_knowledge_contributions_in_dsr
    type: dsr_corpus_source
    role: contribution_development_and_guideline_support
    evidence_status: mapped_to_citation_anchors
    citation_anchor_ids:
      - A07
      - A08
      - A10
      - A13
      - A14
    notes: >
      Supports templates and checklists that help researchers articulate DSR
      knowledge moments, contribution types, strategy fit, and contribution
      development.

