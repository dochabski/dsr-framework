# SPDX-License-Identifier: CC0-1.0
product:
  id: product_dsr_lifecycle_and_contribution_model
  title: DSR Lifecycle and Contribution Model Product Specification
  purpose: Specify the controlled lifecycle, artifact taxonomy, contribution-positioning model, transparency obligations,
    and evaluation-alignment rules used by the DSR Framework to plan, document, review, package, and publish Design
    Science Research artifacts.
  status: draft
  version: 0.1.0
  owner: framework_maintainer
  target_path: specs/product-dsr-lifecycle-and-contribution-model.yaml
  selection_id: spec_dsr_lifecycle_contribution
  portion_type: product_spec
  output_format: yaml
  conformance_target: l2_reviewable
  license: CC0-1.0
source_basis:
- id: user_current_request
  role: immediate_task_definition
  evidence_status: mapped
  notes: User selected spec_dsr_lifecycle_contribution and requested a file with the proper file name.
- id: dsr_framework_generation_spec
  role: generation_rules_and_quality_gates
  evidence_status: mapped
  notes: Requires controlled YAML product specifications, stable identifiers, traceability, quality gates, and reviewable
    conformance material.
- id: dsr_framework_generation_prompt
  role: required_generation_procedure_and_product_spec_shape
  evidence_status: mapped
  notes: Requires product specs to include identity, conceptual model, normative requirements, information items,
    workflow, quality, traceability, implementation guidance, template or schema implications, and backlog.
- id: dsr_extraction_corpus
  role: scholarly_and_methodological_evidence_base
  evidence_status: partially_mapped
  notes: Corpus evidence is mapped at source-family and citation-anchor level where available. Detailed bibliographic
    crosswalks remain delegated to record_source_basis.
