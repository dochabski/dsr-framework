- id: implementation_guidance
  title: Implementation Guidance
  purpose: Guide authors and maintainers in implementing this product specification across the repository.
  content:
    authoring_guidelines:
    - Use this product specification as the controlling source for lifecycle, contribution, artifact, transparency,
      and evaluation alignment vocabulary until downstream vocabularies and models supersede details with traceable
      refinements.
    - Prefer stable lower_snake_case IDs for model elements, requirements, stages, checks, and trace links.
    - Keep project-specific evidence in records, not in this product specification.
    - Use source IDs and citation anchor IDs from the DSR corpus when mapping scholarly evidence; do not invent
      bibliographic evidence.
    - When a downstream model adds detail, preserve backward traceability to this product specification and record
      deviations in change history.
    - When a project cannot satisfy a requirement, record the tailoring or limitation rather than deleting the requirement.
    minimum_review_procedure:
    - Confirm file path and naming convention.
    - Confirm required product-spec sections exist.
    - Confirm all normative requirements have stable IDs and verification notes.
    - Confirm lifecycle stages include inputs, outputs, evidence, and transparency mappings.
    - Confirm contribution, evaluation, and transparency distinctions are not collapsed.
    - Confirm open questions and backlog items are visible.
    - Confirm this file does not assert final publication readiness.
    tailoring_guidance:
    - tailoring_case: early_conceptual_dsr_project
      allowed_adjustment: May mark build, demonstration, and evaluation records as planned or not_yet_available.
      required_safeguard: Contribution and evaluation claims must remain draft or unevaluated.
    - tailoring_case: conceptual_framework_without_software_instantiation
      allowed_adjustment: May use conceptual demonstration, analytical evaluation, expert review, or literature-based
        argumentation rather than software deployment.
      required_safeguard: Artifact type and evaluation method must reflect conceptual status.
    - tailoring_case: confidential_or_security_sensitive_artifact
      allowed_adjustment: May redact source code, implementation details, data, or proprietary context.
      required_safeguard: Must document transparency limitation, rationale, and alternative evidence sufficient
        for review.
    repository_integration_notes:
    - This file belongs under specs/ and should be listed in package-inventory.yaml.
    - Downstream vocabularies should convert lists in this product specification into separately reviewable controlled
      vocabulary entries.
    - Downstream schemas should validate required fields for project, artifact, evaluation, contribution, and transparency
      records.
    - Docs should render this specification for human users without becoming the sole source of controlled data.
