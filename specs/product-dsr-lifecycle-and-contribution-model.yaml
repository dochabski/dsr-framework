- id: open_questions_and_backlog
  title: Open Questions and Backlog
  purpose: Record unresolved decisions and recommended next work for this product area.
  content:
    assumptions:
    - id: asm_l2_scope
      statement: This draft targets L2 reviewable conformance rather than L3 exercisable validation against examples.
    - id: asm_internal_corpus_sufficient_for_initial_spec
      statement: The internal DSR extraction corpus is sufficient for this initial product specification; detailed
        evidence tables remain delegated to source-basis records and downstream crosswalks.
    - id: asm_downstream_vocabularies_refine_lists
      statement: Controlled vocabulary files will refine, stabilize, and possibly deprecate entries listed in this
        product specification.
    open_questions:
    - id: oq_lifecycle_stage_granularity
      question: Should lifecycle stages remain broad for usability or be split into finer phases for schema validation
        and project automation?
      status: open
      recommended_resolution_path: Test against at least two example DSR packages before L3 exercisable release.
    - id: oq_artifact_type_scope
      question: Should socio-technical artifact packages be a primary artifact type or a cross-cutting classification
        modifier?
      status: open
      recommended_resolution_path: Resolve during artifact-types vocabulary and artifact ontology model generation.
    - id: oq_evaluation_method_families
      question: What level of granularity should the evaluation method family vocabulary use across analytical,
        empirical, technical, and stakeholder methods?
      status: open
      recommended_resolution_path: Resolve during evaluation-method-families vocabulary and evaluation alignment
        model generation.
    - id: oq_aesthetics_and_responsible_design
      question: Should aesthetic and responsible design dimensions be required for all DSR projects or conditionally
        required by artifact risk and purpose?
      status: open
      recommended_resolution_path: Resolve through responsible-design-values and aesthetics-dimensions vocabularies
        plus quality review model.
    - id: oq_publication_genre_boundaries
      question: How should the framework distinguish DSR papers, artifact packages, technical reports, reusable
        software releases, and registry records?
      status: open
      recommended_resolution_path: Resolve during publication and registry model generation.
    backlog:
    - id: bl_generate_lifecycle_model
      recommended_next_file: models/dsr-lifecycle-model.yaml
      reason: Operationalize lifecycle stages from this product specification into a reusable model.
    - id: bl_generate_artifact_types_vocabulary
      recommended_next_file: vocabularies/artifact-types.yaml
      reason: Convert artifact taxonomy entries into controlled vocabulary records.
    - id: bl_generate_contribution_model
      recommended_next_file: models/dsr-contribution-model.yaml
      reason: Operationalize contribution positioning, knowledge goals, and knowledge scopes.
    - id: bl_generate_evaluation_alignment_model
      recommended_next_file: models/dsr-evaluation-alignment-model.yaml
      reason: Define detailed claim-to-evidence evaluation alignment.
    - id: bl_generate_transparency_model
      recommended_next_file: models/dsr-transparency-model.yaml
      reason: Expand six-dimension transparency crosswalk and proportionality rules.
