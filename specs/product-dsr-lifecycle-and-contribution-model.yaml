- id: workflow
  title: Workflow and Operating Procedure
  purpose: Define the operating procedure for applying the lifecycle and contribution model to a DSR artifact package.
  content:
    default_workflow:
    - step_id: wf_01_select_conformance_and_tailoring
      name: Select conformance and tailoring profile
      action: Declare intended conformance level, lifecycle tailoring, required records, and evidence expectations.
      outputs:
      - conformance_declaration
      - tailoring_record_if_needed
      exit_criteria:
      - Conformance target is explicit
      - Tailoring does not obscure required evidence
    - step_id: wf_02_frame_problem_and_objectives
      name: Frame problem, stakeholders, objectives, and requirements
      action: Document problem class, context, stakeholders, objectives, success criteria, constraints, and relevance
        rationale.
      outputs:
      - project_charter
      - problem_and_objectives_record
      exit_criteria:
      - Problem-to-objective traceability is present
      - Requirements are evaluable or explicitly exploratory
    - step_id: wf_03_ground_solution_space
      name: Ground the solution space
      action: Record prior theories, artifacts, methods, technologies, alternatives, and justificatory knowledge.
      outputs:
      - solution_space_record
      exit_criteria:
      - Source basis is documented
      - Alternatives and constraints are visible
    - step_id: wf_04_specify_artifact_and_design_rationale
      name: Specify artifact and design rationale
      action: Define artifact type, boundary, components, use logic, instance/type status, make/use plans, and decisions.
      outputs:
      - artifact_specification
      - design_rationale_record
      exit_criteria:
      - Artifact boundary is explicit
      - Design decisions are traceable to objectives and source basis
    - step_id: wf_05_build_and_capture_transparency
      name: Build or instantiate artifact and capture transparency
      action: Create or configure the artifact while recording build process, version, implementation details, and
        deviations.
      outputs:
      - artifact_instance_or_release
      - build_transparency_record
      exit_criteria:
      - Build evidence is sufficient for review
      - Known deviations are documented
    - step_id: wf_06_demonstrate_use
      name: Demonstrate use
      action: Run or describe a use scenario showing how the artifact can be applied to the problem.
      outputs:
      - demonstration_record
      exit_criteria:
      - Scenario, role, task, and output are documented
      - Demonstration limits are stated
    - step_id: wf_07_evaluate_claims
      name: Evaluate claims
      action: Evaluate artifact utility, quality, requirements satisfaction, use effects, or contribution plausibility
        using criteria and methods aligned to claims.
      outputs:
      - evaluation_plan
      - evaluation_report
      exit_criteria:
      - Each claim has aligned evidence or is marked unevaluated
      - Limitations and threats are recorded
    - step_id: wf_08_position_contribution
      name: Position contribution
      action: Classify contribution type, knowledge goal, scope, novelty, source relationship, and boundary conditions.
      outputs:
      - contribution_claim
      - contribution_positioning_record
      exit_criteria:
      - Contribution is not overclaimed
      - Scope and evidence are aligned
    - step_id: wf_09_crosswalk_transparency_and_review
      name: Crosswalk transparency and review
      action: Map evidence to six transparency dimensions and perform checklist-based review.
      outputs:
      - transparency_crosswalk
      - review_record
      exit_criteria:
      - Transparency dimensions are satisfied or justified
      - Defects have remediation status
    - step_id: wf_10_prepare_release_or_iteration
      name: Prepare release or iteration
      action: Update package inventory, metadata, reuse constraints, and next-step backlog.
      outputs:
      - package_inventory_update
      - release_or_iteration_record
      exit_criteria:
      - Package status is clear
      - Next work and open questions are visible
    iteration_rules:
    - Evaluation findings may return the project to problem framing, requirements, design rationale, build, or solution-space
      grounding.
    - Contribution positioning may be updated when evaluation evidence narrows or expands plausible knowledge scope.
    - Transparency crosswalk review may trigger additional documentation without implying a new artifact version
      unless content materially changes.
    - Tailoring decisions must be retained rather than silently changing lifecycle obligations.
    decision_points:
    - id: dp_contribution_threshold
      question: Does the project make a DSR knowledge contribution beyond local delivery?
      yes_action: Continue contribution positioning and evaluation alignment.
      no_action: Classify as routine design or local implementation with limited DSR claim.
    - id: dp_evaluation_readiness
      question: Are the artifact, criteria, and evidence sources sufficiently specified for evaluation?
      yes_action: Execute evaluation plan.
      no_action: Return to objectives, artifact specification, or demonstration planning.
    - id: dp_projectability_claim
      question: Is the evidence sufficient for transfer, projectability, or generalization claims?
      yes_action: Document scope and transfer logic.
      no_action: Limit the claim to idiographic or exploratory evidence.
    - id: dp_transparency_risk
      question: Would full transparency create privacy, security, proprietary, intellectual-property, or maintenance
        burden risks?
      yes_action: Use proportionate transparency and document rationale.
      no_action: Provide ordinary reviewable transparency materials.
- id: quality_and_conformance
  title: Quality and Conformance
  purpose: Define acceptance criteria, validation rules, quality gates, and failure modes for this product specification.
  content:
    conformance_levels:
    - level: l0_draft
      meaning: Concepts are sketched but not yet reliably structured, traced, or reviewable.
    - level: l1_documented
      meaning: Lifecycle and contribution content is documented with basic metadata and source basis.
    - level: l2_reviewable
      meaning: Content has stable IDs, traceability, acceptance criteria, quality gates, and reviewable distinctions.
    - level: l3_exercisable
      meaning: Models, templates, and checklists can be applied to example projects and validation workflows.
    - level: l4_reusable
      meaning: Artifacts are stable enough for external reuse with schemas, examples, and tested guidance.
    - level: l5_archival_publication_ready
      meaning: Artifacts are release-ready with preservation metadata, DOI readiness, final review records, and
        archival evidence.
    acceptance_criteria:
    - id: ac_product_shape
      criterion: The file follows the required product specification structure for specs/.
      evidence_required:
      - sections.identity_and_purpose
      - sections.conceptual_model
      - sections.normative_requirements
      - sections.workflow
      - sections.quality_and_conformance
      - traceability
      pass_condition: All required sections are present with stable IDs and reviewable content.
    - id: ac_dsr_distinctions
      criterion: The specification preserves core DSR distinctions.
      evidence_required:
      - core_distinctions
      - normative_requirements
      - evaluation_alignment_model
      pass_condition: Artifact utility, artifact quality, knowledge contribution, demonstration, evaluation, artifact
        type, and artifact instance are not conflated.
    - id: ac_traceable_lifecycle
      criterion: Lifecycle stages are traceable to evidence items and transparency dimensions.
      evidence_required:
      - lifecycle_stages
      - information_items
      - traceability
      pass_condition: Each lifecycle stage has purpose, input, output, minimum evidence, and transparency mapping.
    - id: ac_evaluation_alignment
      criterion: Evaluation logic aligns claims, criteria, methods, evidence, results, limitations, and decisions.
      evidence_required:
      - evaluation_alignment_model
      - req_evaluation_claim_alignment
      pass_condition: No evaluation claim is accepted without aligned evidence or an explicit unevaluated status.
    - id: ac_contribution_scope_control
      criterion: Contribution claims are scoped and bounded.
      evidence_required:
      - contribution_model
      - req_contribution_positioning
      pass_condition: Contribution type, knowledge goal, knowledge scope, novelty rationale, evidence, and limitations
        are required.
    - id: ac_transparency_proportionality
      criterion: Transparency obligations are explicit but proportionate.
      evidence_required:
      - transparency_model
      - req_transparency_crosswalk
      - dp_transparency_risk
      pass_condition: The specification requires six-dimension crosswalks and permits justified limits for harmful
        or burdensome disclosure.
    validation_rules:
    - id: vr_required_sections
      rule: A product specification is invalid if any required top-level section is missing or lacks a stable section
        ID.
    - id: vr_no_unbounded_claims
      rule: A contribution, evaluation, projectability, or publication-readiness claim is invalid if the claim lacks
        evidence status, scope, and limitations.
    - id: vr_records_have_retention
      rule: Record templates implied by this specification must include retention_rule and related_items fields.
    - id: vr_claim_evidence_alignment
      rule: Every evaluation report must map each claim to at least one criterion and either evidence or a declared
        unevaluated status.
    - id: vr_tailoring_visibility
      rule: Any lifecycle stage removed, combined, deferred, or marked not applicable must be recorded in a tailoring
        or review record.
    failure_modes:
    - id: fm_dsr_ification_after_the_fact
      description: A local implementation is retrospectively framed as DSR without documented objectives, design
        knowledge, evaluation, or contribution positioning.
      mitigation: Require problem-to-objective traceability, source grounding, artifact specification, and contribution
        claim review.
    - id: fm_demonstration_substituted_for_evaluation
      description: A demonstration scenario is treated as evidence of artifact utility or contribution without criteria
        or assessment.
      mitigation: Require separate evaluation plan/report or a documented tailoring rationale.
    - id: fm_unbounded_generalization
      description: A project claims generality from a single case or limited evaluation without boundary conditions.
      mitigation: Require knowledge scope, projectability rationale, and limitation statements.
    - id: fm_artifact_contribution_conflation
      description: The existence of an artifact is treated as the scholarly contribution without explaining design
        knowledge or novelty.
      mitigation: Require contribution type, knowledge goal, source basis, and novelty rationale.
    - id: fm_transparency_overload
      description: The package requires excessive or risky transparency materials that impose maintenance burden
        or reveal sensitive information.
      mitigation: Apply proportionality rule and document non-disclosure rationale.
    quality_gate_mapping:
    - gate_id: qg_consistency
      status: pass_ready
      evidence:
      - target_path
      - product_file_pattern
      - stable_identifier_style
      - controlled_item_types
    - gate_id: qg_coherence
      status: pass_ready
      evidence:
      - dependencies
      - related_items
      - traceability
    - gate_id: qg_cogency
      status: pass_ready
      evidence:
      - workflow
      - decision_points
      - acceptance_criteria
      - failure_modes
    - gate_id: qg_correspondence
      status: pass_ready
      evidence:
      - conformance_target
      - source_basis
      - artifact_package_support
    - gate_id: qg_dsr_transparency
      status: pass_ready
      evidence:
      - transparency_model
      - transparency_crosswalk_requirement
      - lifecycle_stage_transparency_mappings
    - gate_id: qg_reviewability
      status: pass_ready
      evidence:
      - acceptance_criteria
      - validation_rules
      - checklist_implications
