sections:
- id: identity_and_purpose
  title: Identity and Purpose
  purpose: Define the product boundary and its role inside the DSR Framework package.
  content:
    product_boundary:
      in_scope:
      - DSR lifecycle stages and required lifecycle evidence
      - Artifact taxonomy and artifact boundary rules
      - Contribution positioning by contribution type, knowledge goal, and knowledge scope
      - Transparency alignment across process, problem space, solution space, build, evaluation, and contribution
      - Evaluation alignment between claims, criteria, methods, evidence, and limitations
      - Reviewable quality gates for lifecycle and contribution documentation
      out_of_scope:
      - Full JSON Schema definitions for project, artifact, evaluation, and contribution records
      - Detailed human-facing prose guidance for researchers
      - Exhaustive bibliographic evidence tables for every DSR source in the corpus
      - Final publication-readiness or archival-release certification
      non_goals:
      - Do not collapse DSR into routine software development, consulting, or local implementation without knowledge
        contribution.
      - Do not treat demonstration as sufficient evidence of evaluation unless explicitly justified and bounded.
      - Do not require every DSR project to use the same evaluation method or the same contribution type.
      - Do not claim reproducibility, generalizability, or publication readiness beyond the evidence documented
        in project records.
    intended_users:
    - role: researcher_or_designer
      uses:
      - plan a DSR project
      - classify the intended artifact
      - define contribution claims
      - align evaluation to claims and criteria
    - role: reviewer_or_editor
      uses:
      - assess whether a project has DSR identity
      - evaluate artifact, evaluation, and contribution adequacy
      - identify missing transparency evidence
    - role: framework_maintainer
      uses:
      - derive controlled models, vocabularies, templates, checklists, and schemas
      - maintain package consistency across releases
    conformance_statement: At L2 reviewable conformance, this product specification must be structured, traceable,
      internally coherent, and reviewable, but it is not yet a fully validated executable model or archival publication
      package.
- id: conceptual_model
  title: Conceptual Model
  purpose: Define the lifecycle, artifact, contribution, transparency, and evaluation concepts controlled by this
    product.
  content:
    core_distinctions:
    - id: artifact_utility_artifact_quality_knowledge_contribution
      label: Artifact utility, artifact quality, and knowledge contribution are separate claims.
      definition: A DSR artifact may be useful in a context, well-built as an artifact, and still require a separately
        argued contribution to design knowledge.
      review_implication: Evaluation reports must identify which claim type each item of evidence supports.
    - id: demonstration_vs_evaluation
      label: Demonstration and evaluation are distinct lifecycle functions.
      definition: Demonstration shows that an artifact can be used in a scenario; evaluation assesses how well it
        satisfies criteria, goals, requirements, or effects.
      review_implication: A demonstration record cannot substitute for an evaluation report unless the project explicitly
        states and justifies a reduced conformance profile.
    - id: artifact_type_vs_artifact_instance
      label: Artifact type and artifact instance are distinct.
      definition: Reusable design knowledge usually concerns an artifact kind, specification, method, model, or
        design principle; individual deployments or instantiations provide evidence and context but are not identical
        to the reusable contribution.
      review_implication: Artifact records must state whether they document a reusable artifact type, a project-specific
        instance, or both.
    - id: idiographic_nomothetic_projectable_scope
      label: Contribution scope may be idiographic, nomothetic, or projectable/mixed.
      definition: DSR knowledge may be local to a case, generalized across a class of problems, or projectable through
        clearly documented boundary conditions and transfer logic.
      review_implication: Contribution claims must avoid implying generality beyond documented scope and evaluation
        evidence.
    - id: prescriptive_and_descriptive_knowledge
      label: DSR may produce prescriptive and descriptive knowledge.
      definition: DSR normally emphasizes prescriptive design knowledge but may also produce definitional, descriptive,
        explanatory, predictive, or explanatory-predictive knowledge that supports or evaluates design.
    lifecycle_stages:
    - id: problem_identification_and_relevance
      label: Problem Identification and Relevance
      purpose: Define the practical problem, stakeholders, context, problem class, severity, and relevance claim.
      primary_inputs:
      - initial_problem_statement
      - stakeholder_context
      - organizational_or_domain_need
      primary_outputs:
      - problem_space_record
      - stakeholder_map
      - initial_relevance_claim
      minimum_evidence:
      - problem class
      - affected stakeholders
      - context boundaries
      - relevance rationale
      transparency_dimensions:
      - problem_space_transparency
      - process_transparency
    - id: objectives_and_requirements
      label: Objectives and Requirements
      purpose: Translate the problem into solution objectives, requirements, acceptance criteria, and intended effects.
      primary_inputs:
      - problem_space_record
      - stakeholder_needs
      - source_basis
      primary_outputs:
      - objectives_record
      - requirements_list
      - success_criteria
      minimum_evidence:
      - functional requirements
      - quality requirements
      - constraints
      - success criteria
      transparency_dimensions:
      - problem_space_transparency
      - contribution_transparency
    - id: solution_space_grounding
      label: Solution-Space Grounding
      purpose: Document prior theories, artifacts, methods, design principles, technologies, and alternatives that
        ground the project.
      primary_inputs:
      - literature_review
      - prior_artifacts
      - technical_alternatives
      primary_outputs:
      - solution_space_record
      - design_knowledge_basis
      - alternative_solution_rationale
      minimum_evidence:
      - searched source families
      - included knowledge bases
      - rejected alternatives
      - grounding rationale
      transparency_dimensions:
      - solution_space_transparency
    - id: artifact_design_and_rationale
      label: Artifact Design and Rationale
      purpose: Specify the artifact type, components, boundary, make/use logic, design decisions, and expected mechanisms.
      primary_inputs:
      - requirements_list
      - solution_space_record
      - design_constraints
      primary_outputs:
      - artifact_specification
      - design_rationale_record
      - traceable_design_decisions
      minimum_evidence:
      - artifact type
      - artifact boundary
      - components
      - use logic
      - design rationale
      - decision traceability
      transparency_dimensions:
      - build_transparency
      - solution_space_transparency
    - id: build_or_instantiation
      label: Build or Instantiation
      purpose: Create, configure, instantiate, or materially represent the artifact sufficiently for demonstration
        or evaluation.
      primary_inputs:
      - artifact_specification
      - make_plan
      - resources_and_constraints
      primary_outputs:
      - artifact_instance_or_release
      - build_record
      - implementation_notes
      minimum_evidence:
      - build steps
      - version
      - configuration
      - known deviations
      - implementation limits
      transparency_dimensions:
      - build_transparency
      - process_transparency
    - id: demonstration
      label: Demonstration
      purpose: Show how the artifact can be used, enacted, or interpreted in a relevant scenario.
      primary_inputs:
      - artifact_instance_or_specification
      - use_case
      - demonstration_context
      primary_outputs:
      - demonstration_record
      - scenario_outputs
      - observed_use_notes
      minimum_evidence:
      - use scenario
      - actor or user role
      - task
      - artifact behavior
      - demonstrated output
      transparency_dimensions:
      - process_transparency
      - build_transparency
    - id: evaluation
      label: Evaluation
      purpose: Assess artifact utility, artifact quality, requirements satisfaction, use effects, contribution plausibility,
        or fitness for evolution.
      primary_inputs:
      - evaluation_plan
      - artifact
      - success_criteria
      - demonstration_or_use_data
      primary_outputs:
      - evaluation_report
      - evidence_table
      - limitations_and_threats
      minimum_evidence:
      - evaluation criteria
      - method family
      - data or argument
      - findings
      - limitations
      - claim alignment
      transparency_dimensions:
      - evaluation_transparency
    - id: contribution_positioning
      label: Contribution Positioning
      purpose: State how the project contributes to design knowledge, method, theory, artifact practice, evaluation,
        or reporting.
      primary_inputs:
      - artifact_specification
      - evaluation_report
      - source_basis
      - knowledge_gap
      primary_outputs:
      - contribution_claim
      - contribution_positioning_record
      - knowledge_scope_statement
      minimum_evidence:
      - contribution type
      - knowledge goal
      - knowledge scope
      - novelty rationale
      - boundary conditions
      transparency_dimensions:
      - contribution_transparency
    - id: transparency_packaging_and_review
      label: Transparency Packaging and Review
      purpose: Assemble the lifecycle evidence into a reviewable, reusable, and proportionately transparent artifact
        package.
      primary_inputs:
      - all_lifecycle_records
      - package_inventory
      - quality_checklists
      primary_outputs:
      - transparency_crosswalk
      - review_record
      - package_readiness_status
      minimum_evidence:
      - crosswalk to six transparency dimensions
      - open limitations
      - review outcomes
      - remediation decisions
      transparency_dimensions:
      - process_transparency
      - problem_space_transparency
      - solution_space_transparency
      - build_transparency
      - evaluation_transparency
      - contribution_transparency
    - id: communication_release_and_accumulation
      label: Communication, Release, and Accumulation
      purpose: Communicate the artifact and evidence to scholarly, practitioner, technical, or public audiences
        and enable reuse or cumulative extension.
      primary_inputs:
      - artifact_package
      - contribution_claim
      - release_record
      primary_outputs:
      - documentation
      - release_record
      - reuse_guidance
      - future_work_backlog
      minimum_evidence:
      - audience
      - release scope
      - reuse constraints
      - citation or preservation metadata
      - future work
      transparency_dimensions:
      - contribution_transparency
      - process_transparency
    artifact_taxonomy:
    - id: construct
      label: Construct
      definition: A concept, vocabulary element, classification term, or representational primitive used to describe,
        design, evaluate, or reason about a problem or artifact.
    - id: model
      label: Model
      definition: A representation of relationships, entities, states, processes, constraints, or mechanisms relevant
        to a DSR problem or artifact.
    - id: method
      label: Method
      definition: A procedure, algorithm, technique, workflow, or prescriptive sequence intended to accomplish a
        design or evaluation task.
    - id: instantiation
      label: Instantiation
      definition: A realized artifact instance, implementation, prototype, configuration, or deployment used to
        demonstrate or evaluate a design.
    - id: design_theory
      label: Design Theory
      definition: A theory-like body of design knowledge that connects purpose, constructs, principles, mechanisms,
        context, implementation, and evaluation.
    - id: framework
      label: Framework
      definition: An organizing structure that relates concepts, dimensions, procedures, criteria, or decision points
        for a problem class.
    - id: ontology
      label: Ontology
      definition: A formal or semi-formal specification of entities, relations, boundaries, and meanings in a domain
        or artifact class.
    - id: taxonomy
      label: Taxonomy
      definition: A controlled classification scheme for sorting artifacts, contributions, methods, problems, or
        evidence.
    - id: guideline_or_design_principle
      label: Guideline or Design Principle
      definition: A prescriptive statement linking context, action, mechanism or rationale, intended outcome, and
        boundary conditions.
    - id: protocol_or_process
      label: Protocol or Process Artifact
      definition: A governed sequence of activities, records, quality gates, and responsibilities for producing
        or evaluating DSR outputs.
    - id: software_or_computational_artifact
      label: Software or Computational Artifact
      definition: A program, application, algorithmic system, data pipeline, interface, agent, or computational
        component created or adapted to solve a problem.
    - id: information_or_data_artifact
      label: Information or Data Artifact
      definition: A structured data model, dataset, record system, schema, knowledge graph, registry, or information
        package used as a DSR artifact.
    - id: socio_technical_artifact_package
      label: Socio-Technical Artifact Package
      definition: A combined technical, organizational, procedural, role-based, or institutional arrangement whose
        utility depends on use context and stakeholder enactment.
    contribution_model:
      contribution_types:
      - invention
      - improvement
      - adaptation
      - exaptation
      - method_extension
      - theory_extension
      - evaluation_extension
      - synthesis
      - replication_or_projectability_evidence
      - routine_design_with_limited_dsr_claim
      knowledge_goals:
      - definitional
      - descriptive
      - explanatory
      - predictive
      - explanatory_predictive
      - prescriptive
      - methodological
      - evaluative
      - normative
      knowledge_scopes:
      - idiographic_specific
      - projectable_to_problem_class
      - analytical_generalization
      - nomothetic_general
      - mixed_or_multi_scope
      positioning_questions:
      - What is the artifact or design knowledge contribution?
      - What problem class and stakeholder context does it address?
      - What knowledge goal is advanced?
      - What evidence supports the claimed scope?
      - What prior knowledge does it extend, refine, combine, or challenge?
      - What limits, boundary conditions, and unresolved tensions constrain reuse?
    transparency_model:
      dimensions:
      - id: process_transparency
        definition: Documentation of actual DSR activities, sequence, reasoning, emergent changes, and decision
          context.
      - id: problem_space_transparency
        definition: Documentation of application context, stakeholders, scope, improvement goals, timeframe, constraints,
          and boundary conditions.
      - id: solution_space_transparency
        definition: Documentation of grounding theories, prior artifacts, knowledge bases, alternatives, and relevant
          technologies.
      - id: build_transparency
        definition: Documentation of artifact construction, design search, creative decisions, implementation configuration,
          and deviations from plan.
      - id: evaluation_transparency
        definition: Documentation of formative and summative evaluation criteria, methods, data, results, stakeholder
          confidence, and limitations.
      - id: contribution_transparency
        definition: Documentation of practice impact, scientific impact, design knowledge, novelty, scope, and communication
          audience.
      proportionality_rule: Transparency requirements must be sufficient for review, reuse, and accountability while
        respecting burden, confidentiality, security, privacy, maintenance cost, and intellectual-property constraints.
    evaluation_alignment_model:
      claim_types:
      - problem_relevance_claim
      - requirements_satisfaction_claim
      - artifact_quality_claim
      - artifact_utility_claim
      - use_effect_claim
      - contribution_claim
      - projectability_or_transfer_claim
      - responsible_design_claim
      evaluation_timing:
      - ex_ante
      - formative
      - summative
      - ex_post
      - longitudinal_or_follow_up
      evaluation_settings:
      - analytical_argument
      - laboratory_or_simulated_setting
      - naturalistic_field_setting
      - case_or_multi_case_setting
      - literature_based_synthesis
      - expert_or_stakeholder_review
      alignment_rule: Each evaluation method must be mapped to at least one claim type, criterion, evidence source,
        result, limitation, and decision implication.
- id: normative_requirements
  title: Normative Requirements
  purpose: Specify mandatory, recommended, optional, and prohibited requirements for lifecycle and contribution
    documentation.
  content:
    must:
    - id: req_lifecycle_stage_traceability
      requirement: A DSR project package must identify the lifecycle stages used and map each retained evidence
        item to at least one lifecycle stage.
      verification: Review lifecycle_stage_mapping in project records and package inventory.
    - id: req_problem_to_objectives_traceability
      requirement: A DSR project package must trace problem statements to solution objectives, requirements, success
        criteria, and evaluation criteria.
      verification: Review problem-and-objectives record and evaluation plan.
    - id: req_artifact_type_boundary
      requirement: Each artifact must declare artifact type, artifact boundary, artifact instance/type status, components,
        intended use, and non-goals.
      verification: Review artifact specification and artifact profile.
    - id: req_contribution_positioning
      requirement: Each contribution claim must state contribution type, knowledge goal, knowledge scope, novelty
        or extension rationale, source basis, and boundary conditions.
      verification: Review contribution claim and contribution positioning record.
    - id: req_demonstration_evaluation_distinction
      requirement: Demonstration records and evaluation reports must be documented separately or explicitly marked
        as combined with rationale.
      verification: Check demonstration and evaluation record classes.
    - id: req_evaluation_claim_alignment
      requirement: Evaluation evidence must be aligned to claims, criteria, methods, data, results, limitations,
        and decisions.
      verification: Review evaluation plan and evaluation report alignment table.
    - id: req_transparency_crosswalk
      requirement: A reviewable DSR package must include a crosswalk to process, problem-space, solution-space,
        build, evaluation, and contribution transparency or justify non-applicability.
      verification: Review transparency crosswalk.
    - id: req_limitations_and_non_goals
      requirement: The package must state limitations, non-goals, assumptions, and open questions without overclaiming
        evaluation, generalization, or publication readiness.
      verification: Review limitations in artifact profile, evaluation report, and contribution record.
    should:
    - id: req_should_use_controlled_vocabularies
      requirement: Projects should use controlled vocabularies for artifact type, lifecycle stage, contribution
        type, knowledge goal, knowledge scope, evaluation method family, validity type, reliability type, and transparency
        dimension.
    - id: req_should_include_design_rationale
      requirement: Projects should document alternatives considered, tradeoffs, selected rationale, and known rejected
        options.
    - id: req_should_document_projectability
      requirement: Projects should document transfer logic, boundary conditions, reuse assumptions, adaptation requirements,
        and replication opportunities.
    - id: req_should_include_responsible_design_review
      requirement: Projects should document responsible design values, risks, affected stakeholders, and governance
        mitigations when the artifact has social, organizational, ethical, privacy, or security implications.
    - id: req_should_distinguish_source_basis_levels
      requirement: Projects should distinguish direct evidence, literature-derived rationale, expert judgment, implementation
        evidence, and conjectural future-work claims.
    may:
    - id: req_may_tailor_lifecycle
      requirement: Projects may tailor lifecycle stages when the tailoring is documented in a tailoring record and
        does not hide missing evidence.
    - id: req_may_use_multiple_contribution_scopes
      requirement: Projects may include mixed or staged knowledge scopes when separate claims and evidence are documented.
    - id: req_may_combine_artifact_types
      requirement: Projects may classify an artifact under multiple artifact types when one primary type and secondary
        supporting types are declared.
    must_not:
    - id: req_must_not_overclaim_evaluation
      requirement: A project must not claim evaluation success without documented criteria, evidence, and limitations.
    - id: req_must_not_treat_routine_delivery_as_dsr_by_default
      requirement: A project must not classify routine implementation, consulting, or local delivery as DSR unless
        it documents artifact novelty, design knowledge, evaluation, and contribution positioning.
    - id: req_must_not_hide_contextual_limits
      requirement: A project must not imply generality or transferability while omitting boundary conditions, context,
        stakeholder assumptions, or evaluation setting.
    - id: req_must_not_force_full_openness_where_harmful
      requirement: A package must not disclose sensitive, proprietary, private, or security-relevant details solely
        to satisfy transparency; it must document proportional transparency instead.
- id: information_items
  title: Information Items and Records
  purpose: Define information items governed or implied by the lifecycle and contribution model.
  content:
    required_or_expected_items:
    - item_id: dsr_project_charter
      item_type: description
      path_or_template: templates/dsr-project-charter-template.md
      lifecycle_stage: problem_identification_and_relevance
      purpose: Human-readable project framing, scope, stakeholders, and expected contribution.
    - item_id: problem_and_objectives_record
      item_type: record
      path_or_template: templates/problem-and-objectives-template.md
      lifecycle_stage: objectives_and_requirements
      purpose: Trace problem, objectives, requirements, constraints, and success criteria.
    - item_id: solution_space_record
      item_type: record
      path_or_template: templates/solution-space-record-template.yaml
      lifecycle_stage: solution_space_grounding
      purpose: Document knowledge-base grounding, alternatives, and source basis.
    - item_id: artifact_specification
      item_type: specification
      path_or_template: templates/artifact-specification-template.md
      lifecycle_stage: artifact_design_and_rationale
      purpose: Define artifact type, boundary, components, use logic, make/use plans, and version.
    - item_id: design_rationale_record
      item_type: record
      path_or_template: templates/design-rationale-template.md
      lifecycle_stage: artifact_design_and_rationale
      purpose: Preserve design decisions, alternatives, tradeoffs, and rationale.
    - item_id: build_transparency_record
      item_type: record
      path_or_template: templates/build-transparency-record-template.yaml
      lifecycle_stage: build_or_instantiation
      purpose: Document artifact construction, configuration, implementation, and deviations.
    - item_id: demonstration_record
      item_type: record
      path_or_template: templates/demonstration-record-template.yaml
      lifecycle_stage: demonstration
      purpose: Document use scenario, actor roles, task, outputs, and demonstration limits.
    - item_id: evaluation_plan
      item_type: plan
      path_or_template: templates/evaluation-plan-template.yaml
      lifecycle_stage: evaluation
      purpose: Specify evaluation criteria, methods, evidence sources, claims, timing, and analysis plan.
    - item_id: evaluation_report
      item_type: report
      path_or_template: templates/evaluation-report-template.yaml
      lifecycle_stage: evaluation
      purpose: Report evaluation execution, findings, limitations, threats, and resulting decisions.
    - item_id: contribution_claim
      item_type: record
      path_or_template: templates/contribution-claim-template.yaml
      lifecycle_stage: contribution_positioning
      purpose: State contribution type, knowledge goal, knowledge scope, novelty, evidence, and limits.
    - item_id: contribution_positioning_record
      item_type: record
      path_or_template: templates/contribution-positioning-record-template.yaml
      lifecycle_stage: contribution_positioning
      purpose: Position the contribution relative to prior DSR knowledge and target audiences.
    - item_id: transparency_crosswalk
      item_type: record
      path_or_template: templates/dsr-transparency-crosswalk-template.yaml
      lifecycle_stage: transparency_packaging_and_review
      purpose: Map evidence items to six transparency dimensions and proportionality limits.
    - item_id: review_record
      item_type: record
      path_or_template: templates/review-record-template.yaml
      lifecycle_stage: transparency_packaging_and_review
      purpose: Preserve review outcomes, defects, decisions, and remediation status.
    minimum_field_groups:
      all_controlled_items:
      - item_id
      - item_type
