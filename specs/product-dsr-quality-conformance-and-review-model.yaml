# SPDX-License-Identifier: CC0-1.0
product:
  id: product_dsr_quality_conformance_and_review_model
  title: DSR Quality, Conformance, and Review Model Specification
  purpose: >
    Define the DSR Framework quality dimensions, conformance maturity levels,
    quality gates, review workflow, acceptance criteria, review records, and
    remediation expectations used to judge whether a Design Science Research
    artifact package is documented, reviewable, reusable, and publication-ready
    without overclaiming evaluation, reproducibility, generalization, or scholarly
    contribution evidence.
  status: draft
  version: "0.1.0"
  owner: dsr_framework_maintainers
  item_type: specification
  target_path: specs/product-dsr-quality-conformance-and-review-model.yaml
  selection_id: spec_quality_review
  output_format: yaml
  default_conformance_target: l2_reviewable
  license: CC0-1.0

source_basis:
  - source_id: dsr_framework_generation_spec
    role: governing_generation_and_conformance_rules
    evidence_status: mapped
    notes: >
      Requires product specifications to include identity, conceptual model,
      normative requirements, information items, workflow, quality and conformance,
      traceability, implementation guidance, template/schema implications, and
      open questions.
  - source_id: dsr_framework_generation_prompt
    role: governing_output_and_traceability_prompt
    evidence_status: mapped
    notes: >
      Requires generated framework portions to preserve DSR distinctions, include
      traceability, avoid invented evidence, and include acceptance criteria,
      validation rules, failure modes, limitations, and completion reports.
  - source_id: dsr_framework_selection_table
    role: target_selection_authority
    evidence_status: mapped
    notes: >
      Identifies spec_quality_review as a product_spec YAML file at
      specs/product-dsr-quality-conformance-and-review-model.yaml with L2 default
      conformance and dependencies on information item architecture and the DSR
      lifecycle model.
  - source_id: weber_2018_design_science_research
    role: quality_model_source
    evidence_status: mapped
    notes: >
      Supports separation of DSR process quality from outcome or product quality,
      and provides criteria for problem specification, contribution to knowledge,
      solution derivation, and artifact outcome quality.
  - source_id: hevner_et_al_2024_transparency_in_design_science_research
    role: transparency_and_reviewability_source
    evidence_status: mapped
    notes: >
      Supports process, problem-space, solution-space, build, evaluation, and
      contribution transparency as reviewable quality dimensions.
  - source_id: reliability_framework_sources_in_dsr_corpus
    role: reliability_and_validity_source_family
    evidence_status: partially_mapped
    notes: >
      Supports distinction among artifact, method, measure, implementation,
      process, and design-knowledge reliability, including synchronic and
      diachronic review concerns.
  - source_id: venable_et_al_2016_evaluation_strategy_family
    role: evaluation_strategy_source_family
    evidence_status: partially_mapped
    notes: >
      Supports formative/summative and artificial/naturalistic evaluation
      distinctions used in review workflow and acceptance criteria.
  - source_id: akoka_et_al_2023_knowledge_contributions_in_dsr
    role: contribution_and_knowledge_path_source
    evidence_status: mapped
    notes: >
      Supports review of knowledge goal, knowledge scope, knowledge path,
      contribution positioning, and strategy progression.
  - source_id: weigand_johannesson_andersson_2021_artifact_ontology_for_dsr
    role: artifact_ontology_source
    evidence_status: mapped
    notes: >
      Supports artifact-boundary review, artifact universal versus instance
      distinction, make/use plan traceability, and artifact-network context.

