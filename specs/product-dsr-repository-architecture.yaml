# SPDX-License-Identifier: CC0-1.0
product:
  id: product_dsr_repository_architecture
  item_id: product_dsr_repository_architecture
  item_type: specification
  title: DSR Repository Architecture Specification
  purpose: >
    Define the repository tree, naming rules, file responsibilities, dependency
    relationships, and validation expectations for the DSR Framework artifact
    package.
  status: draft
  version: "0.1.0"
  owner: dsr_framework_maintainers
  target_path: specs/product-dsr-repository-architecture.yaml
  selection_id: spec_repository_architecture
  conformance_target: l2_reviewable
  default_conformance: L2
  package_role: product_specification
  license: CC0-1.0

version: "0.1.0"

source_basis:
  - source_id: user_current_request
    role: immediate_task_definition
    evidence_status: mapped
    notes: >
      User selected spec_repository_architecture with target path
      specs/product-dsr-repository-architecture.yaml.
  - source_id: dsr_framework_generation_spec
    role: governing_generation_specification
    evidence_status: mapped
    notes: >
      Provides required repository logic, canonical directories, naming rules,
      controlled item rules, and product specification structure.
  - source_id: dsr_framework_generation_prompt
    role: generation_procedure
    evidence_status: mapped
    notes: >
      Provides the required product specification structure, metadata,
      traceability, quality, and completion-report expectations.
  - source_id: documentation_protocol_repository
    role: governing_documentation_protocol
    evidence_status: not_yet_mapped
    notes: >
      This file is aligned to the protocol model described in the project
      generation specification. Direct repository verification is deferred.
  - source_id: dsr_extraction_corpus
    role: scholarly_and_methodological_evidence_base
    evidence_status: indirectly_mapped
    notes: >
      Corpus support is used for DSR transparency and reviewability principles,
      not for repository-tree facts.

dependencies:
  upstream:
    - id: product_protocol_foundation
      path: specs/product-protocol-foundation.yaml
      dependency_type: governing_specification
      required: true
      evidence_status: not_yet_mapped
    - id: documentation_protocol_repository_architecture
      path: external:documentation-protocol
      dependency_type: protocol_source
      required: true
      evidence_status: not_yet_mapped
    - id: product_dsr_framework_foundation
      path: specs/product-dsr-framework-foundation.yaml
      dependency_type: scope_context
      required: false
      evidence_status: not_yet_mapped
    - id: product_dsr_information_item_architecture
      path: specs/product-dsr-information-item-architecture.yaml
      dependency_type: information_item_model
      required: true
      evidence_status: not_yet_mapped
  downstream:
    - id: root_manifest
      path: manifest.yaml
      dependency_type: repository_identity_consumer
      required: true
    - id: root_package_inventory
      path: package-inventory.yaml
      dependency_type: inventory_consumer
      required: true
    - id: product_dsr_artifact_package_specification
      path: specs/product-dsr-artifact-package-specification.yaml
      dependency_type: package_structure_consumer
      required: true
    - id: product_dsr_automation_and_validation_model
      path: specs/product-dsr-automation-and-validation-model.yaml
      dependency_type: validation_consumer
      required: true
    - id: product_dsr_publication_and_registry_model
      path: specs/product-dsr-publication-and-registry-model.yaml
      dependency_type: release_consumer
      required: false

related_items:
  - id: README
    path: README.md
    relationship: human_entry_point
  - id: root_manifest
    path: manifest.yaml
    relationship: declares_canonical_package_identity
  - id: metadata
    path: metadata.yaml
    relationship: records_repository_metadata
  - id: artifact_profile
    path: artifact-profile.yaml
    relationship: describes_artifact_scope_and_claims
  - id: package_inventory
    path: package-inventory.yaml
    relationship: inventories_files_governed_by_this_spec
  - id: conformance_declaration
    path: conformance-declaration.yaml
    relationship: declares_repository_conformance_and_tailoring
  - id: product_catalog
    path: specs/product-catalog.yaml
    relationship: indexes_product_specifications
  - id: artifact_package_specification
    path: specs/product-dsr-artifact-package-specification.yaml
    relationship: consumes_repository_architecture_for_package_obligations
  - id: automation_validation_model
    path: specs/product-dsr-automation-and-validation-model.yaml
