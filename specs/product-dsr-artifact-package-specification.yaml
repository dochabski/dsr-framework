open_questions:
  - question_id: apkg_top_oq_001
    question: >
      Should the L2 profile require a minimal examples/ directory, or should
      example materials remain a recommended but deferrable L3 exercisability obligation?
    owner: dsr_framework_maintainer
    status: open
  - question_id: apkg_top_oq_002
    question: >
      What exact automated validation workflow should be required before an L4
      reusable or L5 archival release?
    owner: dsr_framework_maintainer
    status: open
