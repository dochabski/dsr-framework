# SPDX-License-Identifier: CC0-1.0
product:
  id: product_dsr_artifact_package_specification
  selection_id: spec_artifact_package
  target_path: specs/product-dsr-artifact-package-specification.yaml
  item_type: specification
  output_format: yaml
  title: DSR Artifact Package Specification
  short_title: Artifact Package Specification
  purpose: >
    Define the required package contents, retained evidence, example materials,
    review records, validation bindings, and conformance obligations for a
    reviewable and reusable Design Science Research Framework artifact package.
  status: draft
  version: "0.1.0"
  owner: dsr_framework_maintainer
  responsible_roles:
    - role_id: package_author
      responsibility: Assemble, update, and justify package contents.
    - role_id: package_reviewer
      responsibility: Review package completeness, traceability, and conformance.
    - role_id: package_maintainer
      responsibility: Maintain release, archival, and preservation records.
  conformance_target: l2_reviewable
  license_expression: CC0-1.0

source_basis:
  - source_id: user_current_request
    source_type: immediate_task_definition
    relevance: >
      Selects spec_artifact_package and requires generation as
      specs/product-dsr-artifact-package-specification.yaml.
  - source_id: dsr_framework_generation_spec
    source_type: project_generation_specification
    relevance: >
      Establishes the product specification structure, repository architecture,
      quality gates, naming conventions, traceability expectations, and L2
      reviewability target.
  - source_id: dsr_framework_generation_prompt
    source_type: project_generation_prompt
    relevance: >
      Requires product specifications to include controlled metadata,
      dependencies, traceability, quality and conformance material, and a short
      completion report.
  - source_id: dsr_framework_selection_table
    source_type: project_selection_registry
    relevance: >
      Provides the selected row, target path, purpose, default conformance, and
      key dependencies for this product.
  - source_id: dsr_extraction_corpus
    source_type: scholarly_and_methodological_evidence_base
    relevance: >
      Provides DSR-specific evidence for artifact ontology, transparency,
      contribution, evaluation, reuse, and reviewability.
    evidence_status: partially_mapped
    mapped_evidence:
      - source_key: hevner_et_al_2024_transparency_in_design_science_research
        citation_anchor_ids:
          - CA01
          - CA05
          - CA14
          - CA16
          - CA17
          - CA18
        supports:
          - transparency_dimensions
          - repository_materials
          - reviewer_audiences
          - privacy_security_and_proprietary_risk_controls
      - source_key: weigand_johannesson_andersson_2021_artifact_ontology_for_dsr
        citation_anchor_ids:
          - A09
          - A15
          - A17
          - A18
          - A19
        supports:
          - artifact_universal_boundary
          - design_specification
          - make_plan_and_use_plan
          - artifact_outcome_typology
      - source_key: akoka_comyn_wattiau_prat_storey_2023_knowledge_contributions_paths
        citation_anchor_ids:
          - A07
          - A10
          - A13
          - A14
        supports:
          - knowledge_contribution_paths
          - contribution_strategy_traceability
          - guidance_for_developing_dsr_projects

dependencies:
  upstream:
    - item_id: product_dsr_repository_architecture
      path: specs/product-dsr-repository-architecture.yaml
      dependency_type: structural
      required: true
      expected_use: >
        Defines canonical repository tree, naming rules, and file
        responsibilities that this package specification must enforce.
    - item_id: product_dsr_quality_conformance_and_review_model
      path: specs/product-dsr-quality-conformance-and-review-model.yaml
      dependency_type: quality_model
      required: true
      expected_use: >
        Defines quality dimensions, maturity gates, review workflow, acceptance
        criteria, and escalation rules used by the package readiness model.
    - item_id: package_inventory
      path: package-inventory.yaml
      dependency_type: inventory_record
      required: true
      expected_use: >
        Enumerates package files, status, validation method, owner, and review
        responsibility.
    - item_id: conformance_declaration
      path: conformance-declaration.yaml
      dependency_type: conformance_record
      required: true
      expected_use: >
        Declares the package conformance level, tailoring decisions, exclusions,
        and unmet obligations.
    - item_id: artifact_profile
      path: artifact-profile.yaml
      dependency_type: package_identity
      required: true
      expected_use: >
        Identifies the artifact, scope, contribution claims, intended users,
        reuse constraints, and review boundary.
  downstream:
    - item_id: template_package_inventory
      path: templates/package-inventory-template.yaml
      dependency_type: template_implication
      required: false
    - item_id: checklist_package_readiness
      path: checklists/artifact-package-readiness-checklist.yaml
      dependency_type: checklist_implication
      required: false
    - item_id: schema_package_inventory
      path: schemas/package-inventory.schema.json
      dependency_type: schema_implication
      required: false
    - item_id: record_release_v0_1_0
      path: records/releases/record-release-0001-v0-1-0.yaml
      dependency_type: release_record_implication
      required: false

