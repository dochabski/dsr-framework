  - id: open_questions_and_backlog
    title: Open Questions and Backlog
    purpose: Preserve unresolved decisions and implementation tasks without blocking L2 reviewability.
    content:
      open_questions:
        - id: mid_oq_001
          question: Should the framework use a dedicated metadata.schema.json target even though it is not currently listed in the selection table?
          owner: framework_maintainers
          resolution_status: open
          impact: Could improve L3 validation readiness.
        - id: mid_oq_002
          question: Which external archival platform is canonical for the first DOI-backed release?
          owner: framework_maintainers
          resolution_status: open
          impact: Determines final .zenodo.json or equivalent archival metadata requirements.
        - id: mid_oq_003
          question: Should contributor roles be strictly aligned to a named external taxonomy or maintained as a local controlled vocabulary?
          owner: framework_maintainers
          resolution_status: open
          impact: Affects CITATION.cff, governance, and contribution records.
        - id: mid_oq_004
          question: Should source extraction records receive package-local citation anchor IDs in addition to corpus source IDs?
          owner: framework_maintainers
          resolution_status: open
          impact: Affects long-term evidence traceability.
      backlog:
        - id: mid_bl_001
          task: Create metadata-template.yaml.
          priority: high
          target_conformance: l2_reviewable
        - id: mid_bl_002
          task: Create metadata.schema.json.
          priority: high
          target_conformance: l3_exercisable
        - id: mid_bl_003
          task: Create identifier-types.yaml and provenance-event-types.yaml vocabularies.
          priority: medium
          target_conformance: l3_exercisable
        - id: mid_bl_004
          task: Create metadata-and-identifier-readiness-checklist.yaml.
          priority: medium
          target_conformance: l2_reviewable
        - id: mid_bl_005
          task: Verify current DOI, CFF, Zenodo, ORCID, ROR, SPDX, and GitHub metadata requirements before L5 release.
          priority: high
          target_conformance: l5_archival_publication_ready
        - id: mid_bl_006
          task: Add automated cross-file metadata consistency checks.
          priority: high
          target_conformance: l3_exercisable
      limitations:
        - id: mid_lim_001
          limitation: This draft specifies DOI readiness but does not assign or verify a DOI.
        - id: mid_lim_002
          limitation: This draft defines metadata and identifier controls but does not generate downstream schemas or templates.
        - id: mid_lim_003
          limitation: External registry rules must be verified before publication-ready release claims.

quality_gates:
  - id: qg_consistency
    question: Does the file use required naming, status, item type, and directory conventions?
    evidence_required:
      - target_path
      - product.item_type
      - repository naming rules
    pass_condition: File path is specs/product-dsr-metadata-and-identifier-profile.yaml and item type is specification.
    status: pass
  - id: qg_coherence
    question: Does the profile align with related product specs and downstream files?
    evidence_required:
      - dependencies
      - related_items
      - traceability
    pass_condition: Dependencies and implementation targets are explicitly mapped.
    status: pass
  - id: qg_cogency
    question: Is the profile operational, ordered, and usable without hidden assumptions?
    evidence_required:
      - workflow
      - normative_requirements
      - acceptance_criteria
      - failure_modes
    pass_condition: Requirements, workflow, and checks are explicit.
    status: pass
  - id: qg_correspondence
    question: Does the profile support the intended DSR Framework artifact package?
    evidence_required:
      - conformance_position
      - controlled_outputs
      - downstream_trace_targets
    pass_condition: Package metadata, citation, provenance, DOI, and archival needs are covered.
    status: pass
  - id: qg_dsr_transparency
    question: Does the profile support DSR transparency dimensions where applicable?
    evidence_required:
      - provenance_event requirements
      - source_basis evidence status
      - quality gate mapping
    pass_condition: Process, source, release, preservation, and contribution traceability are explicit.
    status: pass
  - id: qg_reviewability
    question: Can a reviewer evaluate this profile using explicit criteria?
    evidence_required:
      - acceptance_criteria
      - validation_rules
      - failure_modes
    pass_condition: Review criteria and remediation paths are present.
    status: pass

