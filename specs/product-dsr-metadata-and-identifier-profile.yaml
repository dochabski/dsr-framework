          minimum_required_properties:
            - title
            - authors
            - version
            - license
            - repository_code
            - doi_status
        - id: schema_release_record
          path: schemas/release-record.schema.json
          status: recommended_new_schema
          validates:
            - records/releases/record-release-*.yaml
          minimum_required_properties:
            - record_id
            - record_class
            - release_identity
            - doi_status
            - validation_evidence
            - outcome
            - retention_rule
      template_implications:
        - id: template_metadata
          path: templates/metadata-template.yaml
          status: recommended_new_template
          purpose: Provide a fillable metadata.yaml template using this profile.
        - id: template_release_record
          path: templates/release-record-template.yaml
          status: recommended_new_template
          purpose: Provide a fillable release record template with DOI, checksum, and archival fields.
        - id: template_preservation_record
          path: templates/preservation-record-template.yaml
          status: recommended_new_template
          purpose: Provide a fillable preservation event record template.
      checklist_implications:
        - id: checklist_metadata_readiness
          path: checklists/metadata-and-identifier-readiness-checklist.yaml
          status: recommended_new_checklist
          purpose: Check identity, citation, DOI, provenance, and identifier readiness.
        - id: checklist_publication_readiness
          path: checklists/publication-readiness-checklist.yaml
          status: existing_or_planned_related_checklist
          purpose: Include metadata and DOI checks before release.
      controlled_vocabulary_implications:
        - id: vocabulary_identifier_types
          path: vocabularies/identifier-types.yaml
          status: recommended_new_vocabulary
          entries_seed:
