            - message
            - type
            - authors
            - version
            - license
            - repository_code
            - url
            - keywords
            - preferred_citation_if_needed
        - target_id: zenodo_json
          path: .zenodo.json
          required_sections:
            - title
            - creators
            - description
            - license
            - keywords
            - related_identifiers
            - upload_type
            - version
        - target_id: release_record
          path_pattern: records/releases/record-release-*.yaml
          required_sections:
            - release_identity
            - release_event
            - doi_status
            - archive_status
            - checksums
            - validation_evidence
            - limitations
            - outcome
      evidence_limitations:
        - id: mid_el_001
          limitation: Current external metadata standards were not live-verified for this draft.
          effect: L5 archival publication readiness must remain pending until verification is performed.
        - id: mid_el_002
          limitation: Some downstream files may not yet exist at the time this product spec is authored.
          effect: This specification defines obligations and implications rather than proving package completion.

  - id: implementation_guidance
    title: Implementation Guidance
    purpose: Provide practical guidance for implementing this profile in repository files and validation tools.
    content:
      authoring_guidelines:
        - id: mid_ig_001
          guidance: Keep metadata.yaml concise enough for human review while preserving links to more detailed records.
        - id: mid_ig_002
          guidance: Use local stable IDs for every controlled concept, file, source, record, and quality gate.
        - id: mid_ig_003
          guidance: Keep citation metadata synchronized by treating metadata.yaml as the source for title, description, license, repository URL, and version.
        - id: mid_ig_004
          guidance: Treat CITATION.cff as the source for citation-specific rendering only after it is cross-checked against metadata.yaml.
        - id: mid_ig_005
          guidance: Use release records rather than root metadata files to preserve event-specific release evidence.
        - id: mid_ig_006
          guidance: Add explicit project_specific_placeholder markers only when a field requires project-specific information or external verification.
      yaml_patterns:
        minimal_identifier_object:
          id: example_identifier
          identifier_type: local_stable_id
          value: example_identifier
          status: assigned
          assigned_date: "2026-04-27"
          assigned_by: framework_maintainers
          identifies: example_controlled_item
        minimal_doi_object:
          doi: null
          doi_status: planned
          registry: Zenodo_or_equivalent
          evidence: null
          note: DOI must not be populated as issued until assigned by the registry.
        minimal_provenance_event:
          provenance_event_id: record_event_example_0001
          event_type: review
          date: "2026-04-27"
          responsible_party: framework_maintainers
          affected_items:
            - metadata.yaml
          evidence:
            - review_record_reference
          outcome: in_review
          retention_rule: retain_for_life_of_package
      validation_automation_recommendations:
        - id: mid_auto_001
          recommendation: Add a duplicate-ID scan across YAML and JSON files.
        - id: mid_auto_002
          recommendation: Add a path naming validator using repository architecture rules.
        - id: mid_auto_003
          recommendation: Add cross-file version and citation consistency checks.
        - id: mid_auto_004
          recommendation: Add DOI status and DOI syntax checks.
        - id: mid_auto_005
          recommendation: Add source_basis evidence_status checks.
        - id: mid_auto_006
          recommendation: Add release checksum generation and fixity reporting.
      review_instructions:
        - id: mid_rev_001
          instruction: Review metadata first for package identity, then identifiers, then citation consistency, then provenance records.
        - id: mid_rev_002
          instruction: Treat unresolved DOI, ORCID, ROR, CFF, or archive-platform requirements as open issues unless externally verified.
        - id: mid_rev_003
          instruction: Confirm that metadata supports review and reuse without overstating release, evaluation, or publication maturity.

  - id: template_or_schema_implications
    title: Template or Schema Implications
    purpose: Identify downstream schemas, templates, and checklists that should implement this profile.
    content:
      schema_implications:
        - id: schema_metadata
          path: schemas/metadata.schema.json
          status: recommended_new_schema
          validates:
            - metadata.yaml
          minimum_required_properties:
            - package_id
            - title
            - description
            - version
            - status
            - license
            - contributors
            - identifiers
            - citation
