# SPDX-License-Identifier: CC0-1.0
product:
  id: product_catalog
  title: DSR Framework Product Catalog
  purpose: Provide the controlled registry of DSR Framework repository products, target paths, output formats, conformance targets, dependency relationships, and validation responsibilities.
  status: draft
information_item:
  item_id: spec_product_catalog
  item_type: specification
  target_path: specs/product-catalog.yaml
  output_format: yaml
  selection_id: spec_product_catalog
version: 0.1.0
owner: framework_maintainer
conformance:
  default_conformance: L2
  conformance_target: l2_reviewable
  tailoring: Catalog entries are reviewable and dependency-mapped; executable validation is deferred to schema and automation products.
source_basis:
- source_id: user_current_request
  source_type: immediate_task_definition
  role: Selected spec_product_catalog as the generation target.
- source_id: dsr_framework_selection_table
  source_type: project_registry
  role: Supplies selection IDs, target paths, portion types, formats, purposes, conformance levels, and key dependencies.
- source_id: dsr_framework_generation_spec
  source_type: generation_specification
  role: Defines repository architecture, content generation rules, product specification structure, quality gates, and completion report requirements.
- source_id: dsr_framework_generation_prompt
  source_type: generation_prompt
  role: Defines procedure, required product-spec structure, DSR distinctions, quality standards, and final response conventions.
- source_id: dsr_extraction_corpus
  source_type: internal_evidence_base
  role: Provides scholarly and methodological source basis for downstream DSR concepts; catalog-level evidence mapping is limited to registry dependency control.
- source_id: documentation_protocol_repository
  source_type: external_protocol_reference
  role: Named governing protocol source; not re-queried during this generation.
dependencies:
- dsr_framework_selection_table
- dsr_framework_generation_spec
- dsr_framework_generation_prompt
related_items:
- manifest.yaml
- metadata.yaml
- artifact-profile.yaml
- package-inventory.yaml
