sections:
- id: identity_and_purpose
  title: Identity and Purpose
  purpose: Define the product catalog as the authoritative registry and dependency map for generated DSR Framework repository portions.
  content:
    file_role: controlled_product_specification
    catalog_functions:
    - Identify every selectable repository product by stable selection ID.
    - Map product families, paths, formats, and conformance targets.
    - Preserve key dependencies and normalize dependency relationships where possible.
    - Support package inventory, roadmap, validation automation, and release planning.
    out_of_scope:
    - Does not contain the full content of each product.
    - Does not replace schemas, templates, or checklists.
    - Does not assert that every listed product has already been generated or approved.
- id: conceptual_model
  title: Conceptual Model
  purpose: Define the catalog concepts used to control product identification, grouping, dependency mapping, and validation responsibility.
  content:
    entities:
    - id: catalog_entry
      definition: A controlled generation target with selection ID, repository path, portion type, output format, purpose, conformance target, and dependencies.
    - id: product_family
      definition: A repository-level grouping of products by function, such as specs, models, vocabularies, schemas, templates, checklists, docs, records, or root control files.
    - id: dependency_edge
      definition: A directed relation from a dependent catalog entry to a product, product family, source family, or unresolved dependency term.
    - id: conformance_target
      definition: A declared review or maturity target translated from the selection table level labels L1 through L5 into controlled conformance identifiers.
    - id: validation_responsibility
      definition: The primary review or validation mode expected for the product type.
    relationships:
    - catalog_entry belongs_to product_family
    - catalog_entry has_default_conformance conformance_target
    - catalog_entry depends_on catalog_entry
    - catalog_entry depends_on_family product_family
    - catalog_entry grounded_in_source_family source_basis
    - catalog_entry has_validation_responsibility validation_responsibility
    boundary_conditions:
    - Dependency terms from the selection table are retained even when a precise registered target is unavailable.
    - Source-family dependencies such as documentation_protocol_repository and dsr_extraction_corpus are not repository products unless separately represented by records.
    - Catalog entries indicate intended products, not actual file-existence status.
- id: normative_requirements
  title: Normative Requirements
  purpose: State the rules governing catalog maintenance, dependency control, and downstream use.
  content:
    must:
    - Each generated repository product must have a stable selection_id or a recorded rationale for being outside the catalog.
    - Each catalog entry must include target_path, portion_type, output_format, purpose, default_conformance, and dependency information.
    - Each dependency term from the selection table must be retained in dependency_terms even when normalized dependency resolution is partial.
    - Each dependency edge must distinguish generated product dependencies from source-family dependencies and unresolved dependencies.
    - The catalog must be updated when target paths, conformance levels, repository structure, or validation responsibilities change.
    should:
    - Downstream package inventories should derive required file lists from this catalog when possible.
    - Roadmap and release planning should use product_family and conformance_target indexes to sequence work.
    - Automation should validate that generated files match registered target paths and expected formats.
    - Unregistered dependency references should be resolved into future catalog entries, crosswalks, schemas, or explicit external sources.
    may:
    - The catalog may include additional fields for owner, review status, release status, generated checksum, or last-reviewed date.
    - Catalog consumers may filter entries by product_family, conformance_target, generation_status, or validation_responsibility.
    must_not:
    - The catalog must not be used as evidence that a product has passed review unless the entry has an approved review record.
    - The catalog must not silently drop dependency terms that are not yet resolved to registered files.
    - The catalog must not replace the package inventory as the record of actual package contents.
- id: information_items
  title: Information Items and Records
  purpose: Specify the information items controlled by the catalog and how they relate to package records.
  content:
    catalog_entry_required_fields:
    - selection_id
    - target_path
    - product_family
    - portion_type
    - output_format
    - purpose
    - default_conformance
    - conformance_target
    - generation_status
    - dependency_terms
    - resolved_dependencies
    - dependency_family_refs
    - source_family_dependencies
    - unregistered_dependency_refs
    - validation_responsibility
    catalog_level_indexes:
    - family_index
    - conformance_index
    - dependency_map
    related_records:
    - record: package-inventory.yaml
      relationship: Actual package inventory should confirm which cataloged products are present, omitted, deferred, or generated.
    - record: conformance-declaration.yaml
      relationship: Conformance declaration should summarize target maturity and tailoring across cataloged products.
    - record: records/reviews/record-review-0001-self-review.yaml
      relationship: Review records should use catalog entries as review scope units.
    - record: records/source-basis/record-source-basis-0001-dsr-corpus.yaml
      relationship: Source-basis records should substantiate DSR-corpus dependencies referenced by catalog entries.
- id: workflow
  title: Workflow and Operating Procedure
  purpose: Describe how maintainers use and update the product catalog.
  content:
    workflow_steps:
    - step_id: pcat_step_01_register
      name: Register or revise product entry
      action: Add or update the catalog entry whenever a selected product, path, type, format, purpose, or conformance target changes.
      output: Updated catalog entry.
    - step_id: pcat_step_02_normalize_dependencies
      name: Normalize dependencies
      action: Map dependency terms to registered selection IDs, product families, source families, or unregistered dependency references.
      output: Updated resolved_dependencies and dependency_map edges.
    - step_id: pcat_step_03_sequence_generation
      name: Sequence generation work
      action: Prioritize foundational specs and vocabularies before dependent models, templates, schemas, checklists, docs, and records.
      output: Roadmap-ready product ordering.
    - step_id: pcat_step_04_validate_alignment
      name: Validate package alignment
      action: Compare catalog entries with the package inventory, generated files, schemas, review records, and release records.
      output: Discrepancy list and remediation tasks.
    recommended_generation_order:
    - root_package_control
    - product_specifications
    - vocabularies
    - models
    - schemas
    - templates
    - checklists
    - protocol_documentation
    - records
- id: quality_and_conformance
  title: Quality and Conformance
  purpose: Define acceptance criteria, validation rules, and quality gates for the catalog.
  content:
    acceptance_criteria:
    - id: pcat_ac_01_complete_registry
      criterion: All rows from the selection table are represented as catalog entries.
      evidence_required:
      - entry_count
      - source selection table row count
      status: satisfied_for_initial_generation
    - id: pcat_ac_02_path_format_alignment
      criterion: Each entry preserves target path and output format from the selection table.
      evidence_required:
      - catalog.entries.target_path
      - catalog.entries.output_format
      status: satisfied_for_initial_generation
    - id: pcat_ac_03_dependency_preservation
      criterion: Dependency terms are retained and classified as resolved, family-level, source-family, or unregistered.
      evidence_required:
      - catalog.dependency_map.edges
      status: satisfied_for_initial_generation
    - id: pcat_ac_04_reviewability
      criterion: The catalog contains explicit quality gates, validation rules, and failure modes.
      evidence_required:
      - quality_gates
      - sections.quality_and_conformance
      status: satisfied_for_initial_generation
    validation_rules:
    - entry_count should equal the number of non-header product rows in the selection table.
    - selection_id values must be unique.
    - target_path values should be unique unless a documented alias or replacement is declared.
    - resolved_dependencies should reference existing catalog selection_id values.
    - unregistered_dependency_refs should be reviewed before L3 or higher automation conformance is claimed.
    - output_format must be consistent with target_path extension.
    failure_modes:
    - id: pcat_fm_01_missing_entry
      description: A selected product is absent from the catalog.
      remediation: Add the product entry and dependency edges, then update entry_count and indexes.
    - id: pcat_fm_02_unresolved_dependency_without_note
      description: A dependency term cannot be resolved and is not recorded as unregistered or external.
      remediation: Classify the term explicitly and decide whether to add a new catalog entry or source-basis record.
    - id: pcat_fm_03_path_conflict
      description: Two entries point to the same target_path without a documented reason.
      remediation: Correct the path or record an alias/supersession decision.
- id: traceability
  title: Traceability
  purpose: Record upstream source links, downstream products, evidence status, and dependency trace semantics.
  content:
    upstream_sources:
    - user_current_request
    - dsr_framework_selection_table
    - dsr_framework_generation_spec
    - dsr_framework_generation_prompt
    downstream_consumers:
    - package-inventory.yaml
    - specs/product-dsr-implementation-roadmap.yaml
    - specs/product-dsr-automation-and-validation-model.yaml
    - records/reviews/record-review-0001-self-review.yaml
    - records/releases/record-release-0001-v0-1-0.yaml
    evidence_status: registry_mapped_from_selection_table; scholarly_evidence_not_required_for_catalog_entries; downstream DSR concept files must map corpus evidence separately
    trace_id_prefix: pcat_trace
- id: implementation_guidance
  title: Implementation Guidance
  purpose: Provide practical guidance for using the catalog in a GitHub-publishable repository.
  content:
    repository_use:
    - Place this file at specs/product-catalog.yaml.
    - Use package-inventory.yaml to declare actual generated files and omit/defer decisions.
    - Use this catalog as the target list for scaffolding directories, validating paths, and planning releases.
    - Maintain catalog entries in lower_snake_case for selection IDs and lower-kebab-case for file names.
    automation_hooks:
    - Check that every generated file has a catalog entry or approved exception.
    - Check output_format against file extension.
    - Check that resolved_dependencies reference registered entries.
    - Emit warnings for unregistered_dependency_refs.
    - Compare generation_status with review and release records.
    human_review_guidance:
    - Review unregistered_dependency_refs first because they indicate conceptual dependencies not yet represented as generated files.
    - Review L4 and L5 targets for stronger archival, release, DOI, and publication-readiness requirements.
    - Review source_family_dependencies to ensure source-basis records are present and sufficient.
- id: template_or_schema_implications
  title: Template or Schema Implications
  purpose: Identify downstream templates and schemas implied by the product catalog.
  content:
    future_schema_recommendation:
      selection_id: schema_product_catalog
      target_path: schemas/product-catalog.schema.json
      status: not_in_current_selection_table
      rationale: A catalog schema would support automated validation of registry entries, dependency edges, and conformance indexes.
    package_inventory_implications:
    - Package inventory should include a generated_present, deferred, omitted, or out_of_scope status for each cataloged target.
    - Package inventory validation should detect catalog entries without corresponding inventory rows.
    roadmap_implications:
    - Implementation roadmap should sequence work using product_family and dependency_map edges.
    - Roadmap should explicitly decide how to resolve unregistered dependency references.
- id: open_questions_and_backlog
  title: Open Questions and Backlog
  purpose: List unresolved catalog decisions and future improvements.
  content:
    open_questions:
    - id: pcat_oq_01_schema_registration
      question: Should a product-catalog JSON Schema be added to the selection table for automated validation?
      evidence_status: not_yet_mapped
    - id: pcat_oq_02_crosswalk_registration
      question: Should genre standards, responsible DSR, aesthetics, problem-space, solution-space, and design-rationale dependencies become registered crosswalks or specs?
      evidence_status: not_yet_mapped
    - id: pcat_oq_03_status_lifecycle
      question: Should generation_status be synchronized automatically with review records and release records?
      evidence_status: not_yet_mapped
    backlog_items:
    - Add catalog schema if automation conformance is pursued.
    - Add review status fields after self-review records exist.
    - Resolve unregistered dependency references into generated files, records, crosswalks, or explicit external dependencies.
    - Add checksums or generated file metadata after repository scaffolding is created.
quality_gates:
- id: qg_consistency
  status: pass
  rationale: Uses required target path, YAML format, controlled selection ID, and product specification structure.
- id: qg_coherence
  status: pass_with_watch_items
  rationale: Catalog entries align with the selection table; unregistered dependencies are explicitly retained for later resolution.
- id: qg_cogency
  status: pass
  rationale: Defines entry structure, dependency semantics, workflow, acceptance criteria, and failure modes.
- id: qg_correspondence
  status: pass
  rationale: Supports DSR Framework as a reviewable artifact package by controlling product identity and dependency structure.
- id: qg_dsr_transparency
  status: pass
  rationale: Supports process and contribution transparency by making product scope, dependency basis, and validation responsibility explicit.
- id: qg_reviewability
  status: pass
  rationale: Contains explicit acceptance criteria, validation rules, quality gates, and unresolved questions.
traceability:
- trace_id: pcat_trace_001
  from: user_current_request.selection_id
  to: information_item.selection_id
  relationship: selects_generation_target
  evidence_status: mapped
- trace_id: pcat_trace_002
  from: dsr_framework_selection_table.rows
  to: catalog.entries
  relationship: enumerates_catalog_entries
  evidence_status: mapped
- trace_id: pcat_trace_003
  from: dsr_framework_generation_spec.coherence_rules.product_spec
  to: sections
  relationship: requires_product_spec_structure
  evidence_status: mapped
- trace_id: pcat_trace_004
  from: dsr_framework_generation_spec.quality_gates
  to: quality_gates
  relationship: implements_quality_gate_review
  evidence_status: mapped
assumptions:
- The selection table is treated as the authoritative list of current generation targets.
- Dependency terms are interpreted conservatively; unresolved terms are retained rather than silently normalized away.
- All entries begin with generation_status planned because this catalog does not verify actual file existence or review approval.
- The documentation protocol repository is referenced as a governing source but was not externally queried for current changes during this file generation.
open_questions:
- Should unregistered dependency references be added to the selection table as new specs, schemas, records, or crosswalks?
- Should product-catalog.schema.json be introduced as a new validation artifact?
- Should generation_status values be controlled by a separate vocabulary?
