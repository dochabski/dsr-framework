license_and_reuse:
  default_license:
    spdx_id: CC0-1.0
    name: Creative Commons Zero v1.0 Universal
    applies_to:
    - structured_yaml_files
    - markdown_documentation
    - checklists
    - templates
    - metadata_records
    rationale: The framework is intended for broad reuse, indexing, adaptation, translation, redistribution, and public benefit;
      citation is appreciated but not legally required.
  third_party_material_policy:
    statement: 'Do not include copyrighted source text beyond permitted citation, paraphrase, or bibliographic metadata. Preserve
      source IDs and evidence anchors rather than copying source material into framework files.

      '
    evidence_status: mapped_policy
  reuse_constraints:
  - Preserve citation metadata for scholarly traceability where practical.
  - Do not represent the public draft as peer reviewed, independently evaluated, or stable 1.0.
  - Do not include source PDFs, copyrighted source text, local audit artifacts, or unmapped generated archives in the public
    package.
  code_license:
    spdx_id: Apache-2.0
    name: Apache License 2.0
    applies_to:
    - executable_code
    - scripts
    - ci_workflows
    - software_tooling
    status: declared_for_future_or_added_code
  license_files:
  - LICENSE
  - LICENSES/CC0-1.0.txt
  - LICENSES/Apache-2.0.txt
  - REUSE.toml
versioning_and_release:
  current_version: 0.1.0
  semantic_versioning_policy:
    major: incompatible structural changes to the framework package or schemas
    minor: backward-compatible additions to models, vocabularies, templates, or records
    patch: corrections, clarifications, typo fixes, or nonbreaking metadata edits
  status_lifecycle:
  - draft
  - in_review
  - approved
  - released
  - superseded
  - deprecated
  - archived
  release_readiness:
    current_state: public_draft_release_published
    release_candidate: true
    archival_publication_ready: true
    required_before_release: []
    completed_for_public_draft:
    - citation_metadata_updated
    - github_release_published
    - license_files_added
    - package_inventory_updated
    - root_metadata_updated
    - source_traceability_remediated
    - validation_passed
    - zenodo_deposition_published
conformance_metadata:
  declared_conformance_level: l2_reviewable_public_draft
  conformance_rationale: 'The package has root metadata, inventory, crosswalk traceability, validation evidence, and source
    grounding sufficient for public draft review. It does not claim L3 exercisability, L4 external reuse validation, or L5
    archival completion until Zenodo publication is complete.

    '
  conformance_dependencies:
  - artifact-profile.yaml
  - package-inventory.yaml
  - conformance-declaration.yaml
  - specs/product-dsr-metadata-and-identifier-profile.yaml
  - schemas/metadata.schema.json
  tailoring:
    applied: true
    rationale: 'The selected root_metadata row depends on a metadata profile that is not yet implemented as a dedicated metadata
      schema. This file therefore provides reviewable public-draft metadata while reserving stronger archival and stability
      claims until final Zenodo publication and later independent review.

      '
