    - prescriptive
    - evaluative
    - normative
  contribution_claim_status:
    status: draft_claims_only
    limitation: 'This metadata record does not itself evaluate the framework or establish publication-ready contribution significance.

      '
  transparency_alignment:
    process_transparency:
      role: identifies provenance, generation event, versioning, and change history
      status: supported
    problem_space_transparency:
      role: identifies project purpose, intended users, use cases, and non-goals
      status: supported
    solution_space_transparency:
      role: identifies governing protocol and DSR extraction corpus as source bases
      status: supported
    build_transparency:
      role: records assistant-supported draft generation, normalization, validation, traceability remediation, and publication
        metadata preparation
      status: supported
    evaluation_transparency:
      role: identifies validation and release-readiness obligations
      status: partial
    contribution_transparency:
      role: identifies artifact classes, knowledge goals, and contribution-claim status
      status: supported
