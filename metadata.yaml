metadata_record:
  item_id: root_metadata
  item_type: metadata_record
  title: DSR Framework Metadata
  purpose: 'Provide structured project metadata for the Design Science Research (DSR) Framework artifact package, including
    identity, authorship, citation, licensing, versioning, repository, conformance, provenance, and preservation fields needed
    for reviewable reuse and future publication.

    '
  status: public_draft_release
  version: 0.1.0
  owner:
    role: project_steward
    name: David Ochabski
    contact: https://github.com/dochabski
  target_path: metadata.yaml
  default_conformance: l1_documented
  generated_for_selection:
    selection_id: root_metadata
    portion_type: metadata_record
    output_format: yaml
    declared_purpose: Structured project metadata.
    key_dependencies:
    - metadata_profile
project_identity:
  project_id: dsr_framework
  canonical_name: DSR Framework
  short_name: DSR Framework
  slug: dsr-framework
  project_type: compound_dsr_artifact_package
  artifact_classes:
    primary: compound_dsr_artifact
    secondary:
    - method_or_protocol_artifact
    - model_or_taxonomy_artifact
    - documentation_only
    - data_or_information_artifact
  project_summary: 'A protocol-governed, GitHub-publishable framework for planning, documenting, evaluating, reviewing, and
    publishing Design Science Research artifacts and artifact packages.

    '
  intended_users:
  - dsr_researchers
  - artifact_designers
  - reviewers
  - editors
  - research_methods_instructors
  - repository_maintainers
  intended_use_cases:
  - plan_dsr_artifact_packages
  - document_artifact_identity_scope_and_claims
  - align_artifact_utility_quality_and_knowledge_contribution
  - record_dsr_transparency_evidence
  - prepare_reviewable_and_reusable_repository_packages
  - support_publication_and_registry_readiness
  non_goals:
  - replace_discipline_specific_methodological_judgment
  - certify_publication_readiness_without_review
  - guarantee_artifact_reproducibility_or_generalization
  - provide_a_single_required_dsr_process_model_for_all_projects
