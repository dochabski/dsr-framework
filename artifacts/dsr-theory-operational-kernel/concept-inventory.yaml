dsr_concept_inventory:
  metadata:
    version: 0.1.0-draft
    generated_from:
    - Theory of Design Science Research.txt
    - DSR Operational Synthesis.txt
    - Unified DSR source operational extraction corpus and sidecar referenced by the synthesis
    purpose: Normalized concept inventory for building a DSR operational ontology, SKOS vocabularies, YAML/JSON Schema templates,
      SHACL validation shapes, traceability records, anti-pattern checks, and documentation protocol alignment.
    source_anchor_policy: source_anchors use stable section anchors into the synthesis documents, with original-source clarification
      listed where table-level or genre-level precision is still needed.
    identifier_policy: ASCII lowercase snake_case identifiers are used for YAML keys, ontology terms, SHACL shape names, and
      SKOS concept identifiers.
