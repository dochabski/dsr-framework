concept_to_ontology_coverage:
  item_id: dsr_theory_operational_kernel_concept_to_ontology_coverage
  item_type: crosswalk
  title: Concept Inventory to Ontology Coverage Disposition
  status: draft_reviewed_with_gaps
  version: "0.1.0-draft"
  date: "2026-05-05"
  responsible_party: framework_maintainer
  purpose: >
    Record the first local coverage check between the DSR concept inventory,
    OWL/RDF ontology, SKOS vocabulary, and SHACL shape files before the artifact
    is used as a stronger validation kernel.
  reviewed_files:
    concept_inventory: artifacts/dsr-theory-operational-kernel/concept-inventory.yaml
    ontology: artifacts/dsr-theory-operational-kernel/ontology/dsr-ontology.ttl
    shacl_shapes: artifacts/dsr-theory-operational-kernel/shapes/dsr-shapes.ttl
    skos_yaml: artifacts/dsr-theory-operational-kernel/vocabularies/dsr-skos-controlled-vocabulary.yaml
    skos_ttl: artifacts/dsr-theory-operational-kernel/vocabularies/dsr-skos-controlled-vocabulary.ttl
  method:
    - Parse YAML files with PyYAML.
    - Parse Turtle files with rdflib.
    - Compare concept inventory identifiers to RDF `dcterms:identifier` values where present.
    - Compare controlled vocabulary identifiers to SKOS concept identifiers.
    - Check SHACL target-class references and SHACL path references for ontology or shape representation.
  summary_counts:
    concept_inventory:
      classes: 98
      object_properties: 52
      datatype_properties: 34
      controlled_vocabularies: 23
      validation_rules: 29
      anti_patterns: 13
      source_clarification_needed: 11
    rdf_parse:
      ontology_triples: 2563
      shacl_triples: 1132
      skos_triples: 11097
      ontology_class_identifiers: 87
      ontology_property_identifiers: 130
      skos_identifiers: 485
    coverage:
      classes_represented_by_identifier: 72
      classes_not_represented_by_identifier: 26
      object_properties_represented_by_identifier: 30
      object_properties_not_represented_by_identifier: 22
      datatype_properties_represented_by_identifier: 22
      datatype_properties_not_represented_by_identifier: 12
      controlled_vocabularies_represented: 23
      controlled_vocabularies_not_represented: 0
  concept_inventory_gaps:
    classes_not_represented_by_identifier:
      - artifact_network
      - audience
      - cimo_statement
      - descriptive_knowledge
      - dsr_strategy
      - environment
      - evaluation_object
      - governance
      - kernel_theory
