      - knowledge_moment
      - knowledge_path
      - ontology
      - path_of_knowledge_types
      - practitioner_knowledge
      - prerequisite_space
      - prior_artifact
      - problem_motivation
      - problem_statement
      - process_log
      - replication_study
      - requirements_design_evaluation_trace
      - resource
      - solution_alternative
      - solvability_assessment
      - stakeholder_evidence
    object_properties_not_represented_by_identifier:
      - abstracted_into
      - applied_to
      - codifies_as
      - derived_from_problem
      - evaluated_by
      - evaluates_object
      - grounded_in_input_knowledge
      - has_artifact_universal
      - has_context
      - has_design_rationale
      - has_evaluation_evidence
      - has_knowledge_moment
      - has_problem_class
      - has_use_case
      - implemented_in
      - includes_dsr_grid_dimension
      - instantiates_artifact_universal
      - precedes_knowledge_moment
      - provides_requirements_for
      - supports_claim
      - uses_kernel_theory
      - uses_prior_artifact
    datatype_properties_not_represented_by_identifier:
