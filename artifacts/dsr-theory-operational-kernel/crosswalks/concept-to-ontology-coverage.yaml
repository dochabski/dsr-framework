  shacl_consistency:
    target_classes_missing_from_ontology_by_uri: []
    path_terms_requiring_review:
      - http://purl.org/dc/terms/source
      - http://www.w3.org/2000/01/rdf-schema#label
      - http://www.w3.org/2000/01/rdf-schema#seeAlso
      - https://w3id.org/dsr-framework/ontology#hasCIMOContext
      - https://w3id.org/dsr-framework/ontology#hasClaimType
      - https://w3id.org/dsr-framework/ontology#hasEvaluationMethod
      - https://w3id.org/dsr-framework/ontology#hasInterventionOrArtifactFeature
      - https://w3id.org/dsr-framework/ontology#hasMechanismOrRationale
      - https://w3id.org/dsr-framework/ontology#hasNoveltyMode
      - https://w3id.org/dsr-framework/ontology#hasOutcomeOrEffect
    interpretation: >
      SHACL target classes resolve without missing ontology targets. Several path
      terms require review because the first check did not find a local identifier
      declaration or because the term belongs to a standard RDF namespace.
  disposition:
    result: pass_with_recorded_draft_gaps
    draft_acceptance: >
      The package is internally parseable and reviewable as a draft artifact.
      The gaps are explicit and block stronger ontology-completeness claims until
      they are repaired or retained as scoped modeling decisions.
    required_followup:
      - decide which concept inventory terms should become OWL classes or properties;
      - decide which terms remain YAML-only, SKOS-only, review-only, or documentation constructs;
      - add ontology declarations or retained modeling decisions for SHACL path terms that are not standard RDF terms;
      - update this crosswalk after the next ontology pass.
    does_not_support:
      - standalone_stable_release
      - complete_ontology_coverage
      - independent_semantic_review
      - l5_archival_publication_ready
