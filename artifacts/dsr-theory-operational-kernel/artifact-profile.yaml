  title: "Design Science Research Theory: Operational Kernel and Repository Validation Framework"
  status: draft_identifier_coverage_reconciled
  version: "0.1.0-draft"
  date: "2026-05-05"
  responsible_party: framework_maintainer
  host_repository: https://github.com/dochabski/dsr-framework
  host_package_version: "1.0.2"
  artifact_type:
    primary: methodological_framework
    secondary:
      - theory_synthesis
      - validation_instrument
      - semantic_model_package
  purpose: >
    Translate DSR theory synthesis into an operational kernel of concepts, ontology terms,
    controlled vocabularies, validation shapes, schemas, templates, records, and coverage
    checks that can be used to validate repository-based DSR artifact packages.
  package_scope:
    included:
      - concept inventory
      - ontology competency questions
      - OWL/RDF ontology
      - SKOS controlled vocabulary
      - SHACL shapes
      - JSON Schema
      - YAML authoring templates
      - source-basis record
      - local validation record
      - concept-to-ontology coverage crosswalk
    excluded:
      - copyrighted source PDFs
      - original full-text source documents
      - independent external semantic review
      - empirical validation of downstream framework utility
      - standalone publication or archival release
  conformance_posture:
    artifact_status: draft_identifier_coverage_reconciled
    current_artifact_conformance: l2_reviewable_draft
    host_package_conformance: l4_reusable_stable
    l5_claimed: false
    note: >
      The host DSR Framework package remains an L4 reusable-stable v1.x package.
      This nested artifact package is a draft self-application artifact and does not
      change the host package's L4-not-L5 conformance claim.
  source_basis:
