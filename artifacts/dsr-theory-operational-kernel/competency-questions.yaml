  - domain_id: replication
    domain_label: Replication
    domain_description: Competency questions for replication type, replication function, artifact/evaluation linkage, boundary
      testing, recreation, and accumulation.
    competency_questions:
    - question_id: CQ-REP-001
      priority: core
      natural_language_question: If the study includes a replication record or replication claim, is the replication type
        identified with a controlled value?
      required_classes:
      - replication_study
      - evaluation_evidence
      required_properties:
      - has_replication_type
      - supports_claim
      - source_anchor_id
      required_controlled_values:
      - vocabulary: replication_type_vocabulary
        values:
        - test
        - redesign
        - justification
        - adaptation
        - explanation
        - update
        - recreation
        - meta_replication
        - differentiated_replication
        - conceptual_replication
      expected_answer_type: conditional replication classification record
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: Replication type is conditionally required when a replication record is present.
      source_anchors:
      - vr_replication_record_requires_type_and_function
    - question_id: CQ-REP-002
      priority: recommended
      natural_language_question: Does the replication record link to the artifact/design entity, evaluation evidence, input
        knowledge, and design knowledge it tests, adapts, updates, or recreates?
      required_classes:
      - replication_study
      - artifact_universal
      - evaluation_evidence
      - input_knowledge
      - design_knowledge
      required_properties:
      - has_replication_type
      - evaluates_object
      - has_input_knowledge
      - produces_design_knowledge
      - supports_claim
      required_controlled_values:
      - vocabulary: traceability_edge_vocabulary
        values:
        - evidence_to_claim
        - evaluation_to_design_knowledge
        - design_knowledge_to_contribution
      expected_answer_type: replication linkage graph
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Multi-node traceability requires query support; the knowledge function of a replication needs review.
      source_anchors:
      - vr_replication_record_requires_type_and_function
    - question_id: CQ-REP-003
      priority: advanced
      natural_language_question: Does the replication test or extend boundary conditions, projectability, problem-class fit,
        or context transferability?
      required_classes:
      - replication_study
      - boundary_condition
      - projectability_statement
      - problem_class
      - context
      required_properties:
      - has_boundary_condition
      - has_projectability_statement
      - has_problem_class
      - has_context
      required_controlled_values:
      - vocabulary: knowledge_scope_vocabulary
        values:
        - idiographic_local
        - projectable_problem_class
        - analytical_generalization
        - nomothetic_general
      - vocabulary: replication_type_vocabulary
        values:
        - adaptation
        - differentiated_replication
        - conceptual_replication
        - test
      expected_answer_type: boundary/projectability comparison across original and replication contexts
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Requires comparison across records and expert judgment about contextual similarity or meaningful differentiation.
      source_anchors:
      - sc_replication_type_extensions
    - question_id: CQ-REP-004
      priority: source-dependent
      natural_language_question: When recreation, update, or repository-based replication is claimed, are code, data, templates,
        examples, or process logs available as repository paths?
      required_classes:
      - repository_package
      - build_trace
      - process_log
      - artifact_instantiation
      - replication_study
      required_properties:
      - repository_path
      - trace_description
      - artifact_version
      - has_replication_type
      required_controlled_values:
      - vocabulary: replication_type_vocabulary
        values:
        - recreation
        - update
        - meta_replication
      - vocabulary: evidence_mode_vocabulary
        values:
        - repository_trace
        - replication
      expected_answer_type: repository-readiness report for replication/recreation
      shacl_validation_direct: true
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: File/path existence can be mechanically checked outside OWL; adequacy of materials requires review.
      source_anchors:
      - vr_repository_package_for_publication
  - domain_id: responsible_ethical_validity
    domain_label: Responsible / Ethical Validity
    domain_description: Competency questions for responsible design constraints, ethical validity, stakeholder burden, privacy/security/IP
      boundaries, and transparency balance.
    competency_questions:
    - question_id: CQ-REV-001
      priority: core
      natural_language_question: When ethical, responsible-design, privacy, security, intellectual-property, stakeholder-burden,
        or maintenance constraints are relevant, are they represented as responsible-design constraints and validity considerations?
      required_classes:
      - responsible_design_constraint
      - validity_assessment
      - boundary_condition
      required_properties:
      - has_responsible_design_constraint
      - has_validity_assessment
      - has_boundary_condition
      - boundary_condition_text
      required_controlled_values:
      - vocabulary: validity_type_vocabulary
        values:
        - ethical_responsible_validity
      - vocabulary: obligation_status_vocabulary
        values:
        - conditional
        - recommended
      expected_answer_type: conditional responsible-validity constraint record
      shacl_validation_direct: true
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: The ontology can test the presence of responsible-design constraint nodes; relevance and sufficiency
        require human governance review.
      source_anchors:
      - vr_responsible_transparency_balance
      - sc_responsible_design_constraints_scope
    - question_id: CQ-REV-002
      priority: recommended
      natural_language_question: Are responsible or ethical concerns included in evaluation criteria and findings when they
        affect artifact fitness for use?
      required_classes:
      - evaluation_criterion
      - evaluation_evidence
      - evaluation_finding
      - responsible_design_constraint
      required_properties:
      - uses_evaluation_criterion
      - has_evaluation_evidence
      - evaluation_result_summary
      - has_responsible_design_constraint
      required_controlled_values:
      - vocabulary: evaluation_criterion_vocabulary
        values:
        - ethical_acceptability
        - fitness_for_use
        - fitness_for_evolution
        - usability
        - projectability
      - vocabulary: validity_type_vocabulary
        values:
        - ethical_responsible_validity
        - pragmatic_validity
        - evaluation_validity
      expected_answer_type: responsible-evaluation coverage report
      shacl_validation_direct: true
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Controlled criteria can be validated; sufficiency and ethical acceptability remain contextual judgments.
      source_anchors: []
    - question_id: CQ-REV-003
      priority: advanced
      natural_language_question: Does the transparency trace balance auditability and reuse against confidentiality, security,
        intellectual-property, and stakeholder-burden constraints?
      required_classes:
      - transparency_trace
      - repository_package
      - responsible_design_constraint
      - stakeholder
      - boundary_condition
      required_properties:
      - has_transparency_trace
      - repository_path
      - has_responsible_design_constraint
      - has_stakeholder
      - has_boundary_condition
      required_controlled_values:
      - vocabulary: transparency_form_vocabulary
        values:
        - process
        - problem_space
        - solution_space
        - build
        - evaluation
        - contribution
      - vocabulary: validity_type_vocabulary
        values:
        - ethical_responsible_validity
      - vocabulary: audience_vocabulary
        values:
        - reviewer
        - practitioner
        - technical_implementer
        - user
        - sponsor
      expected_answer_type: responsible transparency balance assessment
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: This is not directly decidable by SHACL because too much and too little disclosure are both risks.
      source_anchors:
      - vr_responsible_transparency_balance
      - ap_transparency_overload
    - question_id: CQ-REV-004
      priority: source-dependent
      natural_language_question: When a domain-specific source raises safety, accessibility, privacy, monitoring, consent,
        environmental, ESG, or public-impact concerns, are those concerns preserved as source-specific responsible-validity
        constraints?
      required_classes:
      - responsible_design_constraint
      - stakeholder_evidence
      - boundary_condition
      - validity_assessment
      required_properties:
      - has_responsible_design_constraint
      - source_anchor_id
      - boundary_condition_text
      - confidence_percent
      required_controlled_values:
      - vocabulary: validity_type_vocabulary
        values:
        - ethical_responsible_validity
        - external_context_validity
        - pragmatic_validity
      - vocabulary: ambiguity_level_vocabulary
        values:
        - low
        - medium
        - high
      expected_answer_type: source-specific ethical/responsible constraint inventory
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Domain-specific responsible design concerns should be preserved even when they are outside the core
        vocabulary.
      source_anchors:
      - sc_responsible_design_constraints_scope
  summary_counts:
    domain_count: 14
    question_count: 56
    questions_by_priority:
      core: 14
      recommended: 14
      advanced: 14
      source-dependent: 14
  quality_control:
    yaml_syntax_validated: true
    concept_inventory_identifier_check:
      unknown_required_classes: []
      unknown_required_properties: []
      unknown_controlled_vocabularies: []
      unknown_controlled_values: []
      unknown_source_anchors: []
    notes: Questions are intended as ontology competency questions. A true value for shacl_validation_direct only means the
      minimum structural condition can be tested; it does not imply that scholarly adequacy is automatically decidable.
