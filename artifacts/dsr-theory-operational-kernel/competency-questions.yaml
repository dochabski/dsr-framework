dsr_ontology_competency_questions:
  metadata:
    id: dsr_ontology_competency_questions_v0_1_0
    title: Ontology Competency Questions for Semantic Validation of Design Science Research Documentation
    version: 0.1.0-draft
    generated_on: '2026-05-05'
    generated_from:
    - file: DSR Operational Synthesis.txt
      role: operational DSR synthesis and validation-rule rationale
    - file: Theory of Design Science Research.txt
      role: consensus-theory source anchors and construct definitions
    - file: concept-inventory_v2.yaml
      role: normalized classes, properties, controlled vocabularies, validation rules, and anti-patterns
    purpose: Provide competency questions that an RDF/OWL ontology, SKOS vocabulary, SHACL shape library, and SPARQL query
      layer should answer for DSR documentation records.
    identifier_policy: ASCII lowercase snake_case for classes/properties/vocabularies; question IDs use CQ-<DOMAIN>-NNN.
    priority_values:
    - core
    - recommended
    - advanced
    - source-dependent
    question_fields:
    - question_id
    - priority
    - natural_language_question
    - required_classes
    - required_properties
    - required_controlled_values
    - expected_answer_type
    - shacl_validation_direct
    - sparql_query_support_needed
    - human_judgment_required
    - validation_notes
    - source_anchors
    validation_interpretation:
      shacl_validation_direct: true when ordinary SHACL node/property shapes can test the minimum condition without custom
        graph queries or human interpretation
      sparql_query_support_needed: true when answering the question requires joins, multi-hop paths, negation, aggregation,
        comparison across records, or report generation
      human_judgment_required: true when adequacy, relevance, ethical acceptability, novelty, methodological fit, or evidence
        sufficiency must be reviewed by a person
  domains:
  - domain_id: problem_space
    domain_label: Problem Space
    domain_description: Competency questions for problem instance, problem class, problem relevance, and problem-to-requirement
      abstraction.
    competency_questions:
    - question_id: CQ-PS-001
      priority: core
      natural_language_question: Does every DSR study state both a situated problem instance and an abstract problem class,
        and is the instance explicitly abstracted to the class?
      required_classes:
      - dsr_study
      - problem_space
      - problem_instance
      - problem_class
      required_properties:
      - has_problem_space
      - has_problem_instance
      - has_problem_class
      - abstracts_to_problem_class
      required_controlled_values: []
      expected_answer_type: boolean plus problem_instance_to_problem_class path
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: Minimum cardinality and required edge validation can be tested with SHACL node/property shapes.
      source_anchors:
      - vr_dsr_study_requires_problem_instance_and_class
      - vr_problem_class_abstraction_required
    - question_id: CQ-PS-002
      priority: recommended
      natural_language_question: What evidence or justification supports the practical relevance, severity, or importance
        of the problem?
      required_classes:
      - problem_motivation
      - stakeholder_evidence
      - evaluation_evidence
      required_properties:
      - relevance_justification
      - source_anchor_id
      - supports_claim
      required_controlled_values:
      - vocabulary: evidence_mode_vocabulary
        values:
        - empirical
        - expert
        - field
        - case
        - literature_synthesis
        - conceptual_argument
      expected_answer_type: list of evidence records with source anchors and relevance justification text
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: SHACL can require evidence fields, but adequacy of problem relevance remains a judgment about the
        evidence-to-claim fit.
      source_anchors:
      - vr_problem_relevance_requires_evidence
    - question_id: CQ-PS-003
      priority: advanced
      natural_language_question: Which objectives and requirements are derived from the problem and context, and where is
        that derivation trace recorded?
      required_classes:
      - problem
      - context
      - objective
      - requirement
      - requirements_design_evaluation_trace
      required_properties:
      - derived_from_problem
      - has_context
      - has_objective
      - has_requirement
      required_controlled_values:
      - vocabulary: traceability_edge_vocabulary
        values:
        - problem_to_requirement
      expected_answer_type: trace subgraph from problem/context nodes to objectives and requirements
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Requires multi-hop graph traversal and review of whether derivation is semantically persuasive, not
        merely linked.
      source_anchors:
      - vr_requirements_trace_to_problem
    - question_id: CQ-PS-004
      priority: source-dependent
      natural_language_question: When a source characterizes problem origin, wickedness, opportunity type, or domain-specific
        problem type, is that characterization represented without forcing it into unsupported hard constraints?
      required_classes:
      - problem
      - problem_statement
      - problem_motivation
      - boundary_condition
      required_properties:
      - problem_statement_text
      - relevance_justification
      - source_anchor_id
      - has_boundary_condition
      required_controlled_values:
      - vocabulary: obligation_status_vocabulary
        values:
        - conditional
        - not_addressed
      expected_answer_type: annotated problem characterization with provenance and obligation status
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: This is conditional because the inventory does not impose a universal problem-type vocabulary; source-specific
        terms need human normalization.
      source_anchors:
      - sc_problem_class_minimum_evidence
  - domain_id: context_and_stakeholder_space
    domain_label: Context and Stakeholder Space
    domain_description: Competency questions for context, stakeholder roles, boundary conditions, artifact networks, and projectability
      boundaries.
    competency_questions:
    - question_id: CQ-CS-001
      priority: core
      natural_language_question: Does the study identify the context, at least one relevant stakeholder, and boundary conditions
        that delimit the DSR claim?
      required_classes:
      - context_space
      - context
      - stakeholder
      - boundary_condition
      required_properties:
      - has_context
      - has_stakeholder
      - has_boundary_condition
      required_controlled_values: []
      expected_answer_type: boolean plus context/stakeholder/boundary-condition node set
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: Core completeness can be tested through cardinality constraints on context, stakeholder, and boundary-condition
        links.
      source_anchors:
      - vr_context_boundary_required
    - question_id: CQ-CS-002
      priority: recommended
      natural_language_question: Which stakeholder roles are documented, and are the intended audiences for artifact use,
        evaluation, and communication distinguished?
      required_classes:
      - stakeholder
      - audience
      required_properties:
      - has_stakeholder
      - communicates_to_audience
      - stakeholder_role
      required_controlled_values:
      - vocabulary: audience_vocabulary
        values:
        - researcher
        - reviewer
        - practitioner
        - manager
        - policy_public
        - technical_implementer
        - user
        - sponsor
      expected_answer_type: table of stakeholder roles and audience categories
      shacl_validation_direct: true
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: SHACL can test controlled audience values; human judgment is needed to decide whether stakeholder
        coverage is adequate for the claim.
      source_anchors: []
    - question_id: CQ-CS-003
      priority: advanced
      natural_language_question: Which evaluation findings, projectability statements, and contribution claims are scoped
        to which contextual boundary conditions?
      required_classes:
      - context
      - boundary_condition
      - evaluation_finding
      - projectability_statement
      - contribution_claim
      required_properties:
      - has_context
      - has_boundary_condition
      - has_projectability_statement
      - supports_contribution_claim
      required_controlled_values:
      - vocabulary: traceability_edge_vocabulary
        values:
        - evidence_to_claim
        - evaluation_to_design_knowledge
        - design_knowledge_to_contribution
      expected_answer_type: context-scoped claim-evidence-boundary graph
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Requires graph traversal across context, evidence, design knowledge, and contribution nodes; adequacy
        requires reviewer judgment.
      source_anchors:
      - vr_contribution_claim_requires_evidence_novelty_scope_boundary
    - question_id: CQ-CS-004
      priority: source-dependent
      natural_language_question: When resources, governance arrangements, artifact networks, or externalities affect feasibility
        or validity, are they represented as context rather than hidden background assumptions?
      required_classes:
      - prerequisite_space
      - resource
      - governance
      - artifact_network
      - context
      - boundary_condition
      required_properties:
      - has_context
      - has_boundary_condition
      - context_description
      required_controlled_values:
      - vocabulary: obligation_status_vocabulary
        values:
        - conditional
        - recommended
        - not_addressed
      expected_answer_type: conditional context-extension record with source anchors
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: The ontology can support these nodes, but whether they are relevant depends on source content and
        study genre.
      source_anchors: []
  - domain_id: input_knowledge
    domain_label: Input Knowledge
    domain_description: Competency questions for rigor grounding, kernel theory, prior artifacts, practitioner knowledge,
      and separation of input knowledge from generated design knowledge.
    competency_questions:
    - question_id: CQ-IK-001
      priority: core
      natural_language_question: Does the study identify the input knowledge used to ground artifact design and evaluation?
      required_classes:
      - input_knowledge
      - kernel_theory
      - descriptive_knowledge
      - prior_artifact
      required_properties:
      - has_input_knowledge
      - uses_kernel_theory
      - uses_prior_artifact
      - grounded_in_input_knowledge
      required_controlled_values: []
      expected_answer_type: set of input-knowledge nodes grouped by type
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: Presence of input knowledge and grounding edges can be tested directly with SHACL.
      source_anchors:
      - vr_solution_grounding_required
    - question_id: CQ-IK-002
      priority: recommended
      natural_language_question: Which solution alternatives, prior artifacts, theories, or methods were considered, selected,
        adapted, or rejected?
      required_classes:
      - solution_alternative
      - prior_artifact
      - kernel_theory
      - design_rationale
      required_properties:
      - uses_prior_artifact
      - uses_kernel_theory
      - has_design_rationale
      - rationale_text
      required_controlled_values:
      - vocabulary: evidence_mode_vocabulary
        values:
        - literature_synthesis
        - conceptual_argument
        - expert
        - repository_trace
      expected_answer_type: ranked or annotated list of solution alternatives with rationale
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Ontology can retrieve alternatives and rationales; evaluating whether grounding is sufficient requires
        expert judgment.
      source_anchors:
      - vr_solution_grounding_required
    - question_id: CQ-IK-003
      priority: advanced
      natural_language_question: Is input knowledge kept distinct from generated design knowledge and output knowledge throughout
        the trace?
      required_classes:
      - input_knowledge
      - design_knowledge
      - output_knowledge
      required_properties:
      - has_input_knowledge
      - produces_design_knowledge
      - produces_output_knowledge
      required_controlled_values: []
      expected_answer_type: boolean plus any suspicious sameAs/duplicate-node conflicts
      shacl_validation_direct: true
      sparql_query_support_needed: true
      human_judgment_required: false
      validation_notes: Direct SHACL can enforce class disjointness or non-equality where represented; SPARQL is useful to
        find reused identifiers and conflated nodes.
      source_anchors:
      - vr_design_knowledge_distinct_from_input_knowledge
    - question_id: CQ-IK-004
      priority: source-dependent
      natural_language_question: When practitioner knowledge, local know-how, or domain expertise is used as input knowledge,
        is it represented with stakeholder provenance and confidence notes?
      required_classes:
      - practitioner_knowledge
      - stakeholder
      - stakeholder_evidence
      - input_knowledge
      required_properties:
      - has_input_knowledge
      - has_stakeholder
      - source_anchor_id
      - confidence_percent
      required_controlled_values:
      - vocabulary: evidence_mode_vocabulary
        values:
        - expert
        - field
        - case
      - vocabulary: ambiguity_level_vocabulary
        values:
        - low
        - medium
        - high
      expected_answer_type: provenance-qualified practitioner-knowledge record
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Practitioner knowledge is not always present; when present, provenance and confidence should be queryable
        and reviewed.
      source_anchors: []
  - domain_id: objectives_and_requirements
    domain_label: Objectives and Requirements
    domain_description: Competency questions for objectives, requirements, acceptance criteria, traceability, and design-decision
      alignment.
    competency_questions:
    - question_id: CQ-OR-001
      priority: core
      natural_language_question: Does the study translate the problem into objectives, requirements, and acceptance criteria
        that can be evaluated?
      required_classes:
      - objective
      - requirement
      - acceptance_criterion
      - problem
      required_properties:
      - has_objective
      - has_requirement
      - derived_from_problem
      - objective_text
      - requirement_text
      - acceptance_threshold
      required_controlled_values: []
      expected_answer_type: boolean plus objective-requirement-acceptance table
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: Cardinality and datatype presence can be tested with SHACL.
      source_anchors:
      - vr_requirements_trace_to_problem
    - question_id: CQ-OR-002
      priority: recommended
      natural_language_question: Are requirements explicitly traced to the problem, context, and relevant input knowledge
        rather than appearing as unsupported design wishes?
      required_classes:
      - requirement
      - problem
      - context
      - input_knowledge
      required_properties:
      - derived_from_problem
      - has_context
      - grounded_in_input_knowledge
      - has_requirement
      required_controlled_values:
      - vocabulary: traceability_edge_vocabulary
        values:
        - problem_to_requirement
        - concept_to_schema_field
      expected_answer_type: requirement trace matrix
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Graph completeness can be queried; semantic adequacy of the trace remains a review question.
      source_anchors:
      - vr_requirements_trace_to_problem
    - question_id: CQ-OR-003
      priority: advanced
      natural_language_question: Which design decisions satisfy which requirements, and which evaluation criteria later test
        those decisions?
      required_classes:
      - requirement
      - design_decision
      - evaluation_criterion
      - requirements_design_evaluation_trace
      required_properties:
      - has_design_decision
      - satisfies_requirement
      - uses_evaluation_criterion
      required_controlled_values:
      - vocabulary: traceability_edge_vocabulary
        values:
        - requirement_to_design_decision
        - design_decision_to_evaluation
      expected_answer_type: multi-hop trace from requirement to design decision to evaluation criterion
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Requires multi-hop SPARQL and review of whether the evaluation criterion actually tests the requirement.
      source_anchors:
      - vr_design_decisions_trace_to_requirements
    - question_id: CQ-OR-004
      priority: source-dependent
      natural_language_question: When the source distinguishes meta-requirements, design requirements, evaluation requirements,
        or acceptance thresholds, are those requirement subtypes preserved?
      required_classes:
      - requirement
      - acceptance_criterion
      - evaluation_criterion
      required_properties:
      - requirement_text
      - acceptance_threshold
      - uses_evaluation_criterion
      - source_anchor_id
      required_controlled_values:
      - vocabulary: obligation_status_vocabulary
        values:
        - conditional
        - recommended
        - not_addressed
      expected_answer_type: source-preserving requirement subtype annotation
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: The current inventory supports requirements generally; subtype vocabulary may need local extension
        or SKOS mapping.
      source_anchors: []
  - domain_id: artifact_design_entity
    domain_label: Artifact / Design Entity
    domain_description: Competency questions for artifact centrality, artifact type, artifact universal, design specification,
      and artifact boundary.
    competency_questions:
    - question_id: CQ-ADE-001
      priority: core
      natural_language_question: Does the study identify an artifact universal or design entity, and is its artifact type
        controlled?
      required_classes:
      - design_entity
      - artifact_universal
      - artifact_space
      required_properties:
      - has_design_entity
      - has_artifact_universal
      - artifact_name
      - artifact_boundary
      required_controlled_values:
      - vocabulary: artifact_type_vocabulary
        values:
        - construct
        - model
        - method
        - instantiation_class
        - artifact_instantiation
        - design_principle
        - design_pattern
        - design_theory
        - framework
        - taxonomy
        - ontology
        - architecture
        - socio_technical_intervention
        - process_artifact
      expected_answer_type: artifact record with controlled artifact type and boundary statement
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: The ontology should directly validate the presence of an artifact/design entity and controlled artifact
        type.
      source_anchors:
      - vr_artifact_universal_required
    - question_id: CQ-ADE-002
      priority: recommended
      natural_language_question: Does the artifact/design entity include a make plan, use plan, and capacity specification?
      required_classes:
      - artifact_universal
      - make_plan
      - use_plan
      - capacity_specification
      required_properties:
      - has_make_plan
      - has_use_plan
      - has_capacity_specification
      - make_goal
      - use_goal
      - capacity_statement
      required_controlled_values: []
      expected_answer_type: artifact specification completeness report
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: The inventory treats make/use/capacity specification as validation-ready, although severity may be
        profiled by genre.
      source_anchors:
      - vr_artifact_spec_requires_make_use_capacity
      - sc_artifact_universal_requirement_strength
    - question_id: CQ-ADE-003
      priority: advanced
      natural_language_question: Is the artifact universal distinct from its instantiations, technical objects, and output
        knowledge?
      required_classes:
      - artifact_universal
      - artifact_instantiation
      - design_entity
      - output_knowledge
      required_properties:
      - has_artifact_instantiation
      - instantiates_artifact_universal
      - produces_output_knowledge
      required_controlled_values: []
      expected_answer_type: boolean plus conflict report for conflated artifact/output/instantiation nodes
      shacl_validation_direct: true
      sparql_query_support_needed: true
      human_judgment_required: false
      validation_notes: Direct SHACL can enforce non-equality; SPARQL helps detect same labels, reused identifiers, or missing
        instantiation links.
      source_anchors:
      - vr_artifact_universal_not_same_as_instantiation
      - ap_conflated_artifact_and_output_knowledge
    - question_id: CQ-ADE-004
      priority: source-dependent
      natural_language_question: When the artifact depends on an artifact network, lifecycle, maintenance plan, or socio-technical
        arrangement, are those dependencies represented as part of the artifact boundary?
      required_classes:
      - artifact_network
      - boundary_condition
      - socio_technical_intervention
      - context
      required_properties:
      - has_boundary_condition
      - artifact_boundary
      - maintenance_boundary
      - context_description
      required_controlled_values:
      - vocabulary: artifact_type_vocabulary
        values:
        - socio_technical_intervention
        - architecture
        - process_artifact
      - vocabulary: obligation_status_vocabulary
        values:
        - conditional
        - recommended
      expected_answer_type: artifact dependency and maintenance-boundary record
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Conditional on artifact type and source claims; needs review to avoid over-scoping the artifact.
      source_anchors:
      - ap_artifact_maintenance_neglect
  - domain_id: instantiation
    domain_label: Instantiation
    domain_description: Competency questions for prototypes, implementations, versions, concrete use settings, and instantiation-to-universal
      links.
    competency_questions:
    - question_id: CQ-IN-001
      priority: core
      natural_language_question: If an implementation, prototype, or proof-of-concept is reported, is it linked to the artifact
        universal or design entity it instantiates?
      required_classes:
      - artifact_instantiation
      - artifact_universal
      - design_entity
      required_properties:
      - has_artifact_instantiation
      - instantiates_artifact_universal
      - has_design_entity
      required_controlled_values:
      - vocabulary: artifact_type_vocabulary
        values:
        - artifact_instantiation
        - instantiation_class
      expected_answer_type: boolean plus instantiation-to-universal link set
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: Conditional cardinality and link validation can be handled directly when an instantiation node exists.
      source_anchors:
      - vr_artifact_universal_not_same_as_instantiation
    - question_id: CQ-IN-002
      priority: recommended
      natural_language_question: Does each instantiation record include version, implementation boundary, and use context
        sufficient for interpretation?
      required_classes:
      - artifact_instantiation
      - context
      - boundary_condition
      required_properties:
      - artifact_version
      - artifact_boundary
      - has_context
      - has_boundary_condition
      required_controlled_values: []
      expected_answer_type: instantiation metadata completeness report
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: true
      validation_notes: SHACL can test metadata presence; sufficiency of implementation detail is a human judgment.
      source_anchors: []
    - question_id: CQ-IN-003
      priority: advanced
      natural_language_question: Which stated capacities of the instantiation support make claims, use claims, or usage-effect
        claims?
      required_classes:
      - artifact_instantiation
      - capacity_specification
      - make_claim
      - use_claim
      - usage_effect_claim
      required_properties:
      - has_capacity_specification
      - supports_claim
      - capacity_statement
      required_controlled_values:
      - vocabulary: claim_type_vocabulary
        values:
        - make_claim
        - use_claim
        - usage_effect_claim
      expected_answer_type: capacity-to-claim support graph
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Graph query can link capacities to claims; reviewers must assess whether capacities plausibly support
        claimed effects.
      source_anchors:
      - vr_make_claim_requires_build_trace
      - vr_use_claim_requires_use_plan_and_conditions
    - question_id: CQ-IN-004
      priority: source-dependent
      natural_language_question: When a source labels the instantiation as prototype, proof of concept, proof of value, pilot,
        field implementation, or local technical object, is that label retained with provenance?
      required_classes:
      - artifact_instantiation
      - demonstration
      - evaluation_evidence
      required_properties:
      - source_anchor_id
      - artifact_boundary
      - supports_claim
      required_controlled_values:
      - vocabulary: evidence_mode_vocabulary
        values:
        - proof
        - field
        - case
        - build_evaluate
        - repository_trace
      - vocabulary: obligation_status_vocabulary
        values:
        - conditional
      expected_answer_type: source-preserving instantiation label with evidence mode
      shacl_validation_direct: false
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: The controlled inventory does not force one prototype taxonomy, so source terminology should be retained
        and normalized cautiously.
      source_anchors: []
  - domain_id: demonstration
    domain_label: Demonstration
    domain_description: Competency questions for artifact demonstration, use cases, users, scenarios, and demonstration-to-evaluation
      traceability.
    competency_questions:
    - question_id: CQ-DEM-001
      priority: core
      natural_language_question: Does the study demonstrate the artifact/design entity in at least one use case, scenario,
        prototype, or implementation context?
      required_classes:
      - demonstration
      - use_case
      - design_entity
      - artifact_instantiation
      required_properties:
      - demonstrates_artifact
      - has_use_case
      - has_artifact_instantiation
      required_controlled_values: []
      expected_answer_type: boolean plus demonstration/use-case node set
      shacl_validation_direct: true
      sparql_query_support_needed: false
      human_judgment_required: false
      validation_notes: Demonstration and use-case presence can be tested with cardinality constraints.
      source_anchors: []
    - question_id: CQ-DEM-002
      priority: recommended
      natural_language_question: Who participated in or was represented by the demonstration, and what context or task was
        demonstrated?
      required_classes:
      - demonstration
      - stakeholder
      - context
      - use_case
      required_properties:
      - has_stakeholder
      - has_context
      - has_use_case
      - context_description
      required_controlled_values:
      - vocabulary: audience_vocabulary
        values:
        - user
        - practitioner
        - manager
        - technical_implementer
        - sponsor
      expected_answer_type: demonstration participant-context-task table
      shacl_validation_direct: true
      sparql_query_support_needed: true
      human_judgment_required: true
      validation_notes: Controlled stakeholder/audience values can be validated; adequacy of participant representation requires
        judgment.
      source_anchors: []
    - question_id: CQ-DEM-003
      priority: advanced
      natural_language_question: Which claims are supported by demonstration evidence, and which still require separate evaluation
        evidence?
      required_classes:
      - demonstration
      - evaluation_evidence
      - make_claim
