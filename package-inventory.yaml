    role: repository_architecture_and_quality_gate_basis
    evidence_status: mapped_to_uploaded_specification
  - source_id: dsr_framework_generation_prompt
    role: generation_procedure_and_output_convention_basis
    evidence_status: mapped_to_uploaded_prompt
  - source_id: dsr_framework_selection_table
    role: selected_file_registry_basis
    evidence_status: mapped_to_uploaded_selection_table
  - source_id: dsr_extraction_corpus
