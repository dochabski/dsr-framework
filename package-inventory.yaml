    - specs/product-dsr-automation-and-validation-model.yaml
    - records/reviews/record-literature-alignment-0001.yaml
    - crosswalks/source-to-framework-alignment.yaml
  inventory_scope:
    included:
    - required root files
    - controlled product specifications
    - models
    - vocabularies
    - schemas
    - templates
    - checklists
    - human-facing protocol documentation
    - records
    - crosswalks
    - examples
    - GitHub automation and issue-template directories when introduced
    excluded:
    - temporary working files
    - local editor configuration
    - generated site build artifacts
    - private notes not intended for repository release
    - large source PDFs unless explicitly added to records or evidence packages
  conformance_level_meanings:
  - level: l1_documented
    meaning: File is named, scoped, and assigned a purpose and validation responsibility.
  - level: l2_reviewable
    meaning: File has enough structure, traceability, and criteria for independent review.
  - level: l3_exercisable
    meaning: File can be exercised by validation tooling, templates, examples, or workflow checks.
  - level: l4_reusable
    meaning: File is stable enough for reuse across projects with minimal adaptation.
  - level: l5_archival_publication_ready
    meaning: File is release-ready for archival citation, DOI registration, or publication workflow.
