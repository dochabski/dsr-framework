  validation_profiles:
  - validation_profile_id: vp_yaml_controlled_file
    applies_to: General controlled YAML files.
    primary_responsible_role: framework_maintainer
    required_checks:
    - YAML parses without duplicate-key warnings where tooling supports detection.
    - Top-level metadata includes stable ID, title, purpose, status, version, owner or responsible role, source_basis, related_items,
      and change_history where applicable.
    - Traceability entries use stable trace IDs and evidence_status when evidence is not mapped.
  - validation_profile_id: vp_controlled_record
    applies_to: Root records and records/ retained evidence files.
    primary_responsible_role: records_steward
    required_checks:
    - Record includes record_id, record_class, event_or_action, date, responsible_party, evidence, outcome, related_items,
      and retention_rule where applicable.
    - Record does not state future intentions as completed outcomes unless record_class is explicitly a plan.
    - Evidence and outcome are distinguishable.
  - validation_profile_id: vp_product_specification
    applies_to: specs/product-*.yaml files.
    primary_responsible_role: product_spec_owner
    required_checks:
    - Contains identity_and_purpose, conceptual_model, normative_requirements, information_items, workflow, quality_and_conformance,
      traceability, implementation_guidance, template_or_schema_implications, and open_questions_and_backlog unless explicitly
      tailored.
    - Normative statements are testable and use must, should, may, or must_not.
    - Downstream templates, schemas, checklists, and docs are listed or marked not_yet_mapped.
  - validation_profile_id: vp_model
    applies_to: models/*.yaml files.
    primary_responsible_role: model_owner
    required_checks:
    - Defines controlled entities, relationships, boundary conditions, validation implications, and traceability.
    - Separates conceptual constructs from operational records and templates.
    - Does not contradict vocabularies or upstream specifications.
  - validation_profile_id: vp_vocabulary
    applies_to: vocabularies/*.yaml files.
    primary_responsible_role: vocabulary_steward
    required_checks:
    - Each entry has id, label, definition, allowed_use, boundary_notes, related_terms, and source_basis where useful.
    - Controlled IDs use lower_snake_case.
    - Boundary notes distinguish near-synonyms and disallowed uses.
  - validation_profile_id: vp_json_schema
    applies_to: schemas/*.schema.json and JSON metadata files.
    primary_responsible_role: schema_maintainer
    required_checks:
    - Schema includes $schema, $id, title, type, required, properties, and additionalProperties settings.
    - Schema validates the corresponding YAML/JSON information item.
    - Enumerations align with controlled vocabularies where stable.
  - validation_profile_id: vp_template
    applies_to: templates/* files.
    primary_responsible_role: template_owner
    required_checks:
    - Template is directly usable by a researcher.
    - TODO placeholders are limited to project-specific facts and explain needed input.
    - Template maps to schema, checklist, or model where applicable.
  - validation_profile_id: vp_checklist
    applies_to: checklists/*.yaml files.
    primary_responsible_role: review_workflow_owner
    required_checks:
    - Each checklist item has check_id, question, evidence_required, pass_condition, fail_condition, and remediation_guidance.
    - Checklist items are evidence-based and reviewable.
    - Checklist maps to quality gates or product requirements.
  - validation_profile_id: vp_markdown_documentation
    applies_to: README.md and docs/protocol/*.md.
    primary_responsible_role: documentation_maintainer
    required_checks:
    - Human-facing documentation identifies controlled source YAML or related files.
    - Markdown does not become the sole source of controlled data.
    - Links to files, examples, records, and templates are valid or marked not_yet_mapped.
  - validation_profile_id: vp_root_governance
    applies_to: LICENSE, CONTRIBUTING.md, GOVERNANCE.md, SECURITY.md, CODE_OF_CONDUCT.md.
    primary_responsible_role: repository_governance_owner
    required_checks:
    - Root governance file exists at declared path.
    - Content is consistent with repository license, contribution process, and community expectations.
    - No governance policy conflicts with conformance declaration or release process.
  - validation_profile_id: vp_release_metadata
    applies_to: CITATION.cff, .zenodo.json, CHANGELOG.md, and release records.
    primary_responsible_role: release_manager
    required_checks:
    - Citation, archival, and changelog metadata are synchronized at release time.
    - DOI, version, release date, and author metadata are either populated or marked TODO before archival release.
    - Release readiness checklist is completed before L5 claims.
