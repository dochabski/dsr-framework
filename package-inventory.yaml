  record_class: package_inventory
  title: DSR Framework Package Inventory
  purpose: Inventory all required, planned, and controlled files in the DSR Framework package and assign validation responsibilities
    for each file class and file entry.
  status: public_draft_release_prepared
  version: 0.1.0
  date: '2026-04-27'
  owner: framework_maintainer
  responsible_party: framework_maintainer
  event_or_action: package_inventory_updated_for_public_draft_release
  conformance_target: l2_reviewable
  inventory_policy:
    scope: root_repository_package
    file_existence_claim: All controlled files listed in file_inventory exist at their declared package paths in the organized
      package copy as of 2026-04-27. This confirms path existence and parse/schema checks where noted; it does not certify
      publication readiness.
    update_rule: Update this inventory whenever a controlled file is added, removed, renamed, superseded, assigned a new validation
      responsibility, or moved between draft/review/release states.
    source_of_truth_rule: Use package-inventory.yaml as the structured package inventory; human-facing documentation may render
      or summarize it but should not override it.
  source_basis:
  - source_id: user_current_request
    role: immediate_task_definition
    selection_id: root_package_inventory
    target_path: package-inventory.yaml
