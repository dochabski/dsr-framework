package_inventory:
  item_id: dsr_framework_package_inventory
  item_type: record
  record_id: package_inventory_root_0001
  record_class: package_inventory
  title: DSR Framework Package Inventory
  purpose: Inventory all required, planned, and controlled files in the DSR Framework package and assign validation responsibilities
    for each file class and file entry.
  status: 1.0.2_stable
  version: 1.0.2
  date: '2026-04-27'
  owner: framework_maintainer
  responsible_party: framework_maintainer
  event_or_action: package_inventory_updated_for_v1_0_2_release
  package_conformance: l4_reusable_stable
  l5_claimed: false
  inventory_policy:
    scope: root_repository_package
    file_existence_claim: All controlled files listed in file_inventory exist at their declared package paths in the organized
      package copy as of 2026-04-27. This confirms path existence and parse/schema checks where noted; it does not certify
      publication readiness.
    update_rule: Update this inventory whenever a controlled file is added, removed, renamed, superseded, assigned a new validation
      responsibility, or moved between draft/review/release states.
    source_of_truth_rule: Use package-inventory.yaml as the structured package inventory; human-facing documentation may render
      or summarize it but should not override it.
    release_progression_rule: The controlled release progression reached 1.0.x_stable for L4 reusable-stable package conformance; L5 archival/publication-ready status remains post-v1 work until preservation closure, registry publication, independent external review, and L5 approval evidence is retained.
  source_basis:
  - source_id: user_current_request
    role: immediate_task_definition
    selection_id: root_package_inventory
    target_path: package-inventory.yaml
  - source_id: dsr_framework_generation_spec
    role: repository_architecture_and_quality_gate_basis
    evidence_status: mapped_to_uploaded_specification
  - source_id: dsr_framework_generation_prompt
    role: generation_procedure_and_output_convention_basis
    evidence_status: mapped_to_uploaded_prompt
  - source_id: dsr_framework_selection_table
    role: selected_file_registry_basis
    evidence_status: mapped_to_uploaded_selection_table
  - source_id: dsr_extraction_corpus
    role: future_dsr_conceptual_evidence_basis_and_repaired_working_corpus_basis
    evidence_status: repaired_working_copy_available
    note: Repaired corpus copies parse with 71 records and should be used for the next literature-alignment pass.
  - source_id: schema_authority_reconciliation
    role: schema_template_record_contract_alignment_basis
    evidence_status: completed_2026-04-27
    note: Schemas were reshaped to validate richer literature-aligned templates and records; template content was corrected
      where the schema caught real placeholder type errors.
  - source_id: evaluator_source_to_framework_alignment_crosswalk
    role: source_to_framework_remediation_crosswalk_and_acceptance_rule
    target_path: crosswalks/source-to-framework-alignment.yaml
    evidence_status: integrated_2026-04-27
    note: Evaluator response accepted the missing-traceability finding and provided the draft crosswalk used for remediation.
  related_items:
    upstream:
    - manifest.yaml
    - artifact-profile.yaml
    - specs/product-dsr-repository-architecture.yaml
    - specs/product-dsr-artifact-package-specification.yaml
    - specs/product-dsr-quality-conformance-and-review-model.yaml
    peer:
    - metadata.yaml
    - conformance-declaration.yaml
    - README.md
    downstream:
    - schemas/package-inventory.schema.json
    - templates/package-inventory-template.yaml
    - checklists/artifact-package-readiness-checklist.yaml
    - specs/product-dsr-automation-and-validation-model.yaml
    - records/reviews/record-literature-alignment-0001.yaml
    - crosswalks/source-to-framework-alignment.yaml
    - crosswalks/claim-to-source-traceability.yaml
    - records/reviews/record-review-claim-traceability-0001-v1-0-0.yaml
    - records/reviews/record-review-schema-hardening-0001-v1-0-0.yaml
  inventory_scope:
    included:
    - required root files
    - controlled product specifications
    - models
    - vocabularies
    - schemas
    - templates
    - checklists
    - human-facing protocol documentation
    - records
    - crosswalks
    - examples
    - artifact packages developed inside this repository before standalone release
    - GitHub automation and issue-template directories when introduced
    excluded:
    - temporary working files
    - local editor configuration
    - generated site build artifacts
    - private notes not intended for repository release
    - large source PDFs unless explicitly added to records or evidence packages
  conformance_level_meanings:
  - level: l1_documented
    meaning: File is named, scoped, and assigned a purpose and validation responsibility.
  - level: l2_reviewable
    meaning: File has enough structure, traceability, and criteria for independent review.
  - level: l3_exercisable
    meaning: File can be exercised by validation tooling, templates, examples, or workflow checks.
  - level: l4_reusable
    meaning: File is stable enough for reuse across projects with minimal adaptation.
  - level: l5_archival_publication_ready
    meaning: File is release-ready for archival citation, DOI registration, or publication workflow.
