  conformance_level_scale:
    - level_id: l0_draft
      label: L0 Draft
      definition: Draft material exists but required package structure, evidence, and reviewability are incomplete.
      minimum_evidence: draft_files_identified
    - level_id: l1_documented
      label: L1 Documented
      definition: Core package identity, metadata, and inventory are present and internally understandable.
