# SPDX-License-Identifier: CC0-1.0
template:
  item_id: template_conformance_declaration
  item_type: template
  title: Conformance Declaration Template
  purpose: >
    Provide a reusable YAML template for declaring a DSR artifact package's
    conformance level, tailoring decisions, evidence basis, validation status,
    quality-gate results, and review responsibilities.
  status: draft
  version: "0.1.0"
  owner: dsr_framework_maintainers
  target_path: templates/conformance-declaration-template.yaml
  target_instance_path: conformance-declaration.yaml
  template_for:
    record_class: conformance_declaration
    item_type: record
    output_format: yaml
    expected_schema: schemas/conformance-declaration.schema.json
    default_conformance_target: l2_reviewable
  source_basis:
    - source_id: user_current_request
      role: immediate_generation_instruction
      evidence_status: mapped_to_current_request
    - source_id: dsr_framework_generation_spec
      role: governing_generation_specification
      evidence_status: mapped_to_project_file
    - source_id: dsr_framework_generation_prompt
      role: generation_procedure_and_output_convention
      evidence_status: mapped_to_project_file
    - source_id: documentation_protocol_repository
      role: governing_repository_model
      evidence_status: not_yet_mapped
    - source_id: dsr_extraction_corpus
      role: scholarly_and_methodological_evidence_base
      evidence_status: not_yet_mapped
  related_items:
    upstream_dependencies:
      - item_id: schema_conformance_declaration
        path: schemas/conformance-declaration.schema.json
        relation: validates_instances_of_this_template
      - item_id: spec_quality_review
        path: specs/product-dsr-quality-conformance-and-review-model.yaml
        relation: defines_quality_gates_and_conformance_logic
      - item_id: spec_artifact_package
        path: specs/product-dsr-artifact-package-specification.yaml
        relation: defines_package_contents_and_conformance_obligations
      - item_id: root_package_inventory
        path: package-inventory.yaml
        relation: supplies_inventory_alignment_evidence
      - item_id: root_artifact_profile
        path: artifact-profile.yaml
        relation: supplies_artifact_identity_and_scope
    downstream_outputs:
      - item_id: root_conformance_declaration
        path: conformance-declaration.yaml
        relation: filled_instance_created_from_this_template
      - item_id: checklist_package_readiness
        path: checklists/artifact-package-readiness-checklist.yaml
        relation: provides_review_evidence
      - item_id: record_self_review
        path: records/reviews/record-review-0001-self-review.yaml
        relation: may_record_review_of_completed_declaration
  usage:
    instructions:
      - Copy the conformance_declaration object into conformance-declaration.yaml.
      - Replace every TODO value with project-specific evidence before review.
      - Keep evidence_status set to not_yet_mapped when evidence is not yet available.
      - Do not claim a higher conformance level unless required files, evidence, and review results support it.
      - Preserve stable IDs when revising an existing declaration; append to change_history rather than overwriting prior history.
    placeholder_policy:
      placeholder_marker: "TODO"
      allowed_when: project_specific_information_is_required
      must_be_resolved_before_release: true
    identifier_policy:
      stable_identifier_style: lower_snake_case
      file_naming_style: lower-kebab-case
    validation_policy:
      primary_schema: schemas/conformance-declaration.schema.json
      minimum_review_target: l2_reviewable
      validation_status_values:
        - not_started
        - pending
        - passed
        - passed_with_warnings
        - failed
        - not_applicable

