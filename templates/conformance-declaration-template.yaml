      minimum_evidence: validation_or_exercise_results_present
    - level_id: l4_reusable
      label: L4 Reusable
      definition: The package has evidence of reusable structure, guidance, constraints, and adaptation support beyond the originating case.
      minimum_evidence: reuse_guidance_and_projectability_evidence_present
    - level_id: l5_archival_publication_ready
