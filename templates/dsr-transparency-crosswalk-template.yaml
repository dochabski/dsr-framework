    evidence_status: mapped
    notes: Template uses the six controlled transparency dimension IDs.
  - trace_id: trace_template_hevner_2024
    source: hevner_et_al_2024_transparency_in_design_science_research
    target: templates/dsr-transparency-crosswalk-template.yaml
    relationship: derived_from
    evidence_status: mapped
    notes: Template operationalizes the six-part DSR transparency framework for reusable project documentation.
  open_questions:
