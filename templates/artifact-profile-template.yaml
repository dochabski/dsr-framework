# SPDX-License-Identifier: CC0-1.0
artifact_profile:
  item_id: project_specific_placeholder_artifact_profile_id
  item_type: artifact_profile
  title: "project_specific_placeholder: Artifact Profile Title"
  purpose: >
    project_specific_placeholder: Identify the DSR artifact, its type, scope, intended use, claims,
    conformance target, source basis, reuse constraints, and review status.
  status: draft
  version: "0.1.0"
  owner:
    role: project_specific_placeholder_owner_role
    name: project_specific_placeholder_owner_name_or_group
    contact: project_specific_placeholder_owner_contact_or_null

  profile_control:
    template_id: artifact_profile_template
    target_path: artifact-profile.yaml
    target_schema: schemas/artifact-profile.schema.json
    conformance_target: l2_reviewable
    last_reviewed: null
    review_status: not_yet_reviewed
    instructions:
      - Replace every project_specific_placeholder value before release.
      - Preserve stable identifiers once external citations or records refer to them.
      - Keep artifact utility claims, artifact quality claims, and knowledge contribution claims separate.
      - Link evidence records rather than embedding long evaluation narratives in this profile.
      - Mark evidence_status as accepted_v1_limitation when a claim is not yet supported by a retained record.

  artifact_identity:
    artifact_id: project_specific_placeholder_artifact_id
    artifact_slug: project_specific_placeholder_lower_kebab_artifact_slug
    artifact_name: "project_specific_placeholder: Artifact Name"
    short_name: project_specific_placeholder_short_name_or_null
    artifact_version: "0.1.0"
    artifact_status: draft
    artifact_package_class:
      primary: project_specific_placeholder_primary_package_class
      secondary: []
    artifact_type:
      primary: project_specific_placeholder_primary_artifact_type
      secondary: []
      vocabulary_reference: vocabularies/artifact-types.yaml
    artifact_materiality: project_specific_placeholder_conceptual_computational_textual_or_mixed
    repository_location: project_specific_placeholder_repository_path_or_url
    persistent_identifier:
      doi: null
      ark: null
      uri: null
      local_identifier: project_specific_placeholder_local_identifier

  artifact_summary:
    plain_language_summary: >
      project_specific_placeholder: Summarize what the artifact is, who it serves, and what problem it helps address.
    technical_summary: >
      project_specific_placeholder: Summarize the artifact as a DSR output, including its model, method, taxonomy,
      template, schema, system, or package structure.
    primary_users:
      - user_role: project_specific_placeholder_researcher_reviewer_practitioner_or_other
        use_context: project_specific_placeholder_use_context
        expected_benefit: project_specific_placeholder_expected_benefit
    intended_use_cases:
      - use_case_id: project_specific_placeholder_use_case_001
        title: project_specific_placeholder_use_case_title
        description: project_specific_placeholder_use_case_description
        actor_roles: []
        expected_inputs: []
        expected_outputs: []
    non_goals:
      - project_specific_placeholder: State what this artifact is not intended to do.

  problem_space:
    problem_class: project_specific_placeholder_problem_class
    focal_problem: >
      project_specific_placeholder: Describe the practical, scholarly, methodological, or socio-technical problem
      the artifact addresses.
    problem_context:
      domain: project_specific_placeholder_domain
      organizational_setting: project_specific_placeholder_setting_or_null
      geographic_or_regulatory_context: project_specific_placeholder_context_or_null
      technical_context: project_specific_placeholder_context_or_null
      social_or_cultural_context: project_specific_placeholder_context_or_null
    affected_stakeholders:
      - stakeholder_id: project_specific_placeholder_stakeholder_001
        stakeholder_role: project_specific_placeholder_role
        need_or_interest: project_specific_placeholder_need_or_interest
        involvement_stage:
          - problem_identification
    problem_boundary:
      in_scope:
        - project_specific_placeholder_scope_item
      out_of_scope:
        - project_specific_placeholder_scope_exclusion
      assumptions:
        - project_specific_placeholder_problem_assumption
      constraints:
        - project_specific_placeholder_problem_constraint

  solution_space:
    solution_objectives:
      - objective_id: project_specific_placeholder_objective_001
        statement: project_specific_placeholder_objective_statement
        objective_type: project_specific_placeholder_functional_quality_documentation_evaluation_or_normative
        priority: should
        success_indicator: project_specific_placeholder_success_indicator
        trace_to_problem: project_specific_placeholder_problem_trace_id
    grounding_sources:
      - source_id: project_specific_placeholder_source_id_or_accepted_v1_limitation
        source_type: project_specific_placeholder_dsr_corpus_protocol_standard_or_local_record
        citation_or_path: project_specific_placeholder_citation_or_path
        evidence_role: project_specific_placeholder_theory_grounding_requirement_source_or_precedent
        evidence_status: accepted_v1_limitation
    alternatives_considered:
      - alternative_id: project_specific_placeholder_alternative_001
        alternative: project_specific_placeholder_alternative_description
        disposition: project_specific_placeholder_selected_rejected_deferred_or_not_applicable
        rationale: project_specific_placeholder_rationale

  artifact_boundary_and_components:
    artifact_boundary_statement: >
      project_specific_placeholder: State what belongs to the artifact, what belongs to surrounding context,
      and what evidence is needed to distinguish the two.
    abstraction_level: project_specific_placeholder_instance_type_framework_model_method_schema_template_package_or_mixed
    artifact_universal_or_instance:
      classification: project_specific_placeholder_artifact_universal_artifact_instance_or_mixed
      rationale: >
        project_specific_placeholder: Explain whether the profile describes a reusable artifact type, a concrete
        artifact instance, or both.
    components:
      - component_id: project_specific_placeholder_component_001
        component_name: project_specific_placeholder_component_name
        component_type: project_specific_placeholder_component_type
        component_function: project_specific_placeholder_component_function
        required: true
        source_path: project_specific_placeholder_component_path_or_null
        depends_on: []
    interfaces:
      - interface_id: project_specific_placeholder_interface_001
        interface_type: project_specific_placeholder_human_machine_file_api_process_or_repository
        description: project_specific_placeholder_interface_description
        inputs: []
        outputs: []
    dependencies:
      internal:
        - dependency_id: project_specific_placeholder_internal_dependency
          path: project_specific_placeholder_internal_path
          dependency_role: project_specific_placeholder_schema_template_model_vocabulary_or_record
      external: []

  dsr_positioning:
    dsr_genre: project_specific_placeholder_genre_reference
    lifecycle_stage:
      current_stage: project_specific_placeholder_problem_objectives_design_development_demonstration_evaluation_communication_release
      stage_vocabulary_reference: vocabularies/lifecycle-stages.yaml
      stage_evidence_status: accepted_v1_limitation
    knowledge_contribution:
      contribution_type: project_specific_placeholder_contribution_type
      contribution_vocabulary_reference: vocabularies/contribution-types.yaml
      knowledge_goals:
        - project_specific_placeholder_definitional_descriptive_explanatory_predictive_prescriptive_methodological_or_evaluative
      knowledge_scopes:
        - project_specific_placeholder_idiographic_nomothetic_projectable_mixed_or_other
      contribution_summary: >
        project_specific_placeholder: Describe what knowledge the artifact is expected to contribute.
      contribution_boundary: >
        project_specific_placeholder: State what the artifact does not yet prove, generalize, or validate.
    novelty_profile:
      novelty_claim: project_specific_placeholder_novelty_claim
      routine_design_risk: project_specific_placeholder_low_moderate_high_or_unknown
      prior_artifact_relationship: project_specific_placeholder_new_extension_adaptation_synthesis_replication_or_other
      evidence_status: accepted_v1_limitation

  claims:
    utility_claims:
      - claim_id: utility_claim_001
        claim: >
          project_specific_placeholder: State a claim about usefulness, fitness for intended use, or practical problem solving.
        intended_beneficiaries: []
        evidence_required:
          - demonstration_record
          - evaluation_report
        current_evidence:
          - evidence_id: project_specific_placeholder_evidence_id_or_null
            evidence_type: project_specific_placeholder_demonstration_evaluation_test_review_or_argument
            evidence_status: accepted_v1_limitation
            related_item: project_specific_placeholder_related_record_or_null
        limitations:
          - project_specific_placeholder_utility_limitation
    quality_claims:
      - claim_id: quality_claim_001
        claim: >
          project_specific_placeholder: State a claim about internal quality, completeness, consistency, validation,
          usability, maintainability, or conformance.
        quality_dimension: project_specific_placeholder_dimension
        evidence_required:
          - schema_validation
          - review_record
        current_evidence:
          - evidence_id: project_specific_placeholder_evidence_id_or_null
            evidence_type: project_specific_placeholder_validation_review_test_or_argument
            evidence_status: accepted_v1_limitation
            related_item: project_specific_placeholder_related_record_or_null
        limitations:
          - project_specific_placeholder_quality_limitation
    knowledge_claims:
      - claim_id: knowledge_claim_001
        claim: >
          project_specific_placeholder: State a claim about contribution to design knowledge, method knowledge,
          theory, taxonomy, model, or reusable artifact practice.
        knowledge_goal: project_specific_placeholder_knowledge_goal
        knowledge_scope: project_specific_placeholder_knowledge_scope
        evidence_required:
          - source_basis
          - contribution_positioning_record
          - evaluation_or_review_record
        current_evidence:
          - evidence_id: project_specific_placeholder_evidence_id_or_null
            evidence_type: project_specific_placeholder_source_basis_conceptual_argument_empirical_evaluation_or_review
            evidence_status: accepted_v1_limitation
            related_item: project_specific_placeholder_related_record_or_null
        limitations:
          - project_specific_placeholder_knowledge_claim_limitation

  demonstration_and_evaluation:
    demonstration:
      demonstration_status: project_specific_placeholder_not_started_planned_in_progress_completed_or_not_applicable
      demonstration_purpose: project_specific_placeholder_demonstration_purpose
      demonstration_records: []
      distinction_from_evaluation: >
        Demonstration shows that the artifact can be used in a relevant scenario; evaluation
        judges how well the artifact satisfies criteria or supports claims.
    evaluation:
      evaluation_status: project_specific_placeholder_not_started_planned_in_progress_completed_or_not_applicable
      evaluation_plan: project_specific_placeholder_records_evaluations_record_evaluation_plan_or_null
      evaluation_reports: []
      evaluation_methods: []
      evaluation_criteria:
        - criterion_id: project_specific_placeholder_criterion_001
          criterion: project_specific_placeholder_criterion
          operational_definition: project_specific_placeholder_operational_definition
          pass_condition: project_specific_placeholder_pass_condition
          related_claims: []
      evidence_gaps:
        - gap_id: project_specific_placeholder_gap_001
          gap: project_specific_placeholder_evidence_gap
          impact_on_claims: project_specific_placeholder_impact
          planned_resolution: project_specific_placeholder_resolution_or_null

  transparency_profile:
    process_transparency:
      status: project_specific_placeholder_not_started_partial_sufficient_or_not_applicable
      evidence_items: []
      notes: project_specific_placeholder_process_transparency_notes
    problem_space_transparency:
      status: project_specific_placeholder_not_started_partial_sufficient_or_not_applicable
      evidence_items: []
      notes: project_specific_placeholder_problem_space_notes
    solution_space_transparency:
      status: project_specific_placeholder_not_started_partial_sufficient_or_not_applicable
      evidence_items: []
      notes: project_specific_placeholder_solution_space_notes
    build_transparency:
      status: project_specific_placeholder_not_started_partial_sufficient_or_not_applicable
      evidence_items: []
      notes: project_specific_placeholder_build_transparency_notes
    evaluation_transparency:
      status: project_specific_placeholder_not_started_partial_sufficient_or_not_applicable
      evidence_items: []
      notes: project_specific_placeholder_evaluation_transparency_notes
    contribution_transparency:
      status: project_specific_placeholder_not_started_partial_sufficient_or_not_applicable
      evidence_items: []
      notes: project_specific_placeholder_contribution_transparency_notes
    transparency_crosswalk: project_specific_placeholder_records_dsr_transparency_crosswalk_or_null

  validity_reliability_replication_projectability:
    validity:
      validity_status: project_specific_placeholder_not_assessed_partial_sufficient_or_not_applicable
      validity_types_addressed: []
      validity_threats:
        - threat_id: project_specific_placeholder_validity_threat_001
          threat: project_specific_placeholder_threat
          affected_claims: []
          mitigation: project_specific_placeholder_mitigation
          evidence_status: accepted_v1_limitation
    reliability:
      reliability_status: project_specific_placeholder_not_assessed_partial_sufficient_or_not_applicable
      reliability_targets_addressed: []
      reliability_evidence: []
      repeatability_notes: project_specific_placeholder_repeatability_notes
    replication:
      replication_status: project_specific_placeholder_not_addressed_planned_supported_or_not_applicable
      replication_type: project_specific_placeholder_exact_conceptual_differentiated_adaptation_or_not_applicable
      replication_materials: []
      constraints: []
    projectability:
      projectability_status: project_specific_placeholder_not_addressed_partial_supported_or_not_applicable
      intended_transfer_contexts: []
      boundary_conditions:
        - project_specific_placeholder_boundary_condition
      adaptation_guidance: project_specific_placeholder_adaptation_guidance
      evidence_status: accepted_v1_limitation

  responsible_design_and_risk:
    responsible_design_relevance: project_specific_placeholder_applicable_not_applicable_or_unknown
    values_addressed: []
    affected_stakeholders: []
    risks:
      - risk_id: project_specific_placeholder_risk_001
        risk: project_specific_placeholder_risk_description
        risk_type: project_specific_placeholder_ethics_privacy_security_accessibility_equity_safety_maintenance_or_other
        likelihood: unknown
        severity: unknown
        mitigation: project_specific_placeholder_mitigation
        owner: project_specific_placeholder_risk_owner
    accessibility_considerations:
      - project_specific_placeholder_accessibility_consideration
    security_privacy_considerations:
      - project_specific_placeholder_security_or_privacy_consideration

  reuse_and_governance:
    license:
      license_id: CC0-1.0
      license_file: LICENSE
      license_notes: project_specific_placeholder_license_notes_or_null
    citation:
      preferred_citation: project_specific_placeholder_preferred_citation
      citation_file: CITATION.cff
      identifier_status: project_specific_placeholder_no_doi_doi_pending_doi_assigned_or_other
    reuse_permissions:
      allowed_reuse:
        - cite
        - adapt
        - redistribute
      reuse_constraints:
        - project_specific_placeholder_reuse_constraint_or_none
      attribution_expectations:
        - project_specific_placeholder_attribution_expectation
    maintenance:
      maintainer_role: project_specific_placeholder_maintainer_role
      update_frequency: project_specific_placeholder_as_needed_periodic_or_release_based
      deprecation_policy: project_specific_placeholder_deprecation_policy
      preservation_plan: project_specific_placeholder_preservation_plan_or_null
    governance:
      decision_authority: project_specific_placeholder_role_or_group
      review_authority: project_specific_placeholder_role_or_group
      approval_authority: project_specific_placeholder_role_or_group

  conformance:
    declared_conformance_level: l2_reviewable
    conformance_declaration: conformance-declaration.yaml
    tailoring:
      tailoring_used: false
      tailoring_records: []
      tailoring_rationale: null
    validation:
      schema: schemas/artifact-profile.schema.json
      validation_status: not_yet_validated
      validation_date: null
      validation_tool: project_specific_placeholder_validation_tool_or_null
      validation_notes: project_specific_placeholder_validation_notes
    quality_gate_status:
      consistency: not_reviewed
      coherence: not_reviewed
      cogency: not_reviewed
      correspondence: not_reviewed
      dsr_transparency: not_reviewed
      reviewability: not_reviewed
    acceptance_criteria:
      - criterion_id: artifact_profile_ac_001
        criterion: Profile identifies artifact identity, type, scope, status, owner, and version.
        evidence_required:
          - artifact_identity
          - owner
          - version
        pass_condition: All required identity fields are complete and contain no unresolved project_specific_placeholder values.
      - criterion_id: artifact_profile_ac_002
        criterion: Profile separates utility, quality, and knowledge contribution claims.
        evidence_required:
          - claims.utility_claims
          - claims.quality_claims
          - claims.knowledge_claims
        pass_condition: Each active claim is classified and linked to evidence or marked accepted_v1_limitation.
      - criterion_id: artifact_profile_ac_003
        criterion: Profile distinguishes demonstration from evaluation.
        evidence_required:
          - demonstration_and_evaluation.demonstration
          - demonstration_and_evaluation.evaluation
        pass_condition: Demonstration status and evaluation status are independently stated.
      - criterion_id: artifact_profile_ac_004
        criterion: Profile identifies transparency, validity, reliability, replication, and projectability status.
        evidence_required:
          - transparency_profile
          - validity_reliability_replication_projectability
        pass_condition: Each status is complete or marked not_applicable with rationale.
      - criterion_id: artifact_profile_ac_005
        criterion: Profile is traceable to related items and source basis.
        evidence_required:
          - related_items
          - source_basis
          - traceability
        pass_condition: Upstream and downstream dependencies are listed with stable identifiers.

  related_items:
    upstream_dependencies:
      - item_id: schemas_artifact_profile_schema
        path: schemas/artifact-profile.schema.json
        relationship: validates_profile
        status: project_specific_placeholder_available_pending_or_not_yet_created
      - item_id: models_dsr_artifact_ontology
        path: models/dsr-artifact-ontology.yaml
        relationship: informs_artifact_type_and_boundary
        status: project_specific_placeholder_available_pending_or_not_yet_created
      - item_id: models_dsr_contribution_model
        path: models/dsr-contribution-model.yaml
        relationship: informs_contribution_positioning
        status: project_specific_placeholder_available_pending_or_not_yet_created
      - item_id: models_dsr_transparency_model
        path: models/dsr-transparency-model.yaml
        relationship: informs_transparency_profile
        status: project_specific_placeholder_available_pending_or_not_yet_created
      - item_id: models_dsr_evaluation_alignment_model
        path: models/dsr-evaluation-alignment-model.yaml
        relationship: informs_evaluation_and_claim_alignment
        status: project_specific_placeholder_available_pending_or_not_yet_created
    downstream_dependents:
      - item_id: root_readme
        path: README.md
        relationship: summarizes_profile
        status: project_specific_placeholder_available_pending_or_not_yet_created
      - item_id: package_inventory
        path: package-inventory.yaml
        relationship: inventories_profile
        status: project_specific_placeholder_available_pending_or_not_yet_created
      - item_id: conformance_declaration
        path: conformance-declaration.yaml
        relationship: declares_profile_conformance
        status: project_specific_placeholder_available_pending_or_not_yet_created

  source_basis:
    - source_id: dsr_framework_generation_spec
      source_type: project_specification
      citation_or_path: dsr-framework-generation-spec.yaml
      evidence_role: governs_repository_structure_conformance_and_quality_gates
      evidence_status: mapped
    - source_id: dsr_framework_generation_prompt
      source_type: generation_prompt
      citation_or_path: dsr-framework-generation-prompt.md
      evidence_role: governs_generation_procedure_and_output_conventions
      evidence_status: mapped
    - source_id: dsr_framework_selection_table
      source_type: selection_registry
      citation_or_path: dsr-framework-selection-table.md
      evidence_role: identifies_selection_id_target_path_format_and_dependency
      evidence_status: mapped
    - source_id: dsr_extraction_corpus
      source_type: evidence_corpus
      citation_or_path: chunked_folder_conversion_extractions_20260427030321_part001.yaml
      evidence_role: supports DSR concepts, source-basis mapping, and evidence anchors
      evidence_status: partially_mapped

  traceability:
    - trace_id: trace_artifact_profile_template_to_schema
      source_item: templates/artifact-profile-template.yaml
      target_item: schemas/artifact-profile.schema.json
      relationship: should_validate_against
      evidence_status: not_yet_validated
    - trace_id: trace_artifact_profile_template_to_package_inventory
      source_item: templates/artifact-profile-template.yaml
      target_item: package-inventory.yaml
      relationship: should_be_listed_in_inventory
      evidence_status: accepted_v1_limitation
    - trace_id: trace_artifact_profile_to_conformance_declaration
      source_item: artifact-profile.yaml
      target_item: conformance-declaration.yaml
      relationship: conformance_claim_should_match
      evidence_status: accepted_v1_limitation

  assumptions:
    - assumption_id: assumption_001
      statement: >
        The instantiated artifact profile will be copied or adapted from this template into
        artifact-profile.yaml or another artifact-specific profile file.
      impact: Template uses project_specific_placeholder placeholders for project-specific details.
    - assumption_id: assumption_002
      statement: >
        Controlled vocabularies may evolve; vocabulary references are included as paths rather
        than repeated as closed enumerations in this template.
      impact: Final validation should be performed after vocabulary files and schema are synchronized.

  limitations:
    - limitation_id: limitation_001
      statement: >
        This template does not by itself establish evidence for artifact utility, quality,
        knowledge contribution, validity, reliability, replication, or projectability.
      mitigation: Link retained records, evaluations, reviews, and source-basis records before release.
    - limitation_id: limitation_002
      statement: >
        This template is designed for L2 reviewability and may require additional automation,
        archival metadata, or release evidence for L3-L5 conformance.
      mitigation: Extend validation, release, preservation, and publication metadata when targeting higher conformance.

  open_questions:
    - question_id: open_question_001
      question: Should the artifact profile schema permit template-specific project_specific_placeholder values or require fully instantiated values only?
      disposition: pending_schema_review
    - question_id: open_question_002
      question: Which controlled vocabularies should be enforced by schema enum versus documentation guidance?
      disposition: pending_vocabulary_stabilization

  change_history:
    - version: "0.1.0"
      date: "2026-04-27"
      change: Initial reusable artifact profile template generated for the DSR Framework package.
      changed_by: GPT-5.5 Thinking
      rationale: >
        Provide a directly usable L2 reviewable artifact profile template aligned with the
        DSR Framework generation specification, selection table, and artifact profile schema dependency.
