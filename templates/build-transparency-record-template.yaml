    transparency_dimension_mapping:
      primary_dimension: build_transparency
      supporting_dimensions:
        - process_transparency
        - solution_space_transparency
        - evaluation_transparency
        - contribution_transparency
      rationale: >
        Build transparency is the primary dimension because the record documents
        artifact creation, construction choices, reasoning, design search, and
        collaboration. Process, solution-space, evaluation, and contribution
        transparency are included only where they directly affect the build record.
