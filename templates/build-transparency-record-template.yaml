template:
  item_id: build_transparency_record_template
  item_type: specification
  title: Build Transparency Record Template
  purpose: >
    Provide a reusable YAML template for documenting how a Design Science Research
    artifact was designed, constructed, revised, and prepared for demonstration or
    evaluation. The template supports build transparency by capturing artifact
    construction choices, design reasoning, creative search, collaboration,
    version changes, evidence, constraints, and boundaries on what can be shared.
  status: draft
  version: "0.1.0"
  owner: "TODO: responsible_role_or_team"
  target_file_path: templates/build-transparency-record-template.yaml
  conformance_target: l2_reviewable
  intended_users:
    - dsr_researcher
    - artifact_designer
    - reviewer
    - repository_maintainer
  related_items:
    upstream_dependencies:
      - item_id: model_transparency
        path: models/dsr-transparency-model.yaml
        relationship: operationalizes_build_transparency_dimension
        evidence_status: not_yet_mapped
      - item_id: vocab_transparency_dimensions
        path: vocabularies/transparency-dimensions.yaml
        relationship: uses_controlled_transparency_dimension_terms
        evidence_status: not_yet_mapped
      - item_id: template_design_rationale
        path: templates/design-rationale-template.md
        relationship: may_supply_or_receive_design_decision_detail
        evidence_status: not_yet_mapped
      - item_id: template_artifact_specification
        path: templates/artifact-specification-template.md
        relationship: supplies_artifact_boundary_components_and_use_logic
        evidence_status: not_yet_mapped
      - item_id: template_evaluation_plan
        path: templates/evaluation-plan-template.yaml
        relationship: receives_build_outputs_for_evaluation_planning
        evidence_status: not_yet_mapped
    downstream_uses:
      - item_id: record_dsr_transparency_crosswalk
        path: records/dsr-transparency/record-dsr-transparency-crosswalk-0001.yaml
        relationship: can_reference_completed_build_transparency_records
        evidence_status: not_yet_mapped
      - item_id: checklist_transparency
        path: checklists/dsr-transparency-crosswalk-checklist.yaml
        relationship: can_review_build_transparency_completeness
        evidence_status: not_yet_mapped
      - item_id: package_inventory
        path: package-inventory.yaml
        relationship: can inventory completed build transparency records as retained evidence
        evidence_status: not_yet_mapped
  source_basis:
    - source_id: dsr_framework_generation_spec
      source_type: project_governance
      evidence_role: repository_structure_and_quality_gate_rules
      evidence_status: mapped
    - source_id: hevner_et_al_2024_transparency_in_design_science_research
      source_type: dsr_corpus_source
      evidence_role: build_transparency_and_six_dimension_transparency_framework
      citation_anchor_ids:
        - CA09
        - CA16
      evidence_status: mapped
    - source_id: dsr_process_journaling_source
      source_type: dsr_corpus_source
      evidence_role: concurrent_documentation_of_design_processing_and_design_theorizing
      citation_anchor_ids:
        - A06
        - A07
        - A08
      evidence_status: mapped_at_source_family_level
    - source_id: documentation_protocol_repository
      source_type: governing_protocol
      evidence_role: repository_and_information_item_conventions
      evidence_status: not_checked_in_this_generation
  change_history:
    - version: "0.1.0"
      date: "2026-04-27"
      change_summary: Initial reusable build transparency record template.
      changed_by: GPT-5.5 Thinking

usage_guidance:
  when_to_use: >
    Use this template whenever a DSR project needs a retained record of how an
    artifact was constructed or revised. Complete one record for the artifact as
    a whole, or one record per major build episode when the build process is long,
    iterative, or materially affects evaluation and contribution claims.
  when_not_to_use: >
    Do not use this template as a substitute for an artifact specification,
    design rationale record, demonstration record, or evaluation report. Link to
    those files instead when the needed detail belongs there.
  completion_level_guidance:
    l0_draft: Capture only identity, artifact version, build summary, and open TODO items.
    l1_documented: Add build inputs, build activities, outputs, and basic evidence links.
    l2_reviewable: Add decision traceability, rationale, constraints, evidence sufficiency checks, and transparency limitations.
    l3_exercisable: Add executable build steps, environment details, test outputs, and reproduction notes where relevant.
    l4_reusable: Add adaptation guidance, reusable components, version compatibility, and maintenance implications.
    l5_archival_publication_ready: Add preservation metadata, immutable artifact identifiers, repository links, and release evidence.
  placeholder_rule: >
    Replace TODO values with project-specific information. If information is not
    available, keep the TODO value and explain the gap under open_questions or
    transparency_limitations.

