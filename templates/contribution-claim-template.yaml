template_metadata:
  item_id: template_contribution_claim
  item_type: specification
  title: DSR Contribution Claim Template
  purpose: >
    Provide a reusable YAML template for declaring, bounding, evidencing, and
    reviewing a Design Science Research contribution claim. The template is
    intended to support contribution transparency, schema validation, and
    reviewer assessment without overclaiming novelty, generality, utility, or
    evaluation strength.
  status: draft
  version: "0.1.0"
  conformance_target: l2_reviewable
  target_path: templates/contribution-claim-template.yaml
  target_schema: schemas/dsr-contribution-claim.schema.json
  owner:
    role: "TODO: name or role responsible for maintaining this contribution claim"
    name: "TODO: responsible person, team, or project role"
  source_basis:
    - source_id: dsr_framework_generation_spec
      source_type: internal_specification
      evidence_status: mapped
      relevance: Governs repository conventions, controlled metadata, traceability, and quality gates.
    - source_id: dsr_framework_generation_prompt
      source_type: internal_generation_prompt
      evidence_status: mapped
      relevance: Governs template-generation procedure and DSR-specific distinctions.
    - source_id: dsr_extraction_corpus
      source_type: internal_dsr_corpus
      evidence_status: not_yet_mapped
      relevance: Provides scholarly grounding for DSR contribution, evaluation, transparency, validity, and projectability concepts.
    - source_id: documentation_protocol_repository
      source_type: external_protocol_reference
      evidence_status: not_yet_mapped
      relevance: Provides repository and documentation-protocol alignment where mapped.
  related_items:
    upstream_dependencies:
      - item_id: schema_contribution_claim
        path: schemas/dsr-contribution-claim.schema.json
        relationship: validates_this_template_instance
      - item_id: model_contribution
        path: models/dsr-contribution-model.yaml
        relationship: defines_contribution_positioning_logic
      - item_id: vocab_contribution_types
        path: vocabularies/contribution-types.yaml
        relationship: supplies_controlled_values
      - item_id: vocab_knowledge_goals
        path: vocabularies/knowledge-goals.yaml
        relationship: supplies_controlled_values
      - item_id: vocab_knowledge_scopes
        path: vocabularies/knowledge-scopes.yaml
        relationship: supplies_controlled_values
      - item_id: model_evaluation_alignment
        path: models/dsr-evaluation-alignment-model.yaml
        relationship: aligns_claims_to_evaluation_evidence
      - item_id: model_projectability
        path: models/dsr-projectability-model.yaml
        relationship: supports_scope_transfer_and_boundary_condition_fields
      - item_id: model_transparency
        path: models/dsr-transparency-model.yaml
        relationship: supports_contribution_transparency_fields
    downstream_uses:
      - item_id: record_contribution_positioning
        path: records/contributions/record-contribution-positioning-0001.yaml
        relationship: may_use_or_reference_completed_claims
      - item_id: docs_lifecycle_contribution
        path: docs/protocol/02-dsr-lifecycle-and-contribution-model.md
        relationship: may_render_or_explain_contribution_claiming_guidance
      - item_id: checklist_contribution_positioning
        path: checklists/contribution-positioning-checklist.yaml
        relationship: reviews_completed_contribution_claims
  validation:
    expected_format: yaml
    expected_top_level_key: contribution_claim
    schema_validation: "TODO: validate completed instances against schemas/dsr-contribution-claim.schema.json"
