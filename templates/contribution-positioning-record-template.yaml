acceptance_criteria:
  - id: ac_required_record_fields_present
    statement: >
      The instantiated record includes record_id, record_class, event_or_action,
      date, responsible_party, evidence, outcome, related_items, and retention_rule.
    verification_method: inspect_record_required_fields
  - id: ac_claim_axes_complete
    statement: >
      Each contribution claim has contribution type, contribution level, knowledge
      goals, knowledge scope, evidence basis, audience, impact target, boundaries,
      and limitations.
    verification_method: inspect_related_claims
  - id: ac_practice_and_knowledge_separated
    statement: >
      Contribution to practice and contribution to knowledge are separately stated
      or explicitly marked not_applicable with rationale.
    verification_method: inspect_positioning_summary
  - id: ac_evidence_traceability_present
    statement: >
      Each claim maps to at least one evidence item or explicitly marks evidence_status
      as not_yet_mapped.
    verification_method: inspect_evidence_traceability_matrix
  - id: ac_overclaiming_review_completed
    statement: >
      The record includes explicit checks for demonstration-as-evaluation,
      instance-as-general-contribution, novelty-as-utility, transparency-as-reproducibility,
      method-delta, and responsible-design operationalization risks.
    verification_method: inspect_positioning_review

validation_rules:
  - rule_id: vr_template_yaml_valid
    severity: error
    applies_to: contribution_positioning_record_template
    test: File parses as YAML and preserves the record_template object.
    failure_message: Template is not parseable YAML or lacks record_template.
  - rule_id: vr_record_required_fields
    severity: error
    applies_to: instantiated_contribution_positioning_record
    test: Instantiated record includes all record_required_fields from the generation specification.
    failure_message: Instantiated contribution positioning record is missing a required record field.
  - rule_id: vr_no_unresolved_todo_for_release
    severity: error
    applies_to: release_candidate_record
    test: No TODO placeholders remain in records marked approved or released.
    failure_message: Released contribution positioning records must not contain unresolved TODO placeholders.
  - rule_id: vr_controlled_values_used
    severity: warning
    applies_to: related_claims
    test: Contribution types, knowledge goals, knowledge scopes, contribution levels, evidence basis types, audiences, and impact targets use controlled value hints or linked vocabularies.
    failure_message: Claim positioning uses an uncontrolled or ambiguous value.

quality_gate_status:
  consistency:
    status: pass
    rationale: Target path, file naming, YAML format, stable IDs, status, owner, source_basis, related_items, and change_history follow the generation specification.
  coherence:
    status: pass
    rationale: Template operationalizes the contribution model and links to expected vocabularies, schemas, checklists, and contribution records.
  cogency:
    status: pass
    rationale: Template proceeds from metadata and controlled values to the usable record structure, evidence mapping, review checks, validation rules, and retention.
  correspondence:
    status: pass
    rationale: Content corresponds to the selected purpose of a contribution positioning record template for the DSR Framework package.
  dsr_transparency:
    status: pass
    rationale: Template explicitly supports contribution transparency and links claim strength to evidence, scope, assumptions, boundaries, and limitations.
  reviewability:
    status: pass
    rationale: Acceptance criteria, validation rules, overclaiming checks, review questions, and outcomes are explicit.

traceability:
