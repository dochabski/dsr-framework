# SPDX-License-Identifier: CC0-1.0
template:
  id: contribution_positioning_record_template
  title: Contribution Positioning Record Template
  item_type: specification
  portion_type: template
  selection_id: template_contribution_positioning
  target_path: templates/contribution-positioning-record-template.yaml
  purpose: >
    Provide a reusable YAML template for recording how a Design Science Research
    artifact package positions its contribution claims against the DSR contribution
    model, including contribution type, knowledge goal, knowledge scope, contribution
    level, evidence basis, audience, boundaries, limitations, and review outcome.
  status: draft
  version: "0.1.0"
  owner: dsr_framework_maintainers
  conformance_target: l2_reviewable
  output_format: yaml
  intended_users:
    - dsr_researcher
    - artifact_package_author
    - reviewer_or_editor
    - repository_maintainer
  template_scope:
    includes:
      - contribution_claim_positioning
      - contribution_type_classification
      - knowledge_goal_and_scope_classification
      - artifact_utility_quality_and_knowledge_distinction
      - practice_and_research_contribution_separation
      - evidence_and_traceability_mapping
      - boundary_condition_and_limitation_statement
      - overclaiming_review
      - contribution_transparency_recordkeeping
    excludes:
      - full_artifact_specification
      - full_evaluation_plan
      - full_evaluation_report
      - publication_readiness_scoring
      - repository_release_record
    boundary_statement: >
      This template records contribution positioning. It does not itself validate
      artifact utility, prove generalizability, or establish publication readiness.
      Those judgments must be supported by linked artifact, demonstration,
      evaluation, review, and release records.

