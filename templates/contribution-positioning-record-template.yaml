usage_guidance:
  instruction: >
    Copy the record_template object into a new file under records/contributions/,
    rename the record_id and target file path, replace TODO placeholders, and preserve
    source_basis, evidence, outcome, related_items, retention_rule, and change_history.
  minimum_viable_record:
    - record_id
    - record_class
    - event_or_action
    - date
    - responsible_party
    - artifact_or_project_reference
    - positioning_summary
    - related_claims
    - evidence
    - outcome
    - related_items
    - retention_rule
  placeholder_policy:
    - "TODO placeholders identify project-specific facts that must be completed by the record author."
    - "Do not leave TODO placeholders in records intended for review or release."
    - "Use evidence_status: not_yet_mapped only when the evidence item is known to exist but has not yet been linked."
  overclaiming_warning: >
    A contribution positioning record should make the claim reviewable, not stronger.
    If evidence only demonstrates plausible use, do not classify the claim as summatively
    evaluated. If evidence is local, do not classify the claim as nomothetic unless an
    abstraction and boundary rationale is supplied.

