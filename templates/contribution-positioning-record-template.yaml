    source: dsr_framework_selection_table.template_contribution_positioning
    target: template.contribution_positioning_record_template
    relationship: implements_selected_template
    evidence_status: mapped
  - trace_id: tr_spec_to_template_rules
    source: dsr_framework_generation_spec.content_generation_rules
    target: template.contribution_positioning_record_template
    relationship: follows_generation_and_record_rules
    evidence_status: mapped
  - trace_id: tr_model_to_template
    source: models/dsr-contribution-model.yaml
    target: record_template.related_claims
    relationship: operationalizes_contribution_claim_axes_and_validation_rules
    evidence_status: mapped
  - trace_id: tr_template_to_record
    source: template.contribution_positioning_record_template
    target: records/contributions/record-contribution-positioning-0001.yaml
    relationship: can_generate_instantiated_record
    evidence_status: not_yet_mapped

