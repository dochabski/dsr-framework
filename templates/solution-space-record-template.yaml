      statement: project_specific_placeholder
      basis: project_specific_placeholder
      risk_if_false: project_specific_placeholder
  open_questions:
    - question_id: oq_001
      question: project_specific_placeholder
      owner_or_responsible_role: project_specific_placeholder
      due_or_review_stage: project_specific_placeholder

  review_and_validation:
    acceptance_criteria:
      - criterion_id: ac_001
        criterion: Solution-space boundary is explicit.
        pass_condition: In-scope and out-of-scope knowledge sources, technologies, artifacts, and solution approaches are stated.
      - criterion_id: ac_002
        criterion: Search and selection logic is reviewable.
        pass_condition: Sources consulted, search terms or selection logic, inclusion criteria, and limitations are documented.
      - criterion_id: ac_003
        criterion: Candidate solutions are compared or the absence of alternatives is justified.
        pass_condition: At least one candidate is documented with fit, assumptions, risks, constraints, and decision status.
      - criterion_id: ac_004
        criterion: Selected solution direction is traceable.
        pass_condition: Evidence and candidate analysis are linked to design, evaluation, contribution, and projectability implications.
      - criterion_id: ac_005
        criterion: Evidence limits are not overclaimed.
        pass_condition: >
          Unmapped, uncertain, or unsupported evidence is marked with evidence_status
          accepted_v1_limitation or an equivalent uncertainty statement.
    quality_gate_status:
      consistency: project_specific_placeholder - pass | partial | fail | not_reviewed
      coherence: project_specific_placeholder - pass | partial | fail | not_reviewed
      cogency: project_specific_placeholder - pass | partial | fail | not_reviewed
      correspondence: project_specific_placeholder - pass | partial | fail | not_reviewed
      dsr_transparency: project_specific_placeholder - pass | partial | fail | not_reviewed
      reviewability: project_specific_placeholder - pass | partial | fail | not_reviewed
    reviewer_notes: project_specific_placeholder

  retention_rule:
    retention_class: project_record
    minimum_retention: life_of_project_plus_repository_release_lifecycle
    rationale: >
      Retain the solution-space record because it provides evidence of knowledge
      grounding, candidate solution appraisal, design rationale inputs, and
      transparency support for later review, reuse, evaluation, and publication.
