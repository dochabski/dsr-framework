  responsible_design_review:
    values_implicated:
      - project_specific_placeholder - transparency | privacy | security | fairness | accessibility | accountability | sustainability | autonomy | usability | other
    risks_or_harms:
      - risk_id: rd_risk_001
        description: project_specific_placeholder
        affected_stakeholders: []
        mitigation_or_governance: project_specific_placeholder
    transparency_restrictions:
      proprietary_information: project_specific_placeholder - none | limited | substantial | unknown
      privacy_or_security_limits: project_specific_placeholder
      publication_or_repository_implications: project_specific_placeholder
    residual_risks:
