    practice_accessibility_considerations:
      - project_specific_placeholder - Identify whether solution knowledge is understandable and usable by intended practitioner audiences.
    transdisciplinary_fit:
      disciplines_or_knowledge_traditions_integrated: []
      integration_rationale: project_specific_placeholder
