        solution_claim: project_specific_placeholder
        intended_mechanism: project_specific_placeholder
        problem_fit:
          addressed_requirements: []
          unmet_requirements: []
          fit_summary: project_specific_placeholder
        maturity_level: project_specific_placeholder - exploratory | emerging | established | mature | deprecated | unknown
        evidence_strength: project_specific_placeholder - weak | moderate | strong | not_assessed
        expected_utility: project_specific_placeholder
        expected_quality_attributes:
          - project_specific_placeholder - usability | reliability | validity | maintainability | interoperability | transparency | scalability | accessibility | security | other
        context_fit:
          suitable_contexts: []
          unsuitable_contexts: []
          boundary_conditions: []
        assumptions:
          - project_specific_placeholder
        risks_or_harms:
          - risk_id: risk_001
            description: project_specific_placeholder
            severity: project_specific_placeholder - low | medium | high | unknown
            mitigation: project_specific_placeholder
        constraints:
          - project_specific_placeholder
        reuse_constraints:
          license_or_ip: project_specific_placeholder
          privacy_or_security_limits: project_specific_placeholder
          maintenance_burden: project_specific_placeholder
        decision_status: project_specific_placeholder - considered | shortlisted | rejected | adopted | deferred
        decision_rationale: project_specific_placeholder
    comparison_summary:
      preferred_candidate_ids: []
      rejected_candidate_ids: []
      comparison_basis:
        - evidence_strength
        - problem_fit
        - implementation_feasibility
        - risk_profile
        - contribution_potential
        - projectability
      summary: project_specific_placeholder

  solution_space_gap_analysis:
    current_solution_limitations:
      - limitation_id: gap_001
        description: project_specific_placeholder
        affected_requirement_or_objective: project_specific_placeholder
        evidence_reference: project_specific_placeholder
    unresolved_design_needs:
      - need_id: need_001
        description: project_specific_placeholder
        rationale: project_specific_placeholder
        priority: project_specific_placeholder - low | medium | high
    opportunity_space:
      - opportunity_id: opp_001
        description: project_specific_placeholder
        relation_to_problem_class: project_specific_placeholder
        expected_contribution_type: project_specific_placeholder - improvement | extension | synthesis | translation | instantiation | new_design | other
    novelty_or_extension_rationale: >
      project_specific_placeholder - Explain how the proposed artifact or design direction differs from,
      extends, integrates, or operationalizes existing solution knowledge.
    non_goals:
      - project_specific_placeholder - State solution directions intentionally not pursued.

  constraints_and_tradeoffs:
    constraints:
      technical: []
      organizational: []
      data_or_information: []
      ethical_or_responsible_design: []
      legal_or_policy: []
      interoperability: []
      resource_or_schedule: []
      maintenance_or_sustainability: []
      publication_or_repository: []
    tradeoffs:
      - tradeoff_id: tr_001
        option_a: project_specific_placeholder
        option_b: project_specific_placeholder
        decision_relevance: project_specific_placeholder
        evidence_basis: project_specific_placeholder
        unresolved_tension: project_specific_placeholder
        provisional_resolution: project_specific_placeholder

  stakeholder_and_context_fit:
    stakeholders_considered:
      - stakeholder_id: st_001
        role: project_specific_placeholder - researcher | practitioner | reviewer | user | manager | policy_maker | maintainer | other
