template:
  id: template_solution_space
  title: Solution Space Record Template
  portion_type: template
  item_type: specification
  output_format: yaml
  target_path: templates/solution-space-record-template.yaml
  purpose: >
    Provide a reusable YAML template for documenting the solution-space grounding
    of a Design Science Research project, including knowledge bases consulted,
    candidate solution approaches, existing artifacts, design theories, technical
    options, constraints, risks, tradeoffs, and implications for artifact design,
    evaluation, contribution, and projectability.
  status: draft
  version: "0.1.0"
  owner_role: dsr_framework_maintainer
  default_conformance_target: l2_reviewable
  intended_users:
    - dsr_researcher
    - artifact_designer
    - project_reviewer
    - repository_maintainer
  source_basis:
    - source_id: dsr_framework_generation_spec
      relationship: governing_generation_and_quality_rules
      evidence_status: mapped
    - source_id: dsr_framework_generation_prompt
      relationship: governing_generation_procedure
      evidence_status: mapped
    - source_id: dsr_framework_selection_table
      relationship: selected_target_path_and_purpose
      evidence_status: mapped
    - source_id: hevner_et_al_2024_transparency_in_design_science_research
      relationship: solution_space_transparency_source
      evidence_status: mapped
    - source_id: dsr_extraction_corpus
      relationship: scholarly_and_methodological_evidence_base
      evidence_status: partially_mapped
  dependencies:
    - id: solution_space_schema
      path: schemas/solution-space-record.schema.json
      relationship: expected_validation_schema
      status: not_yet_available
      note: >
        The selection table identifies a solution-space schema dependency, but no
        dedicated solution-space schema file is currently listed as a selected
        generated portion. Treat this as an anticipated validation dependency.
    - id: model_transparency
      path: models/dsr-transparency-model.yaml
      relationship: upstream_transparency_model
      status: expected_or_previously_generated
    - id: template_problem_objectives
      path: templates/problem-and-objectives-template.md
      relationship: upstream_problem_space_and_requirements_input
      status: expected_or_previously_generated
    - id: template_design_rationale
      path: templates/design-rationale-template.md
      relationship: downstream_design_decision_input
      status: planned
    - id: template_build_transparency
      path: templates/build-transparency-record-template.yaml
      relationship: downstream_build_record_input
      status: planned
    - id: template_transparency_crosswalk
      path: templates/dsr-transparency-crosswalk-template.yaml
      relationship: downstream_transparency_mapping
      status: planned
  related_items:
    upstream:
      - templates/problem-and-objectives-template.md
      - models/dsr-transparency-model.yaml
      - docs/protocol/10-transparency-and-reporting.md
    downstream:
      - templates/design-rationale-template.md
      - templates/artifact-specification-template.md
      - templates/build-transparency-record-template.yaml
      - templates/evaluation-plan-template.yaml
      - templates/contribution-claim-template.yaml
      - templates/dsr-transparency-crosswalk-template.yaml
    anticipated_validation:
      - schemas/solution-space-record.schema.json
  repository_alignment:
    canonical_directory: templates
    file_naming_rule: lower-kebab-case
    stable_identifier_style: lower_snake_case
    license_expression: CC0-1.0
  change_history:
    - version: "0.1.0"
      date: "2026-04-27"
      change_type: initial_creation
      changed_by: GPT-5.5 Thinking
      summary: Initial reusable solution-space grounding template generated for L2 reviewable conformance.

usage_guidance:
  when_to_use: >
    Use this template after a DSR problem space and objectives have been framed
    and before finalizing design rationale, artifact specification, build plan,
    or evaluation plan. The record should show how the project was grounded in
    existing knowledge and why the selected solution direction is justified.
  minimum_completion_expectation_l2_reviewable:
    - Identify the problem record or problem-space source that this solution-space record addresses.
    - Document the knowledge bases, search logic, and evidence sources consulted.
    - Compare candidate solution approaches or explain why only one plausible option exists.
    - Record assumptions, constraints, boundary conditions, and known gaps.
    - Trace the selected solution direction to design, evaluation, and contribution implications.
    - Mark unsupported or not-yet-reviewed evidence as evidence_status: not_yet_mapped.
  placeholder_policy: >
    Replace TODO values with project-specific content. If information is unknown,
    retain TODO and add a specific note explaining what input is needed.
  evidence_policy: >
    Do not invent scholarly, technical, practitioner, or repository evidence.
    Use source identifiers, citation anchors, repository paths, URLs, or stable
    evidence IDs where available. If source-level evidence has not yet been
    mapped, use evidence_status: not_yet_mapped.

