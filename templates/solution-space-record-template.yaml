        statement: project_specific_placeholder
        source_reference: project_specific_placeholder
        adaptation_needed: project_specific_placeholder
    features_to_adapt:
      - feature_id: feat_001
        source_feature: project_specific_placeholder
        adaptation_rationale: project_specific_placeholder
        target_design_implication: project_specific_placeholder
    features_to_avoid:
      - feature_id: avoid_001
        source_feature_or_pattern: project_specific_placeholder
        reason_to_avoid: project_specific_placeholder
    build_implications:
      - project_specific_placeholder - How this grounding should shape artifact design and development.
    evaluation_implications:
      - project_specific_placeholder - What evaluation criteria, baselines, comparison points, or test contexts follow from the solution-space analysis.
    contribution_implications:
      - project_specific_placeholder - What kind of knowledge contribution the selected solution direction can plausibly support.
    projectability_implications:
      - project_specific_placeholder - What context, boundary, adaptation, or reuse information should be preserved for later projects.

  traceability:
    upstream_problem_items:
      - item_id: project_specific_placeholder
        relationship: addresses_requirement | addresses_problem_class | constrains_solution | informs_boundary
