template:
  id: template_solution_space
  title: Solution Space Record Template
  portion_type: template
  item_type: specification
  output_format: yaml
  target_path: templates/solution-space-record-template.yaml
  purpose: >
    Provide a reusable YAML template for documenting the solution-space grounding
    of a Design Science Research project, including knowledge bases consulted,
    candidate solution approaches, existing artifacts, design theories, technical
    options, constraints, risks, tradeoffs, and implications for artifact design,
    evaluation, contribution, and projectability.
  status: draft
  version: "0.1.0"
  owner_role: dsr_framework_maintainer
  default_conformance_target: l2_reviewable
  intended_users:
    - dsr_researcher
    - artifact_designer
    - project_reviewer
    - repository_maintainer
  source_basis:
    - source_id: dsr_framework_generation_spec
      relationship: governing_generation_and_quality_rules
      evidence_status: mapped
    - source_id: dsr_framework_generation_prompt
      relationship: governing_generation_procedure
      evidence_status: mapped
    - source_id: dsr_framework_selection_table
      relationship: selected_target_path_and_purpose
      evidence_status: mapped
    - source_id: hevner_et_al_2024_transparency_in_design_science_research
      relationship: solution_space_transparency_source
      evidence_status: mapped
    - source_id: dsr_extraction_corpus
      relationship: scholarly_and_methodological_evidence_base
      evidence_status: partially_mapped
  dependencies:
    - id: solution_space_schema
      path: schemas/solution-space-record.schema.json
      relationship: expected_validation_schema
      status: post_v1_minor_release_work
      note: >
        The selection table identifies a solution-space schema dependency, but no
        dedicated solution-space schema file is currently listed as a selected
        generated portion. Treat this as an anticipated validation dependency.
    - id: model_transparency
      path: models/dsr-transparency-model.yaml
      relationship: upstream_transparency_model
      status: expected_or_previously_generated
    - id: template_problem_objectives
      path: templates/problem-and-objectives-template.md
      relationship: upstream_problem_space_and_requirements_input
      status: expected_or_previously_generated
    - id: template_design_rationale
      path: templates/design-rationale-template.md
      relationship: downstream_design_decision_input
      status: planned
    - id: template_build_transparency
      path: templates/build-transparency-record-template.yaml
      relationship: downstream_build_record_input
      status: planned
    - id: template_transparency_crosswalk
      path: templates/dsr-transparency-crosswalk-template.yaml
      relationship: downstream_transparency_mapping
      status: planned
  related_items:
    upstream:
      - templates/problem-and-objectives-template.md
      - models/dsr-transparency-model.yaml
      - docs/protocol/10-transparency-and-reporting.md
    downstream:
      - templates/design-rationale-template.md
      - templates/artifact-specification-template.md
      - templates/build-transparency-record-template.yaml
      - templates/evaluation-plan-template.yaml
      - templates/contribution-claim-template.yaml
      - templates/dsr-transparency-crosswalk-template.yaml
    anticipated_validation:
      - schemas/solution-space-record.schema.json
  repository_alignment:
    canonical_directory: templates
    file_naming_rule: lower-kebab-case
    stable_identifier_style: lower_snake_case
    license_expression: CC0-1.0
  change_history:
    - version: "0.1.0"
      date: "2026-04-27"
      change_type: initial_creation
      changed_by: GPT-5.5 Thinking
      summary: Initial reusable solution-space grounding template generated for L2 reviewable conformance.

usage_guidance:
  when_to_use: >
    Use this template after a DSR problem space and objectives have been framed
    and before finalizing design rationale, artifact specification, build plan,
    or evaluation plan. The record should show how the project was grounded in
    existing knowledge and why the selected solution direction is justified.
  minimum_completion_expectation_l2_reviewable:
    - Identify the problem record or problem-space source that this solution-space record addresses.
    - Document the knowledge bases, search logic, and evidence sources consulted.
    - Compare candidate solution approaches or explain why only one plausible option exists.
    - Record assumptions, constraints, boundary conditions, and known gaps.
    - Trace the selected solution direction to design, evaluation, and contribution implications.
    - Mark unsupported or not-yet-reviewed evidence as evidence_status: accepted_v1_limitation.
  placeholder_policy: >
    Replace project_specific_placeholder values with project-specific content. If information is unknown,
    retain project_specific_placeholder and add a specific note explaining what input is needed.
  evidence_policy: >
    Do not invent scholarly, technical, practitioner, or repository evidence.
    Use source identifiers, citation anchors, repository paths, URLs, or stable
    evidence IDs where available. If source-level evidence has not yet been
    mapped, use evidence_status: accepted_v1_limitation.

solution_space_record:
  record_id: project_specific_placeholder - record-solution-space-0001
  record_class: solution_space_grounding
  title: project_specific_placeholder - Solution Space Record for <project_or_artifact_name>
  event_or_action: solution_space_grounding_documented
  date: project_specific_placeholder - YYYY-MM-DD
  responsible_party:
    name: project_specific_placeholder
    role: project_specific_placeholder - dsr_researcher_or_artifact_designer
    affiliation: project_specific_placeholder
  status: draft
  version: "0.1.0"
  project_context:
    project_id: project_specific_placeholder
    artifact_id: project_specific_placeholder
    artifact_name: project_specific_placeholder
    artifact_type: project_specific_placeholder - construct | model | method | instantiation | framework | taxonomy | ontology | guideline | software | process_model | other
    lifecycle_stage: project_specific_placeholder - problem_framing | objective_definition | design_and_development | demonstration | evaluation | communication | release
    conformance_target: l2_reviewable
    linked_problem_record:
      id: project_specific_placeholder
      path_or_reference: project_specific_placeholder
    linked_objectives_or_requirements:
      - requirement_id: project_specific_placeholder
        requirement_summary: project_specific_placeholder
        source_reference: project_specific_placeholder
    application_domain: project_specific_placeholder
    problem_class: project_specific_placeholder
    local_problem_instance: project_specific_placeholder
    solution_space_boundary: >
      project_specific_placeholder - State the boundary of solution-space inquiry, including what kinds
      of theories, artifacts, technologies, methods, standards, or practitioner
      solutions are in scope and what has intentionally been excluded.

  grounding_questions:
    primary_question: >
      project_specific_placeholder - What existing knowledge, artifacts, theories, technologies, design
      principles, standards, methods, or practitioner solutions can inform the
      design of this artifact for this problem class?
    secondary_questions:
      - question_id: sq_001
        question: project_specific_placeholder - Which prior DSR artifacts or design theories address comparable problem classes?
      - question_id: sq_002
        question: project_specific_placeholder - Which technical or organizational solution approaches are feasible in this context?
      - question_id: sq_003
        question: project_specific_placeholder - Which existing approaches are inadequate, risky, inaccessible, obsolete, or misaligned with project objectives?
      - question_id: sq_004
        question: project_specific_placeholder - What must be adapted, combined, simplified, or newly designed?

  search_and_selection_protocol:
    protocol_summary: >
      project_specific_placeholder - Briefly describe how the solution space was searched, screened,
      selected, and synthesized.
    source_types_consulted:
      scholarly_literature:
        consulted: project_specific_placeholder - true | false
        databases_or_indexes: []
        search_terms: []
        date_range: project_specific_placeholder
        notes: project_specific_placeholder
      dsr_knowledge_base:
        consulted: project_specific_placeholder - true | false
        sources_or_repositories: []
        relevant_dsr_models_or_frameworks: []
        notes: project_specific_placeholder
      existing_artifacts_or_tools:
        consulted: project_specific_placeholder - true | false
        artifact_sources: []
        notes: project_specific_placeholder
      technical_standards_or_protocols:
        consulted: project_specific_placeholder - true | false
        standards_bodies_or_sources: []
        notes: project_specific_placeholder
      practitioner_or_policy_sources:
        consulted: project_specific_placeholder - true | false
        sources: []
        notes: project_specific_placeholder
      organizational_legacy_assets:
        consulted: project_specific_placeholder - true | false
        assets_or_systems: []
        notes: project_specific_placeholder
    inclusion_criteria:
      - criterion_id: inc_001
        criterion: project_specific_placeholder - Directly relevant to the problem class, artifact type, or design objective.
      - criterion_id: inc_002
        criterion: project_specific_placeholder - Provides usable design knowledge, implementation logic, evaluation evidence, or boundary conditions.
    exclusion_criteria:
      - criterion_id: exc_001
        criterion: project_specific_placeholder - Excluded because the source is outside scope, insufficiently evidenced, incompatible, obsolete, inaccessible, or too context-specific.
    screening_and_appraisal:
      screening_method: project_specific_placeholder - narrative_review | structured_review | rapid_scan | expert_selection | repository_review | mixed
      appraisal_criteria:
        - relevance_to_problem_class
        - solution_maturity
        - evidence_strength
        - context_fit
        - adaptability
        - transparency_of_assumptions
        - risk_or_constraint_profile
      selection_rationale: project_specific_placeholder
      search_limitations:
        - project_specific_placeholder - State limitations of the search and screening process.

  knowledge_grounding:
    descriptive_knowledge:
      - knowledge_id: dk_001
        claim_or_finding: project_specific_placeholder
        source_reference: project_specific_placeholder
        relevance_to_design: project_specific_placeholder
        evidence_status: accepted_v1_limitation
    prescriptive_knowledge:
      - knowledge_id: pk_001
        design_guidance_or_rule: project_specific_placeholder
        source_reference: project_specific_placeholder
        relevance_to_design: project_specific_placeholder
        evidence_status: accepted_v1_limitation
    design_theories_or_principles:
      - theory_id: dt_001
        name: project_specific_placeholder
        source_reference: project_specific_placeholder
        constructs_or_principles_used: []
        applicability_rationale: project_specific_placeholder
        limitations_or_boundary_conditions: project_specific_placeholder
        evidence_status: accepted_v1_limitation
    behavioral_or_social_theories:
      - theory_id: bt_001
        name: project_specific_placeholder
        source_reference: project_specific_placeholder
        design_relevance: project_specific_placeholder
        evidence_status: accepted_v1_limitation
    technical_knowledge:
      - technical_item_id: tk_001
        name_or_description: project_specific_placeholder
        source_reference: project_specific_placeholder
        technical_role: project_specific_placeholder - architecture | algorithm | data_model | interface | standard | platform | method | other
        maturity_or_readiness: project_specific_placeholder
        constraints_or_dependencies: []
        evidence_status: accepted_v1_limitation
    existing_artifacts_and_legacy_solutions:
      - artifact_reference_id: ea_001
        artifact_name: project_specific_placeholder
        artifact_type: project_specific_placeholder
        source_or_repository: project_specific_placeholder
        use_context: project_specific_placeholder
        relevant_features: []
        limitations: []
        reuse_or_license_constraints: project_specific_placeholder
        evidence_status: accepted_v1_limitation
    negative_cases_or_failed_solutions:
      - negative_case_id: nc_001
        source_reference: project_specific_placeholder
        failure_or_limitation: project_specific_placeholder
        lesson_for_current_design: project_specific_placeholder
        evidence_status: accepted_v1_limitation

  candidate_solution_analysis:
    candidates:
      - candidate_id: cand_001
        name: project_specific_placeholder
        candidate_type: project_specific_placeholder - theory | artifact | method | framework | technology | process | standard | hybrid | other
