        evidence_type: project_specific_placeholder - scholarly_source | design_theory | existing_artifact | technical_standard | practitioner_source | internal_document | evaluation_report | other
        source_reference: project_specific_placeholder
        citation_anchor_or_identifier: project_specific_placeholder
        summary: project_specific_placeholder
        relevance_to_solution_space: project_specific_placeholder
        confidence: project_specific_placeholder - low | medium | high | not_assessed
        evidence_status: accepted_v1_limitation
