# SPDX-License-Identifier: CC0-1.0
---
template:
  item_id: evaluation_plan_template
  item_type: template
  title: DSR Evaluation Plan Template
  purpose: >
    Provide a reusable, reviewable YAML template for planning Design Science
    Research evaluation activities before, during, and after artifact construction.
    The template helps researchers align evaluation questions, claims, evidence,
    criteria, methods, stakeholders, validity threats, reliability controls,
    transparency obligations, and contribution claims.
  status: draft
  version: "0.1.0"
  owner: "project_specific_placeholder: responsible role or maintainer"
  target_path: templates/evaluation-plan-template.yaml
  default_conformance: l2_reviewable
  intended_users:
    - dsr_researcher
    - artifact_designer
    - evaluator
    - reviewer
    - project_stakeholder
  related_items:
    upstream_dependencies:
      - id: schema_evaluation_plan
        path: schemas/dsr-evaluation-plan.schema.json
        relationship: should_validate_instances_of_this_template
      - id: model_evaluation_alignment
        path: models/dsr-evaluation-alignment-model.yaml
        relationship: supplies_evaluation_alignment_concepts
      - id: vocab_evaluation_methods
        path: vocabularies/evaluation-method-families.yaml
        relationship: supplies_controlled_method_families
      - id: vocab_validity_types
        path: vocabularies/validity-types.yaml
        relationship: supplies_validity_terms
      - id: vocab_reliability_types
        path: vocabularies/reliability-types.yaml
        relationship: supplies_reliability_terms
      - id: vocab_replication_types
        path: vocabularies/replication-types.yaml
        relationship: supplies_replication_terms
      - id: vocab_projectability_types
        path: vocabularies/projectability-types.yaml
        relationship: supplies_projectability_terms
      - id: model_transparency
        path: models/dsr-transparency-model.yaml
        relationship: supplies_transparency_dimensions
    downstream_records:
      - id: record_evaluation_plan
        path: records/evaluations/record-evaluation-plan-0001.yaml
        relationship: may_be_instantiated_from_this_template
      - id: template_evaluation_report
        path: templates/evaluation-report-template.yaml
        relationship: should_receive_results_from_this_plan
      - id: checklist_evaluation_readiness
        path: checklists/evaluation-readiness-checklist.yaml
        relationship: should_review_instances_of_this_template
  source_basis:
    - source_id: dsr_framework_generation_spec
      evidence_status: mapped
      relevance: >
        Establishes repository conventions, required metadata, L2 reviewability,
        quality gates, traceability expectations, and output rules for templates.
    - source_id: dsr_framework_generation_prompt
      evidence_status: mapped
      relevance: >
        Requires template files to be directly usable by researchers, with project_specific_placeholder
        placeholders only where project-specific information is required.
    - source_id: dsr_extraction_corpus
      evidence_status: partially_mapped
      relevance: >
        Supplies DSR evaluation concepts, including formative and summative
        evaluation, artificial and naturalistic evaluation, artifact utility,
        artifact quality, contribution evidence, validity, reliability,
        replication, and transparency.
    - source_id: venable_feds_family
      evidence_status: accepted_v1_limitation
      relevance: >
        Expected source family for formative, summative, artificial, and
        naturalistic evaluation distinctions.
    - source_id: hevner_transparency_family
      evidence_status: accepted_v1_limitation
      relevance: >
        Expected source family for evaluation transparency and stakeholder
        confidence requirements.
  assumptions:
    - >
      The instantiated plan is created before the evaluation report and should
      not contain final results except as planning assumptions or known baseline
      evidence.
    - >
      Evaluation may address artifact utility, artifact quality, contribution to
      knowledge, or a combination of these; the plan must explicitly distinguish
      them.
    - >
      Demonstration can support evaluation readiness or plausibility but should
      not be mislabeled as evaluation unless it uses explicit evaluation criteria
      and evidence.
  limitations:
    - >
      This template does not prescribe a single evaluation method. Method choice
      must be justified by artifact type, claim type, lifecycle stage, stakeholder
      context, risk, and contribution scope.
    - >
      This template supports L2 reviewability by default. Stronger conformance
      levels may require executable validation, external review, replication
      packages, release evidence, or archival metadata.
  open_questions:
    - question_id: oq_evaluation_metric_enumerations
      question: >
        Which evaluation metrics should be enumerated by controlled vocabulary
        rather than left as project-specific text?
      status: open
    - question_id: oq_evidence_thresholds
      question: >
        Which evidence thresholds should be required for L3, L4, and L5
        conformance in future schema versions?
      status: open
  change_history:
    - version: "0.1.0"
      date: "2026-04-27"
      change: Initial reusable evaluation plan template generated.
      responsible_party: GPT-5.5 Thinking

evaluation_plan:
  plan_id: "project_specific_placeholder: stable lower_snake_case evaluation plan identifier"
  plan_type: dsr_evaluation_plan
  title: "project_specific_placeholder: concise title of the evaluation plan"
  status: draft
  version: "0.1.0"
  date_created: "project_specific_placeholder: YYYY-MM-DD"
  date_updated: "project_specific_placeholder: YYYY-MM-DD or null"
  responsible_party:
    name: "project_specific_placeholder: person or role responsible for the evaluation plan"
    role: "project_specific_placeholder: principal investigator, artifact owner, evaluator, reviewer, or other role"
    affiliation: "project_specific_placeholder: organization or project unit"
  project_identity:
    dsr_project_id: "project_specific_placeholder: linked DSR project identifier"
    project_title: "project_specific_placeholder: project title"
    artifact_id: "project_specific_placeholder: linked artifact identifier"
    artifact_name: "project_specific_placeholder: artifact name"
    artifact_type: "project_specific_placeholder: controlled artifact type, such as construct, model, method, instantiation, framework, taxonomy, ontology, process_model, tool, or package"
    artifact_version_under_evaluation: "project_specific_placeholder: version, commit, release, or configuration"
    evaluation_scope:
      scope_type: "project_specific_placeholder: component, artifact_instance, artifact_type, process, method, package, or contribution_claim"
      included_components:
        - "project_specific_placeholder: artifact component, module, feature, procedure, or documentation item included"
      excluded_components:
        - "project_specific_placeholder: artifact component, module, feature, procedure, or documentation item excluded"
      boundary_rationale: "project_specific_placeholder: why this evaluation scope is appropriate"
  evaluation_purpose:
    primary_purpose: "project_specific_placeholder: formative_improvement, summative_judgment, contribution_support, risk_reduction, readiness_review, replication_support, or mixed"
    lifecycle_stage: "project_specific_placeholder: problem_framing, requirements, design, build, demonstration, evaluation, contribution_positioning, dissemination, release, maintenance, or retirement"
    evaluation_timing:
      - "project_specific_placeholder: formative, summative, ex_ante, ex_post, continuous, or longitudinal"
    evaluation_setting:
      - "project_specific_placeholder: artificial_setting, naturalistic_setting, laboratory, field, simulation, expert_review, literature_based_argument, archival_review, technical_test, user_study, case_study, pilot, or operational_use"
    intended_decision_supported: "project_specific_placeholder: what decision this plan is intended to support"
    intended_audiences:
      - audience_id: "project_specific_placeholder: researcher, reviewer, practitioner, manager, policymaker, technical_maintainer, stakeholder_group, or public_user"
        information_need: "project_specific_placeholder: what this audience needs from the evaluation"
  claims_under_evaluation:
    - claim_id: "project_specific_placeholder: claim_001"
      claim_text: "project_specific_placeholder: specific evaluable claim"
      claim_type: "project_specific_placeholder: utility_claim, quality_claim, contribution_claim, validity_claim, reliability_claim, projectability_claim, transparency_claim, responsible_design_claim, or other"
      claim_scope: "project_specific_placeholder: idiographic_local, projectable_to_problem_class, nomothetic_general, mixed, or unclear"
      related_artifact_component: "project_specific_placeholder: linked component or null"
      expected_evidence_level: "project_specific_placeholder: plausibility, feasibility, effectiveness, efficiency, adoption, usability, reliability, validity, comparative_advantage, transferability, or other"
      rationale_for_evaluation: "project_specific_placeholder: why this claim must be evaluated"
      evidence_status: planned
  evaluation_questions:
    - question_id: "project_specific_placeholder: eq_001"
      question: "project_specific_placeholder: evaluative question linked to one or more claims"
      linked_claim_ids:
        - "project_specific_placeholder: claim_001"
      decision_relevance: "project_specific_placeholder: how answering this question affects artifact design, acceptance, reuse, or contribution positioning"
      evaluation_target: "project_specific_placeholder: artifact_utility, artifact_quality, contribution_to_knowledge, implementation_feasibility, stakeholder_acceptance, risk_control, or mixed"
      success_criteria:
        - criterion_id: "project_specific_placeholder: crit_001"
          criterion: "project_specific_placeholder: criterion name"
          operational_definition: "project_specific_placeholder: how the criterion is interpreted in this project"
          threshold_or_decision_rule: "project_specific_placeholder: pass/fail, minimum acceptable value, comparative benchmark, qualitative standard, or review judgment"
          evidence_required:
            - "project_specific_placeholder: data, observation, log, test result, expert judgment, user feedback, citation, artifact inspection, or other evidence"
          failure_condition: "project_specific_placeholder: what would count as failing this criterion"
  evaluation_design:
    overall_strategy: "project_specific_placeholder: concise design summary"
    evaluation_pathway:
      artificial_evaluation:
        planned: "project_specific_placeholder: true or false"
        rationale: "project_specific_placeholder: why artificial evaluation is or is not appropriate"
        methods:
          - method_id: "project_specific_placeholder: method_artificial_001"
            method_family: "project_specific_placeholder: controlled method family from evaluation-method-families vocabulary"
            method_name: "project_specific_placeholder: method name"
            method_description: "project_specific_placeholder: what will be done"
            evaluation_question_ids:
              - "project_specific_placeholder: eq_001"
            units_of_analysis:
              - "project_specific_placeholder: artifact component, scenario, case, user, task, document, transaction, or record"
            data_to_collect:
              - "project_specific_placeholder: metric, observation, document, trace, interview, survey response, log, or test output"
            instruments_or_materials:
              - "project_specific_placeholder: rubric, test script, scenario, checklist, survey, interview protocol, benchmark, dataset, or code"
            sampling_or_selection_logic: "project_specific_placeholder: how units, scenarios, cases, or reviewers are selected"
            procedure_summary:
              - step_id: "project_specific_placeholder: step_001"
                action: "project_specific_placeholder: action to perform"
                expected_output: "project_specific_placeholder: output, evidence, or record created by the step"
            analysis_plan: "project_specific_placeholder: how collected evidence will be analyzed"
            limitations: "project_specific_placeholder: known limits of this method"
      naturalistic_evaluation:
        planned: "project_specific_placeholder: true or false"
        rationale: "project_specific_placeholder: why naturalistic evaluation is or is not appropriate"
        methods:
          - method_id: "project_specific_placeholder: method_naturalistic_001"
            method_family: "project_specific_placeholder: controlled method family from evaluation-method-families vocabulary"
            method_name: "project_specific_placeholder: method name"
            method_description: "project_specific_placeholder: what will be done in a real or realistic use context"
            evaluation_question_ids:
              - "project_specific_placeholder: eq_001"
            use_context: "project_specific_placeholder: organizational, educational, technical, social, or domain context"
            participants_or_stakeholders:
              - stakeholder_role: "project_specific_placeholder: role"
                involvement: "project_specific_placeholder: observation, use, interview, review, co-design, approval, or other"
            data_to_collect:
              - "project_specific_placeholder: metric, observation, document, trace, interview, survey response, log, or outcome indicator"
            procedure_summary:
              - step_id: "project_specific_placeholder: step_001"
                action: "project_specific_placeholder: action to perform"
                expected_output: "project_specific_placeholder: output, evidence, or record created by the step"
            analysis_plan: "project_specific_placeholder: how evidence will be analyzed"
            limitations: "project_specific_placeholder: known limits of this method"
    comparison_logic:
      comparison_type: "project_specific_placeholder: no_comparison, baseline, pre_post, benchmark, alternative_artifact, expert_standard, historical_case, theoretical_expectation, or mixed"
      comparator_description: "project_specific_placeholder: comparator or baseline description"
      rationale: "project_specific_placeholder: why this comparison is appropriate or why no comparison is used"
    demonstration_relationship:
      demonstration_present_or_planned: "project_specific_placeholder: true or false"
      demonstration_record_id: "project_specific_placeholder: linked demonstration record or null"
      distinction_from_evaluation: >
        project_specific_placeholder: explain whether demonstration is only showing use/feasibility or is
        also being treated as evaluation with explicit criteria and evidence.
  evidence_plan:
    evidence_items:
      - evidence_id: "project_specific_placeholder: ev_001"
        evidence_type: "project_specific_placeholder: quantitative_metric, qualitative_observation, document_review, expert_judgment, user_feedback, technical_test, log_data, archival_record, citation, or mixed"
        linked_question_ids:
          - "project_specific_placeholder: eq_001"
        linked_claim_ids:
          - "project_specific_placeholder: claim_001"
        source_or_collection_method: "project_specific_placeholder: where the evidence comes from"
        collection_timing: "project_specific_placeholder: before_build, during_build, after_build, during_use, after_use, longitudinal, or other"
        storage_location: "project_specific_placeholder: repository path, record ID, dataset ID, or secure location"
        access_constraints: "project_specific_placeholder: none, privacy, proprietary, security, embargo, consent_required, or other"
        quality_controls:
          - "project_specific_placeholder: calibration, reviewer training, instrument validation, audit trail, duplicate coding, version control, or other"
        retention_rule: "project_specific_placeholder: how long evidence must be retained and where"
    evidence_sufficiency_rationale: "project_specific_placeholder: why the planned evidence is sufficient for L2 reviewability"
  data_management_and_ethics:
    human_participants_involved: "project_specific_placeholder: true, false, or unknown"
    ethics_review_required: "project_specific_placeholder: true, false, unknown, or not_applicable"
    ethics_review_status: "project_specific_placeholder: not_started, submitted, approved, exempt, not_required, or unknown"
    privacy_considerations:
      - "project_specific_placeholder: personal data, de-identification, consent, restricted access, or not_applicable"
    security_considerations:
      - "project_specific_placeholder: system access, vulnerability exposure, credential handling, secure storage, or not_applicable"
    proprietary_or_ip_constraints:
      - "project_specific_placeholder: proprietary data, protected code, licensing, trade secret, or not_applicable"
    responsible_design_values_considered:
      - "project_specific_placeholder: transparency, accountability, privacy, accessibility, fairness, sustainability, safety, usability, or other"
  validity_and_reliability_plan:
    validity_threats:
      - threat_id: "project_specific_placeholder: val_threat_001"
        validity_type: "project_specific_placeholder: construct_validity, internal_validity, conclusion_validity, external_validity, ecological_validity, evaluation_validity, artifact_validity, context_validity, or other"
        threat_description: "project_specific_placeholder: threat to credible interpretation"
        likely_effect: "project_specific_placeholder: how this threat could distort findings or claims"
        mitigation: "project_specific_placeholder: planned mitigation"
        residual_risk: "project_specific_placeholder: low, moderate, high, or unknown"
    reliability_controls:
      - control_id: "project_specific_placeholder: rel_control_001"
        reliability_target: "project_specific_placeholder: measure_reliability, evaluator_reliability, process_reliability, artifact_reliability, implementation_reliability, or method_reliability"
        control_description: "project_specific_placeholder: planned control"
        evidence_to_record: "project_specific_placeholder: what evidence will show the control was used"
    replication_and_projectability:
      replication_type_supported: "project_specific_placeholder: exact_replication, direct_replication, conceptual_replication, differentiated_replication, reuse, adaptation, transfer, or not_applicable"
      projectability_claim: "project_specific_placeholder: what can reasonably be projected beyond the evaluation setting"
      boundary_conditions:
        - "project_specific_placeholder: context, population, artifact version, organizational constraint, domain condition, or technical condition"
      reuse_requirements:
        - "project_specific_placeholder: documentation, code, data, configuration, training, license, or environment required for reuse"
  transparency_plan:
    transparency_dimensions:
      process_transparency:
        required: true
        planned_materials:
          - "project_specific_placeholder: activity log, decision record, design rationale, review notes, or workflow trace"
      problem_space_transparency:
        required: true
        planned_materials:
          - "project_specific_placeholder: problem statement, stakeholder map, requirements, success criteria, context boundary, or risk register"
      solution_space_transparency:
        required: true
        planned_materials:
          - "project_specific_placeholder: literature basis, alternative artifacts, technology baseline, design precedent, or theory grounding"
      build_transparency:
        required: true
        planned_materials:
          - "project_specific_placeholder: build record, design rationale, version history, commit trace, prototype notes, or configuration record"
      evaluation_transparency:
        required: true
        planned_materials:
          - "project_specific_placeholder: this evaluation plan, instruments, data dictionary, evaluation report, analysis notes, or evidence index"
      contribution_transparency:
        required: true
        planned_materials:
          - "project_specific_placeholder: contribution claim, positioning record, publication argument, practice implication, or knowledge contribution map"
    transparency_risk_controls:
      - risk_id: "project_specific_placeholder: trans_risk_001"
        risk: "project_specific_placeholder: information_overload, burden, privacy, security, intellectual_property, proprietary_information, misinterpretation, or other"
        mitigation: "project_specific_placeholder: how transparency will be balanced with risk"
  analysis_and_interpretation_plan:
    analysis_methods:
      - analysis_id: "project_specific_placeholder: analysis_001"
        analysis_type: "project_specific_placeholder: descriptive_statistics, inferential_statistics, thematic_analysis, rubric_scoring, trace_analysis, comparative_analysis, expert_synthesis, argumentation, or mixed"
        linked_evidence_ids:
          - "project_specific_placeholder: ev_001"
        output: "project_specific_placeholder: table, narrative finding, score, model, decision, claim update, or report section"
    interpretation_rules:
      - rule_id: "project_specific_placeholder: interp_rule_001"
        condition: "project_specific_placeholder: condition or evidence pattern"
        interpretation: "project_specific_placeholder: claim supported, claim partially supported, claim not supported, redesign required, more evidence required, or other"
    uncertainty_reporting: "project_specific_placeholder: how uncertainty, limitations, missing data, disagreement, or mixed findings will be reported"
  decision_and_action_plan:
    possible_decisions:
      - decision_id: "project_specific_placeholder: decision_001"
        decision: "project_specific_placeholder: proceed_to_build, revise_artifact, conduct_additional_evaluation, release, reject_claim, narrow_claim, broaden_evidence, or other"
        evidence_needed:
          - "project_specific_placeholder: evidence or criterion required"
        responsible_party: "project_specific_placeholder: role or person"
    feedback_into_design:
      planned_feedback_loop: "project_specific_placeholder: how evaluation findings will affect artifact design or documentation"
      related_record_types:
        - design_decision_record
        - evaluation_report
        - review_record
        - contribution_positioning_record
  acceptance_criteria:
    - criterion_id: ac_l2_reviewable_001
      criterion: Evaluation questions are explicitly linked to artifact, quality, utility, or contribution claims.
      pass_condition: Every evaluation question lists at least one linked claim or evaluation target.
    - criterion_id: ac_l2_reviewable_002
      criterion: Evaluation methods are justified by claim type and lifecycle stage.
      pass_condition: Every planned method includes rationale, data to collect, procedure, and analysis plan.
    - criterion_id: ac_l2_reviewable_003
      criterion: Demonstration and evaluation are distinguished.
      pass_condition: The demonstration_relationship field explains whether demonstration evidence is separate from or part of evaluation.
    - criterion_id: ac_l2_reviewable_004
      criterion: Validity threats and reliability controls are documented.
      pass_condition: At least one validity threat and one reliability control are listed, or a not_applicable rationale is provided.
    - criterion_id: ac_l2_reviewable_005
      criterion: Evaluation transparency materials are identified.
      pass_condition: The transparency_plan identifies planned materials for evaluation transparency and at least one additional relevant transparency dimension.
  validation_rules:
    required_fields:
      - evaluation_plan.plan_id
      - evaluation_plan.title
      - evaluation_plan.project_identity.artifact_id
      - evaluation_plan.evaluation_purpose.primary_purpose
      - evaluation_plan.claims_under_evaluation
      - evaluation_plan.evaluation_questions
      - evaluation_plan.evaluation_design
      - evaluation_plan.evidence_plan
      - evaluation_plan.validity_and_reliability_plan
      - evaluation_plan.transparency_plan
      - evaluation_plan.acceptance_criteria
    controlled_value_expectations:
      - field: evaluation_plan.evaluation_purpose.primary_purpose
        expected_source: evaluation alignment model or schema enumeration
      - field: evaluation_plan.evaluation_purpose.lifecycle_stage
        expected_source: lifecycle stages vocabulary
      - field: evaluation_plan.evaluation_design.*.methods.method_family
        expected_source: evaluation-method-families vocabulary
      - field: evaluation_plan.validity_and_reliability_plan.validity_threats.validity_type
        expected_source: validity-types vocabulary
      - field: evaluation_plan.validity_and_reliability_plan.reliability_controls.reliability_target
        expected_source: reliability-types vocabulary
    review_notes:
      - >
        A reviewer should reject or return the plan for revision if evaluation
        methods do not correspond to the stated claims.
      - >
        A reviewer should require claim narrowing if the proposed evidence is
        insufficient for the declared contribution scope.
  failure_modes:
    - failure_mode_id: fm_claim_method_mismatch
      description: The selected method cannot reasonably evaluate the stated claim.
      remediation_guidance: Narrow the claim, change the method, add additional evidence, or revise the evaluation question.
    - failure_mode_id: fm_demonstration_overclaimed_as_evaluation
      description: The plan treats a use demonstration as evaluative proof without explicit criteria or evidence.
      remediation_guidance: Reclassify as demonstration or add criteria, evidence, and analysis logic.
    - failure_mode_id: fm_missing_context_boundary
      description: The plan omits boundary conditions needed for projectability or replication.
      remediation_guidance: Add context, stakeholder, artifact-version, and environmental constraints.
    - failure_mode_id: fm_unmanaged_transparency_risk
      description: The plan requires openness that may expose privacy, security, proprietary, or intellectual-property risks.
      remediation_guidance: Add access controls, redaction, abstraction, repository restrictions, or a justified transparency limit.
  traceability:
    - trace_id: tr_template_to_schema
      source: templates/evaluation-plan-template.yaml
      target: schemas/dsr-evaluation-plan.schema.json
      relationship: should_be_validated_by
      evidence_status: not_yet_verified
    - trace_id: tr_plan_to_report
      source: templates/evaluation-plan-template.yaml
      target: templates/evaluation-report-template.yaml
      relationship: supplies_planned_questions_methods_criteria_and_evidence_requirements
      evidence_status: planned
    - trace_id: tr_plan_to_contribution_claim
      source: templates/evaluation-plan-template.yaml
      target: templates/contribution-claim-template.yaml
      relationship: provides_evidence_plan_for_claim_support
      evidence_status: planned
  retention_rule:
    retain_as: controlled_template
    minimum_retention: life_of_repository
    rationale: >
      The template governs reusable evaluation planning records and should remain
      available for review, reuse, schema alignment, and historical traceability.
