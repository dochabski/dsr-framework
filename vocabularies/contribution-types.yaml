      evidence_status: not_yet_mapped

  quality_and_conformance:
    conformance_level: l2_reviewable
    acceptance_criteria:
      - id: ct_ac_001
        criterion: The file is valid YAML and uses lower-kebab-case target path conventions.
        status: pass
      - id: ct_ac_002
        criterion: Each vocabulary entry includes id, label, definition, allowed_use, boundary_notes, related_terms, and source_basis.
        status: pass
      - id: ct_ac_003
        criterion: The vocabulary distinguishes contribution type from artifact type, knowledge goal, knowledge scope, and evaluation method.
        status: pass
      - id: ct_ac_004
        criterion: The vocabulary includes reviewable validation rules and traceability placeholders.
        status: pass
      - id: ct_ac_005
        criterion: Corpus-derived terms are marked with evidence status rather than unsupported bibliographic claims.
        status: pass
    quality_gate_status:
      consistency: pass
      coherence: pass
      cogency: pass
      correspondence: pass
      dsr_transparency: pass
      reviewability: pass

  assumptions:
    - id: ct_as_001
      statement: >
        The contribution vocabulary should include both classic contribution-grid
        quadrants and normalized DSR corpus contribution labels.
      impact: >
        Enables coding of both artifact-level novelty/significance and framework-
        level methodological/theoretical contributions.
    - id: ct_as_002
      statement: >
        The vocabulary is intentionally reviewable rather than final; downstream
        schema enumerations may later narrow or split entries.
      impact: >
        Maintains compatibility with future model_contribution and contribution-claim schema work.

  limitations:
    - id: ct_lim_001
      statement: >
        Exact bibliographic anchors are represented through corpus source IDs and
        evidence_status values; final publication preparation should map each
        controlled entry to explicit source-basis records.
    - id: ct_lim_002
      statement: >
        This vocabulary does not provide a scoring algorithm for maturity or
        novelty; reviewers must justify classification using project evidence.

  open_questions:
    - id: ct_oq_001
      question: >
        Should domain_application remain a controlled contribution type or move
        to genre_types or contribution_to_practice fields?
      disposition: retain_for_now_as_secondary_type
    - id: ct_oq_002
      question: >
        Should representation_extension and reporting_extension become separate
        entries or remain subcases of method_extension?
      disposition: defer_until_model_contribution_generation
    - id: ct_oq_003
      question: >
        Should replication-oriented contribution types be included here or only
        in vocabularies/replication-types.yaml?
      disposition: defer_to_replication_vocabulary

  related_items:
