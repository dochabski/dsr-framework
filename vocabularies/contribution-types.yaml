      relation: grounded_in_dsr_corpus_contribution_types
      evidence_status: mapped_to_corpus_extracts
    - trace_id: ct_trace_004
      source: models/dsr-contribution-model.yaml
      target: vocabulary.entries
      relation: upstream_dependency_placeholder
      evidence_status: not_yet_mapped
    - trace_id: ct_trace_005
