# SPDX-License-Identifier: CC0-1.0
vocabulary:
  id: vocab_artifact_types
  title: Controlled Artifact Taxonomy
  target_path: vocabularies/artifact-types.yaml
  item_type: vocabulary
  purpose: >
    Provide a controlled vocabulary for classifying Design Science Research artifacts
    in the DSR Framework. The vocabulary supports artifact profiles, artifact
    specifications, contribution claims, evaluation plans, schemas, templates,
    checklists, and publication-readiness review.
  status: draft
  version: "0.1.0"
  owner: dsr_framework_maintainers
  conformance_target: l2_reviewable
  selection:
    selection_id: vocab_artifact_types
    portion_type: vocabulary
    output_format: yaml
    default_conformance: L2
    key_dependencies:
      - DSR lifecycle spec
  scope:
    includes:
      - controlled labels for conceptual, procedural, technical, evaluative, and package-level DSR artifact forms
      - boundary notes for distinguishing artifact type from contribution type, evidence type, and lifecycle stage
      - validation implications for downstream schemas and review checklists
    excludes:
      - domain-specific taxonomies of every possible information system or technology
      - contribution-significance levels such as routine design, improvement, invention, or exaptation
      - evaluation-method families, validity types, reliability types, replication types, and projectability types
    governing_distinctions:
      - id: artifact_type_vs_contribution_type
        statement: >
          Artifact type classifies what kind of designed object, specification, representation,
          procedure, or package is being produced. Contribution type classifies how the work
          advances knowledge or practice.
      - id: artifact_universal_vs_instance
        statement: >
          A reusable artifact kind, design specification, or design knowledge object should be
          distinguished from a local implementation, prototype, deployment, or evidence instance.
      - id: demonstration_vs_evaluation
        statement: >
          A demonstration shows use or feasibility; an evaluation makes a warranted quality,
          utility, outcome, validity, or contribution claim.
      - id: artifact_quality_vs_utility
        statement: >
          Artifact quality concerns properties of the artifact or specification. Artifact utility
          concerns usefulness in a context of use. Both should be traceable but not collapsed.

source_basis:
  - source_id: dsr_framework_generation_spec
    source_type: project_specification
    evidence_status: mapped
    role: >
      Governs repository architecture, vocabulary file conventions, common metadata,
      traceability expectations, and reviewability requirements.
  - source_id: dsr_framework_generation_prompt
    source_type: project_prompt
    evidence_status: mapped
    role: >
      Governs the generation procedure, vocabulary entry shape, and final quality expectations.
  - source_id: dsr_framework_selection_table
    source_type: project_selection_registry
    evidence_status: mapped
    role: >
      Identifies vocab_artifact_types as vocabularies/artifact-types.yaml with L2 default
      conformance and DSR lifecycle specification dependency.
  - source_id: march_smith_1995_artifact_typology_via_dsr_corpus
    source_type: scholarly_source_family
    evidence_status: mapped
    role: >
      Supports the canonical DSR artifact-family baseline of constructs, models, methods,
      and instantiations.
  - source_id: hevner_et_al_2004_and_gregor_hevner_2013_via_dsr_corpus
    source_type: scholarly_source_family
    evidence_status: mapped
    role: >
      Supports DSR artifact creation, evaluation, utility, design knowledge, and contribution
      positioning across constructs, models, methods, instantiations, and design theories.
  - source_id: weigand_johannesson_andersson_2021_artifact_ontology_for_dsr
    source_type: scholarly_source
    evidence_status: mapped
    role: >
      Supports artifact ontology distinctions among artifact universals, artifact instances,
      make plans, use plans, capacities, technical objects, symbolic artifacts, and IS artifacts.
  - source_id: hevner_et_al_2024_transparency_in_design_science_research
    source_type: scholarly_source
    evidence_status: mapped
    role: >
      Supports classification of artifacts and artifact packages in relation to process,
      problem-space, solution-space, build, evaluation, and contribution transparency.
  - source_id: akoka_et_al_2023_knowledge_contributions_in_dsr
    source_type: scholarly_source
    evidence_status: mapped
    role: >
      Supports graph-based and strategy-based DSR knowledge artifacts, including constructs,
      taxonomies, guidelines, and process models for cumulative design knowledge.

